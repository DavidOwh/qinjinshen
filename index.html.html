慧，也没有智慧！当我们找的是虚空，得到的就是虚空！相反地，当我们渴慕真理，就会得到真理！\n\n所罗门晚年离弃神，因此他再怎么寻找，也找不到智慧了（参27节），因为他所找寻的对象，通通都是错误的！亲爱的弟兄姐妹，神造我们原是好的，可是人自以为聪明（参29节）、不要神，以致承受害人又害己的后果。但愿我们藉著相信耶稣基督，重生得救，就能按照神的启示来寻找祂，而不是照自己的意思迷迷糊糊寻找神；在耶稣基督的里面，得著真正丰盛的生命！\n\n回应：主啊！求祢赐给我谦卑渴慕祢的心，好让我能明白祢的话语，并能在祢的里面，得著真正丰盛的生命！奉主的名求，阿们！\n\n祷读：诗篇二十七篇8节 \n祢说：「你们当寻求我的面。」那时我心向祢说：「耶和华啊，祢的面我正要寻求。」\n\nQT: 传道书七章15~29节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "15 有义人行义，反致灭亡；有恶人行恶，倒享长寿。这都是我在虚度之日中所见过的。\n16 不要行义过分，也不要过于自逞智慧，何必自取败亡呢？\n17 不要行恶过分，也不要为人愚昧，何必不到期而死呢？\n18 你持守这个为美，那个也不要松手；因为敬畏神的人，必从这两样出来。\n19 智慧使有智慧的人比城中十个官长更有能力。\n20 时常行善而不犯罪的义人，世上实在没有。\n21 人所说的一切话，你不要放在心上，恐怕听见你的仆人咒诅你。\n22 因为你心里知道，自己也曾屡次咒诅别人。\n23 我曾用智慧试验这一切事；我说，要得智慧，智慧却离我远。\n24 万事之理，离我甚远，而且最深，谁能测透呢？\n25 我转念，一心要知道，要考察，要寻求智慧和万事的理由；又要知道邪恶为愚昧，愚昧为狂妄。\n26 我得知有等妇人比死还苦：她的心是网罗，手是锁炼。凡蒙神喜悦的人必能躲避她；有罪的人却被她缠住了。\n27 传道者说：“看哪，一千男子中，我找到一个正直人，但众女子中，没有找到一个。”我将这事一一比较，要寻求其理，我心仍要寻找，却未曾找到。\n28 并于上节\n29 我所找到的只有一件，就是神造人原是正直，但他们寻出许多巧计。"}, "12-1": {"theme": "敬畏神的智慧", "scripture": "传道书八章1~17节", "url": "https://www.youtube.com/watch?v=K5OHA9A8NSc&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=11", "videoId": "K5OHA9A8NSc", "date_cn": "1/12/26(二)", "description": "主题：敬畏神的智慧\n经文：传道书八章1~17节\n\n一个因敬畏神而有智慧的人，就像是传道书七章19节所言──他是大有能力的人，他不但能够解释事情（参1节），也能够解决问题！这样的人能够「辨明时候和定理」（参5节），也就是在敬畏神的前提之下，按照不同状况作出活泼、适切的回应。\n\n作者在第2至5节，以面对国家掌权者为例，告诉我们如何在各样情境中，操练成为敬畏神的人。而这样的例子让我们看到─当人敬畏神，即便是面对高高在上的君王，也能够有智慧作出合宜的分辨和回应。如今，我们面对国家政策和选举制度，也要怀抱敬畏神的心，作出有智慧的分辨和回应。我们务要心存谨慎，不要以情绪化的方式回应关乎国家和社会的议题。同时也不要漠视它们，以为这些和信仰没有关系，而跳离信仰以世俗的方式处理！\n\n人若不敬畏神，就无法拥有真正的智慧。虽然在环保、医学、人文、社会等层面，人好像已经为这个世界做了很多贡献；但是，如果人不认识神，就算是世上最聪明的人，也无法明白这个世界存在的意义（参17节），更不用说要为此采取什么样的回应。\n\n传道书的作者一再提及人类无法掌控与明白的几件事情，其中一件就是「死亡」──就算是再有权力的人，都不能避免死亡（参6~9节）；而另一个则是「不公不义的现象」（参10、11、12、14节）。\n\n然而，对一个敬畏神的基督徒而言，我们能从圣经得著回应的智慧，那就是把眼光从今生移到永恒！感谢主！我们因怀抱末日复活的盼望，死亡就不会是永远的绝望！另外，我们也因相信末日必有审判，便能在充满罪恶的世界中持守圣洁，行出公义、良善、诚实的生命，积极传扬大有盼望的信仰，并且忍耐等候主的再来！\n \n回应：主啊！感谢祢拯救我脱离罪恶，赐给我永生的盼望。求祢帮助我，因著敬畏祢而拥有智慧，能够回应这个世界上的需要，并能全心仰望祢！奉主的名求，阿们！\n\n祷读：诗篇八十六篇11节 \n耶和华啊，求祢将祢的道指教我；我要照祢的真理行；求祢使我专心敬畏祢的名！\n\nQT: 传道书八章1~17节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 谁如智慧人呢？谁知道事情的解释呢？人的智慧使他的脸发光，并使他脸上的暴气改变。\n2 我劝你遵守王的命令；既指神起誓，理当如此。\n3 不要急躁离开王的面前，不要固执行恶，因为他凡事都随自己的心意而行。\n4 王的话本有权力，谁敢问他说“你做什么”呢？\n5 凡遵守命令的，必不经历祸患；智慧人的心能辨明时候和定理〔原文作“审判”。下节同。〕。\n6 各样事务成就都有时候和定理，因为人的苦难重压在他身上。\n7 他不知道将来的事，因为将来如何，谁能告诉他呢？\n8 无人有权力掌管生命，将生命留住；也无人有权力掌管死期；这场争战，无人能免；邪恶也不能救那好行邪恶的人。\n9 这一切我都见过，也专心查考日光之下所做的一切事。有时这人管辖那人，令人受害。\n10 我见恶人埋葬，归入坟墓；又见行正直事的离开圣地，在城中被人忘记。这也是虚空。\n11 因为断定罪名不立刻施刑，所以世人满心作恶。\n12 罪人虽然作恶百次，倒享长久的年日；然而我准知道，敬畏神的，就是在他面前敬畏的人，终久必得福乐。\n13 恶人却不得福乐，也不得长久的年日；这年日好像影儿，因他不敬畏神。\n14 世上有一件虚空的事，就是义人所遭遇的，反照恶人所行的；又有恶人所遭遇的，反照义人所行的。我说，这也是虚空。\n15 我就称赞快乐，原来人在日光之下，莫强如吃喝快乐；因为他在日光之下，神赐他一生的年日，要从劳碌中，时常享受所得的。\n16 我专心求智慧，要看世上所做的事。（有昼夜不睡觉不合眼的。）\n17 我就看明神一切的作为，知道人查不出日光之下所做的事；任凭他费多少力寻查，都查不出来，就是智慧人虽想知道，也是查不出来。"}, "12-2": {"theme": "真正的盼望", "scripture": "传道书九章1~12节", "url": "https://www.youtube.com/watch?v=YClB_PSXx6E&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=10", "videoId": "YClB_PSXx6E", "date_cn": "2/12/26(三)", "description": "主题：真正的盼望\n经文：传道书九章1~12节\n\n俗话说：「人死如灯灭。」乍看之下，这句话相当符合传道书的信息，因为作者不断告诉我们─死亡是人生的终点，人死了之后，就什么都没有了（参6节）；人人难逃一死，今生的财富、知识、权力、美貌等等，通通显为虚空！\n\n在今天所读的经文中，作者首先用一连串的事情告诉我们─不管一个人是否敬畏神，所遭遇的事情都是一样的，尤其是死亡（参2~3节）。俗话说：「好死不如赖活。」第4节也写道：「活著的狗比死了的狮子更强」。可见得，死了的人很悲哀，没有享受、奖赏，也将慢慢被人遗忘（参5节）。所以，从第7至10节，作者劝人要好好享受活著的日子，尽量吃、喝（参7节）、打扮（参8节）、享受婚姻（参9节）以及工作的乐趣（参10节）。\n\n然而，作者后来却在第11至12节，转换了他的立场！他认为人无论如何规画人生、认真工作、积极享乐，很多事情还是由不得自己，而我们所付出的聪明、财富、努力，跟最终所得的，未必成正比！\n\n从这段经文看来，身为人真是死了悲哀，活著也悲哀！死后一切终结、幻灭，活著又只能「在乎当时的机会」（参11节）。既然如此，我们还有什么安全感可言？还有什么是我们能够掌握得住，不会幻灭的呢？\n\n针对这样的光景，信仰为我们提供了答案─我们所信的这一位神，是永远可靠的！祂为我们预备了新天新地，那里永远没有死亡、悲哀、哭号和疼痛（参启二十一4）。等到那一天，我们将要在新天新地，享受永远的生命！除此之外，当我们愿意将生命交托在神的手里，就会天天活在祂的恩典中，并且相信不论环境如何，我们都能活在祂的爱中！（参罗八35）\n\n回应：主啊！求祢加添我信心，让我相信不论环境如何，祢的爱永不改变！求祢使我天天经历祢的信实，并能倚靠祢面对每一天的生活！奉主的名求，阿们！\n\n祷读：诗篇六十二篇5节 \n我的心哪，你当默默无声，专等候神，因为我的盼望是从祂而来。\n\nQT: 传道书九章1~12节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我 9节所言：「日光之下并无新事」。作者谈到一个「广大」的情形（参13节），也就是在各个时代、历史和地理环境中，都会有人拥有充足的智慧，解决那些无法透过武力解决的问题，并且勇敢面对艰难（参14~16节）。\n\n感谢主！祂在各个世代中安排一些有智慧的人，能够有效处理复杂与艰巨的情况。然而，令人感到悲哀的是，这样的人展现智慧与能力解决问题，却不见得能够获得别人的感谢和记念，甚至还会遭到藐视和憎恨（参16节）。\n\n在圣经中，我们看到一些智慧人遭到藐视的例子：先知耶利米时常流泪，为悖逆的以色列民祷告，渴求神的忿怒转消，结果百姓却来攻击他（参耶十八18）。众人都稀奇主耶稣的智慧（参太十三54；可六2；路二40、52）；但是，祂在传道的时候，也时常被人藐视、憎恨，甚至没有人愿意听从祂说的话。\n\n亲爱的弟兄姐妹，求神帮助我们，成为一个愿意听从智慧话语的人。感谢主！世上最伟大，而且绝对有益处的智慧，都记录在圣经当中。可是，这个世界却不断地透过电视、网路等媒介，用似是而非的声音来刺激我们。求神怜悯、帮助我们，如同马利亚一样安静在祂的面前，聆听祂智慧的话语，而不是一再地吸收、听从世上这些愚昧人的声音（参17节）！\n\n另外，当我们凭著神的恩典与能力做事，却不得人的喜悦、接纳，反而被藐视、拒绝的时候，求主激励我们，不让我们感到灰心！因为我们实在不需要别人的纪念，而是要得到主的纪念！\n\n但愿我们在生活的每一天，都能谦卑聆听主的话语，而拥有真正的智慧；但愿我们在遭到拒绝时不会灰心，而能倚靠主的爱、智慧和能力，继续服事人！如此一来，我们就能凡事都讨主喜悦，蒙祂记念！\n\n回应：主啊！求祢帮助我能谦卑、安静地聆听祢的话，并能怀抱平静安稳的心服事别人。但愿我所做的都蒙祢悦纳、被祢记念！奉主的名求，阿们！\n\n祷读：加拉太书一章10节 \n我现在是要得人的心呢？还是要得神的心呢？我岂是讨人的喜欢吗？若仍旧讨人的喜欢，我就不是基督的仆人了。\n\nQT: 传道书九章13~18节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "13 我见日光之下有一样智慧，据我看乃是广大，\n14 就是有一小城，其中的人数稀少，有大君王来攻击，修筑营垒，将城围困。\n15 城中有一个贫穷的智慧人，他用智慧救了那城，却没有人记念那穷人。\n16 我就说，智慧胜过勇力；然而那贫穷人的智慧被人藐视，他的话也无人听从。\n17 宁可在安静之中听智慧人的言语，不听掌管愚昧人的喊声。\n18 智慧胜过打仗的兵器；但一个罪人能败坏许多善事。"}, "12-4": {"theme": "属灵「柔软操」", "scripture": "传道书十章1~20节", "url": "https://www.youtube.com/watch?v=FtHwP7jm0AQ&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=8", "videoId": "FtHwP7jm0AQ", "date_cn": "4/12/26(五)", "description": "主题：属灵「柔软操」\n经文：传道书十章1~20节\n\n抵挡神的罪恶有时看来十分微小，甚至让人看不见，却会产生很大的影响（参1节）。反过来说，一点点的良善，也可能带来很大的正面效应！盼望我们都能成为敬畏神的智慧人，以致天国在我们身上好像看不见的小芥菜种，却可以长成大树，造福许多飞鸟！\n\n我们从第2至7节看到，敬畏神的智慧人，能够在恶劣的环境下，仍旧保持对神的信心。作者以「心居右」（参2节）这个词，来表达智慧人正直的心。尽管有的时候，环境看起来非常不公平，像是第6、7节所描述的─狂妄、没有能力的愚昧人高升，有能力又谦卑的智慧人，反而没有得到重视。可是，即便是在这个时候，真正的智慧人仍然能以柔和谦卑的态度面对，并经历神的带领（参4节）！\n\n此外，智慧人知道要「未雨绸缪」（参8~11节）。基督徒面对潜在的试探，应该有所防范，甚至不主动接触试探，千万不要以为自己绝对不会跌倒。另外，我们从作者对于愚昧人的描述，来反推智慧人的特性─能说造就人的好话（参12~14节）；并将精力花在追求神的事上，他无论做什么，都为著荣耀神而活（参17节；林前十31）；智慧人也是殷勤的人（参18节），愿意建造自己、对付罪恶，将圣灵居住的殿，也就是自己打理妥当。\n\n有时我们无法分辨愚昧人或智慧人，但是神必鉴察人心（参耶十七10）！亲爱的弟兄姐妹，我们真要心存谨慎，因为我们经常表现出来的敬虔、爱人，其实是虚伪、敷衍的，根本不是因敬畏神、体贴圣灵而行！然而，如同第4节：「柔和能免大过」，当我们承认自己的渺小、软弱和罪恶，神必要透过祂的能力，叫我们活出真实又荣美的生命！\n\n感谢主！但愿我们的生命，天天经历从神而来的建造，并能见证祂的恩惠与慈爱！\n\n回应：主啊，求祢保守我的心怀意念，除去我内心的骄傲和愚昧！求祢使我更深地学习祢柔和谦卑的样式，好能讨祢喜悦！奉主的名求，阿们！\n\n祷读：弥迦书六章8节 \n世人哪，耶和华已指示你何为善。祂向你所要的是什么呢？只要你行公义，好怜悯，存谦卑的心，与你的神同行。\n\nQT: 传道书十章1~20节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 死苍蝇使做香的膏油发出臭气；这样，一点愚昧也能败坏智慧和尊荣。\n2 智慧人的心居右；愚昧人的心居左。\n3 并且愚昧人行路显出无知，对众人说，他是愚昧人。\n4 掌权者的心若向你发怒，不要离开你的本位，因为柔和能免大过。\n5 我见日光之下有一件祸患，似乎出于掌权的错误，\n6 就是愚昧人立在高位；富足人坐在低位。\n7 我见过仆人骑马，王子像仆人在地上步行。\n8 挖陷坑的，自己必掉在其中；拆墙垣的，必为蛇所咬。\n9 凿开〔或作“挪移”〕石头的，必受损伤；劈开木头的，必遭危险。\n10 铁器钝了，若不将刃磨快，就必多费气力；但得智慧指教，便有益处。\n11 未行法术以先，蛇若咬人，后行法术也是无益。\n12 智慧人的口说出恩言；愚昧人的嘴吞灭自己。\n13 他口中的言语起头是愚昧；他话的末尾是奸恶的狂妄。\n14 愚昧人多有言语，人却不知将来有什么事；他身后的事谁能告诉他呢？\n15 凡愚昧人，他的劳碌使自己困乏，因为连进城的路，他也不知道。\n16 邦国啊，你的王若是孩童，你的群臣早晨宴乐，你就有祸了！\n17 邦国啊，你的王若是贵冑之子，你的群臣按时吃喝，为要补力，不为酒醉，你就有福了！\n18 因人懒惰，房顶塌下；因人手懒，房屋滴漏。\n19 设摆筵席是为喜笑。酒能使人快活；钱能叫万事应心。\n20 你不可咒诅君王，也不可心怀此念；在你卧房也不可咒诅富户。因为空中的鸟必传扬这声音，有翅膀的也必述说这事。"}, "12-5": {"theme": "靠主行善", "scripture": "传道书十一章1~8节", "url": "https://www.youtube.com/watch?v=s5Uj9Im7z9c&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=7", "videoId": "s5Uj9Im7z9c", "date_cn": "5/12/26(六)", "description": "主题：靠主行善\n经文：传道书十一章1~8节\n\n「施比受更为有福」，是我们很熟悉的一句话，而这也是耶稣讲过的话（参徒二十35）。在今天所读的经文中，传道书的作者勉励我们行善。\n\n谈到行善，我们给予别人恩惠，不见得会有回报，反而经常吃亏，白忙一场！这些损失可能是金钱、时间、体力，好像「粮食撒在水面上」（参1节），有去无回。不过，作者提醒我们，即使看似无法得到回报，却仍然要对有需要的人慷慨施予。有一天我们若有困难，可能也会得著帮助（参1~2节）！\n\n圣经并非教导我们行善是为了别人的回报；而是要我们将信心建立在对神的信靠上，以致能对别人怀抱良善，并且愿意把握每一次机会，尽力活出良善的生命！\n\n当我们信靠神而行善，即便一时看不见任何益处，但益处却终究存在！云如果积得厚，终究会下雨；人若不断把树往某个方向牵引，这棵树终究会往那个方向倾倒（参3节）。虽然我们不一定知道，神会如何使用我们的服事来造福别人，也不一定明白自己如何在服事中得著福分（参6~7节），但是，我们只要靠著神的恩典，继续不灰心地服事人，就必看见神美好的心意显明！\n\n对人有益的事情要积极去做，同时也应当谨慎计划、考虑。但是，如果我们每件事情都要考虑得面面俱到才去行，可能就会像当时的以色列人一样─农耕时不断看风向，天天都有借口说不适合撒种；收割时不断看云，担心下雨，干脆就说不适合收割！（参4节）求神帮助我们更加倚靠祂，以致任何时候都能行善！\n\n感谢主！即使我们的生命如此有限（参7~8节），只要我们带著对神的信靠和顺服，行出各样的善事，就能享受无限的喜乐与平安！而主与我们同在，让我们在行善的操练中，更深经历神的预备和赐福！\n\n回应：主啊！我真是软弱，以致无法时常行善！求祢帮助我更加信靠祢，以致能够看见别人的需要，并将祢的恩典与人分享！奉主的名求，阿们！\n\n祷读：以弗所书二章10节 \n我们原是祂的工作，在基督耶稣里造成的，为要叫我们行善，就是神所预备叫我们行的。\n\nQT: 传道书十一章1~8节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 当将你的粮食撒在水面，因为日久必能得着。\n2 你要分给七人，或分给八人，因为你不知道将来有什么灾祸临到地上。\n3 云若满了雨，就必倾倒在地上。树若向南倒，或向北倒，树倒在何处，就存在何处。\n4 看风的，必不撒种；望云的，必不收割。\n5 风从何道来，骨头在怀孕妇人的胎中如何长成，你尚且不得知道；这样，行万事之神的作为，你更不得知道。\n6 早晨要撒你的种，晚上也不要歇你的手，因为你不知道哪一样发旺；或是早撒的，或是晚撒的，或是两样都好。\n7 光本是佳美的，眼见日光也是可悦的。\n8 人活多年，就当快乐多年；然而也当想到黑暗的日子。因为这日子必多，所要来的都是虚空。"}, "12-6": {"theme": "敬畏神", "scripture": "传道书十一章9节~十二章14节", "url": "https://www.youtube.com/watch?v=O_k7Kj4ZeoM&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=6", "videoId": "O_k7Kj4ZeoM", "date_cn": "6/12/26(日)", "description": "主题：敬畏神\n经文：传道书十一章9节~十二章14节\n\n时下各种广告，几乎都异口同声地告诉消费者──要「放纵」、「奢华」、「满足欲望」。虽然圣经并没有阻止我们享受、获得快乐，但是我们必须在信靠、顺服神的原则之下做这些事情，而不是随从肉体的情欲与喜好，因为我们所做的一切，在审判日都要向主交帐！更何况，放纵私欲所产生的许多罪恶，也会叫人愁烦（参十一9~10）。\n\n在今天所读的经文中，作者提醒年轻人，要趁年轻的时候记念主（参十二1），不要等到老，甚至到死，都没有记念、享受神，以致活得枉然和虚空！（参十一8）从十二章2节开始，作者用了一连串生动的比喻，来描述生命的老化和衰败，好比手发颤、牙齿松动、眼睛昏花（参十二3）、听觉逐渐失灵、浅眠，以及喉咙发不出响亮的声音（参十二4）。另外，老年人也时常因著步履不稳，而担忧爬高、容易受惊吓、头发变白、体力不好、食欲衰退，又看著同伴死去（参十二5），最后自己的生命也走向不可逆转的衰弱，以致死亡（参十二6）。\n\n人若在年轻的时候就认识神，是很有福的，因为接下来大半的人生，都能经历丰盛的恩典和喜乐！但是，这不代表老年人就没有机会，或不需要享受神。不论一个人的年纪多老迈，我们都能因敬畏神而享受人生！传道书的作者读书、考察、默想、经历，然后描绘人生的诸般虚空（参十二9节），就是希望人能够敬畏神（参十二13）。\n\n人若离了神，活在世上真的很虚空！传道书作者对世界和人生的虚空，有十分深刻的体会。亲爱的弟兄姐妹，如果我们觉得离了神，人生依然可以有意义，就是没有看透人生！然而，基督徒面对虚空的世界，不需要怀抱消极态度，而要因明白日光之下的虚空，而将眼目转向日光之上的神！感谢神！因祂的创造、拯救，以及新天新地美好的盼望，我们能够靠著祂喜乐、积极地度过每一天！\n\n\n回应：主啊！求祢的圣灵持续在我的心中动工，好叫我一生紧紧跟随祢！求祢让我天天存著信心、盼望，以及敬畏祢的心！奉主的名求，阿们！\n\n祷读：传道书十二章13节\n这些事都已听见了，总意就是：敬畏神，谨守祂的诫命，这是人所当尽的本分。\n \nQT: 传道书十一章9节~十二章14节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "9 少年人哪，你在幼年时当快乐。在幼年的日子，使你的心欢畅，行你心所愿行的，看你眼所爱看的；却要知道，为这一切的事，神必审问你。\n10 所以，你当从心中除掉愁烦，从肉体克去邪恶；因为一生的开端和幼年之时，都是虚空的。"}, "12-7": {"theme": "渴慕者得饱足", "scripture": "雅歌一章1~4节", "url": "https://www.youtube.com/watch?v=ov69rq9dhGE&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=5", "videoId": "ov69rq9dhGE", "date_cn": "7/12/26(一)", "description": "主题：渴慕者得饱足\n经文：雅歌一章1~4节\n\n犹太人非常看重雅歌，认为它是非常神圣的一卷书，远远超过地上的爱情及婚姻关系，因为内容关乎神与祂子民的关系。犹太人在每年的逾越节，都会诵读雅歌。逾越节的意涵是神救赎祂的百姓，因此我们可以窥见雅歌的最终寓意，是人与基督在爱中的联合。\n\n在这一卷书中，作者以「王」来称呼我们所爱戴的神，而我们是和王来往的女子。女子爱王，是因为王本身吸引她。但愿我们也单单被主吸引，以致爱的是主自己，而非只是祂所给予的赏赐。\n\n「愿他用口与我亲嘴；因你的爱情比酒更美。」（参2节）一开始，女子就表示她非常渴望与王建立亲密的关系，而且是最亲密的关系！「渴慕」是使人得著神的根基，而神的话应许我们──「饥渴慕义的人有福了！因为他们必得饱足」（参太五6）。\n\n女子如此渴慕王，是因为她发现王的爱情比酒更美！「酒」可以指世上一切的福乐，以及神所赏赐的一切祝福。然而，即便这一切都能令人喜乐，但是真正能够满足我们内心深处的，只有神！\n\n女子渴望与王的关系更加亲密，因此她如此祷告：「愿你吸引我，我们就快跑跟随你」（参4节）。她祈求王再来吸引她，好让她可以快跑跟随他！亲爱的弟兄姐妹，我们当怀抱一颗渴慕的心，在至圣所与主亲密的相交，显明主对我们深刻的爱！而当一个人真正被主所吸引，他就会影响别人来渴慕主（参4节）！\n\n女子的祷告得蒙垂听！王答应了她的祈求，带她进入内室（参4节），而当她与王单独相处、个别认识，就越发现王是她的喜乐和满足！感谢主！神与我们的关系，竟然能够如此美丽！但愿我们都能与祂建立亲密的关系，好能更深看见祂的荣美！\n\n\n回应：主啊！求祢赐给我一颗深切渴慕祢的心，并且大大地吸引我，好叫我能够快跑跟随祢！\n奉主的名求，阿们！\n\n祷读：雅歌一章4节\n愿祢吸引我，我们就快跑跟随祢。　\n\nQT: 雅歌一章1~4节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 所罗门的歌，是歌中的雅歌。\n2 〔新娘〕愿他用口与我亲嘴；因你的爱情比酒更美。\n3 你的膏油馨香；你的名如同倒出来的香膏，所以众童女都爱你。\n4 愿你吸引我，我们就快跑跟随你。王带我进了内室，我们必因你欢喜快乐。我们要称赞你的爱情，胜似称赞美酒。他们爱你是理所当然的。"}, "12-8": {"theme": "与神独处的生活（参上）", "scripture": "雅歌一章5~11节", "url": "https://www.youtube.com/watch?v=oQM8AVZjU0U&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=4", "videoId": "oQM8AVZjU0U", "date_cn": "8/12/26(二)", "description": "主题：与神独处的生活（参上）\n经文：雅歌一章5~11节\n\n当女子与王进入内室生活，她的生命就产生了一些奇妙的改变。\n\n健康的自我形象（参5节）：女子提到「我虽然黑，却是秀美」（参5节）。当她开始追求内室生活，让王成为她的王，并且与他建立亲密的关系，她首先看见的是自己的黑，也就是软弱与败坏。但是，她同时也看见，自己在爱里蒙悦纳！所以，她很有信心地宣告──「我虽然黑，却是秀美」（参5节）！而且，她还说：「如同基达的帐棚，好像所罗门的幔子」（参5节）。「基达」的意思也是黑，而「所罗门的幔子」可能是白的，是细麻布做的，十分美丽。\n\n女子因著与王建立亲密的关系，而变得洁白、美丽！保罗告诉我们：「若有人在基督里，他就是新造的人」（参林后五17）。我们原本都是充满软弱与败坏的罪人，如今却因著耶稣基督救赎的恩典，而成为新造的人！我们的生命是蒙悦纳、美丽的，因为耶稣基督的荣美在我们身上，而且神看我们就是如此（参8节）！\n\n发现生命中的问题（参6节）：女子说到她的肤色被日头晒黑，因为她只做人要她做的，而非神要她做的。很多时候，我们可能忙于其他事情，做一些神没有要我们做的，而没有去做神量给我们的，以致生命中充满混乱、软弱与败坏！但愿我们都在与神的独处中，调整生命的次序，天天看守自己的葡萄园──做神要我们做的。\n\n心中的渴慕再次得著满足（参7~11节）：女子渴望随时坦然遇见王、得著王，而王很快地回应她的呼求，向她指出寻找他的途径，也就是跟随羊群的脚踪（参8节）。我们若要得著主，只要跟著那些追求祂的人的脚步就对了！而当人全心追求神、渴慕神，他的需要不仅会得著满足，而且他会成为在神眼中美丽的（参8节）、有吸引力的人（参9节）！感谢主！祂乐意在我们的生命中，加上「金」与「银」（参11节），也就是属祂的性情和祂救赎大能的装饰！\n\n\n回应：主啊！感谢祢救赎的恩典，使我可以与祢亲密同行！愿祢再来吸引我，使我单单寻求\n祢，奉主的名求，阿们！\n\n祷读：哥林多后书五章17节 \n若有人在基督里，他就是新造的人，旧事已过，都变成新的了。　 \n\nQT: 雅歌一章5~11节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊 y/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "12 〔新娘〕王正坐席的时候，我的哪哒香膏发出香味。\n13 我以我的良人为一袋没药，常在我怀中。\n14 我以我的良人为一棵凤仙花，在隐‧基底葡萄园中。\n15 〔新郎〕我的佳偶，你甚美丽！你甚美丽！你的眼好像鸽子眼。\n16 〔新娘〕我的良人哪，你甚美丽可爱！我们以青草为床榻，\n17 以香柏树为房屋的栋梁，以松树为椽子。"}, "12-10": {"theme": "与主同行的邀请", "scripture": "雅歌二章8~14节", "url": "https://www.youtube.com/watch?v=CkreC-3DKzE&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=2", "videoId": "CkreC-3DKzE", "date_cn": "10/12/26(四)", "description": "主题：与主同行的邀请\n经文：雅歌二章8~14节\n\n由于女子渴慕与主建立亲密的关系，就与王进入内室生活，而能享受王所带给她的一切祝福与满足。不但如此，她也在这一份亲密的关系中，晓得良人的声音与身影。\n\n在这一段经文中，良人被女子形容像是羚羊、小鹿（参9节）。意思是说，他的行动敏捷，举止斯文、精力充沛。虽然他们之间还有墙壁阻隔，只能从窗户看见彼此，但是女子仍然可以认得良人的声音和身影──当我们与神的关系越亲密，必然也会越熟悉神的声音和行踪！我们也许无法主动寻见神，神却总会主动来寻找我们；我们所需要的，就是天天渴慕祂，并且以专注的爱，儆醒聆听与等候。\n\n第10至13节描述良人主动邀请女子，出外享受春天的美好。春天的生机与美丽，表明冬日的严酷与阴暗，已经成为过去。我们看到良人连续两次邀请女子，说：「起来，与我同去」（参10、13节）！可见他是多么渴望他的佳偶，能够一直和他在一起。而这一句话，也是神对我们发出的殷切呼唤。\n\n耶稣从死里复活的生命，已经胜过了生命的严冬；祂呼召我们去看祂的复活所带给我们的一切生机，而非一直停留在严冬之中。很多的时候，我们不能起来与主同行，是因为我们只看见冬日，也就是生活中的各种试炼与困难。可是，我们不要忘记神对我们说：「冬天已往，雨水止住过去了」（参11节）。感谢神！因著祂的复活，这些都已经过去了！祂已为我们走过各种试炼与困难，我们只要起来与祂同行，就能享受复活的生命！\n\n在第14节，我们再度看见良人多么渴望他的佳偶与他同行，而不要像是藏在峭壁、岩穴中的鸽子，使他无法看见她的面容，听见她的声音。亲爱的弟兄姐妹，这也是神对我们的呼唤！祂想要见我们的面，听我们的声音！祂切切呼唤你我来亲近祂！从今天起，让我们不要再受到任何事的拦阻，起来与主同行吧！\n\n\n回应：主啊！我要起来回应祢的邀请，我要与祢同行！求祢牵著我的手，让我跨出脚步跟随\n祢！奉主的名求，阿们！\n\n祷读：诗篇六十三篇8节 \n我心紧紧地跟随祢；祢的右手扶持我。\n\nQT: 雅歌二章8~14节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "8 〔新娘〕听啊！是我良人的声音；看哪！他蹿山越岭而来。\n9 我的良人好像羚羊，或像小鹿。他站在我们墙壁后，从窗户往里观看，从窗棂往里窥探。\n10 我良人对我说：〔新郎〕我的佳偶，我的美人，起来，与我同去！\n11 因为冬天已往，雨水止住过去了。\n12 地上百花开放，百鸟鸣叫的时候〔或作“修理葡萄树的时候”〕已经来到；斑鸠的声音在我们境内也听见了。\n13 无花果树的果子渐渐成熟；葡萄树开花放香。我的佳偶，我的美人，起来，与我同去！\n14 我的鸽子啊，你在磐石穴中，在陡岩的隐密处。求你容我得见你的面貌，得听你的声音；因为你的声音柔和，你的面貌秀美。"}, "12-11": {"theme": "失去与得著", "scripture": "雅歌二章15节~三章5节", "url": "https://www.youtube.com/watch?v=MSlc7KBZX14&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=1", "videoId": "MSlc7KBZX14", "date_cn": "11/12/26", "description": "主题：失去与得著\n经文：雅歌二章15节~三章5节\n\n女子似乎失去了与良人的亲密关系！然而，后来她却发现──自己实在不能没有他！所以，即使在夜间，她也起来殷切寻找良人。最后，她再次找著良人，与他恢复亲密的关系。\n\n我们与神的关系，时常因为不同原因而失去祂的同在、与祂的亲密关系，以及祂在我们生命中的建造。倘若我们渴望一直活在神的同在中，就要留心去行下列的几件事：\n\n擒拿小狐狸（参二15）：因为小狐狸会毁坏葡萄园，尤其是葡萄开花的期间。有人说小狐狸比大狐狸更具破坏性，因为大狐狸吃果子，小狐狸则是吃葡萄的嫩枝，使得葡萄连结果的机会都没有了！小狐狸代表拆毁（参尼四3）、诱惑（参结十三4）、残杀（参路十三31~32）。小狐狸好比是一些小罪、小试探，表面似乎不危险，却最会败坏我们的灵性！\n\n如果说得更直接一点，小狐狸就是指我们的「老我」，好比自私、骄傲、嫉妒、含怒、毁谤、苦毒、批评等等。倘若我们容让「老我」停留在生命中，而不去对付，它就会使我们的生命无法结出属神的果子来，甚至走入死亡！\n\n即使在黑暗中，仍要全心寻求神（参三1~4）：当良人呼召女子一起出去，她却没有即时跟去，甚至她觉得，只要我知道我们彼此相属就好，短暂分别没有关系（参二16~17）。但是，当她一连好几晚找不到良人，她才发现事情严重了！于是，她到外面寻找良人，良人也被她遇见，那时他们就确定终身大事，彼此的关系更加稳固。\n\n在我们的属灵历程中，也会有「属灵的黑夜」──我们似乎感觉不到神，也寻找不到神。这是一段真实的试炼，目的是要帮助我们提升对神的爱，能够真正委身于祂。因此，每当我们面临这样的阶段，要继续寻求神，以致能如同女子一样寻见她心所爱的，并能更加确信，没有任何的事「能叫我们与神的爱隔绝」（参罗八39）！\n\n\n回应：主啊！求祢让我看见自己生命中的小狐狸，认真对付并且倚靠祢得胜，好让我的生命\n可以结出果子来！奉主的名求，阿们！\n\n祷读：罗马书八章37节 \n然而，靠著爱我们的主，在这一切的事上已经得胜有余了。\n\nQT: 雅歌二章15节~三章5节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "15 要给我们擒拿狐狸，就是毁坏葡萄园的小狐狸，因为我们的葡萄正在开花。\n16 〔新娘〕良人属我，我也属他；他在百合花中牧放群羊。\n17 我的良人哪，求你等到天起凉风、日影飞去的时候，你要转回，好像羚羊，或像小鹿在比特山上。"}, "12-12": {"theme": "与主联合", "scripture": "雅歌三章6~11节", "url": "https://www.youtube.com/watch?v=L1scedHgQG4&list=PLgFvTLP0QRDug6rV_YTfgjSSa3XJqyBvO&index=31", "videoId": "L1scedHgQG4", "date_cn": "12/12/26(六)", "description": "主题：与主联合\n经文：雅歌三章6~11节\n\n这段经文的起头，应该是伴娘们为婚礼伴唱。「那从旷野上来」的人指的是新娘，王为了举行婚礼，而迎接女子到城市来。烟柱、乳香、没药薰染的排场，是王室迎接新娘的场面。因著王的迎娶，女子离开先前旷野漂流的生活，进入安息及荣耀之中。感谢主！神的救恩也是如此，让我们脱离漂荡的生活，进入完全的安息。\n\n从此段经文中，我们看到王不仅将女子从漂荡的生活中带出来，又让她被乳香、没药以及各种香粉所薰染，全身散发出香气！亲爱的弟兄姐妹，神不仅救赎、带领我们，祂也藉著圣灵的工作，把耶稣的生命彰显在我们身上，让我们身上因著十字架的工作，彰显出复活的美丽生命！这一切都是出于神的恩典，因为耶稣已经为我们付上一切代价！我们所要尽的本分就是顺服──顺服神一切的造作，使我们身上散发出基督荣美的生命。\n\n有趣的是，第6节提问的内容是关于新娘，可是第7、8节的回应，却是关于所罗门的事。这是要告诉我们，新娘是与王联合的。当我们与耶稣联合在一起，祂的力量就成为我们的力量，祂的得胜就成为我们的得胜！祂一切的丰盛都是我们的！所以，当我们与神联合，就能享受属祂的一切。\n\n所罗门王利用黎巴嫩木，为自己制造了一乘华轿，这表示神要在属祂的人身上作工。这一乘华轿的旁边有勇士护卫，表示我们一直都受到保护；木头、金子、银，则是代表基督完全的人性、完全的神性和救赎的大能。所以，这段经文是预表基督要以其圣洁荣美来装饰祂的新娘，使她毫无瑕疵！感谢主！这是何等伟大的恩典！一切都不是出于我们，完全是神自己做成的！创造主把我们创造得如此荣美，可以归祂自己！\n\n回应：主啊！感谢祢使我脱离生命的旷野，能够进入祢的安息！我渴望天天连结于祢，\n活出属祢的荣美！奉主的名求，阿们！\n\n祷读：歌罗西书二章9~10节\n 因为神本性一切的丰盛，都有形有体的居住在基督里面；你们在祂里面也得了丰盛。\n\nQT: 雅歌三章6~11节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "6 〔新娘〕那从旷野上来、形状如烟柱、以没药和乳香并商人各样香粉薰的是谁呢？\n7 看哪，是所罗门的轿；四围有六十个勇士，都是以色列中的勇士；\n8 手都持刀，善于争战，腰间佩刀，防备夜间有惊慌。\n9 所罗门王用黎巴嫩木为自己制造一乘华轿。\n10 轿柱是用银做的，轿底是用金做的；坐垫是紫色的，其中所铺的乃耶路撒冷众女子的爱情。\n11 锡安的众女子啊，你们出去观看所罗门王！头戴冠冕，就是在他婚筵的日子、心中喜乐的时候，他母亲给他戴上的。"}, "12-13": {"theme": "神眼中的你", "scripture": "雅歌四章 1~7 节", "url": "https://www.youtube.com/watch?v=S-TktcEwH0k&list=PLgFvTLP0QRDug6rV_YTfgjSSa3XJqyBvO&index=30", "videoId": "S-TktcEwH0k", "date_cn": "13/12/26(日)", "description": "主题：神眼中的你\n经文：雅歌四章1~7节\n\n第三章1节至五章1节，叙述了两人成婚的历程。此时，新郎开始对新娘表达赞美。在今天所读的经文中，新郎论及佳偶七个肢体部位的美。第四章9至15节，则是形容佳偶所展现的美，对他带来的影响。在第7节，新郎由衷称赞新娘：「我的佳偶，妳全然美丽，毫无瑕疵」！\n\n亲爱的弟兄姐妹，这是主对你的赞赏！求主开启我们灵里的耳朵，听见祂对我们说的这些话，真正清楚自己是蒙神所爱的人，好让这份爱激励我们，使我们不再为自己活，而能单单为祂而活！如同在这一段赞美中，新郎两次提到「在帕子内」（参1、3节），这表示隐藏，单单为著新郎而预备──主赞赏我们单单为祂摆上的心志，一切为祂而做！\n\n另外，如果我们从属灵的意义来评论这些赞赏的话，可以说鸽子眼是指对主专一的心，以及拥有属灵的眼光，温良有智慧；头发则是指女子的奉献与顺服；牙齿是用来吃饭的，所以是指女子能够吸收、接受神的话；双生对称的牙齿则是圣灵的工作，平衡地展现在她主观、客观的经历中。红唇是指她能见证主恩与救赎之道。石榴的双颊如太阳，是指她在隐藏的生活中，活出荣美、丰沛的生命；颈项则是表明意志的降服。\n\n当我们对神怀抱绝对顺服的意志，就将如同千个大卫的盾牌，足以抵挡仇敌的诡计。两乳的美丽象征怀抱和供应，双生的小鹿有著均衡、丰沛的生命力。一个充满神洁白如百合生命力的胸怀，也能供应人、给予人祝福。\n\n当新妇听见王这样称赞她，她没有因而感到骄傲、停止追求，反倒发现自己更需要十字架的工作（没药山），和复活的能力（乳香冈）来帮助她，好能除去她生命中的日影（参6节）！当人越追求主，就越会发现自己的生命何等需要十字架的工作，以及复活大能的救赎！而主必要看这样的人为全然美丽、毫无瑕疵！感谢主！这真是奇妙的恩典！\n\n\n回应：主啊！感谢祢如此深爱著我！求祢帮助我，时常活在祢的爱中、更加专一爱祢， 成为祢所喜悦的儿女！奉主的名求，阿们！\n\n\n祷读：犹大书一章21节\n保守自己常在神的爱中，仰望我们主耶稣基督的怜悯，直到永生。\n\nQT: 雅歌四章1~7节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 我的佳偶，你甚美丽！你甚美丽！你的眼在帕子内好像鸽子眼。你的头发如同山羊群卧在基列山旁。\n2 你的牙齿如新剪毛的一群母羊，洗净上来，个个都有双生，没有一只丧掉子的。\n3 你的唇好像一条朱红线；你的嘴也秀美。你的两太阳在帕子内，如同一块石榴。\n4 你的颈项好像大卫建造收藏军器的高台，其上悬挂一千盾牌，都是勇士的藤牌。\n5 你的两乳好像百合花中吃草的一对小鹿，就是母鹿双生的。\n6 我要往没药山和乳香冈去，直等到天起凉风、日影飞去的时候回来。\n7 我的佳偶，你全然美丽，毫无瑕疵！"}, "12-14": {"theme": "让主的心得满足", "scripture": "雅歌四章 8 节~五章 1 节", "url": "https://www.youtube.com/watch?v=xWJXcNcy52Q&list=PLgFvTLP0QRDug6rV_YTfgjSSa3XJqyBvO&index=29", "videoId": "xWJXcNcy52Q", "date_cn": "14/12/26(一)", "description": "主题：让主的心得满足\n经文：雅歌四章8节~五章1节\n\n从经文一开头，新郎就要新妇和他一起去更高的境地（参四8）。黑门山与亚玛拿山两座山遥遥相对，而它们代表神在我们生命中的呼召──往高处行！　\n\n虽然我们好像无法看见新妇立即的反应，但是，若从新郎接下来所说的话，就能推断新娘的回应：「我妹子，我新妇，妳夺了我的心。妳用眼一看，用妳项上的一条金链，夺了我的心！」（参四9）「项」代表意志的降服。新妇是立即顺服带领的人，她的顺服使新郎全心被她所吸引，并且大得激励！当新郎称她为「我妹子」、「我新妇」（参四9），就是表明他们的生命是从同一位天父而来的，而且她的心意和新郎完全一致。\n\n当我们选择顺服神，神就得著极大的满足！因此，让我们学习这一位新妇，顺服主的带领！\n\n新妇的顺服不仅让王得到满足，也使她的生命散发出美善！因此，新郎如此称赞她：「妳的嘴唇滴蜜，好像蜂房滴蜜；妳的舌下有蜜，有奶。妳衣服的香气如黎巴嫩的香气。」（参四11）当人选择顺服神，时常与主连结、活在主的爱中，就能散发出神的美善！而在这些称赞中，新郎再次提到新娘的嘴唇，强调她嘴唇所结的果子，也就是她所说的话。神非常看重我们所说的话，甚至将来要照我们所说的话来审判我们！所以，我们应该谨慎说话，并要学习在话语上顺服神的引导！\n\n新妇被称赞是「关锁的园，禁闭的井，封闭的泉源」（参12节）。她专一自守，只为主人开放，她园中所有的一切，只献给主。当她将自己完全献给主，对主说：「愿我的良人进入自己园里，吃他佳美的果子」（参16节）。主很快就垂听她的祷告，进入园中享受（参五1）！主在这位新妇身上看见她劳苦的果效，便心满意足。感谢神！愿我们献给主的一切，都能蒙祂喜悦！\n\n\n回应：主啊！我愿意将自己献给祢，全心为祢而活，单单讨祢喜悦！奉主的名求，阿们！\n\n祷读：罗马书十二章1节 \n所以弟兄们，我以神的慈悲劝你们，将身体献上，当作活祭，是圣洁的，是神所喜悦的；你\n们如此事奉乃是理所当然的。\n\nQT: 雅歌四章8节~五章1节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153i 新妇要起来，和祂同走受苦与羞辱之路时（满头露水被夜露滴湿之意，参2节)，她似乎又有些犹豫。但是，当主用钉痕的手吸引她，她便「因他动了心」（参4节），愿意起来跟随主（参5节）！唯有爱能吸引人来跟随──感谢主！祂总是用无尽的爱，邀请和吸引我们来跟从祂！\n\n新妇虽然起来给良人开门，良人却已经离开，而且似乎离她很远，以致她的灵极其孤单、悲伤！此刻，仇敌黑暗的权势就如同洪水一般临到──她的披肩被夺，失去了保护与遮盖，以致受辱（参7节）。新妇虽然不明白为何良人要将自己隐藏，使她感受不到他的同在，甚至任由她受到极大的破碎和羞辱，但是，这一切的困苦和艰难，反而更加坚定她要见到良人的决心！亲爱的弟兄姐妹，这就是信心的跟随──当神容许我们的信心受到考验，我们务要靠祂站立得稳！\n\n\n回应：主啊！求祢帮助我，在任何环境中都能深知自己是蒙祢所爱的，好让我能更坚定地\n跟随祢！奉主的名求，阿们！\n\n祷读：雅各书一章3~4节\n因为知道你们的信心经过试验，就生忍耐。但忍耐也当成功，使你们成全完备，毫无缺\n欠。\n\nQT: 雅歌五章2~8节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "2 〔耶路撒冷的众女子〕我的朋友们，请吃！我所亲爱的，请喝，且多多地喝！〔新娘〕我身睡卧，我心却醒。这是我良人的声音；他敲门说：\n3 〔新郎〕我的妹子，我的佳偶，我的鸽子，我的完全人，求你给我开门；因我的头满了露水，我的头发被夜露滴湿。〔新娘〕我回答说：我脱了衣裳，怎能再穿上呢？我洗了脚，怎能再玷污呢？\n4 我的良人从门孔里伸进手来，我便因他动了心。\n5 我起来，要给我良人开门。我的两手滴下没药；我的指头有没药汁滴在门闩上。\n6 我给我的良人开了门；我的良人却已转身走了。他说话的时候，我神不守舍；我寻找他，竟寻不见；我呼叫他，他却不回答。\n7 城中巡逻看守的人遇见我，打了我，伤了我；看守城墙的人夺去我的披肩。\n8 耶路撒冷的众女子啊，我嘱咐你们：若遇见我的良人，要告诉他，我因思爱成病。"}, "12-16": {"theme": "述说主 得到主", "scripture": "雅歌五章 9 节~六章 3 节", "url": "https://www.youtube.com/watch?v=rz_BwGIMHsk&list=PLgFvTLP0QRDug6rV_YTfgjSSa3XJqyBvO&index=27", "videoId": "rz_BwGIMHsk", "date_cn": "16/12/26(三)", "description": "主题：述说主 得到主\n经文：雅歌五章9节~六章3节\n\n新妇的焦急与恳切，引起耶路撒冷众女子对她良人的好奇（参五9）。我们的心中都会有一个「良人」，这个「良人」是指吸引我们、夺了我们的心、生命和时间的对象。亲爱的弟兄姐妹，你的良人是谁呢？\n \n在第10至16节，新妇描述她良人的美丽，而这些内容所指的，就是我们所信靠的主耶稣。虽然有一些经文，我们无法断定其确切的意思，但是能大致明白它们的属灵意涵。好比新妇多次提到金子，也就是属神的意思，因为主耶稣是神。另外，新妇也提及她良人的「嘴唇」和「口」（参五13、16）；而圣经其他的经文，也特别形容耶稣在这方面的完全（参约七46；诗四十五2；路四22）。\n\n在新妇眼中，她的良人「超乎万人之上」（参五10），如同主耶稣一样！良人「白而且红」（参五10），主耶稣的荣耀也像日头一样洁「白」发光；而「红」，是指被杀羔羊的记号。良人的「头像至精的金子」（参五11），如同耶稣坐在宝座上掌权；良人的「头发厚密累垂，黑如乌鸦」，如同主耶稣顺服神、又充满大能！良人的眼「如溪水旁的鸽子眼」（参五12），也如同主的眼目充满慈爱和怜悯。良人的脸颊就像香花畦、香草台（参五13），主耶稣也是这样，祂所说的话，散发出爱和恩典！\n\n良人的双手像「金管和水苍玉」（参五14），是说明神的作为精巧、细腻，而祂的身体就是教会！「腿」指的是稳定、支持的力量（参五15），而主耶稣属天的度量、大能和超然的美丽，就如同香柏木一样坚固！最后，从新妇的描述中，可以看见主耶稣喂养我们的一切话语，尽都甘甜（参五16）！\n\n新妇对良人的渴慕，激发众女子一同寻求良人的面（参六1）。当我们的生命真正被主吸引，别人也会受到影响，与我们一同追求主！最后，新妇明白，她的良人并没有离去，而是永活在她的心中！这样的经历使她更为肯定──「我属我的良人，我的良人也属我」（参六3）！感谢主！我们完全属于祂，而祂也完全属于我们！\n\n\n回应：主啊，祢是如此荣耀！我愿意天天述说祢的美好，称颂祢的慈爱！奉主的名求，阿们！\n\n祷读：诗篇一一三篇4节\n耶和华超乎万民之上；祂的荣耀高过诸天。\n\nQT: 雅歌五章9节~六章3节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "9 〔耶路撒冷的众女子〕你这女子中极美丽的，你的良人比别人的良人有何强处？你的良人比别人的良人有何强处，你就这样嘱咐我们？\n10 〔新娘〕我的良人白而且红，超乎万人之上。\n11 他的头像至精的金子；他的头发厚密累垂，黑如乌鸦。\n12 他的眼如溪水旁的鸽子眼，用奶洗净，安得合式。\n13 他的两腮如香花畦，如香草台；他的嘴唇像百合花，且滴下没药汁。\n14 他的两手好像金管，镶嵌水苍玉；他的身体如同雕刻的象牙，周围镶嵌蓝宝石。\n15 他的腿好像白玉石柱，安在精金座上；他的形状如黎巴嫩，且佳美如香柏树。\n16 他的口极其甘甜；他全然可爱。耶路撒冷的众女子啊，这是我的良人；这是我的朋友。"}, "12-17": {"theme": "主看我们为宝贵", "scripture": "雅歌六章 4~12 节", "url": "https://www.youtube.com/watch?v=sbnLRpRGOJE&list=PLgFvTLP0QRDug6rV_YTfgjSSa3XJqyBvO&index=26", "videoId": "sbnLRpRGOJE", "date_cn": "17/12/26(四)", "description": "主题：主看我们为宝贵 \n经文：雅歌六章4~12节\n\n本段经文又是良人对新妇的赞美。在前一段经文中，看到新妇即便经历了许多的艰难和破碎，却仍然渴慕地追求她的良人。当别人问及她的良人，她也能详细述说良人的美好，使那些听她作见证的人，都渴望来寻找这一位美好的良人。\n\n当新妇不再发怨言，而在艰难困苦中认识了自己的良人时，在良人的眼中，她就成为「美丽如得撒，秀美如耶路撒冷，威武如展开旌旗的军队」（参4节）。得撒是位处平原的一座城，是以色列的京城（参王上十六23~24），也是「欢心」的意思。耶路撒冷位于锡安山上，是大卫的保障、是最坚固的城，也是平安的根基。一支军队的旌旗展开，是表明得胜；因此，当良人形容新妇「威武如展开旌旗的军队」（参4节），就是在认可她的得胜！\n\n良人夸赞新妇是欢心、喜乐，并且充满平安、得胜的人！她即使只有一个人，却像是一支军队，而且是得胜的军队！亲爱的弟兄姐妹，我们无论遇见任何情况和环境，都要像新妇一样，持续火热爱主，相信祂的带领和作为，永远不会出错！但愿我们都能成为得胜的军队，得著神的称赞！此外，当良人说新妇是「我的鸽子，我的完全人，只有这一个是她母亲独生的，是生养她者所宝爱的。众女子见了就称她有福；王后妃嫔见了也赞美她。」（参9节）这表示在良人心里，新妇是何等独特、宝贵！\n\n第5节后半段至7节的称赞，和四章1至3节的内容是重叠的。「头发」代表奉献与顺服，「牙齿」则是吸收及接受神话语的能力，「两太阳在帕子内」是指新妇所隐藏的内室生活。因此，我们可以知道，无论我们经历得胜或失败，主的爱永不改变！在祂的眼里，我们永远都是宝贝！\n\n亲爱的弟兄姐妹，但愿我们都能更深操练对主的奉献与顺服，真实地饱尝祂的话语，建立内室的生活，好让我们的生命能「如晨光发现、美丽如月亮、皎洁如日头、威武如展开旌旗军队」（参10节）！\n\n\n回应：主啊！求祢引领我与祢同行，好让我能够彰显出祢荣耀的生命，并能得蒙祢的喜悦！\n奉主的名求，阿们！\n\n祷读：耶利米书三十一章3节 \n古时耶和华向以色列显现，说：「我以永远的爱爱你，因此我以慈爱吸引你。」\n\nQT: 雅歌六章4~12节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "4 〔新郎〕我的佳偶啊，你美丽如得撒，秀美如耶路撒冷，威武如展开旌旗的军队。\n5 求你掉转眼目不看我，因你的眼目使我惊乱。你的头发如同山羊群卧在基列山旁。\n6 你的牙齿如一群母羊洗净上来，个个都有双生，没有一只丧掉子的。\n7 你的两太阳在帕子内，如同一块石榴。\n8 有六十王后八十妃嫔，并有无数的童女。\n9 我的鸽子，我的完全人，只有这一个是她母亲独生的，是生养她者所宝爱的。众女子见了就称她有福；王后妃嫔见了也赞美她。\n10 那向外观看、如晨光发现、美丽如月亮、皎洁如日头、威武如展开旌旗军队的是谁呢？\n11 我下入核桃园，要看谷中青绿的植物，要看葡萄发芽没有，石榴开花没有。\n12 不知不觉，我的心将我安置在我尊长的车中。"}, "12-18": {"theme": "神的杰作", "scripture": "雅歌六章 13 节~七章 9 节", "url": "https://www.youtube.com/watch?v=I7qNOQy7Sl4&list=PLgFvTLP0QRDug6rV_YTfgjSSa3XJqyBvO&index=25", "videoId": "I7qNOQy7Sl4", "date_cn": "18/12/26(五)", "description": "主题：神的杰作\n经文：雅歌六章13节~七章9节\n\n今天所读的经文，作者首次以「书拉密女」来称呼新妇（参六13）。「书拉密」是「所罗门」阴性的写法，意思是「平安之女」。当主呼召我们跟随祂，是要我们从祂里面得著平安。而当我们跟随祂，就能得著一个新的名字──「平安」；虽然我们蒙召背起十字架来跟随主、为祂的国度争战，可是我们不要忘记──祂是赐平安的神！祂的居所（就是我们）也要充满平安！感谢主！我们如此有福，能活在神所赐的平安中！\n\n接续的经文形容书拉密女在跳舞时，所展现的肢体之美，也象征基督所完成的工作。「大腿」是一个人的能力所在，当我们看到「大腿」，就联想到雅各的故事（参创三十二22~32）。当雅各天然的能力被神拿去，他才得著真实的力量。神将他改名为「以色列」，意思是「神的王子」或「与神一同作王」。当作者形容书拉密女的那一双大腿，是「巧匠的手做成的」（参七1），这位巧匠就是主！祂熬炼她、雕琢她，让十字架的工作成全在她的身上，好让她拥有属天的能力！当我们天然的能力没有了，才能得著属灵的能力，这真是神的巧思和美意！\n\n新妇经过巧匠的陶造，生命就满有基督长成的身量；她不但拥有属灵的能力，内在也有丰盛的生命（参七2），而且这份丰盛的生命，还能喂养及供应别人（参七3）。因著十字架，她的心志变得非常坚韧（参七4），却又保持纯净，没有搀杂！她拥有属灵的辨别力，能够敏锐于圣灵的工作，甚至能得著王的心，成为真正与神同行的人！\n\n亲爱的弟兄姊妹，但愿我们都能顺服于神的塑造、生命不断得著更新，以致满有基督长成的身量！\n\n\n回应：主啊，我是祢手中的工作！愿祢持续塑造我，让我成为合祢心意的器皿。奉主的名\n求，阿们！\n\n祷读：以赛亚书六十四章8节 \n耶和华啊，现在祢仍是我们的父！我们是泥，祢是窰匠；我们都是祢手的工作。\n\nQT: 雅歌六章13节~七章9节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "13 〔耶路撒冷的众女子〕回来，回来，书拉密女；你回来，你回来，使我们得观看你。〔新娘〕你们为何要观看书拉密女，像观看玛哈念跳舞的呢？"}, "12-19": {"theme": "一切为良人", "scripture": "雅歌七章10节~八章4节", "url": "https://www.youtube.com/watch?v=LRcokVdQ8dI&list=PLgFvTLP0QRDug6rV_YTfgjSSa3XJqyBvO&index=24", "videoId": "LRcokVdQ8dI", "date_cn": "19/12/26(六)", "description": "主题：一切为良人\n经文：雅歌七章10节~八章4节\n\n雅歌中三次提到「我属我的良人」（参二16、六3、七10），而这三次表达出来的意义各有不同。当新妇首次说：「良人属我，我也属祂」（参二16），她想到的是自己的需要。而当她第二次说：「我属我的良人，我的良人也属我」（参六3），她已经能为良人的需要设想。而在今天所读的经文中，她又说：「我属我的良人，他也恋慕我。」（参七10）这代表她全心只想到良人，一点也没有想到自己！\n\n人越多追求主，在主的爱中越能得满足，就更加愿意单单为祂而活！如同保罗写道：「原来基督的爱激励我们……祂替众人死，是叫那些活著的人不再为自己活，乃为替他们死而复活的主活」（参林后五14~15）。福音的目的，是要叫我们这些得蒙救赎的人，不再为自己活，而是为主活！亲爱的弟兄姐妹，我们在为主而活的目标上，达成了多少呢？\n\n当新妇确知「我属我的良人，他也恋慕我」（参七10），她就非常殷勤地做神的工（参七11~12）。然而，在一切的工作中，她知道最重要的事，就是「将我的爱情给你」（参七12）。亲爱的弟兄姐妹，事奉主，最重要的就是把我们的爱献给主！因为我们实在太容易把服事工作放在第一位，却忽略了爱主、亲近主、以主为中心！让我们学习效法新妇──在承担服事工作之时，也将爱献给主，好为主结出生命的果子（参七13）！\n\n如今，新妇和良人已经拥有非常亲密的关系！但是，她却仍然怀抱深切的渴慕，就是要与良人的关系比现在更加亲密（参八1）！她不满足于现状，因此渴望竭力进入更完全的地步！好像保罗写道：「我不是以为自己已经得著了；我只有一件事，就是忘记背后，努力面前的，向著标竿直跑，要得神在基督耶稣里从上面召我来得的奖赏」（参腓三13~14）！\n\n\n回应：主啊！求祢加增我对祢的渴慕，好叫我天天渴望更加亲近祢，更多学习为祢而活！\n奉主的名求，阿们！\n\n祷读：哥林多后书五章15节\n并且祂替众人死，是叫那些活著的人不再为自己活，乃为替他们死而复活的主活。\n\nQT: 雅歌七章10节~八章4节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "10 我属我的良人，他也恋慕我。\n11 我的良人，来吧！你我可以往田间去；你我可以在村庄住宿。\n12 我们早晨起来往葡萄园去，看看葡萄发芽开花没有，石榴放蕊没有；我在那里要将我的爱情给你。\n13 风茄放香，在我们的门内有各样新陈佳美的果子；我的良人，这都是我为你存留的。"}, "12-20": {"theme": "靠著良人", "scripture": "雅歌八章5~14节", "url": "https://www.youtube.com/watch?v=a_GcrNTJ-RM&list=PLgFvTLP0QRDug6rV_YTfgjSSa3XJqyBvO&index=23", "videoId": "a_GcrNTJ-RM", "date_cn": "20/12/26(日)", "description": "主题：靠著良人\n经文：雅歌八章5~14节\n\n雅歌两次提到女子从旷野上来。当经文首次描述她从旷野上来（参三6），提到了她如何脱离飘流的生活，进入安息。而我们在此看到的旷野，不只是指飘浮不定的生活，也是指世界的生活。我们活在这个世界上，受到它的限制与影响，但是神已经救赎了我们，祂要我们「不要效法这个世界，只要心意更新而变化，叫你们察验何为神的善良、纯全、可喜悦的旨意」（参罗十二2）。\n\n从女子的新生命和生活上，我们得著启示，若要脱离世界的影响，就要靠著良人！当人更多追求主、渴慕主，并洁净自己，就越不会受到世界的吸引；并且切望完全从世界分别出来，如同圣经提到的属灵伟人，「羡慕一个更美的家乡，就是在天上的」（参来十一13~16）。\n\n所谓的「靠著良人」，就是不倚靠自己的力量，谦卑承认自己需要主。今天所读的经文中，神透过描述这一位女子的出身（参5节）提醒我们──即使我们认为现在活得很荣耀、丰富，却仍然是卑微、蒙恩的罪人！我们所拥有的一切，都是因著祂的恩典；因此，要时刻谦卑倚靠神！\n\n女子知道若想要坚持到底，无法靠自己的力量，而是要靠主的保守！因为一切属灵的造就和成长，都在于神！因此，她如此呼求：「求你将我放在你心上如印记，带在你臂上如戳记」（参6节）。「心」是指爱，「臂」是能力；而「印记」和「戳记」，都是不能抹灭的记号。女子知道她需要良人的爱和能力来保守她，所以她请求良人，不要抹灭她，而要持续记念她，免得她有可能失败或跌倒！\n\n靠著良人的生活，在于倚靠神的爱与能力、等候祂的再来，并且将自己的心全然归属于主，不被世俗和世界侵扰。而当我们立志如此行，就会将生命中一切的美丽、圣洁，单单归于主（参14节）！感谢主！这是何等荣美的生命！但愿我们都能认真的效法！\n\n\n回应：主啊！求祢切实保守我，使我的心单单属于祢，直到祢再来的日子。奉主的名求，阿\n们！\n\n祷读：罗马书十二章2节\n不要效法这个世界，只要心意更新而变化，叫你们察验何为神的善良、纯全可喜悦的旨意。\n\nQT: 雅歌八章5~14节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "5 〔耶路撒冷的众女子〕那靠着良人从旷野上来的是谁呢？〔新娘〕我在苹果树下叫醒你。你母亲在那里为你劬劳；生养你的在那里为你劬劳。\n6 求你将我放在你心上如印记，带在你臂上如戳记。因为爱情如死之坚强，嫉恨如阴间之残忍；所发的电光是火焰的电光，是耶和华的烈焰。\n7 爱情，众水不能熄灭，大水也不能淹没。若有人拿家中所有的财宝要换爱情，就全被藐视。\n8 〔新娘的兄弟〕我们有一小妹；她的两乳尚未长成，人来提亲的日子，我们当为她怎样办理？\n9 她若是墙，我们要在其上建造银塔；她若是门，我们要用香柏木板围护她。\n10 〔新娘〕我是墙；我两乳像其上的楼。那时，我在他眼中像得平安的人。\n11 〔新郎〕所罗门在巴力‧哈们有一葡萄园；他将这葡萄园交给看守的人，为其中的果子必交一千舍客勒银子。\n12 我自己的葡萄园在我面前。所罗门哪，一千舍客勒归你，二百舍客勒归看守果子的人。\n13 你这住在园中的，同伴都要听你的声音，求你使我也得听见。\n14 〔新娘〕我的良人哪，求你快来！如羚羊或小鹿在香草山上。"}, "12-21": {"theme": "真正神的儿女", "scripture": "以赛亚书一章1~17节", "url": "https://www.youtube.com/watch?v=eJZ-LpNr2Bo&list=PLgFvTLP0QRDug6rV_YTfgjSSa3XJqyBvO&index=22", "videoId": "eJZ-LpNr2Bo", "date_cn": "21/12/26(一)", "description": "主题：真正神的儿女\n经文：以赛亚书一章1~17节\n\n在经文的一开始，先知提到神称呼以色列人为「儿女」（参2节）、「我的民」（参3节）、「国民」（参4节），代表百姓应该与神建立如此密切的关系。但是，他们却悖逆神、离弃耶和华、与神生疏、往后退步（参2、4节）！\n\n虽然神以各样的苦难责罚他们，让他们狼狈不堪（参6节），甚至使他们的国家被敌人侵吞，仅存锡安城（参8节）；但是，神却依然在他们的身上，浇灌祂的恩典与美意，也就是要百姓回转，再度归向祂！\n\n回转不在于外在形式，以色列人看重形式，他们不断献祭、来到神的殿中朝见神、守节期和祷告（参11~15节）；然而，却无法得著神的喜悦！因为在人眼中看似敬虔、讨神喜悦的事，在神的眼中却是虚浮、憎恶、麻烦，甚至觉得不耐烦（参14节），而不愿聆听他们的祷告（参15节）！\n\n神所要的回转，是全人的回转──不只是宗教仪式上的行为，而是愿意聆听神的话语（参10节），并且照著去行。这表示我们要敬畏神，在一切的行为上自洁，并且除去祂所不喜悦的恶行（参16节）；此外，我们不能只是消极聆听神的话，而要积极遵守祂的命令，在生活中「学习行善、寻求公平」（参17节）。\n\n神之所以让困难临到祂的百姓，为的是要呼召他们回到祂的心意里！也就是在生活中的每一个层面听从神的话语，活出真实的敬虔生活。如今，有人称基督徒为「小基督」，也就是学像基督的人。在生活中，我们是否真的能够活出基督的生命呢？亲爱的弟兄姐妹，神所要的不是在宗教仪文上的敬虔，而是期盼我们的生命能够靠著祂的雕琢和磨练得著建造，讨祂喜悦！\n\n我们所以为的「好基督徒」，只需要认真参加主日、读经、祷告，或更进一步参加教会的服事吗？这些都是迈向好基督徒的过程，但更重要的是能够在生活中，实际将基督的生命活出来，让人在我们身上看见基督。我们是否愿意如此回应祂的恩典呢？\n\n\n回应：主啊！求祢不断光照我与祢之间的关系，并且帮助我在生命的每一个层面都能活出真正属祢儿女的身分！奉主的名求，阿们！\n\n祷读：约翰壹书五章3节 \n我们遵守神的诫命，这就是爱祂了；并且祂的诫命不是难守的。\n\nQT: 以赛亚书一章1~17节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人 座城，所定下的心意（参26节）！但是，在这个过程中，神要先来炼净这座城（参25节）；所有心存悖逆、犯罪、离弃耶和华的人，都要遭到消灭（参28节）！而神却仍然为他们开一条出路──只要他们再次归向神，就仍必得救，回到神的恩典中（参27节）。\n\n如今，我们这些领受神救恩的人，是否也像以色列人一般，本来应该承受更大的恩典，却不断离开神的心意和祂的话语，一昧追求自己看为喜悦的呢？当我们顺著自己的渴望行事，就必逐渐落入以色列人的景况！先知以赛亚所传讲的信息，不只是对当时的以色列人发出的呼召，今天也同样向我们发出；但愿我们都能归回神的心意，遵行神的话语而活，因为这是唯一蒙福的道路（参19节）！\n\n亲爱的弟兄姐妹，但愿我们每一天都能不再只为自己活，而是为主活！让我们自我省察：生活中的各个层面，是否都是如此呢？我们的心中是否还有很多的事情，无法将主权交给主呢？求神光照，并且帮助我们，再度将生命的主权交给祂，好更多领受祂预备要给我们的恩典！\n\n\n回应：主啊！求祢光照我的生命，并且帮助我将生命的主权完全交在祢的手中，好能领受真正的祝福！奉主的名求，阿们！\n\n祷读：诗篇十六篇2节 \n我的心哪，你曾对耶和华说：「祢是我的主；我的好处不在祢以外。」\n\nQT: 以赛亚书一章18~31节\n*************\n💌欢迎留言回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://hvfhoc.com/hvfproduct/ \n🔥 天声官网 https://www.hvfhoc.com/  \n📡 天声Podcast   https://bit.ly/Grace365Podcast   \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB \n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/ \n⛪寻找合适教会：https://hvfhoc.com/newfriend/  \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师 主讲的 #恩典365 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "18 耶和华说：你们来，我们彼此辩论。你们的罪虽像硃红，必变成雪白；虽红如丹颜，必白如羊毛。\n19 你们若甘心听从，必吃地上的美物，\n20 若不听从，反倒悖逆，必被刀剑吞灭。这是耶和华亲口说的。\n21 可叹，忠信的城变为妓女！从前充满了公平，公义居在其中，现今却有凶手居住。\n22 你的银子变为渣滓；你的酒用水搀对。\n23 你的官长居心悖逆，与盗贼作伴，各都喜爱贿赂，追求赃私。他们不为孤儿伸冤；寡妇的案件也不得呈到他们面前。\n24 因此，主──万军之耶和华、以色列的大能者说：哎！我要向我的对头雪恨，向我的敌人报仇。\n25 我必反手加在你身上，炼尽你的渣滓，除净你的杂质。\n26 我也必复还你的审判官，像起初一样，复还你的谋士，像起先一般。然后，你必称为公义之城，忠信之邑。\n27 锡安必因公平得蒙救赎；其中归正的人必因公义得蒙救赎。\n28 但悖逆的和犯罪的必一同败亡；离弃耶和华的必致消灭。\n29 那等人必因你们所喜爱的橡树抱愧；你们必因所选择的园子蒙羞。\n30 因为，你们必如叶子枯干的橡树，好像无水浇灌的园子。\n31 有权势的必如麻瓤；他的工作好像火星，都要一同焚毁，无人扑灭。"}, "12-23": {"theme": "抬头仰望", "scripture": "以赛亚书二章1~5节", "url": "https://www.youtube.com/watch?v=LGKggQmrhk0&list=PLgFvTLP0QRDug6rV_YTfgjSSa3XJqyBvO&index=20", "videoId": "LGKggQmrhk0", "date_cn": "23/12/26(三)", "description": "主题：抬头仰望\n经文：以赛亚书二章1~5节\n\n在第一章中，我们看见神藉著先知指责百姓犯下的罪。以色列国从上到下，都充满了罪恶，这个情况真是让人看不到盼望！但是，到了第二章，我们的眼光就立即被转移到将来（参2节）！即便我们现在无法在世界上看见盼望，神却要将我们的眼光转移到将来，为的是让我们拥有超越世界的眼光，并能怀抱从祂而来的盼望！\n\n神不仅要炼净百姓的罪恶，恢复国家先前的景况（参一25~26），祂还要预备行更大的事──将来「耶和华殿的山必坚立，超乎诸山，高举过于万岭；万民都要流归这山」（参2节）。即便当时神的山看似败落，神却要用祂自己的手，再度将山高举，而且超乎世上的一切！\n\n今天，台湾教会的力量即使看似微小，传统宗教势力依然强大；当我们放眼观看世界局势，敌对真神的势力仍然无法遏止，神却告诉我们──将来，祂要高举祂的山，胜过这一切！感谢主！这是何等大的盼望！\n\n不只如此，「万民都要流归这山」（参2节）──所有敌对真神的势力都要归向神，他们的口要发出寻求神的言语，并且依照神的心意行事，一心归向祂（参3节）！这个世界的乱象将要被除去，神将要完全掌权！\n\n感谢主！祂藉著先知提升祂儿女的眼光！期盼我们透过向上仰望的眼光，往远处望去，而看见神的心意和作为，让我们能够天天行在神的光明中！如同先知所发出的呼召，「雅各家啊，来吧！我们在耶和华的光明中行走」（参5节）。\n\n亲爱的弟兄姐妹，你的眼目定睛于何处呢？我们何等有福，能在神的计划中有分！因此，我们必须抬头仰望神，透过祂的眼光观看这个世代。但愿我们在这个世界上，无论面对任何险恶的困境，都能透过神的眼光观看，以致能够重新得力，行在祂的光明中！\n\n\n回应：主啊！求祢提升我的眼光，让我进入祢的心意！求祢使我天天委身于祢，使我能行在祢的光明中！奉主的名求，阿们！\n\n祷读：以赛亚书二章5节 \n雅各家啊，来吧！我们在耶和华的光明中行走。\n\nQT: 以赛亚书二章1~5节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年 荣（参四2），这里指的是主耶稣；而「公义的灵和焚烧的灵」（参四3~4），指的是圣灵。感谢主！祂不只是要审判人，也要为人开一条出路──藉著主耶稣，我们能够真实地得著洁净（参四3），再次得蒙神的眷顾（参四5~6）！\n\n作为神的儿女，我们在生活中时常软弱、失败，甚至犯罪；但是，只要我们承认所犯的罪，并且悔改，就必如同先前的以色列人，再次回到神的眷顾之下！如同四章6节写道：「必有亭子，白日可以得荫避暑，也可以作为藏身之处，躲避狂风暴雨。」感谢主！祂要作我们的「亭子」（参四6）！\n\n亲爱的弟兄姐妹，在你的生命中，是否也有一些难以胜过的软弱？或是有一些不讨神喜悦的事呢？神是公义的神，也是慈爱的神，祂顾念我们的软弱！让我们放心将失败带到祂的面前，并且单单倚靠祂，更多活出神儿女得胜的生命！\n\n\n回应：主啊，谢谢祢总是为我开路！求祢让我在面对自己的软弱时，能够放胆来到祢的面前，并且经历祢的赦免和帮助！奉主的名求，阿们！\n\n祷读：出埃及记三十四章6节 \n耶和华在他面前宣告说：「耶和华，耶和华，是有怜悯有恩典的神，不轻易发怒，并有丰盛的慈爱和诚实。」\n\nQT: 以赛亚书三章1节~四章6节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 主──万军之耶和华从耶路撒冷和犹大，除掉众人所倚靠的，所仗赖的，就是所倚靠的粮，所仗赖的水；\n2 除掉勇士和战士，审判官和先知，占卜的和长老，\n3 五十夫长和尊贵人，谋士和有巧艺的，以及妙行法术的。\n4 主说：我必使孩童作他们的首领，使婴孩辖管他们。\n5 百姓要彼此欺压；各人受邻舍的欺压。少年人必侮慢老年人；卑贱人必侮慢尊贵人。\n6 人在父家拉住弟兄，说：你有衣服，可以作我们的官长。这败落的事归在你手下吧！\n7 那时，他必扬声说：我不作医治你们的人；因我家中没有粮食，也没有衣服，你们不可立我作百姓的官长。\n8 耶路撒冷败落，犹大倾倒；因为他们的舌头和行为与耶和华反对，惹了他荣光的眼目。\n9 他们的面色证明自己的不正；他们述说自己的罪恶，并不隐瞒，好像所多玛一样。他们有祸了！因为作恶自害。\n10 你们要论义人说：他必享福乐，因为要吃自己行为所结的果子。\n11 恶人有祸了！他必遭灾难！因为要照自己手所行的受报应。\n12 至于我的百姓，孩童欺压他们，妇女辖管他们。我的百姓啊，引导你的使你走错，并毁坏你所行的道路。\n13 耶和华起来辩论，站着审判众民。\n14 耶和华必审问他民中的长老和首领，说：吃尽葡萄园果子的就是你们；向贫穷人所夺的都在你们家中。\n15 主──万军之耶和华说：你们为何压制我的百姓，搓磨贫穷人的脸呢？\n16 耶和华又说：因为锡安的女子狂傲，行走挺项，卖弄眼目，俏步徐行，脚下玎珰，\n17 所以，主必使锡安的女子头长秃疮；耶和华又使她们赤露下体。\n18 到那日，主必除掉她们华美的脚钏、发网、月牙圈、\n19 耳环、手镯、蒙脸的帕子、\n20 华冠、足炼、华带、香盒、符囊、\n21 戒指、鼻环、\n22 吉服、外套、云肩、荷包、\n23 手镜、细麻衣、裹头巾、蒙身的帕子。\n24 必有臭烂代替馨香，绳子代替腰带，光秃代替美发，麻衣系腰代替华服，烙伤代替美容。\n25 你的男丁必倒在刀下；你的勇士必死在阵上。\n26 锡安〔原文作“他”〕的城门必悲伤、哀号；她必荒凉坐在地上。"}, "12-26": {"theme": "神的期望", "scripture": "以赛亚书五章1~7节", "url": "https://www.youtube.com/watch?v=_ijWRQaReLc&list=PLgFvTLP0QRDug6rV_YTfgjSSa3XJqyBvO&index=17", "videoId": "_ijWRQaReLc", "date_cn": "26/12/26(六)", "description": "主题：神的期望\n经文：以赛亚书五章1~7节\n\n从第五章开始，先知用葡萄园的比喻，指出以色列人的错误，而这个比喻又称为「葡萄园之歌」。\n\n比喻中说到，神──也就是葡萄园的拥有者，他的葡萄园位于一座肥美的山冈上（参1节）。葡萄园的土壤肥沃，园主费心费力地「刨挖园子」（参2节），使土壤松软，又「捡去石头」，除去生长的障碍；他「栽种上等的葡萄树」之后（参2节），又「盖了一座楼」（参2节），以便时时照顾葡萄树。园主不仅为葡萄园作好万全准备，甚至还「凿出压酒池」（参2节），这代表园主期望将来收获好葡萄！但是，他所种植的这一棵「好葡萄树」，却结出了「野葡萄」（参2节）！\n\n神对以色列百姓的心，就如同葡萄园的园主一样。神期望百姓因著祂的祝福，结出「好葡萄」，也就是公平与公义。然而，以色列人却结出了「野葡萄」，也就是暴虐与冤声（参7节）！神的期望，大大落空！祂后悔一切所行的，并要收回（参5~6节）。\n\n亲爱的弟兄姐妹，我们何等期望神能够赐下更多的福分！可是，就像以色列人一样，我们在神眼中也是一棵葡萄树，祂期望我们能够结出好果子，而与所蒙的恩相称（参弗四1）。我们都渴望能够得到从神而来的新生命，并且能够经历神的同在与赐福！选择权在我们手中──我们必须顺从神，结出「好葡萄」；倘若仍然顺从自己的私欲，就必结出「野葡萄」！\n\n亲爱的弟兄姐妹，让我们时常回想神在我们身上的恩典！必须知道，这样的恩典并不是我们配得的！在这些恩典的背后，有著神的期望，希望我们能够活出祂的样式！今天，你是否愿意照著神的期望而活呢？\n\n回应：主啊！求祢让我贴近祢的心意，看见祢所赐给我的一切恩典，都是我不配得的！我要更加谦卑地来到祢的面前，回应祢对我生命的期待！奉主的名求，阿们！\n\n祷读：歌罗西书一章9~10节\n愿你们在一切属灵的智慧悟性上，满心知道神的旨意；好叫你们行事为人对得起主，凡事蒙祂喜悦，在一切善事上结果子，渐渐地多知道神。\n\nQT: 以赛亚书五章1~7节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 我要为我所亲爱的唱歌，是我所爱者的歌，论他葡萄园的事：我所亲爱的有葡萄园在肥美的山冈上。\n2 他刨挖园子，捡去石头，栽种上等的葡萄树，在园中盖了一座楼，又凿出压酒池；指望结好葡萄，反倒结了野葡萄。\n3 耶路撒冷的居民和犹大人哪，请你们现今在我与我的葡萄园中，断定是非。\n4 我为我葡萄园所做之外，还有什么可做的呢？我指望结好葡萄，怎么倒结了野葡萄呢？\n5 现在我告诉你们，我要向我葡萄园怎样行：我必撤去篱笆，使它被吞灭，拆毁墙垣，使它被践踏。\n6 我必使它荒废，不再修理，不再锄刨，荆棘蒺藜倒要生长。我也必命云不降雨在其上。\n7 万军之耶和华的葡萄园就是以色列家；他所喜爱的树就是犹大人。他指望的是公平，谁知倒有暴虐〔或作“倒流人血”〕；指望的是公义，谁知倒有冤声。"}, "12-27": {"theme": "活出不一样的生命", "scripture": "以赛亚书五章8~30节", "url": "https://www.youtube.com/watch?v=5aMm1oo87Jc&list=PLgFvTLP0QRDug6rV_YTfgjSSa3XJqyBvO&index=16", "videoId": "5aMm1oo87Jc", "date_cn": "27/12/26(日)", "description": "主题：活出不一样的生命\n经文：以赛亚书五章8~30节\n\n本段经文延续前面审判的信息，内容包含六次的「祸哉」！犹大国当时富足强盛，国中的上层人士，却不因财富增加而满足，反倒贪得无厌──地主欺压贫穷人（参8节），社会上充满了酗酒与荒宴（参11~12节）。最重要的是，神的百姓忘记了神（参12节），落入私欲的网罗中（参14节）！而属神的先知看透这一切，就向他们发出「祸哉」的警告！\n\n然而，神藉著先知指出罪恶，并且宣告审判，百姓却仍然硬著心，继续行恶（参18节）。他们掩耳不听先知所说的话，甚至出口狂妄，认为神不会审判（参19节）；他们认为自己有智慧判断好坏，实际上却只会颠倒是非，且恣意贿赂，欺压义人（参20~23节）。如今，先知再次向他们发出审判的话语：「祸哉」！\n\n面对百姓悖逆的光景，神并不静默，祂将回应他们狂傲的言语！祂要使远方的国民来到，毁灭他们所引以为傲的一切（参10、17、24节），并且神要使他们「望地，只见黑暗艰难，光明在云中变为昏暗」（参30节）。\n\n我们所处的社会，如同当时的犹大国一样，生活品质有一定程度的水准，道德却不断沉沦！例如人们不断合理化同性恋、外遇的问题，甚至为了金钱，什么都可以舍弃，也什么都可以做！面对这样的社会，我们作为神的儿女，能否有所警觉呢？我们是否表面上看似光鲜亮丽，内在的生命却正在腐败？\n\n今天，我们不只要指责这个世界所犯下的罪，更要认真反省──作为神的子民，我们是否像以色列人一样，「不顾念耶和华的作为，也不留心祂手所做的」（参12节）？亲爱的弟兄姐妹，要先回到神的心意中，从神的家中活出神的心意，而能在这个败坏的世界上，活出不一样的见证！\n\n\n回应：主啊！求祢光照我的生命，让我在这个败坏的世代中，彰显祢的荣光！求祢指教我如何与祢同行，好能服事祢、荣耀祢！奉主的名求，阿们！\n\n祷读：约翰一书二章15节\n不要爱世界和世界上的事。人若爱世界，爱父的心就不在他里面了。\n\nQT: 以赛亚书五章8~30节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "8 祸哉！那些以房接房，以地连地，以致不留余地的，只顾自己独居境内。\n9 我耳闻万军之耶和华说：必有许多又大又美的房屋成为荒凉，无人居住。\n10 三十亩葡萄园只出一罢特酒；一贺梅珥谷种只结一伊法粮食。\n11 祸哉！那些清早起来追求浓酒，留连到夜深，甚至因酒发烧的人。\n12 他们在筵席上弹琴，鼓瑟，击鼓，吹笛，饮酒，却不顾念耶和华的作为，也不留心他手所做的。\n13 所以，我的百姓因无知就被掳去；他们的尊贵人甚是饥饿，群众极其干渴。\n14 故此，阴间扩张其欲，开了无限量的口；他们的荣耀、群众、繁华，并快乐的人都落在其中。\n15 卑贱人被压服；尊贵人降为卑；眼目高傲的人也降为卑。\n16 惟有万军之耶和华因公平而崇高；圣者神因公义显为圣。\n17 那时，羊羔必来吃草，如同在自己的草场；丰肥人的荒场被游行的人吃尽。\n18 祸哉！那些以虚假之细绳牵罪孽的人！他们又像以套绳拉罪恶，\n19 说：任他急速行，赶快成就他的作为，使我们看看；任以色列圣者所谋划的临近成就，使我们知道。\n20 祸哉！那些称恶为善，称善为恶，以暗为光，以光为暗，以苦为甜，以甜为苦的人。\n21 祸哉！那些自以为有智慧，自看为通达的人。\n22 祸哉！那些勇于饮酒，以能力调浓酒的人。\n23 他们因受贿赂，就称恶人为义，将义人的义夺去。\n24 火苗怎样吞灭碎秸，干草怎样落在火焰之中，照样，他们的根必像朽物，他们的花必像灰尘飞腾；因为他们厌弃万军之耶和华的训诲，藐视以色列圣者的言语。\n25 所以，耶和华的怒气向他的百姓发作。他的手伸出攻击他们，山岭就震动；他们的尸首在街市上好像粪土。虽然如此，他的怒气还未转消；他的手仍伸不缩。\n26 他必竖立大旗，招远方的国民，发嘶声叫他们从地极而来；看哪，他们必急速奔来。\n27 其中没有疲倦的，绊跌的；没有打盹的，睡觉的；腰带并不放松，鞋带也不折断。\n28 他们的箭快利，弓也上了弦。马蹄算如坚石，车轮好像旋风。\n29 他们要吼叫，像母狮子，咆哮，像少壮狮子；他们要咆哮抓食，坦然叼去，无人救回。\n30 那日，他们要向以色列人吼叫，像海浪匉訇；人若望地，只见黑暗艰难，光明在云中变为昏暗。"}, "12-28": {"theme": "回应神", "scripture": "以赛亚书六章1~13节", "url": "https://www.youtube.com/watch?v=OWv0wSSy45k&list=PLgFvTLP0QRDug6rV_YTfgjSSa3XJqyBvO&index=15", "videoId": "OWv0wSSy45k", "date_cn": "28/12/26(一)", "description": "主题：回应神\n经文：以赛亚书六章1~13节\n\n本章经文提到先知以赛亚蒙召的过程。在犹大国所面临的关键时刻，神向以赛亚显现，呼召他完成神的工作。\n\n特别的是，以赛亚并没有将蒙召的过程放在书卷开头，而是放在第六章。在前五章，他不断指出犹大国的罪恶，不断说：「祸哉」！但是，到了第六章，当他看见荣耀的主坐在宝座上（参1节），又有撒拉弗在神的周围飞翔，呼喊：「圣哉！圣哉！圣哉！」（参3节），他的反应是：「祸哉！我灭亡了！因为我是嘴唇不洁的人，又住在嘴唇不洁的民中，又因我眼见大君王──万军之耶和华」（参5节）！\n\n在圣洁的主面前，以赛亚看见自己和他的同胞一样有罪（参5节）！当他承认自己的罪，神就藉著祂的使者，以红炭象征性地洁净他（参6~7节），让他知道自己已得赦免。\n\n以赛亚蒙召的过程，给了我们一个启示──百姓是如此刚硬（参9~10节），但以赛亚听见神的呼召，就立即甘心回应（参8节）！这是因为他体会到神在他身上的恩典，他知道──百姓也需要相同的恩典，所以愿意面对如此大的挑战！\n\n亲爱的弟兄姐妹，当我们知道自己已经得蒙神的赦罪之恩，是否也看见我们身旁的人，需要这样的恩典？我们是否愿意回应神对我们生命的呼召，在祂量给我们的环境中为祂作见证？也许当我们这样做的时候，会和以赛亚一样面对相同的困难，但我们应以先知为榜样，因著神的恩典而甘心面对！当我们细查神在我们生命中所做的一切，就必甘心乐意为祂而活。\n\n以赛亚体会神的恩典，甘心回应神的呼召。如今，我们能够随时来到神的面前，享受祂的恩典，是我们配得的吗？我们的生活是否能更深地为主而活，来回应祂的恩典呢？\n\n\n回应：主啊！求祢让我更加谦卑地来到祢的面前，知道自己活在祢何等奇妙的恩典中！我愿意献上自己，单单为祢而活，好让祢的心得满足！奉主的名求，阿们！\n\n祷读：加拉太书二章20节\n我已经与基督同钉十字架，现在活著的不再是我，乃是基督在我里面活著；并且我如今在肉身活著，是因信神的儿子而活；祂是爱我，为我舍己。\n\nQT: 以赛亚书六章1~13节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 当乌西雅王崩的那年，我见主坐在高高的宝座上。他的衣裳垂下，遮满圣殿。\n2 其上有撒拉弗侍立，各有六个翅膀：用两个翅膀遮脸，两个翅膀遮脚，两个翅膀飞翔；\n3 彼此呼喊说：圣哉！圣哉！圣哉！万军之耶和华；他的荣光充满全地！\n4 因呼喊者的声音，门槛的根基震动，殿充满了烟云。\n5 那时我说：“祸哉！我灭亡了！因为我是嘴唇不洁的人，又住在嘴唇不洁的民中，又因我眼见大君王──万军之耶和华。”\n6 有一撒拉弗飞到我跟前，手里拿着红炭，是用火剪从坛上取下来的，\n7 将炭沾我的口，说：“看哪，这炭沾了你的嘴，你的罪孽便除掉，你的罪恶就赦免了。”\n8 我又听见主的声音说：“我可以差遣谁呢？谁肯为我们去呢？”我说：“我在这里，请差遣我！”\n9 他说：“你去告诉这百姓说：你们听是要听见，却不明白；看是要看见，却不晓得。\n10 要使这百姓心蒙脂油，耳朵发沉，眼睛昏迷；恐怕眼睛看见，耳朵听见，心里明白，回转过来，便得医治。”\n11 我就说：“主啊，这到几时为止呢？”他说：直到城邑荒凉，无人居住，房屋空闲无人，地土极其荒凉。\n12 并且耶和华将人迁到远方，在这境内撇下的地土很多。\n13 境内剩下的人若还有十分之一，也必被吞灭，像栗树、橡树虽被砍伐，树墩子却仍存留。这圣洁的种类在国中也是如此。"}, "12-29": {"theme": "选择", "scripture": "以赛亚书七章1~25节", "url": "https://www.youtube.com/watch?v=YXWAoqg2hz0&list=PLgFvTLP0QRDug6rV_YTfgjSSa3XJqyBvO&index=14", "videoId": "YXWAoqg2hz0", "date_cn": "29/12/26(二)", "description": "主题：选择\n经文：以赛亚书七章1~25节\n\n本章记载犹大王亚哈斯，面对亚兰王与以色列王联合攻击的事件（参1节）。当时亚兰与以色列想要与犹大国一起对抗亚述，却遭到犹大国的拒绝，于是他们就转而想要攻击犹大国。消息传到犹大国，全国上下人心惶惶（参2节）。\n\n但是，这一切神都知道！当亚哈斯巡视耶路撒冷的防卫状况时（参3节），神就藉著以赛亚告诉他──面对这个情势，不用害怕（参4节）；他们的计谋神都知道，这些计谋将站立不住，而且这两个王将被毁坏（参5~9节）！最后，神要求亚哈斯──只要信靠祂，就必得救（参9节）。另外，神还给亚哈斯一个恩典，那就是可以求一个兆头，来印证他所信的是真实的（参10~11节）。\n\n可是，虽然亚哈斯对神的回应看似敬虔（参12节），他实际的行为却显明他对神不信任！他向亚述求救，并将耶和华殿里与宫里的金银，都送给亚述王（参王下十六7~8）。亚哈斯选择以自己的方式，来回应困境！他离弃神的应许，又选择不听从神的话，以致即便暂时看似得救，却终究走向灭亡──神预言亚述与埃及将来必攻击犹大国（参18节），而亚哈斯曾经求助的亚述，将如同「剃刀」一样攻击亚兰、以色列，以及犹大国（参20节）！亚哈斯因著高傲，选择不信靠神，以致必须承受如此的结果！\n\n如今，我们在生活中遇到困难，也会面临要选择信靠神，或是用自己的方式回应。神要我们信靠祂，并且寻求从祂而来的智慧。若选择倚靠自己的「智慧」来面对困境，最后所承受的往往是不平安，甚至内心产生骄傲，而离开神！我们和亚哈斯一样，必须面对自己所选择的结果。\n\n亲爱的弟兄姐妹，当我们面临艰难的抉择，是否真实信靠神呢？愿我们遭遇各样的难处时，都能单单信靠神，让祂来带领我们所踏出的每一步！\n\n\n回应：主啊！求祢赐给我一颗深深信靠祢的心，好让我不论面临什么样的景况，都能单单跟随、顺服祢的带领！奉主的名求，阿们！\n\n祷读：申命记三十章20节 \n且爱耶和华──你的神，听从祂的话，专靠祂；因为祂是你的生命，你的日子长久也在乎祂。\n\nQT: 以赛亚书七章1~25节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 乌西雅的孙子、约坦的儿子、犹大王亚哈斯在位的时候，亚兰王利汛和利玛利的儿子、以色列王比加上来攻打耶路撒冷，却不能攻取。\n2 有人告诉大卫家说：“亚兰与以法莲已经同盟。”王的心和百姓的心就都跳动，好像林中的树被风吹动一样。\n3 耶和华对以赛亚说：“你和你的儿子施亚雅述出去，到上池的水沟头，在漂布地的大路上，去迎接亚哈斯，\n4 对他说：『你要谨慎安静，不要因亚兰王利汛和利玛利的儿子这两个冒烟的火把头所发的烈怒害怕，也不要心里胆怯。\n5 因为亚兰和以法莲，并利玛利的儿子，设恶谋害你，\n6 说：我们可以上去攻击犹大，扰乱它，攻破它，在其中立他比勒的儿子为王。\n7 所以主耶和华如此说：这所谋的必立不住，也不得成就。\n8 原来亚兰的首城是大马士革；大马士革的首领是利汛。（六十五年之内，以法莲必然破坏，不再成为国民。）\n9 以法莲的首城是撒马利亚；撒马利亚的首领是利玛利的儿子。你们若是不信，定然不得立稳。』”\n10 耶和华又晓谕亚哈斯说：\n11 “你向耶和华──你的神求一个兆头：或求显在深处，或求显在高处。”\n12 亚哈斯说：“我不求；我不试探耶和华。”\n13 以赛亚说：“大卫家啊，你们当听！你们使人厌烦岂算小事，还要使我的神厌烦吗？\n14 因此，主自己要给你们一个兆头，必有童女怀孕生子，给他起名叫以马内利〔就是神与我们同在的意思〕。\n15 到他晓得弃恶择善的时候，他必吃奶油与蜂蜜。\n16 因为在这孩子还不晓得弃恶择善之先，你所憎恶的那二王之地必致见弃。\n17 耶和华必使亚述王攻击你的日子临到你和你的百姓，并你的父家，自从以法莲离开犹大以来，未曾有这样的日子。\n18 “那时，耶和华要发嘶声，使埃及江河源头的苍蝇和亚述地的蜂子飞来；\n19 都必飞来，落在荒凉的谷内、磐石的穴里，和一切荆棘篱笆中，并一切的草场上。\n20 “那时，主必用大河外赁的剃头刀，就是亚述王，剃去头发和脚上的毛，并要剃净胡须。\n21 “那时，一个人要养活一只母牛犊，两只母绵羊；\n22 因为出的奶多，他就得吃奶油，在境内所剩的人都要吃奶油与蜂蜜。\n23 “从前，凡种一千棵葡萄树、值银一千舍客勒的地方，到那时必长荆棘和蒺藜。\n24 人上那里去，必带弓箭，因为遍地满了荆棘和蒺藜。\n25 所有用锄刨挖的山地，你因怕荆棘和蒺藜，不敢上那里去；只可成了放牛之处，为羊践踏之地。”"}, "12-30": {"theme": "患难中的呼召", "scripture": "以赛亚书八章1~18节", "url": "https://www.youtube.com/watch?v=2zeKCLsh53o&list=PLgFvTLP0QRDug6rV_YTfgjSSa3XJqyBvO&index=13", "videoId": "2zeKCLsh53o", "date_cn": "30/12/26(三)", "description": "主题：患难中的呼召\n经文：以赛亚书八章1~18节\n\n本段经文延续上一段所提到，犹大国的敌人──亚兰和以色列的命运（参4节），以及犹大国的命运（参7~8节）。起初，神晓喻以赛亚记下「玛黑珥．沙拉勒．哈施．罢斯」（参1节），并且要以赛亚为自己的儿子取这个名字，为的是要提醒犹大百姓──掳掠速临、抢夺快到（参1节）！\n\n这个预言不只是指著犹大国的仇敌──以色列和亚兰说的，更是指著犹大国说的！因为他们离弃神、选择自己认为好的（参6节），所以神要使亚述攻入犹大！每当以赛亚称呼这个孩子的名字，神的话就会不断地提醒他，也提醒所有听见的百姓──审判将要临近（参18节）！　\n\n但是，神在审判中，却依然存留怜悯。因为神最终的心意不是要降灾，而是要人回转、归向祂。虽然敌人如洪水泛滥，却不使人灭顶；因为「以马内利」的神仍然掌权（参8节）！虽然仇敌要带来毁灭，但是在全地的主面前，他们却要终归无有（参9~10节）！当人在患难中得救，就必须敬畏神，仰望祂（参13、17节），并从悖逆中回转。患难来临，神似乎不顾雅各家，而是眷顾那些敬畏祂的百姓，并且仍然作他们的圣所（参13、14、17节）。这告诉我们──我们能否得著神的恩典，取决于我们的选择！\n\n如今，虽然我们在面对整个大环境的变迁时，往往只看见不断变坏的局势，而看不见未来的盼望；但是，主仍然掌权！祂要神儿女专心信靠，并且在患难临到时，全心仰望祂。信靠神，就能在患难中经历神成为我们的圣所（参13~14节）！相反的，倘若我们忽视神透过患难对我们所发出回转的呼召，患难就将成为我们的审判！\n\n神允许患难来到，为的是让人回转、归向祂。今天，当我们遇见困难，听见神呼召的时候，是否能紧紧抓住祂呢？\n\n\n回应：主啊！虽然我在世上有苦难，祢却让我有平安！求祢让我在患难中，更加紧紧抓住祢，好让我明白祢要我学习的功课，让祢在我的生命中做成祢的工作！奉主的名求，阿们！\n\n祷读：那鸿书一章7节 \n耶和华本为善，在患难的日子为人的保障，并且认得那些投靠祂的人。\n\nQT: 以赛亚书八章1~18节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固 却仍然因自己的「热心」（参九7），赐下救恩──我们是否也能体贴神的心意呢？\n\n亲爱的弟兄姐妹，但愿我们拥有怜悯的心，火热、踊跃地向人传福音，并且时常为他们祷告！求神赐给我们一颗对灵魂的热心（参九7），好为神多得灵魂！\n\n\n回应：主啊！愿祢再度开展我的眼界，呼召我勇敢传扬祢的福音，好让更多人能够领受祢丰盛的恩典，享受生命之光！奉主的名求，阿们！\n\n祷读：约翰福音八章12节 \n耶稣又对众人说：「我是世界的光。跟从我的，就不在黑暗里走，必要得著生命的光。」\n　\n\nQT: 以赛亚书八章19节~九章7节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "19 有人对你们说：“当求问那些交鬼的和行巫术的，就是声音绵蛮，言语微细的。”你们便回答说：“百姓不当求问自己的神吗？岂可为活人求问死人呢？”\n20 人当以训诲和法度为标准；他们所说的，若不与此相符，必不得见晨光。\n21 他们必经过这地，受艰难，受饥饿；饥饿的时候，心中焦躁，咒骂自己的君王和自己的神。\n22 仰观上天，俯察下地，不料，尽是艰难、黑暗，和幽暗的痛苦。他们必被赶入乌黑的黑暗中去。"}};
var cur=new Date(); cur.setHours(0,0,0,0);
var audioEl=document.getElementById("audio-el");
var isPlaying=false;

function key(d){return (d.getMonth()+1)+"-"+d.getDate();}
function pad(n){return n<10?"0"+n:n;}
function audioFile(k){var p=k.split("-");return "audio/2026-"+pad(parseInt(p[0]))+"-"+pad(parseInt(p[1]))+".m4a";}
function label(d){
  var M=["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
  var W=["日","一","二","三","四","五","六"];
  return "2026年"+M[d.getMonth()]+d.getDate()+"日（星期"+W[d.getDay()]+"）";
}
function fmtTime(s){
  if(isNaN(s)||s===Infinity)return "0:00";
  var m=Math.floor(s/60), sec=Math.floor(s%60);
  return m+":"+(sec<10?"0":"")+sec;
}

function changeDay(n){
  audioEl.pause(); isPlaying=false;
  cur=new Date(cur); cur.setDate(cur.getDate()+n);
  render();
}

function togglePlay(){
  if(audioEl.paused){
    audioEl.play().catch(function(){});
    isPlaying=true;
  } else {
    audioEl.pause();
    isPlaying=false;
  }
  updatePlayBtn();
}

function updatePlayBtn(){
  var btn=document.getElementById("play-btn-svg");
  if(!btn)return;
  if(isPlaying){
    btn.innerHTML='<rect x="6" y="4" width="4" height="16" rx="1" fill="#1b3a6b"/><rect x="14" y="4" width="4" height="16" rx="1" fill="#1b3a6b"/>';
  } else {
    btn.innerHTML='<polygon points="5,3 19,12 5,21" fill="#1b3a6b"/>';
  }
}

function setSpeed(rate){
  audioEl.playbackRate=rate;
  document.querySelectorAll(".speed-btn").forEach(function(b){
    b.classList.toggle("active", parseFloat(b.dataset.rate)===rate);
  });
}

function seekTo(e){
  var bar=document.getElementById("progress-bg");
  if(!bar||!audioEl.duration)return;
  var rect=bar.getBoundingClientRect();
  var x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
  var ratio=Math.max(0,Math.min(1,x/rect.width));
  audioEl.currentTime=ratio*audioEl.duration;
}

audioEl.addEventListener("timeupdate",function(){
  var el=document.getElementById("time-current");
  var pf=document.getElementById("progress-fill");
  if(el)el.textContent=fmtTime(audioEl.currentTime);
  if(pf&&audioEl.duration)pf.style.width=(audioEl.currentTime/audioEl.duration*100)+"%";
});
audioEl.addEventListener("loadedmetadata",function(){
  var el=document.getElementById("time-total");
  if(el)el.textContent=fmtTime(audioEl.duration);
});
audioEl.addEventListener("ended",function(){isPlaying=false;updatePlayBtn();});
audioEl.addEventListener("play",function(){isPlaying=true;updatePlayBtn();});
audioEl.addEventListener("pause",function(){isPlaying=false;updatePlayBtn();});
audioEl.addEventListener("error",function(){
  var err=audioEl.error;
  var code=err?err.code:0;
  var codes=["","ABORTED","NETWORK","DECODE","NOT_SUPPORTED"];
  var msg="Error "+(codes[code]||code)+" — src: "+audioEl.src;
  var na=document.getElementById("no-audio");
  var pb=document.getElementById("player-main");
  if(na){na.style.display="block"; na.innerHTML+='<p style="color:rgba(255,255,255,0.7);font-size:11px;word-break:break-all;margin-top:6px;">'+msg+'</p>';}
  if(pb)pb.style.display="none";
});

function toggleDesc(){
  var b=document.getElementById("desc-body");
  var a=document.getElementById("desc-arrow");
  b.classList.toggle("open");
  a.classList.toggle("open");
}

function render(){
  var k=key(cur), e=D[k];

  }

  var af=audioFile(k);

  // Clean description
  var desc=e.description||"";
  var lines=desc.split("\n"), filtered=[];
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    if(l.indexOf("奉献")>=0||l.indexOf("奉獻")>=0||l.indexOf("https://")>=0) break;
    filtered.push(l);
  }
  var cleanDesc=filtered.join("\n").trim();
  // Prepend Bible text at top of devotion content
  var bibleBlock="";
  if(e.bible_text){
    bibleBlock="📖 今日经文："+e.scripture+"\n\n"+e.bible_text+"\n\n──────────────\n\n";
  } else {
    bibleBlock="📖 今日经文："+e.scripture+"\n\n──────────────\n\n";
  }
  cleanDesc=bibleBlock+cleanDesc;

  ca.innerHTML=
    '<div class="player-card">'+
      '<div class="player-title">&#x1F3B5; 今日灵修音频</div>'+
      '<div id="player-main">'+
        '<div class="player-row">'+
          '<button class="play-btn" onclick="togglePlay()"><svg id="play-btn-svg" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" fill="#1b3a6b"/></svg></button>'+
          '<div class="time-info">'+
            '<div class="time-current" id="time-current">0:00</div>'+
            '<div class="time-total" id="time-total">载入中...</div>'+
          '</div>'+
        '</div>'+
        '<div class="progress-wrap" id="progress-bg" onclick="seekTo(event)" ontouchstart="seekTo(event)">'+
          '<div class="progress-bg"><div class="progress-fill" id="progress-fill"></div></div>'+
        '</div>'+
        '<div class="speed-row">'+
          '<span class="speed-label">&#x23E9; 速度：</span>'+
          '<button class="speed-btn" data-rate="0.75" onclick="setSpeed(0.75)">0.75x</button>'+
          '<button class="speed-btn active" data-rate="1" onclick="setSpeed(1)">1x</button>'+
          '<button class="speed-btn" data-rate="1.25" onclick="setSpeed(1.25)">1.25x</button>'+
          '<button class="speed-btn" data-rate="1.5" onclick="setSpeed(1.5)">1.5x</button>'+
          '<button class="speed-btn" data-rate="2" onclick="setSpeed(2)">2x</button>'+
        '</div>'+
      '</div>'+
      '<div class="no-audio" id="no-audio">'+
        '<p>音频文件未找到，请点击YouTube收听</p>'+
        '<a class="yt-fallback" href="'+e.url+'" target="_blank">'+
          '<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>'+
          '在 YouTube 收听'+
        '</a>'+
      '</div>'+
    '</div>'+
    '<div class="card">'+
      '<div class="card-label">&#12304;每日亲近神&#12305;&nbsp;&nbsp;'+e.date_cn+'</div>'+
      '<div class="card-theme">'+e.theme+'</div>'+
      '<div class="card-scripture-label">&#x1F4D6; 今日经文</div>'+
      '<div class="card-scripture">'+e.scripture+'</div>'+
    '</div>'+
    '<div class="desc-wrap">'+
      '<div class="desc-header" onclick="toggleDesc()">'+
        '<span>&#x1F4DD; 今日灵修内容</span>'+
        '<span class="desc-arrow open" id="desc-arrow">&#9660;</span>'+
      '</div>'+
      '<div class="desc-body open" id="desc-body">'+
        '<div class="desc-text">'+cleanDesc.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="bottom-pad"></div>';

  // Set src — browser will not download until play() is called (preload="none")
  audioEl.src=af;
  isPlaying=false;
  updatePlayBtn();
}

render();
</script>
