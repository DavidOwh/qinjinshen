上，好能专心跟随祢！奉主的名求，阿们！\n \n祷读：诗篇九十三篇1节\n耶和华作王！祂以威严为衣穿上；耶和华以能力为衣，以能力束腰，世界就坚定，不得动摇。\n\n\nQT: 诗篇九十三篇1~5节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 耶和华作王！他以威严为衣穿上；耶和华以能力为衣，以能力束腰，世界就坚定，不得动摇。\n2 你的宝座从太初立定；你从亘古就有。\n3 耶和华啊，大水扬起，大水发声，波浪澎湃。\n4 耶和华在高处大有能力，胜过诸水的响声，洋海的大浪。\n5 耶和华啊，你的法度最的确；你的殿永称为圣，是合宜的。"}, "7-17": {"theme": "等候神的时间表", "scripture": "诗篇九十四篇1~23节", "url": "https://www.youtube.com/watch?v=Ln-YAfPvZ4Q&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=26", "videoId": "Ln-YAfPvZ4Q", "date_cn": "17/7/26(五)", "description": "主题：等候神的时间表\n经文：诗篇九十四篇1~23节\n\n「耶和华啊，恶人夸胜要到几时呢？要到几时呢？」（参3节）有的时候，我们可能也会问神同样的问题。在这一篇诗篇中，诗人告诉我们：神有祂的计划！祂听见我们的祷告和哀求，而且祂清楚知道发生什么事；如同以色列人在埃及作奴隶时，耶和华说：「我的百姓在埃及所受的困苦，我实在看见了；他们因……辖制所发的哀声，我也听见了。我原知道他们的痛苦……」（参出三7~8）。\n\n虽然恶人以为一切都在自己的掌控中，「他们说：『耶和华必不看见；雅各的神必不思念』」（参7节）。恶人以为神看不见他们所做的事──这真是错误的态度！但是，诗人面对恶人的态度时，作出了这样的回应：「造耳朵的，难道自己不听见吗？造眼睛的，难道自己不看见吗？管教列邦的，就是叫人得知识的，难道自己不惩治人吗？」（参9~10节）换句话说，难道神会比我们笨吗？当然不会！神看见这个世界正在发生的每一件事，祂也必然听见祂子民的呼声，并且要在合适的时间，管教那些需要接受管教的人。\n\n一般人的习惯是，把事情掌控在自己的手中。摩西也曾经这样做，后来他却落得逃到旷野牧羊四十年，在那里接受神的训练，学习如何信靠神、等候神，以及遵照神的旨意行。亲爱的弟兄姊妹，我们或许也会在沮丧的时候呼喊：「主啊！要到几时呢？要到几时呢？」在这样的时刻，要将焦点放在神的信实、定睛在祂的应许上，并且等候、儆醒祷告。神必信守祂的应许，实现祂的承诺。\n\n回应：主啊！求祢教导我如何等候祢的时间，并且学习使用祢的方法来回应我的处境。求祢吸引我，使我能够信靠祢的应许，勇敢向前。奉主的名求，阿们！\n\n祷读：诗篇九十四篇14节\n因为耶和华必不丢弃祂的百姓，也不离弃祂的产业。\n\nQT: 诗篇九十四篇1~23节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 耶和华啊，你是伸冤的神；伸冤的神啊，求你发出光来！\n2 审判世界的主啊，求你挺身而立，使骄傲人受应得的报应！\n3 耶和华啊，恶人夸胜要到几时呢？要到几时呢？\n4 他们絮絮叨叨说傲慢的话；一切作孽的人都自己夸张。\n5 耶和华啊，他们强压你的百姓，苦害你的产业。\n6 他们杀死寡妇和寄居的，又杀害孤儿。\n7 他们说：耶和华必不看见；雅各的神必不思念。\n8 你们民间的畜类人当思想；你们愚顽人到几时才有智慧呢？\n9 造耳朵的，难道自己不听见吗？造眼睛的，难道自己不看见吗？\n10 管教列邦的，就是叫人得知识的，难道自己不惩治人吗？\n11 耶和华知道人的意念是虚妄的。\n12 耶和华啊，你所管教、用律法所教训的人是有福的！\n13 你使他在遭难的日子得享平安；惟有恶人陷在所挖的坑中。\n14 因为耶和华必不丢弃他的百姓，也不离弃他的产业。\n15 审判要转向公义；心里正直的，必都随从。\n16 谁肯为我起来攻击作恶的？谁肯为我站起抵挡作孽的？\n17 若不是耶和华帮助我，我就住在寂静之中了。\n18 我正说我失了脚，耶和华啊，那时你的慈爱扶助我。\n19 我心里多忧多疑，你安慰我，就使我欢乐。\n20 那借着律例架弄残害、在位上行奸恶的，岂能与你相交吗？\n21 他们大家聚集攻击义人，将无辜的人定为死罪。\n22 但耶和华向来作了我的高台；我的神作了我投靠的磐石。\n23 他叫他们的罪孽归到他们身上。他们正在行恶之中，他要剪除他们；耶和华──我们的神要把他们剪除。"}, "7-18": {"theme": "回应至高者", "scripture": "诗篇九十五篇1~11节", "url": "https://www.youtube.com/watch?v=NCm6ENnkmWc&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=25", "videoId": "NCm6ENnkmWc", "date_cn": "18/7/26(六)", "description": "主题：回应至高者\n经文：诗篇九十五篇1~11节\n\n当诗人看见周遭其他民族的异教神祗，不禁赞叹，并且宣告︰「因耶和华为大神，为大王，超乎万神之上。」（参3节）感谢主！我们的神真是伟大！\n\n在《你的神太小了》（参Your God Is Too Small: A Guide for Believers and Skeptics Alike）这本书中，作者腓力斯（参J. B. Phillips）提到了一个概念──如果你的神很渺小，你的信心就会很微小；如果你的神很伟大，你就会拥有极大的信心！然而，我们并不是对自己大有信心，而是对这位伟大的神大有信心！\n\n其次，诗人告诉我们──神是慈爱的神。虽然以色列的列祖背叛了神，祂却仍然持守给亚伯拉罕立约的应许，并且在旅程中不断地提醒、扶持祂所爱的百姓（参7~11节）。\n\n如果我们所信的神是这样的一位神，那么我们要如何回应祂的伟大和慈爱呢？诗人呼吁百姓──「我们要来感谢祂，用诗歌向祂欢呼！」（参2节）心存感恩、欢乐歌唱，是基督徒敬拜及生活的主轴。我们感恩及欢唱，是因为深知「地的深处在祂手中；山的高峰也属祂。」（参4节）当我们登上生命的巅峰，神在那里；当我们走进生命的低谷，祂也在那里！神是深处的神，也是高处的神！「海洋属祂，是祂造的；旱地也是祂手造成的。」（参5节）感谢主！祂是变化莫测的海洋之主，也是平稳可靠的旱地之神！\n\n感谢主！无论我们的人生处在什么样的阶段，或是进入哪一种处境，都能经历祂的伟大及恩慈！所以，我们相信生活中的每一种历练，都是为了使「万事都互相效力，叫爱神的人得益处。」（参罗八28）；而且没有任何的事情，「能使我们与基督的爱隔绝」（参罗八35），因为这是全能神的应许！\n\n回应：主啊！从亘古到永远，祢是创造的主！谢谢祢以不变的爱牵引我走人生的路，求祢让我一生一世能够歌颂祢的慈爱与伟大。奉主的名求，阿们！\n\n祷读：诗篇九十五篇3节\n因耶和华为大神，为大王，超乎万神之上。\n　\n\nQT: 诗篇九十五篇1~11节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】 rg.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 你们要向耶和华唱新歌！全地都要向耶和华歌唱！\n2 要向耶和华歌唱，称颂他的名！天天传扬他的救恩！\n3 在列邦中述说他的荣耀！在万民中述说他的奇事！\n4 因耶和华为大，当受极大的赞美；他在万神之上，当受敬畏。\n5 外邦的神都属虚无；惟独耶和华创造诸天。\n6 有尊荣和威严在他面前；有能力与华美在他圣所。\n7 民中的万族啊，你们要将荣耀、能力归给耶和华，都归给耶和华！\n8 要将耶和华的名所当得的荣耀归给他，拿供物来进入他的院宇。\n9 当以圣洁的〔“的”或作“为”〕妆饰敬拜耶和华；全地要在他面前战抖！\n10 人在列邦中要说：耶和华作王！世界就坚定，不得动摇；他要按公正审判众民。\n11 愿天欢喜，愿地快乐！愿海和其中所充满的澎湃！\n12 愿田和其中所有的都欢乐！那时，林中的树木都要在耶和华面前欢呼。\n13 因为他来了，他来要审判全地。他要按公义审判世界，按他的信实审判万民。"}, "7-20": {"theme": "恨恶罪恶", "scripture": "诗篇九十七篇1~12节", "url": "https://www.youtube.com/watch?v=CV8R6ytT-78&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=23", "videoId": "CV8R6ytT-78", "date_cn": "20/7/26(一)", "description": "主题：恨恶罪恶\n经文：诗篇九十七篇1~12节\n\n学习骑脚踏车，关键在于如何维持平衡；而学习直排轮、溜冰鞋或滑雪板的道理也都是相同的，那就是保持平衡。\n\n基督徒的生命也是如此。所以，诗人才会如此写道：「你们爱耶和华的，都当恨恶罪恶」（参10节）！亲爱的弟兄姊妹，这就是我们务要活出的「平衡」！我们必须学习平衡的功课──不要彼此相恨，却要恨恶罪恶。\n\n面对世上的罪恶，我们在心态上有以下的几种选择：我们可以为之辩护，甚至促进罪恶；或者，我们可以闭上眼睛，眼不见为净，如同路加福音十章30至37节，好撒玛利亚人的比喻里面的祭司和利未人一样，从另外一边走过去了；或者，我们也可以忍受罪恶，并且告诉自己：「事到临头，只好逆来顺受。」但是，神却透过圣经的话语告诉我们，必须恨恶罪恶，并且抵挡它。\n\n亲爱的弟兄姊妹，我们恨恶罪恶，是因为爱主的缘故！如果我们爱衪，就会爱衪所爱，恨祂所恨。当神审判罪恶的时候，我们都希望自己能够站在衪这一边。我们千万不要像罗得一样，忍受所多玛城的罪恶，直到所多玛城遭受神的审判、被火焚烧时，他所追求的一切，也都一并化为乌有（参创十九）！\n\n亲爱的弟兄姊妹，我们是以什么态度，来面对世上的罪恶呢？如果我们爱主，就不能保持中立。我们必须恨恶罪恶，并且予以反对！然而，我们也要求神赐下力量，让我们知道如何谨慎自己的言行，并且向那些犯罪的人作见证。\n\n回应：主啊，我是如此软弱！求祢帮助我选择真理，而非爱慕罪恶！求祢帮助我活出圣洁，与罪恶分别，好能爱祢所爱，恨祢所恨。奉主的名求，阿们！\n\n祷读：诗篇九十七篇10节\n你们爱耶和华的，都当恨恶罪恶。\n\nQT: 诗篇九十七篇1~12节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 耶和华作王！愿地快乐！愿众海岛欢喜！\n2 密云和幽暗在他的四围；公义和公平是他宝座的根基。\n3 有烈火在他前头行，烧灭他四围的敌人。\n4 他的闪电光照世界，大地看见便震动。\n5 诸山见耶和华的面，就是全地之主的面，便消化如蜡。\n6 诸天表明他的公义；万民看见他的荣耀。\n7 愿一切事奉雕刻的偶像、靠虚无之神自夸的，都蒙羞愧。万神哪，你们都当拜他。\n8 耶和华啊，锡安听见你的判断就欢喜；犹大的城邑〔原文作“女子”〕也都快乐。\n9 因为你──耶和华至高，超乎全地；你被尊崇，远超万神之上。\n10 你们爱耶和华的，都当恨恶罪恶；他保护圣民的性命，搭救他们脱离恶人的手。\n11 散布亮光是为义人；预备喜乐是为正直人。\n12 你们义人当靠耶和华欢喜，称谢他可记念的圣名。"}, "7-21": {"theme": "歌唱的信仰", "scripture": "诗篇九十八篇1~9节", "url": "https://www.youtube.com/watch?v=EXd9jXbCg8M&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=22", "videoId": "EXd9jXbCg8M", "date_cn": "21/7/26(二)", "description": "主题：歌唱的信仰\n经文：诗篇九十八篇1~9节\n\n基督教是一个歌唱的信仰，因为神吩咐我们──「要向耶和华唱新歌」（参1节）。而我们歌颂的原因与内容，则是「因为祂行过奇妙的事；祂的右手和圣臂施行救恩」（参1节），如同下述的内容：\n\n我们要歌唱主的得胜：如果我们在生活中时常经历失败，内心就会因而变得灰暗。而在这样的时刻，我们就要歌唱主的得胜，因为赞美会带来能力！亲爱的弟兄姊妹，让我们来赞美神吧！你将会惊奇地看见，神为你行了何等奇妙的事！\n\n我们要歌唱主的救恩：「耶和华发明了祂的救恩，在列邦人眼前显出公义。」（参2节）我们的生活，是向人宣扬救恩信息的范本。但愿我们每一天的生活，都能向人彰显神救赎的恩典！\n\n我们要歌唱祂的怜悯与信实：经文告诉我们，神「记念祂向以色列家所发的慈爱，所凭的信实」（参3节）。感谢主！祂是昨日、今日、直到永远永不改变的神！祂怜悯我们，直到永永远远。\n\n我们要歌唱祂的来临：第7至9节告诉我们，「愿海和其中所充满的澎湃；世界和住在其间的也要发声。愿大水拍手；愿诸山在耶和华面前一同欢呼；因为祂来要审判遍地。祂要按公义审判世界，按公正审判万民。」使徒约翰在看见新天新地之后，就这样欢呼──「主耶稣啊，我愿祢来！」（参启二十二20）如今，虽然世间充满诸多的不公与不义，我们却能怀抱盼望等候神；因为我们知道，到时祂将实现荣耀的应许──「神要擦去他们一切的眼泪；不再有死亡，也不再有悲哀、哭号、疼痛，因为以前的事都过去了」（参启二十一4）。\n\n亲爱的弟兄姊妹，你是否时常在生活中歌唱、赞美神呢？如果我们失去了向神赞美的歌声，可能也代表我们也失去了对神话语的信心、对祂同在的看见，甚至可能容让罪恶与愁苦潜入生命！但愿我们在每一天的生活中，都能遵循神的话语和引导，并且「向耶和华唱新歌」（参1节）！\n\n回应：主啊！愿我的生命成为一首诗歌献给祢！求祢时刻在我的生命中，赐下新的旋律，使我天天传扬、称颂祢的圣名。奉主的名求，阿们！\n\n祷读：诗篇九十八篇1、9节\n你们要向耶和华唱新歌！因为祂行过奇妙的事；祂的右手和圣臂施行救恩。因为他来，要审判遍地；他要按公义审判世界，按公正审判万民。\n\nQT: 诗篇九十八篇1~9节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔一篇诗。〕你们要向耶和华唱新歌！因为他行过奇妙的事；他的右手和圣臂施行救恩。\n2 耶和华发明了他的救恩，在列邦人眼前显出公义；\n3 记念他向以色列家所发的慈爱，所凭的信实。地的四极都看见我们神的救恩。\n4 全地都要向耶和华欢乐；要发起大声，欢呼歌颂！\n5 要用琴歌颂耶和华，用琴和诗歌的声音歌颂他！\n6 用号和角声，在大君王耶和华面前欢呼！\n7 愿海和其中所充满的澎湃；世界和住在其间的也要发声。\n8 愿大水拍手；愿诸山在耶和华面前一同欢呼；\n9 因为他来要审判遍地。他要按公义审判世界，按公正审判万民。"}, "7-22": {"theme": "祂本为圣", "scripture": "诗篇九十九篇1~9节", "url": "https://www.youtube.com/watch?v=vZhd_Ne5S1Q&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=21", "videoId": "vZhd_Ne5S1Q", "date_cn": "22/7/26(三)", "description": "主题：祂本为圣\n经文：诗篇九十九篇1~9节\n\n从第九十八篇到第九十九篇，原先活泼的欢庆转为较含蓄、却更深沉的敬畏；而我们读此诗时也好像从参与赞美的节庆，转而进入庄严的教堂。\n\n今天的这一篇诗篇，可以分为两个部分。首先，就是反复出现的「祂本为圣」（参3、5节）。「耶和华作王……祂坐在二基路伯之上」（参1节）。然而，虽然神在锡安彰显祂自己，祂却不只是一族、一民的神而已，因为「祂超乎万民之上」（参2节），而万民「当称赞祂大而可畏的名；祂本为圣」（参3节）！\n\n既然神统治万方，那么祂就是至高的王（参4节）。然而，神不仅大有能力，祂也喜爱公平和公义。而关于祂的这个属性，也完全彰显在祂所立约的百姓身上：「……在雅各中施行公平和公义」（参4节）。当百姓面对这样的神，他们唯一所能作的回应是──「尊崇耶和华──我们的神，在祂脚凳前下拜。祂本为圣」（参5节）！\n\n其次，诗人也在这一篇诗篇中提到，这一位崇高与圣洁的神，竟然向世人揭露祂自己（参7节）。我们或许认为摩西、亚伦和撒母耳，都是高不可攀的属灵伟人，而诗人却把他们安插在祭司，以及那些呼求神的人之中！这表示他们基本上和其他人没有什么区别，甚至他们也和我们一样，生命中充满脆弱与不足。所以，我们可以相信，无论是什么样的人，都需要这位「赦免人的神」的怜悯（参8节）。\n\n摩西、亚伦和撒母耳，也都是祷告时常蒙应允的人（参6节）。这是因为他们聆听神的话，并且顺服祂的法度与律例（参7节）。他们按著神的心意祈求，就必得著神的回应。\n\n亲爱的弟兄姊妹，我们若以圣洁为妆饰来生活，并且时常在主的面前聆听、顺服祂的话语，我们也将会如同摩西、亚伦和撒母耳一样，时常经历祷告蒙应允的喜乐。\n\n回应：主啊！祢是圣洁的主！求祢的话语引导我走义路，并且活出圣洁。我渴望时常透过祷告，更多经历祢的大能与荣耀！奉主的名求，阿们！\n\n祷读：诗篇九十九篇2~3节\n耶和华在锡安为大；祂超乎万民之上。他们当称赞祂大而可畏的名；祂本为圣！\n\nQT: 诗篇九十九篇1~9节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推 完全的道。祢几时到我这里来呢？我要存完全的心行在我家中。\n\nQT: 诗篇一百零一篇1~8节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔大卫的诗。〕我要歌唱慈爱和公平；耶和华啊，我要向你歌颂！\n2 我要用智慧行完全的道。你几时到我这里来呢？我要存完全的心行在我家中。\n3 邪僻的事，我都不摆在我眼前；悖逆人所做的事，我甚恨恶，不容沾在我身上。\n4 弯曲的心思，我必远离；一切的恶人〔或作“恶事”〕，我不认识。\n5 在暗中谗谤他邻居的，我必将他灭绝；眼目高傲、心里骄纵的，我必不容他。\n6 我眼要看国中的诚实人，叫他们与我同住；行为完全的，他要伺候我。\n7 行诡诈的，必不得住在我家里；说谎话的，必不得立在我眼前。\n8 我每日早晨要灭绝国中所有的恶人，好把一切作孽的从耶和华的城里剪除。"}, "7-25": {"theme": "急难的日子（上）", "scripture": "诗篇一百零二篇1~11节", "url": "https://www.youtube.com/watch?v=JU5oVL4aYsM&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=18", "videoId": "JU5oVL4aYsM", "date_cn": "25/7/26(六)", "description": "主题：急难的日子（上）\n经文：诗篇一百零二篇1~11节\n\n「我在急难的日子，求祢向我侧耳；不要向我掩面！我呼求的日子，求祢快快应允我！」（参2节）诗人在极大的苦难中向神祷告，并且吐露他的苦情。\n\n诗人求神「快快应允」（参2节），因为他的身体感到十分痛苦（参3~5节），而他的内心也感到极其孤独，有如雀鸟在无人之地（参6~7节）。鹈鹕和鸮鸟都是在旷野独自栖息的鸟类，牠们喜欢深夜时在荒野无人之地啼叫，发出的声音听起来十分哀戚。诗人遭受仇敌的辱骂和咒诅（参8节），就为此独自悲哀、饮泣（参9节）。他认为这一切之所以发生，似乎是神恼怒他，以致要刑罚他（参10节）。他甚至觉得自己仿佛来日无多，将要不久于世（参3、11节）！\n\n有时候，我们也会感觉自己的生活，仿佛诗人所描述的一样──计划泡汤、处事不顺，还要肩负各样的问题与重担。似乎诗人很了解我们心中的感受，因为他曾经走过这样的岁月。「耶和华啊，求祢听我的祷告，容我的呼求达到祢面前！」（参1节）每个人都会遭受急难，我们的人生也经常因难处或困苦而觉得无奈；但是，诗人会在经历的当下，就将所有问题带到神前，仿佛是一种因急迫而产生的渴求从心发出：「我要靠著神的恩典，来改变这样的景况！」因此，这段急难的日子，转而成为他专心祷告、与神亲近的日子。\n\n诗人将自己的感受，和他所看见的一切都告诉神。他在心中向神呼喊──「神啊！只有祢能够改变这个局面！」亲爱的弟兄姊妹，神也可以改变我们所处的局面！虽然祂不一定会照著我们期望的方式来回应祷告，但是祂能使「万事都互相效力，使爱神的人得益处。」（参罗八28）而且祂也将改变我们内心的感受、赐下新的眼光，使急难的日子成为更深经历祂、与祂紧密同行的日子。\n\n回应：主啊！求祢听我的祷告，留心听我的呼求！求祢赐给我信心，让我知道如何坚定仰望祢，好能更深经历祢的大能与恩典！奉主的名求，阿们！\n\n祷读：诗篇一百零二篇1、2节\n耶和华啊，求祢听我的祷告，容我的呼求达到祢面前！我在急难的日子，求祢向我侧耳，不要向我掩面；我呼求的日子，求祢快快应允我。\n\n\nQT: 诗篇一百零二篇1~11节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔困苦人发昏的时候、在耶和华面前吐露苦情的祷告。〕耶和华啊，求你听我的祷告，容我的呼求达到你面前！\n2 我在急难的日子，求你向我侧耳；不要向我掩面！我呼求的日子，求你快快应允我！\n3 因为，我的年日如烟云消灭；我的骨头如火把烧着。\n4 我的心被伤，如草枯干，甚至我忘记吃饭。\n5 因我唉哼的声音，我的肉紧贴骨头。\n6 我如同旷野的鹈鹕；我好像荒场的鸮鸟。\n7 我警醒不睡；我像房顶上孤单的麻雀。\n8 我的仇敌终日辱骂我；向我猖狂的人指着我赌咒。\n9 我吃过炉灰，如同吃饭；我所喝的与眼泪搀杂。\n10 这都因你的恼恨和忿怒；你把我拾起来，又把我摔下去。\n11 我的年日如日影偏斜；我也如草枯干。"}, "7-26": {"theme": "急难的日子（下）", "scripture": "诗篇一百零二篇12~28节", "url": "https://www.youtube.com/watch?v=HE17LwPLIGw&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=17", "videoId": "HE17LwPLIGw", "date_cn": "26/7/26(日)", "description": "主题：急难的日子（下）\n经文：诗篇一百零二篇12~28节\n\n「祂垂听穷人的祷告，并不藐视他们的祈求。」（参17节）诗人深信神是听祷告的神，祂不藐视他们的祈求，并且已经在荣耀里向卑微的罪人显现！所以，诗人如此写道：「列国要敬畏耶和华的名；世上诸王都敬畏祢的荣耀。因为耶和华建造了锡安，在祂荣耀里显现。」（参15~16节）\n\n诗人自认「中道衰弱……年日短少」（参23节），如同先前他所发出的感叹──「我的年日如烟云消灭……我的年日如日影偏斜；我也如草枯干」（参3、11节）。但是，当他转眼向上仰望，却看到「惟祢──耶和华必存到永远……天地都要灭没，祢却要长存；天地都要如外衣渐渐旧了。祢要将天地如里衣更换，天地就改变了。惟有祢永不改变；祢的年数没有穷尽」（参12、26、27节）。\n\n亲爱的弟兄姊妹，在你的生命中，什么东西是最坚定的呢？你将自己的生命，建立在什么基础上呢？在〈永恒的答问〉这一首诗歌里面，歌词如此写道：「在世上有多少欢笑，能使你快乐永久？试问谁能支配将来，永远不必担忧？名和利，哪天才足够，能使你满足永久？试问就算拥有一切，谁能守住眼前的所有？人世间变换，无穷变换，今朝多少光彩，在明日转眼消失离开……」。\n\n亲爱的弟兄姊妹，我们要认清一件事，那就是我们是世上的客旅！而我们必须在「一切所行的事上都要认定祂」（参箴三6），并且时常来到祂的面前，寻求祂的能力、信靠祂的话语，因为唯有祂是「昨日、今日、直到永远，是一样的。」（参来十三8）感谢主！祂爱我们到底，而且祂对我们的爱永不改变！祂「要垂听被囚之人的叹息，要释放将要死的人」（参20节），而祂也要指引我们前面的路──因为「谁敬畏耶和华，耶和华必指示他当选择的道路。」（参诗二十五12）\n\n回应：主啊，谢谢祢愿意让我享受祢永恒的爱！即使现今的环境不甚理想，求祢开广我的心，使我更坚定地跟随祢，并能更深倚靠祢！奉主的名求，阿们！\n\n祷读：诗篇一百零二篇27节\n惟有祢永不改变；祢的年数没有穷尽。\n\nQT: 诗篇一百零二篇12~28节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "12 惟你──耶和华必存到永远；你可记念的名也存到万代。\n13 你必起来怜恤锡安，因现在是可怜她的时候，日期已经到了。\n14 你的仆人原来喜悦她的石头，可怜她的尘土。\n15 列国要敬畏耶和华的名；世上诸王都敬畏你的荣耀。\n16 因为耶和华建造了锡安，在他荣耀里显现。\n17 他垂听穷人的祷告，并不藐视他们的祈求。\n18 这必为后代的人记下，将来受造的民要赞美耶和华。\n19 因为，他从至高的圣所垂看；耶和华从天向地观察，\n20 要垂听被囚之人的叹息，要释放将要死的人，\n21 使人在锡安传扬耶和华的名，在耶路撒冷传扬赞美他的话，\n22 就是在万民和列国聚会事奉耶和华的时候。\n23 他使我的力量中道衰弱，使我的年日短少。\n24 我说：我的神啊，不要使我中年去世。你的年数世世无穷！\n25 你起初立了地的根基；天也是你手所造的。\n26 天地都要灭没，你却要长存；天地都要如外衣渐渐旧了。你要将天地如里衣更换，天地就都改变了。\n27 惟有你永不改变；你的年数没有穷尽。\n28 你仆人的子孙要长存；他们的后裔要坚立在你面前。"}, "7-27": {"theme": "神的仁慈", "scripture": "诗篇一百零三篇1~22节", "url": "https://www.youtube.com/watch?v=jMhbd96gz94&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=16", "videoId": "jMhbd96gz94", "date_cn": "27/7/26(一)", "description": "主题：神的仁慈\n经文：诗篇一百零三篇1~22节\n\n「我的心哪，你要称颂耶和华」（参1节）！大卫对神在他身上所做的事，始终感到非常惊讶。当他逐渐老迈，他又再次回顾自己的生命，并且发现──虽然曾经面临许多困境，神却始终把他从「淤泥」中拉起来（参诗四十2）。由于神总是持守祂对大卫的应许，所以大卫怀著感恩，写了许多赞美的诗篇来颂赞神的信实，他像是神子民的记忆仓库一样，帮助整个国家记念神的美好。\n \n以色列人赞美神时，时常思念神将他们从奴役中解救出来，并且带领他们进入属于自己的土地。他们的诗篇有如历史课程一般，审慎地整理过往，特别是在摩西的带领之下，得著救赎的记念日。他们研读摩西五经，并且写下诗歌来记念那些日子。\n\n关于神子民的历史和回忆，并不全然是正面的，他们的诗歌也可能坦诚地记下祖先对神的叛逆、抱怨和忘恩。尽管如此，他们仍然要为一个值得快乐的原因，而感到欢欣，那就是神始终向他们守约、施慈爱（参8~9节）。对大卫而言，以色列的历史就是神恩典的象征──他们从来都不配得神的爱，神的爱却如同春雨一般临到他们！\n\n诗人回顾自己在生病、受压制、陷入罪与反叛中的黑暗日子，然后指出──神如何出手将这些黑暗的日子转变过来。感谢主！祂不仅了解，也能对付人的软弱：「因为他知道我们的本体，思念我们不过是尘土。」（参14节）而且纵使我们经常失败，祂还是愿意在我们身上倾倒永恒的爱！\n\n所以，大卫怀著感恩，并且向众人大声宣扬──我们本不配得所拥有的一切，我们所得的远超过所应得的！这一篇诗篇以赞美作为开头，接著回顾人的软弱和神的信实，最终再以和开头相同的诗句作结──「我的心哪，你要称颂耶和华」（参22节）！\n\n亲爱的弟兄姊妹，今天让我们的心与诗人一同来赞美神吧！因为这一位以恩手托住你我的神，配得一切的赞美！\n\n回应：主啊！谢谢祢赦免我的一切罪过，又医治、安慰我一切的伤痛！我愿意一生称颂、赞美祢，因为祢是何等奇妙、仁慈的主！奉主的名求，阿们！\n\n祷读：诗篇一百零三篇2节\n我的心哪，你要称颂耶和华！不可忘记祂的一切恩惠！\n\nQT: 诗篇一百零三篇1~22节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩 不是谁；好比祂是爱，祂是真光，而祂不是黑暗（参约一9；约壹四16）。可见界限的观念，来自于神的本性。祂借由告诉我们祂的观点和计划，以及祂允许什么、禁止什么、喜欢什么、厌恶什么，来为祂的个性定位，并且为祂自己的作为负责。\n\n「神啊，祢……将地立在根基上，使地永不动摇。」（参1、5节）神对祂所创造的一切设定界限！祂抵挡罪恶，却允许犯罪之后的后果存留；祂护卫祂的房子，绝对不让败坏或邪恶的事发生或进入其中；凡是爱祂的人，祂都邀请他们进去，并且将爱浇灌在他们身上。\n\n同样地，神也将祂的样式给予我们（参创一26），而且祂给予我们属于自己界限范围之内，应该承担的个人责任。神要我们管理与治理全地，并且成为祂忠心的管家。如果我们要达成这个目标，就一定要拥有和神一样的界限──我们需要以神为范本，学习与发展出祂希望我们拥有的界限！\n\n然而，神并没有借由向人设限，而使他们的行为端正。神只是设下一些标准，告诉人什么是祂要的，什么是祂不喜悦的，然后让人选择要成为怎样的人，而这个选择决定了我们是亲近神或远离神。\n\n感谢主！在界限的设立上，我们的模范是神。因此，我们最需要学习的，是对自己设立界限，表明什么是我们要的，什么是我们不要的。我们必须向那些不当的欲望说「不」，并且负起责任，勇于拒绝从别人而来不当的要求。亲爱的弟兄姊妹，你是否愿意对自己设立界限呢？你是否愿意照著神的旨意，设定合祂心意的界限呢？\n\n回应：主啊！我不知道该如何设定界限，以致时常活在罪疚或负荷过重之中！求祢帮助我学习祢的样式，设定明确、有益的界限，好能享受真实的自由！奉主的名求，阿们！\n\n祷读：耶利米书四十二章3节\n愿耶和华──你的神指示我们所当走的路，所当做的事。\n\nQT: 诗篇一百零四篇1~18节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 我的心哪，你要称颂耶和华！耶和华──我的神啊，你为至大！你以尊荣威严为衣服，\n2 披上亮光，如披外袍，铺张穹苍，如铺幔子，\n3 在水中立楼阁的栋梁，用云彩为车辇，借着风的翅膀而行，\n4 以风为使者，以火焰为仆役，\n5 将地立在根基上，使地永不动摇。\n6 你用深水遮盖地面，犹如衣裳；诸水高过山岭。\n7 你的斥责一发，水便奔逃；你的雷声一发，水便奔流。\n8 诸山升上，诸谷沉下〔或作“随山上翻，随谷下流”〕，归你为它所安定之地。\n9 你定了界限，使水不能过去，不再转回遮盖地面。\n10 耶和华使泉源涌在山谷，流在山间，\n11 使野地的走兽有水喝，野驴得解其渴。\n12 天上的飞鸟在水旁住宿，在树枝上啼叫。\n13 他从楼阁中浇灌山岭；因他作为的功效，地就丰足。\n14 他使草生长，给六畜吃，使菜蔬发长，供给人用，使人从地里能得食物，\n15 又得酒能悦人心，得油能润人面，得粮能养人心。\n16 佳美的树木，就是黎巴嫩的香柏树，是耶和华所栽种的，都满了汁浆。\n17 雀鸟在其上搭窝；至于鹤，松树是牠的房屋。\n18 高山为野山羊的住所；岩石为沙番的藏处。"}, "7-29": {"theme": "歌唱的人生", "scripture": "诗篇一百零四篇19~35节", "url": "https://www.youtube.com/watch?v=0hQ801bA93s&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=14", "videoId": "0hQ801bA93s", "date_cn": "29/7/26(三)", "description": "主题：歌唱的人生\n经文：诗篇一百零四篇19~35节\n\n第一百零四篇与一百零三篇这两篇诗篇，除了在结构上十分相似，它们的首句和尾句也都相同──「我的心哪，你要称颂耶和华。」可见这两篇诗篇都是赞美诗。第一百零三篇述说的，是神对祂选民的恩惠与慈爱；第一百零四篇则是述说神创造万物，并且养育、统管一切的权能。第一百零三篇描述神是救主，第一百零四篇则强调神是创造主。而我们能够从这两篇诗篇中看见──诗人发自内心向神发出赞叹，称颂祂是创造宇宙、自然的主宰，也是掌管、看顾和保守一切的神。\n\n关于刻画神的造化之工，诗人的描述方式与创世记的内容非常相似。第1至4节是第一日与第二日的创造，第5至18节是第三日的创造，第19至23节是第四日的创造，第24至26节是第五日与第六日的创造，第27至30节是在描述万物仰望神的供应，而第31至35节则是说明诗人在观看、思想这一切之后，深深赞叹神的作为，并且期望一生一世都能称颂神。\n\n亲爱的弟兄姊妹，你有多久没有抬起头来，观看神所造的日月星宿呢？无论是眼前的花草树木，或是所能呼吸到的空气，你是否曾经对神的创造及供应，从心中发出赞叹呢？\n  \n以色列人在旷野流浪时，天天除了有云柱、火柱提供保护和引导，也有吗哪供应每天的饮食。可是，由于他们经历了太多的神迹，反倒对神的恩典视而不见，并且感到麻木不仁！然而，当他们在生活中遇到困难或挫折，却又抱怨神，以致最后他们在旷野白白流浪四十年。以色列人身处恩典中，却因为不知惜福、感恩，反而尝不到，也感受不到主恩的滋味。\n \n「我要一生向耶和华唱诗！我还活的时候，要向我神歌颂！」（参33节）感谢主！我们的信仰是歌唱的信仰，我们的人生也是赞美的人生！亲爱的弟兄姊妹，无论旁人的眼光如何，我们都要学习和大卫与保罗一样，在得胜与困顿中都尽情赞美主！因为祂是爱我们，并且永不丢弃我们的神（参来十三5）！\n\n回应：天父，求祢在我顺利与困惑中都赐我新歌，好让我对祢的恩典能时时献上赞美、感恩的祭，免得我因饱足不认祢，也不让我因贫穷就偷窃，以致亵渎我神的名。\n\n祷读：诗篇一零四篇33节\n我要一生向耶和华唱诗！我还活的时候，要向我神歌颂！\n　\n\nQT: 诗篇一百零四篇19~35节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 明爱我们到底（参约十三1）。所以，亲爱的弟兄姊妹，无论发生什么事，我们千万要记得──任何事物都无法隔绝神对我们的爱（参罗八35~39）。\n\n回应：主啊！求祢让我时常能在祢的光中，得见祢的荣面！求祢使我活在真正的平安中，好能培养健康的属灵生命！奉主的名求，阿们！\n\n祷读：诗篇一零五篇5节\n你们要记念祂奇妙的作为和祂的奇事，并祂口中的判语。\n\nQT: 诗篇一百零五篇1~23节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 你们要称谢耶和华，求告他的名，在万民中传扬他的作为！\n2 要向他唱诗歌颂，谈论他一切奇妙的作为！\n3 要以他的圣名夸耀！寻求耶和华的人，心中应当欢喜！\n4 要寻求耶和华与他的能力，时常寻求他的面。\n5 他仆人亚伯拉罕的后裔，他所拣选雅各的子孙哪，你们要记念他奇妙的作为和他的奇事，并他口中的判语。\n6 并于上节\n7 他是耶和华──我们的神；全地都有他的判断。\n8 他记念他的约，直到永远；他所吩咐的话，直到千代──\n9 就是与亚伯拉罕所立的约，向以撒所起的誓。\n10 他又将这约向雅各定为律例，向以色列定为永远的约，\n11 说：我必将迦南地赐给你，作你产业的分。\n12 当时，他们人丁有限，数目稀少，并且在那地为寄居的。\n13 他们从这邦游到那邦，从这国行到那国。\n14 他不容什么人欺负他们，为他们的缘故责备君王，\n15 说：不可难为我受膏的人，也不可恶待我的先知。\n16 他命饥荒降在那地上，将所倚靠的粮食全行断绝，\n17 在他们以先打发一个人去──约瑟被卖为奴仆。\n18 人用脚镣伤他的脚；他被铁炼捆拘。\n19 耶和华的话试炼他，直等到他所说的应验了。\n20 王打发人把他解开，就是治理众民的，把他释放，\n21 立他作王家之主，掌管他一切所有的，\n22 使他随意捆绑他的臣宰，将智慧教导他的长老。\n23 以色列也到了埃及；雅各在含地寄居。"}, "7-31": {"theme": "世界的光 世上的盐", "scripture": "诗篇一百零五篇24~45节", "url": "https://www.youtube.com/watch?v=ZgDvTe4Tk1E&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=12", "videoId": "ZgDvTe4Tk1E", "date_cn": "31/7/26(五)", "description": "主题：世界的光 世上的盐\n经文：诗篇一百零五篇24~45节\n\n「……敌人的心转去恨祂的百姓，并用诡计待祂的仆人……他们出来的时候，埃及人便欢喜；原来埃及人惧怕他们。」（参25、38节）今天的经文提到，埃及人对以色列人又爱、又恨、又怕的心境──他们既享受以色列人的服务，却又害怕他们的强盛！当他们逼迫以色列人，耶和华就用神迹奇事降下刑罚；以色列人的存在，就是神真理和大能的见证！\n　　\n后来，当神用祂权能的手，引领祂的百姓出埃及，埃及人实在是极其「欢喜」，因为他们对以色列人心存「惧怕」（参38节）。为什么他们会惧怕以色列人？这是因为以色列人是敬拜真神的民族，而他们所信靠的这一位真神，就在埃及借由降灾显出祂的大能！神使用以色列人，向埃及人作见证，但是，对于埃及人而言，他们如同撒在伤口上的盐巴，同时也如同光明显露罪恶。\n \n以色列人的存在，是否就像今日的基督徒，在这个世界上的写照？世人提到基督徒时，大多会根据很高的标准来看待，这代表他们也在无形中承认──基督徒应该是真理的见证人，也应该是充满爱心的人。而面对基督徒，世人甚至会在心里产生一种矛盾──他们既享受从基督徒而来爱的服务，却又厌恶他们为真理所作的见证，以致显出他们内心的黑暗。\n \n感谢主！基督徒是光，也是盐。有时候，我们因著信仰的缘故而会刺激别人；有时候，我们的行为也会把别人的错误暴露出来。因为基督徒的使命之一，就是成为这个世界的光与盐。当我们奉耶稣的名行事或发言，势必会有意、无意地对人产生影响；可能带来感激，也可能带来攻击，而这些都是光与盐的见证。\n \n但是，我们因著爱主的缘故，无论来自于人的任何反应，都必须照单全收时，要记得：「祂记念祂的圣言和祂的仆人亚伯拉罕」（参42节）。感谢主！神是信实的，祂是按著爱子的血所立的约来看待我们，而不是照著我们所受的对待，或所做的一切来看待我们──祂永远不会忘记属祂的百姓！亲爱的弟兄姊妹，这真是我们极大的安慰！\n\n回应：主啊！谢谢祢救赎了我，并且呼召我成为这个世界的光与盐！求祢使用我，让我活出属灵的影响力，荣神益人！奉主的名求，阿们！\n\n祷读：以赛亚书四十四章8节\n你们不要恐惧，也不要害怕。我岂不是从上古就说明指示你们吗？并且你们是我的见证！\n\nQT: 诗篇一百零五篇24~45节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【 n": "主题：站在破口中　\n经文：诗篇一百零六篇24~48节\n\n在这罪恶泛滥的世界中，要看到问题并不难。然而，生命之所以伟大，并不是在于我们如何会批判、指责问题的所在，而是看我们如何回应这些问题。\n \n「所以……若非有祂所拣选的摩西站在当中（参原文是破口），使祂的忿怒转消，恐怕祂就灭绝他们」（参23节）。在以色列人完全败坏，又因著承受神的审判而将要灭亡的关键时刻，摩西站在破口上，为这一群忘恩的百姓向神祷告。摩西本来可以因著百姓的犯罪，而获得个人的利益，因为神对他说：「你且由著我，我要向他们发烈怒，将他们灭绝，使你的后裔成为大国。」（参出三十二10）但是，摩西听见神说了这番话，却这样回答：「不！主啊！他们是祢所爱的百姓，是祢用大能救赎出来的！如果祢在半路上将他们击杀，祢的心意就必被人误会！」（参出三十二11~13节）后来，神确实听了摩西的祷告，没有灭绝百姓。\n\n然而，百姓并不明白摩西为他们所做的事，反倒开始批判和埋怨他，摩西最终所犯下的罪，以色列人难辞其咎！「他们在米利巴水又叫耶和华发怒，甚至摩西也受了亏损，是因他们惹动他的灵，摩西用嘴说了急躁的话。」（参32~33节）百姓本来应该到摩西那里，向他表达感恩，但是他们反而向他提出各样的批判及抱怨。摩西因著受到他们的刺激，一时忘了神的吩咐，以致犯罪，最终无法进入应许之地！\n \n亲爱的弟兄姊妹，你是一个愿意为别人祷告的人吗？有许多的人需要你的代祷！但愿我们都能效法摩西，站在破口中以祷告来服事人！\n\n亲爱的弟兄姊妹，你是一位领袖吗？你对神以及自己所带领的人，负有很大的责任！就算你的同工使你感到心里受伤，要记得──别让你的眼光从神的身上转离，不要忘记起初的呼召！\n\n亲爱的弟兄姊妹，你是否时常为你的领袖祷告，并且鼓励和支持他们呢？求主开广你的心，使你透过代祷与他们同工，并且帮助他们坚定事奉的脚步！\n\n回应：主啊！求祢使我学习多为别人祷告，在祢的面前以膝盖来服事！求祢使我站在破口中，成为坚定的守望者！奉主的名求，阿们！\n\n祷读：雅各书五章16节 \n所以你们要彼此认罪，互相代求，使你们可以得医治。义人祈祷所发的力量是大有功效的。\n\nQT: 诗篇一百零六篇24~48节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "24 他们又藐视那美地，不信他的话，\n25 在自己帐棚内发怨言，不听耶和华的声音。\n26 所以，他对他们起誓：必叫他们倒在旷野，\n27 叫他们的后裔倒在列国之中，分散在各地。\n28 他们又与巴力‧毗珥连合，且吃了祭死神〔或作“人”〕的物。\n29 他们这样行，惹耶和华发怒，便有瘟疫流行在他们中间。\n30 那时，非尼哈站起，刑罚恶人，瘟疫这才止息。\n31 那就算为他的义，世世代代，直到永远。\n32 他们在米利巴水又叫耶和华发怒，甚至摩西也受了亏损，\n33 是因他们惹动他的灵，摩西〔原文作“他”〕用嘴说了急躁的话。\n34 他们不照耶和华所吩咐的灭绝外邦人，\n35 反与他们混杂相合，学习他们的行为，\n36 事奉他们的偶像，这就成了自己的网罗，\n37 把自己的儿女祭祀鬼魔，\n38 流无辜人的血，就是自己儿女的血，把他们祭祀迦南的偶像，那地就被血污秽了。\n39 这样，他们被自己所做的污秽了，在行为上犯了邪淫。\n40 所以，耶和华的怒气向他的百姓发作，憎恶他的产业，\n41 将他们交在外邦人的手里；恨他们的人就辖制他们。\n42 他们的仇敌也欺压他们，他们就伏在敌人手下。\n43 他屡次搭救他们，他们却设谋背逆，因自己的罪孽降为卑下。\n44 然而，他听见他们哀告的时候，就眷顾他们的急难，\n45 为他们记念他的约，照他丰盛的慈爱后悔。\n46 他也使他们在凡掳掠他们的人面前蒙怜恤。\n47 耶和华──我们的神啊，求你拯救我们，从外邦中招聚我们，我们好称赞你的圣名，以赞美你为夸胜。\n48 耶和华──以色列的神是应当称颂的，从亘古直到永远。愿众民都说：阿们！你们要赞美耶和华！"}, "8-3": {"theme": "愿人都称赞祂（三之一）", "scripture": "诗篇一百零七篇1~9节", "url": "https://www.youtube.com/watch?v=XAwTXycTgPI&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=9", "videoId": "XAwTXycTgPI", "date_cn": "3/8/26(一)", "description": "主题：愿人都称赞祂（三之一）\n经文：诗篇一百零七篇1~9节\n\n诗人在这一篇诗篇的第一句经文，就鼓励我们要「称谢耶和华」。不仅如此，他在这一篇诗篇的每一段，都提到同一件事：「但愿人因耶和华的慈爱和祂向人所行的奇事都称赞祂」（参8、15、21、31节），特别是神的「赎民」（参2节）──也就是我们，这一群被祂从仇敌手中救赎的百姓，要称谢耶和华！因为我们作为祂的儿女，可说是最认识祂，以致应当时常称谢祂！\n\n亲爱的弟兄姊妹，你时常感谢神吗？你时常赞美神吗？赞美不仅是神百姓的权利，也是应当向神献上的祭，而凡以感谢献上为祭的，便是荣耀神（参诗五十23）。因此，让我们时常以颂赞为祭来献给神吧！\n\n为什么我们要赞美神呢？诗人也不断地提到──因为我们「在苦难中哀求耶和华；祂从我们的祸患中拯救我们」（参6、13、19、28节）！每当我们面临各样的患难，神不仅垂听我们的哀求，也拯救我们，所以我们理应到祂面前称谢祂。\n\n今天这一段经文的重点是，我们要为著神使我们的灵魂兴盛、身体健壮、凡事兴盛，来向祂献上感恩！一方面，我们要为著神引导我们人生行走直路而感恩，也为祂使我们成家立业而感恩（参7节）。另方面，我们在未信主之前，确实如同诗人所说的──仿佛在旷野中漂流，人生没有盼望（参4节）！如今，我们能够活出满足、丰盛的人生，都是因著「耶和华的慈爱和祂所行的奇事」！感谢神！祂不仅赐给我们物质的满足，更让我们的心灵得著满足，而这是最大的满足！\n\n亲爱的弟兄姊妹，今天让我们一起再度数算神的恩典，并且来称赞祂吧！\n\n回应：主啊！谢谢祢拯救我脱离旧有的生命！谢谢祢每天赐给我丰盛有余的恩典，并且喂养我的心灵！祢是我生命最大的满足，我感谢祢！奉主的名求，阿们！\n\n祷读：诗篇一零七篇8~9节\n但愿人因耶和华的慈爱和祂向人所行的奇事都称赞祂；因祂使心里渴慕的人得以知足，使心里饥饿的人得饱美物。\n\nQT: 诗篇一百零七篇1~9节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.ne 爱的弟兄姊妹，我们所相信的这一位神真是奇妙！\n\n感谢主！祂将我们从黑暗、死荫中拯救出来，使我们活在光明、盼望和喜乐之中；祂把我们从罪恶的捆绑中拯救出来，使我们活在圣洁和自由之中！感谢主！祂完全断开我们身上所有的捆索！但愿我们不再违背祂的话，也不再藐视至高者的旨意，以致能够时常在祂的里面，得享自由的生命！\n\n回应：\n主啊！每当我偏行己路，以致落入困苦的捆锁，感谢祢总是愿意拯救我！我要天天赞美祢，因为祢的名是何等奇妙，配得一切的称颂！奉主的名求，阿们！\n\n祷读：诗篇一一八篇21节 \n我要称谢祢，因为祢已经应允我，又成了我的拯救！\n\nQT: 诗篇一百零七篇10~22节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "10 那些坐在黑暗中、死荫里的人被困苦和铁炼捆锁，\n11 是因他们违背神的话语，藐视至高者的旨意。\n12 所以，他用劳苦治服他们的心；他们仆倒，无人扶助。\n13 于是，他们在苦难中哀求耶和华；他从他们的祸患中拯救他们。\n14 他从黑暗中和死荫里领他们出来，折断他们的绑索。\n15 但愿人因耶和华的慈爱和他向人所行的奇事都称赞他；\n16 因为他打破了铜门，砍断了铁闩。\n17 愚妄人因自己的过犯和自己的罪孽便受苦楚。\n18 他们心里厌恶各样的食物，就临近死门。\n19 于是，他们在苦难中哀求耶和华；他从他们的祸患中拯救他们。\n20 他发命医治他们，救他们脱离死亡。\n21 但愿人因耶和华的慈爱和他向人所行的奇事都称赞他。\n22 愿他们以感谢为祭献给他，欢呼述说他的作为！"}, "8-5": {"theme": "愿人都称赞祂（三之三）", "scripture": "诗篇一百零七篇23~43节", "url": "https://www.youtube.com/watch?v=2THA235NTQo&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=7", "videoId": "2THA235NTQo", "date_cn": "5/8/26(三)", "description": "主题：愿人都称赞祂（三之三）\n经文：诗篇一百零七篇23~43节\n\n在这一段经文中，诗人要我们为著神为我们「平静风浪」，来赞美祂！我们的一生中，总会面临一些风浪；有些在我们个人身上，有些在我们的家庭中，或者有些在我们的工作上。这些风浪往往让我们的心「因患难便消化」（参26节），以及让我们的「智慧无法可施」（参27节）！而当我们遇见人生的风浪，才会发现原来我们是如此软弱！\n\n但是，感谢主！当我们在苦难中哀求神，「祂使狂风止息，波浪就平静」（参29节），而我们将要看见，神迹发生在我们原先感到愁苦的事上！亲爱的弟兄姊妹，这也是你的经历吗？让我们一起来赞美神，并且在众人面前述说祂的作为、尊荣祂的名（参32节）！\n\n这一篇诗篇的最后一段，再次让我们思想赞美神的原因──我们之所以赞美神，是因为祂乐意赐福我们。「因祂本为善；祂的慈爱永远长存」（参1节），祂愿意使我们得著饱足及富足，而不愿意让我们遭受饥饿和干渴之苦；祂乐意我们建造可居住的城邑，而不愿意我们面临漂流之苦；祂愿意我们心里充满喜乐、尊荣，而不愿意我们被愁苦充满，以致受到羞辱。感谢主！祂是赐福的神，也是良善、慈爱的神！\n\n然而，另一方面，这一段经文也提到──我们的生命之所以感到贫乏、愁苦和蒙羞，往往是因为犯罪的缘故（参34节）！亲爱的弟兄姊妹，我们的罪恶，会阻绝神的赐福。因此，让我们再次立定心志，要时常思想神的慈爱、赞美祂所行的奇事，并且时常回转、归向祂──「凡有智慧的，必在这些事上留心，也必思想耶和华的慈爱」（参43节）。\n\n回应：\n主啊！祢本为善，祢的慈爱永远长存！求祢使我时常思想祢的慈爱，并且真实地回转、归向祢，好能承受祢所赐的福分！奉主的名求，阿们！\n\n祷读：西番雅书三章17节\n耶和华──你的神是施行拯救、大有能力的主。祂在你中间必因你欢欣喜乐，默然爱你，且因你喜乐而欢呼。\n\nQT: 诗篇一百零七篇23~43节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "23 在海上坐船，在大水中经理事务的，\n24 他们看见耶和华的作为，并他在深水中的奇事。\n25 因他一吩咐，狂风就起来，海中的波浪也扬起。\n26 他们上到天空，下到海底；他们的心因患难便消化。\n27 他们摇摇晃晃，东倒西歪，好像醉酒的人；他们的智慧无法可施。\n28 于是，他们在苦难中哀求耶和华，他从他们的祸患中领出他们来。\n29 他使狂风止息，波浪就平静。\n30 风息浪静，他们便欢喜；他就引他们到所愿去的海口。\n31 但愿人因耶和华的慈爱和他向人所行的奇事都称赞他。\n32 愿他们在民的会中尊崇他，在长老的位上赞美他！\n33 他使江河变为旷野，叫水泉变为干渴之地，\n34 使肥地变为碱地；这都因其间居民的罪恶。\n35 他使旷野变为水潭，叫旱地变为水泉。\n36 他使饥饿的人住在那里，好建造可住的城邑，\n37 又种田地，栽葡萄园，得享所出的土产。\n38 他又赐福给他们，叫他们生养众多，也不叫他们的牲畜减少。\n39 他们又因暴虐、患难、愁苦，就减少且卑下。\n40 他使君王蒙羞被辱，使他们在荒废无路之地漂流。\n41 他却将穷乏人安置在高处，脱离苦难，使他的家属多如羊群。\n42 正直人看见就欢喜；罪孽之辈必塞口无言。\n43 凡有智慧的，必在这些事上留心，也必思想耶和华的慈爱。"}, "8-6": {"theme": "坚定的基督徒", "scripture": "诗篇一百零八篇1~13节", "url": "https://www.youtube.com/watch?v=R90EKYVQ5yw&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=6", "videoId": "R90EKYVQ5yw", "date_cn": "6/8/26(四)", "description": "主题：坚定的基督徒\n经文：诗篇一百零八篇1~13节\n\n这一篇诗篇是大卫的诗歌。在一开头，大卫就写道：「神啊，我心坚定」。亲爱的弟兄姊妹，你是否也是一个信心坚定的基督徒呢？今天，让我们一起来思想，什么样的人才是信心坚定的基督徒？\n \n信心坚定的人：在第11至13节，大卫坚定地求神和他一同争战。因为他承认，「人的帮助是枉然的」（参12节）！另外，大卫坚定地相信，「践踏我们敌人的」（参13节），就是神！我们之所以能够得胜，不是靠著自己的力量，而是唯有「倚靠神才得施展大能」（参13节）！亲爱的弟兄姊妹，你是否也在各样的事上承认，人的帮助是枉然的呢？你是否坚定地相信──我们倚靠神，才能施展大能？你是否在每一件事情上，坚定地呼求神与你同去呢？\n\n高声赞美的人：在第1至5节，我们看见一个信心坚定的基督徒，必然会时常歌颂神，并且在众人的面前高声称颂神，因为赞美就是信心的表现！大卫在神尚未向他施展大能之前，就凭著信心向神献上赞美──「祢的慈爱大过诸天；祢的诚实达到穹苍。神啊，愿祢崇高过于诸天！愿祢的荣耀高过全地！」（参4~5节）亲爱的弟兄姊妹，你是否时常开口，高声赞美神？你是否常在众人的面前称谢祂？当你遇见患难和仇敌的攻击，你是否仍然像大卫一样，开口赞美神？\n\n高声宣告的人：在第7至10节，我们看见一个信心坚定的基督徒，也是一个高声宣告「神必得胜」的基督徒。大卫在此宣告，神必统治示剑、疎割谷，必保护基列、以法莲、犹大！他想像神是凯旋的征服者，祂要使用摩押如同使用沐浴盆一般，祂要把肮脏的草鞋抛给以东，如同抛给侍役一样，而且祂也要征服非利士及以东地。亲爱的弟兄姊妹，让我们向大卫学习，并且宣告──神的得胜将要临到我们的身上！\n\n回应：主啊！求祢坚定我的心，使我放胆宣告祢的得胜！我要高声赞美祢，并且在生活中更深经历祢得胜的同在！奉主的名求，阿们！\n\n祷读：诗篇一零八篇13节\n我们倚靠神才得施展大能，因为践踏我们敌人的就是祂。\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这 \n30 我要用口极力称谢耶和华；我要在众人中间赞美他；\n31 因为他必站在穷乏人的右边，要救他脱离审判他灵魂的人。"}, "8-8": {"theme": "永远为王 为祭司", "scripture": "诗篇一百一十篇1~7节", "url": "https://www.youtube.com/watch?v=wfY08oiu6_c&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=4", "videoId": "wfY08oiu6_c", "date_cn": "8/8/26(六)", "description": "主题：永远为王 为祭司\n经文：诗篇一百一十篇1~7节\n\n今天的这一篇诗篇，是有关于弥赛亚的预言。根据第4节的预言，耶稣是「照著麦基洗德的等次永远为祭司」！我们从旧约律法知道：只有利未支派的子孙, 才能担当祭司的职分，耶稣却是从犹大支派生的。因此，耶稣祭司的职分不是按照利未人的等次，而是照著「麦基洗德的等次为祭司」。可是，这是什么意思呢？\n\n根据希伯来书第七章的解释，创世记的记载并未提到麦基洗德的家世，神却以他来表明耶稣是从神而来的祭司！另外，麦基洗德又是祭司，又是「撒冷王」，这也预表耶稣又是君王，又是祭司的职分；这样的身分，在旧约里是独一无二的！因此，我们可以从今天的诗篇看见──耶稣又是君王，又是祭司的奇妙身分！祂不仅是「永远的祭司」，成为我们与天父之间永远的「中保」，祂也是永远的君王！\n\n感谢主！主耶稣已经从死里复活，如今坐在父神的右边（参1节）。祂在仇敌中掌权（参2节），祂也是得胜的君王（参6节），我们是祂的子民（参3节）！而第3节告诉我们，耶稣的子民要操练的几件事：\n\n以圣洁的妆饰为衣：亲爱的弟兄姊妹，当我们成为圣洁的子民，生命就没有破口容许撒但来攻击我们！但愿我们都自洁、脱离卑贱的事，好能成为属神得胜的子民！\n\n甘心牺牲自己：今天，许多的灵魂受到了恶者的辖制。神在寻找一群愿意舍弃自己、为祂摆上，甚至因著祂的名而受苦的子民！亲爱的弟兄姊妹，你愿意吗？\n\n亲爱的弟兄姊妹，但愿我们在主里活出新鲜、活泼的生命，如同清晨的甘露！但愿我们时常在主的面前得著更新，并且更多委身于回应祂的呼召！\n\n回应：主啊！我愿自洁，作祢圣洁的器皿！求祢帮助我舍己来跟随祢，活出属祢子民的生命！奉主的名求，阿们！\n\n祷读：申命记七章6节 \n因为你归耶和华──你神为圣洁的民；耶和华──你神从地上的万民中拣选你，特作自己的子民。\n\nQT: 诗篇一百一十篇1~7节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录19 代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 你们要赞美耶和华！我要在正直人的大会中，并公会中，一心称谢耶和华。\n2 耶和华的作为本为大；凡喜爱的都必考察。\n3 他所行的是尊荣和威严；他的公义存到永远。\n4 他行了奇事，使人记念；耶和华有恩惠，有怜悯。\n5 他赐粮食给敬畏他的人；他必永远记念他的约。\n6 他向百姓显出大能的作为，把外邦的地赐给他们为业。\n7 他手所行的是诚实公平；他的训词都是确实的，\n8 是永永远远坚定的，是按诚实正直设立的。\n9 他向百姓施行救赎，命定他的约，直到永远；他的名圣而可畏。\n10 敬畏耶和华是智慧的开端；凡遵行他命令的是聪明人。耶和华是永远当赞美的！"}, "8-10": {"theme": "敬畏神之福", "scripture": "诗篇一百一十二篇1~10节", "url": "https://www.youtube.com/watch?v=HHtimGNINo0&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=2", "videoId": "HHtimGNINo0", "date_cn": "10/8/26(一)", "description": "主题：敬畏神之福\n经文：诗篇一百一十二篇1~10节\n\n在一开头，诗人就告诉我们：「敬畏耶和华……这人便为有福！」因此，今天我们要一起来思想，谁是敬畏耶和华的人呢？\n\n在第1节，诗人提到：甚喜爱神命令的人，就是敬畏神的人！当人喜爱神的命令，又因著喜爱而遵行，就是敬畏神了！亲爱的弟兄姊妹，你是这样的人吗？诗人告诉我们，当人敬畏神、喜爱神的命令，并且常常遵行神的命令，他的生命就会越来越像神（参4节）──「他有恩惠，有怜悯，有公义」！他越来越有神的「恩惠」，如同第5节提到，他慷慨地借贷给有需要的人；他越来越有神的「怜悯」，如同第9节提到，他愿意赒济穷人；他也越来越有神的「公义」，如同第5节提到，当他被审判，可以站立得住！\n\n另外，诗人提到：当人坚定倚靠神，就是敬畏神了（参7~8节）！因为他与神拥有美好的关系，所以即便他听见凶恶的信息，他的内心却是确定、不惧怕的！亲爱的弟兄姊妹，但愿我们都能这样坚定倚靠神！\n\n接著，我们也要一起来思想：敬畏耶和华的人，会经历什么样的祝福呢？\n\n诗人告诉我们，敬畏神的人必定在今生满得恩惠！因为他是一个有恩惠的人，神就以更大的恩惠对待他！如同第3节提到，神在钱财及物质上赐恩给他。如同第4节提到，神也必在他遇见患难的时候，光照他、指引他的脚步！如同第9节提到，神必在他面对仇敌的攻击时，使他的角被高举，以致他大大得胜，并且大有荣耀！感谢主！神给那些敬畏祂的人，在世人面前所显明的恩惠是何等的大啊（参诗三十一19）！\n\n另外，诗人告诉我们，敬畏神的人除了要在今生满得恩惠，还要从神领受永恒的奖赏！如同第9节提到──敬畏神的人，「他的仁义存到永远」！感谢主！敬畏祂的人是何等有福啊！亲爱的弟兄姊妹，但愿我们都能成为敬畏神的人！\n\n最后，诗人在第2节提到：敬畏神的人不仅要在个人的今生与永恒蒙福，他的后代也要蒙福，并且强盛！亲爱的弟兄姊妹，让我们再次为著神丰厚的恩典，向祂献上感恩，并且更深地在祂的面前立志──成为敬畏祂的人！\n\n回应：主啊！但愿我能成为敬畏祢的人，喜爱祢的命令并且愿意遵行！求祢使我一生坚定倚靠祢，永不动摇！奉主的名求，阿们！\n\n祷读：诗篇一一二篇1节\n你们要赞美耶和华！敬畏耶和华，甚喜爱祂命令的，这人便为有福！\nQT: 诗篇一百一十二篇1~10节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 你们要赞美耶和华！敬畏耶和华，甚喜爱他命令的，这人便为有福！\n2 他的后裔在世必强盛；正直人的后代必要蒙福。\n3 他家中有货物，有钱财；他的公义存到永远。\n4 正直人在黑暗中，有光向他发现；他有恩惠，有怜悯，有公义。\n5 施恩与人、借贷与人的，这人事情顺利；他被审判的时候要诉明自己的冤。\n6 他永不动摇；义人被记念，直到永远。\n7 他必不怕凶恶的信息；他心坚定，倚靠耶和华。\n8 他心确定，总不惧怕，直到他看见敌人遭报。\n9 他施舍钱财，赒济贫穷；他的仁义存到永远。他的角必被高举，大有荣耀。\n10 恶人看见便恼恨，必咬牙而消化；恶人的心愿要归灭绝。"}, "8-11": {"theme": "谁像我们的神呢", "scripture": "诗篇一百一十三篇1~9节", "url": "https://www.youtube.com/watch?v=l9cr_tYMQlk&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=1", "videoId": "l9cr_tYMQlk", "date_cn": "11/8/26(二)", "description": "主题：谁像我们的神呢 \n经文：诗篇一百一十三篇1~9节\n　\n在第5节，诗人赞美神，说：「谁像耶和华──我们的神呢」？当我们越认识神，就能越经历神。而我们也会如同诗人一样，从心里越发向神献上赞美：「谁像耶和华──我们的神呢？」\n\n在这一篇诗篇中，诗人赞美神的重点有两个。一方面，他赞美神的伟大，如同他在第4、5节提到的，「耶和华超乎万民之上；祂的荣耀高过诸天……祂坐在至高之处」！感谢主，我们所信的神是超乎一切的神！祂不是人手所造、虚假的偶像，而是那位掌管一切的全能神！而我们是何等有福，可以来信靠祂！\n\n另方面，在第6至9节，诗人又赞美神的另一个属性，那就是祂的谦卑。我们的神真是奇妙！祂虽然超乎一切，又坐在至高之处，却「谦卑，观看天上地下的事」（参6节）！祂不仅十分关心我们这些渺小的人，也一直都在观看我们发生的每一件事。除此之外，祂甚至垂怜、眷顾我们这些活在「灰尘」和「粪堆」中的人（参7节）！当人对我们不屑一顾，祂却关心我们、了解我们，而且伸出祂大能的手来帮助我们！感谢主！我们所信的神真是奇妙！\n\n既然神是如此的伟大、奇妙，那么谁应当来赞美祂呢？第1节提到，凡是「耶和华的仆人」，都应当来赞美神！亲爱的弟兄姊妹，如果我们愿意一生服事这一位伟大、奇妙的神，就要立志一生因著祂的名，时常向祂开口赞美！\n\n亲爱的弟兄姊妹，但愿我们都能不断赞美神，「从今时直到永远」（参2节），因为神的恩典是从今时直到永远的！「从日出之地到日落之处，耶和华的名是应当赞美的！」（参3节）感谢主！祂的恩典如同太阳一样，眷顾一切祂所造的人！但愿我们一天比一天更加信靠祂、更常称颂祂，以致能够更深地认识、经历祂的伟大与奇妙！\n\n回应：主啊！我愿意一生称颂祢伟大、奇妙的圣名，因为唯有祢配得称颂！求祢借由圣灵提升我的敬拜和赞美，使我更深遇见祢！奉主的名求，阿们！\n\n祷读：诗篇一一三篇2~3节\n耶和华的名是应当称颂的，从今时直到永远！从日出之地到日落之处，耶和华的名是应当赞美的！\n\nQT : 诗篇一百一十三篇1~9节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 你们要赞美耶和华！耶和华的仆人哪，你们要赞美，赞美耶和华的名！\n2 耶和华的名是应当称颂的，从今时直到永远！\n3 从日出之地到日落之处，耶和华的名是应当赞美的！\n4 耶和华超乎万民之上；他的荣耀高过诸天。\n5 谁像耶和华──我们的神呢？他坐在至高之处，\n6 自己谦卑，观看天上地下的事。\n7 他从灰尘里抬举贫寒人，从粪堆中提拔穷乏人，\n8 使他们与王子同坐，就是与本国的王子同坐。\n9 他使不能生育的妇人安居家中，为多子的乐母。你们要赞美耶和华！"}, "8-12": {"theme": "拯救之歌", "scripture": "诗篇一百一十四篇1~8节", "url": "https://www.youtube.com/watch?v=s71OIHKPRao&list=PLgFvTLP0QRDueudvaUg4OVhgrgf_GRzmi&index=30", "videoId": "s71OIHKPRao", "date_cn": "12/8/26(三)", "description": "主题：拯救之歌\n经文：诗篇一百一十四篇1~8节\n\n在这一篇诗篇中，诗人歌颂神拯救以色列人出埃及的过程。而我们的生命也如同以色列人，充满伟大神施行拯救的故事！\n\n从罪中救赎出来：在第1节，诗人歌颂神拯救以色列人，出了埃及为奴之地。感谢主！过去我们也是被罪、被坏习惯捆绑，活在黑暗和绝望之中。但神拯救了我们，我们就得著自由！因此，无论蒙恩得救多久，都要像诗人一样，时常歌颂神的拯救，永远不忘神在我们身上的恩典。\n\n成为我们生命的主宰：在第2节，诗人提到神不仅拯救以色列人，还停留在他们当中治理他们。感谢主！神不仅拯救我们，也与我们同在；祂治理我们，管理我们的生命、生活，成为生命的主宰，越发活出祂的荣美。因此，让我们将生命的主权交给祂，让祂掌权、居首位。\n\n带领我们走属天的道路：在第3节，诗人提到神不仅拯救以色列人出埃及，也使沧海分开，使约但河倒流，带领以色列人进入迦南美地。感谢主！神不仅拯救我们脱离世界的捆绑，也时刻帮助、引导我们走属天的道路，并且为我们除去一切拦阻！亲爱的弟兄姊妹，我们所信的是一位大而可畏、大有权能的神，我们还惧怕什么呢？让我们将生命中的红海、约但河、大山、小山等一切的困难都交给祂，相信祂必为我们成就大事！\n\n供应我们生活上的一切需要：在第8节，诗人歌颂神，说：「祂叫磐石变为水池，叫坚石变为泉源。」感谢主！祂总是供应我们生活上的一切需要。亲爱的弟兄姊妹，或许你觉得目前生活十分困难，艰难如同「磐石」和「坚石」。今天，就让我们一起来仰望神，相信祂必要使我们一切所需用的都充足（参腓四19）。\n\n回应：主啊！谢谢祢拯救我，成为我生命的主宰，带领我走属天的道路，并且供应我一切的需要，我愿意一生跟随祢，直到见祢的面。奉主的名求，阿们！\n\n祷读：以赛亚书四十八章17节\n耶和华─你的救赎主，以色列的圣者如此说：「我是耶和华─你的神，教训你，使你得益处，引导你所当行的路。」\n\nQT: 诗篇一百一十四篇1~8节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心 /8/26(六)", "description": "主题：愿万国赞美耶和华\n经文：诗篇一百一十七篇1节~一百一十八篇4节\n\n第一百一十七篇虽然只有两节经文，却意义非凡。有人认为，本诗篇是圣经「最中间」的一章，而它的信息，也是圣经的「核心」信息：「外邦啊！你们当赞美主；万民哪！你们都当颂赞祂。」(罗15:11)我们要像诗人一样热情、坚定、迫切地向万民、万国传扬这一位创造宇宙万物的耶和华；邀请万国万民，一起来赞美耶和华！这是神子民所宣告的异象，也是不断祷告祈求的最大愿望。\n\n第一百一十八篇1至4节，诗人同样怀抱这样的渴望。他特别呼吁敬畏耶和华的人（参4节）、神的选民（参2节），以及服事神的人都要来赞美神（参3节）！因为若我们不赞美神，就连石头都要跳起来赞美神。（参路十九40）亲爱的弟兄姊妹，让我们将耶和华当得的赞美归给祂！\n\n我们的神配得万民、万国来赞美祂！让我们透过诗人的描述，更多认识神的属性：\n\n良善与慈爱：在第一百一十八篇，诗人不断赞美耶和华是良善、慈爱的神！而在一百一十七篇2节，诗人也提到─我们的神不仅是慈爱的神，也是「向我们大施慈爱」的神。我们投靠祂，是何等有福！让我们来到祂的面前，饱尝祂的恩典吧！\n\n信实：另外，诗人不断地提到，神的良善和慈爱「永远长存」，永不会改变。从一百一十七篇，我们看见诗人除了提到神的慈爱之外，也提到神的「诚实」（参2节）。一般来说，当圣经提及神的「慈爱」，也会同时论到神的「信实」。感谢主！这是何等大的保证，因为这表明神是「守约施慈爱」的神（参尼一5），祂对我们的慈爱和良善永不改变！尽管天地都要改变，祂的慈爱却永远长存！\n\n亲爱的弟兄姊妹，我们所信靠的这一位神，如此奇妙伟大，所以，我们应当时常扬声赞美祂！同时也渴望看见万国、万民来敬拜祂。\n\n回应：主啊！但愿万国、万民都来赞美祢！因为祢是守约施慈爱的神，我愿一生赞美祢，并且称颂祢的恩惠，奉主的名求，阿们！\n\n祷读：诗篇一一七篇2节\n因为祂向我们大施慈爱；耶和华的诚实存到永远。你们要赞美耶和华！\nQT: 诗篇一百一十七篇1节~一百一十八篇4节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 万国啊，你们都当赞美耶和华！万民哪，你们都当颂赞他！\n2 因为他向我们大施慈爱；耶和华的诚实存到永远。你们要赞美耶和华！"}, "8-16": {"theme": "欢呼赞美的子民", "scripture": "诗篇一百一十八篇5~29节", "url": "https://www.youtube.com/watch?v=HZDPW6FB9Cs&list=PLgFvTLP0QRDueudvaUg4OVhgrgf_GRzmi&index=26", "videoId": "HZDPW6FB9Cs", "date_cn": "16/8/26(日)", "description": "主题：欢呼赞美的子民\n经文：诗篇一百一十八篇5~29节\n\n本篇第15节，诗人写道：「在义人的帐棚里，有欢呼拯救的声音。」在教会中，也应当时常听见欢喜赞美神的声音！而在第19节，诗人又写道：「给我敞开义门；我要进去称谢耶和华！」但愿每一个来到神殿的人，都以「称谢」进入祂的门；以「赞美」进入祂的院（参诗一百篇4）。\n　　\n在第24节，诗人写道：「这是耶和华所定的日子，我们在其中要高兴欢喜！」什么是「耶和华所定的日子」呢？第22和23节提到，「耶和华所定的日子」，就是指耶稣虽然如同被弃绝的石头，被钉死在十字架，却荣耀地从死里复活，成了「房角的头块石头」。但愿神的百姓，在祂荣耀复活的主日，都能以欢喜的心来到圣殿敬拜祂！但愿每一个礼拜日，我们也都在义人的帐棚中，听见欢呼赞美的声音，这是神的心意，也是诗人的渴望！\n\n在第28节，诗人喜乐、渴慕地写道：「祢是我的神，我要称谢祢；祢是我的神，我要尊崇祢！」感谢主！愿神在教会中，得著一切祂当得的荣耀和尊崇！我们的教会是向神欢呼赞美的教会。\n\n另外，在第5至15节，诗人解释为什么在义人的帐棚中，会有欢呼拯救的声音？因为投靠耶和华的人，时常会有「得胜」的经历。在这段经文中，诗人不断地鼓励我们投靠耶和华：\n\n投靠耶和华，强似倚赖人（参8节），甚至强似倚赖王子（参9节）。世间人、事、物都无法成为我们永远的倚靠，人的力量终会减弱，人的权势终必消失。亲爱的弟兄姊妹，什么是你所倚赖的呢？你是否时常倚赖人，却不愿意专心倚赖神呢？\n\n专心倚赖神的人，即使遇到拦阻抵挡，也能靠主得胜！所以，诗人大声呼喊：「有耶和华帮助我，我必不惧怕，人能把我怎么样呢？」感谢主！没有任何事，能够围困倚靠祂的百姓，因为「耶和华是我的力量，是我的诗歌；祂也成了我的拯救。」（参14节）愿神的百姓专心倚赖耶和华，经历祂的拯救与喜乐！\n\n回应：主啊！我要称谢、赞美祢的名！愿祢在我的生命中，得著祢所当得的荣耀。奉主的名求，阿们！\n\n祷读：诗篇一一八篇14节\n耶和华是我的力量，是我的诗歌；祂也成了我的拯救。\nQT: 诗篇一百一十八篇5~29节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗 要在祢的律例中自乐！」（参16节）神的话语如同甘蜜，吃进神的话，甘甜在心里，自然喜乐！\n\n「意志」上──要看重神的话：诗人提到，他看重神的道路（参15节）。神的道路高过我们的道路，行在祂的旨意中，就不会受到世界的诱惑，偏离神的法则。我们要常常自我省察，是否看重神的话语，并讨神喜悦？\n\n「言语」上──要传扬神的话：诗人提到：「我用嘴唇传扬祢口中的一切典章。」（参13节）在生活中时常向人传扬神的话，因为若生活中充满神的话时，就能远离试探！亲爱的弟兄姊妹，当你与人相处时，都谈论什么呢？从今以后，让我们更多与人分享见证，以及神话语的美好，在圣洁中享受祂话语的甘甜！\n 　　　　\n求主亲自帮助我们，使我们的生活以神的话语为中心，活出圣洁，成为真正有福的人！\n\n回应：主啊！求祢指教我渴慕祢的话语，好让我知道如何讨祢喜悦。奉主的名求，阿们！\n祷读：诗篇一一九篇16节\n我要在祢的律例中自乐；我不忘记祢的话。　\nQT: 诗篇一百一十九篇9~16节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "9 少年人用什么洁净他的行为呢？是要遵行你的话！\n10 我一心寻求了你；求你不要叫我偏离你的命令。\n11 我将你的话藏在心里，免得我得罪你。\n12 耶和华啊，你是应当称颂的！求你将你的律例教训我！\n13 我用嘴唇传扬你口中的一切典章。\n14 我喜悦你的法度，如同喜悦一切的财物。\n15 我要默想你的训词，看重你的道路。\n16 我要在你的律例中自乐；我不忘记你的话。"}, "8-19": {"theme": "荒漠甘泉", "scripture": "诗篇一百一十九篇17~24节", "url": "https://www.youtube.com/watch?v=pc7pQ9Nma0s&list=PLgFvTLP0QRDueudvaUg4OVhgrgf_GRzmi&index=23", "videoId": "pc7pQ9Nma0s", "date_cn": "19/8/26(三)", "description": "主题：荒漠甘泉\n经文：诗篇一百一十九篇17~24节\n\n从这一段经文的第17、21、22、23节，看见诗人正处于苦难中。他可能遭遇病痛的苦，或是环境的苦；然而，他心中更大的苦，却是从「人」而来的。在痛苦的光景中，诗人切实经历：神的话是「荒漠甘泉」，是胜过苦难的秘诀！\n　\n神的话为什么是「荒漠甘泉」呢？诗人提到，「祢的法度是我所喜乐的。」（参24节）亲爱的弟兄姊妹，神的话是我们的「喜乐」；在苦难中，神的话使我们得安息，并且赐给我们力量面对苦难！因此，让我们学习在苦难中，寻求神话语的安慰与能力。\n\n另外，诗人也提到：神的话语是他的「谋士」（参24节）。感谢主！祂的话语是我们的「谋士」。祂的话语会引导我们、加添智慧，帮助我们面对苦难。那么，如何以神的话语，来面对苦难呢？\n　　\n定意遵行：在第23节，诗人写道：「虽有首领坐著妄论我，祢仆人却思想祢的律例。」让我们也如诗人一样，定意以属神的方式，来回应苦难和人们带来的伤害，而不是用世人的方法，靠血气报复。生命属神还是属肉体，在于面对问题与难处时的反应；是从神的话语中寻求喜乐与智慧，还是和没信主的人一样，作出血气的反应呢？\n　　\n定意寻求：基督徒生命成熟与否，在于是否寻求神，从软弱中变为刚强，使愁苦变为喜乐、迷惘中得著引导。亲爱的弟兄姊妹，我们要渴慕神的话语，借以认识神，如同诗人写道：「我时常切慕祢的典章，甚至心碎」（参20节）；「我是在地上作寄居的；求祢不要向我隐瞒祢的命令。」（参19节）\n\n求神将祂的话语赐给我们，使我们天天经历：「祢的话是我脚前的灯，是我路上的光！」（参诗一一九105）\n\n回应：主啊，祢的话是我荒漠中的甘泉，是我的喜乐与谋士，我要时常切慕祢的话语，甚至心碎！\n\n祷读：诗篇一一九篇19~20节\n我是在地上作寄居的；求祢不要向我隐瞒祢的命令！我时常切慕祢的典章，甚至心碎。\n\nQT: 诗篇一百一十九篇17~24节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "17 求你用厚恩待你的仆人，使我存活，我就遵守你的话。\n18 求你开我的眼睛，使我看出你律法中的奇妙。\n19 我是在地上作寄居的；求你不要向我隐瞒你的命令！\n20 我时常切慕你的典章，甚至心碎。\n21 受咒诅、偏离你命令的骄傲人，你已经责备他们。\n22 求你除掉我所受的羞辱和藐视，因我遵守你的法度。\n23 虽有首领坐着妄论我，你仆人却思想你的律例。\n24 你的法度是我所喜乐的，是我的谋士。"}, "8-20": {"theme": "拣选真道", "scripture": "诗篇一百一十九篇25~32节", "url": "https://www.youtube.com/watch?v=j0mH6nkQb1Y&list=PLgFvTLP0QRDueudvaUg4OVhgrgf_GRzmi&index=22", "videoId": "j0mH6nkQb1Y", "date_cn": "20/8/26(四)", "description": "主题：拣选真道\n经文：诗篇一百一十九篇25~32节\n　\n人生是不断抉择的过程，求主帮助我们在任何一个关键时刻，都能作出正确抉择。在第29、30节，诗人求主让他「离开奸诈的道」，走上「忠信的道」。「奸诈的道」指的是那些「似是而非的道」，看起来似乎美好，却是通往灭亡的道路；而「忠信的道」指的是神那信实、可靠的道路，也就是蒙福之路。\n　　\n诗人体会到，假的道会使人灵性黑暗，甚至死亡（参25节），使人感到「愁苦」（参28节）和「羞愧」（参31节）。例如世上有许多让人迅速致富的奸诈之道，表面上看起来很吸引人，却是灭亡之道，因为「贪财是万恶之根」，人若贪财，终究要被愁苦刺透（参提前六10） ！\n\n神的道是「忠信之道」，是信实、可靠的蒙福之路！如同诗人所写：当我们认真地把神的话摆在我们的面前（参30节），就必不羞愧（参31节），而要经历奇妙的事（参27节）。可是，我们如何拣选真道呢？\n\n「明白」真道：如同诗人不断求神使他能够「明白真道」（参26~29节），求主也开我们的心（参33节），让我们不断追求并渴慕祂的话语。\n　\n「拣选」真道：我们要选择相信神的道才是真道，是蒙福之道！诗人曾经因信靠假道而受苦，他为此在神面前悔改（参29节），并且向神表明他愿意拣选真道、追求真道！（参30节）\n　　\n「直奔」真道（参32节）：我们要下定决心，不再受环境或人的影响，以致偏离神的道。如同经文所写：「祢开广我心的时候，我就往祢命令的道上直奔。」（参32节）亲爱的弟兄姊妹，让我们快跑跟随主！\n\n但愿今天的经文成为我们的力量与帮助，使我们愿意拣选真道，活出神对我们的心意和命定！\n\n回应：主啊！求祢开广我的心，使我晓得祢的道是无比的信实可靠。我要立定心志快跑跟随祢，并且乐意持守祢的法度。奉主的名求，阿们！\n祷读：诗篇一一九篇32节 \n祢开广我心的时候，我就往祢命令的道上直奔。　\nQT: 诗篇一百一十九篇25~32节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n 条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "33 耶和华啊，求你将你的律例指教我，我必遵守到底！\n34 求你赐我悟性，我便遵守你的律法，且要一心遵守。\n35 求你叫我遵行你的命令，因为这是我所喜乐的。\n36 求你使我的心趋向你的法度，不趋向非义之财。\n37 求你叫我转眼不看虚假，又叫我在你的道中生活。\n38 你向敬畏你的人所应许的话，求你向仆人坚定！\n39 求你使我所怕的羞辱远离我，因你的典章本为美。\n40 我羡慕你的训词；求你使我在你的公义上生活！"}, "8-22": {"theme": "爱的律法", "scripture": "诗篇一百一十九篇41~48节", "url": "https://www.youtube.com/watch?v=y3uHQrs36P4&list=PLgFvTLP0QRDueudvaUg4OVhgrgf_GRzmi&index=20", "videoId": "y3uHQrs36P4", "date_cn": "22/8/26(六)", "description": "主题：爱的律法\n经文：诗篇一百一十九篇41~48节\n　\n第一百一十九篇不断提到神的律法和命令，而我们从第41节看见，神设立律法或命令，不是为了「要求」我们，而是为了「爱」我们。在第41节，诗人也提到神的律法是我们的「救恩」；而第45节也提到，神的律法使我们得「自由」。另外，第47节也告诉我们，凡愿意遵行神律法的人，必然得著喜乐，也必蒙福！\n\n许多人觉得基督徒的生活很不自由，因为受到律法约束，其实，身为神的儿女，我们所经历的乃是「不自由的自由」。现今世代对于「自由」的认定，经常是「只要我喜欢，有什么不可以？」；殊不知这样反而让人落入罪的捆绑里，失去真正的自由。所以，耶稣说：「所有犯罪的就是罪的奴仆！」（参约八34）若我们信靠神，并且遵行祂的律法，不放纵肉体，就能够得著真正的自由。感谢主！这是何等伟大的恩典！\n \n在第41节，诗人求主让他「经历」神充满爱的律法，而满有信心地为真理作见证。诗人甚至在第46节提到，他要在君王的面前为神作见证。亲爱的弟兄姊妹，我们也可以像诗人一样，向神求这经历，为主所使用。深信只要我们遵行祂爱的律法，就能在人的面前喜乐地为真理作见证。\n\n在第48节，诗人写道：「我又要遵行（原文是举手）祢的命令」。在这段经文中，诗人不断提到他「素来」高举神的律法。而他透过下列的四种方式，来「高举」神的律法：「素来所爱」（参47~48节）、「素来所想」（参45、48节）、「素来所言」（参43节），以及「素来所行」（参44节）。让我们像诗人一样，一生高举神的律法！\n\n但愿我们都能向诗人学习爱慕神的话，并且渴慕追求神的话！让我们时常研究、默想，并且用神的话来面对生活上的各种需求；也时常与人谈论真理、传扬真理，专心遵行神的律法。但愿神那充满爱的律法，是我们素来所爱、所想、所言与所行的。\n\n回应：主啊！谢谢祢把爱的律法赐给我！我愿让祢的话语，成为我素来所爱、所想、所言与所行的，奉主的名求，阿们！\n祷读：诗篇一一 若环境使我们感到难过，要选择相信神，并且倚靠神充满「安慰」的话语。如同第50节，诗人提到，神的话语将他「救活」，并且「安慰」他！所以，当感到难过时，记得不要容许自己陷在情绪里太久，而是起来研读神的话语。因为凡是「出于神的话，没有一句不带能力的！」（参路一37）感谢主！祂的话语能够救活并安慰我们！\n\n若心中受伤，并因此消沉时，要选择相信，并倚靠神充满「肯定」的话语。如同在第51节，诗人提到：即使有人说话侮辱他，神的话语也会将他救活！亲爱的弟兄姊妹，无论别人如何用话语伤害我们，都要坚定地宣告：这些都是谎言，只有神的话才是真实的！\n 　　\n感谢主！我们何等蒙恩，可以借由神的话来战胜环境！但愿我们天天倚靠神的话语，战胜一切的困境，并且得胜有余！\n\n回应：主啊！虽然环境十分艰难，我却要相信祢必透过祢的话语，赐给我盼望、安慰和肯定。我渴慕天天活在祢的话语中，直到永远！奉主的名求，阿们！\n\n祷读：路加福音一章37节\n因为，出于神的话，没有一句不带能力的。\n\nQT: 诗篇一百一十九篇49~56节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "49 求你记念向你仆人所应许的话，叫我有盼望。\n50 这话将我救活了；我在患难中，因此得安慰。\n51 骄傲的人甚侮慢我，我却未曾偏离你的律法。\n52 耶和华啊，我记念你从古以来的典章，就得了安慰。\n53 我见恶人离弃你的律法，就怒气发作，犹如火烧。\n54 我在世寄居，素来以你的律例为诗歌。\n55 耶和华啊，我夜间记念你的名，遵守你的律法。\n56 我所以如此，是因我守你的训词。"}, "8-24": {"theme": "持守真道", "scripture": "诗篇一百一十九篇57~64节", "url": "https://www.youtube.com/watch?v=QAeW7Voc3as&list=PLgFvTLP0QRDueudvaUg4OVhgrgf_GRzmi&index=18", "videoId": "QAeW7Voc3as", "date_cn": "24/8/26(一)", "description": "主题：持守真道\n经文：诗篇一百一十九篇57~64节\n　\n在第61节，诗人写道：「恶人的绳索缠绕我，我却没有忘记祢的律法。」由此可见，诗人是愿意付代价并持守真道的人！作为基督徒，应该像耶稣一样，愿意付代价持守真道。让我们透过这一段经文，来思想如何持守真道，了解持守真道的原因：\n \n第一、持守真道，是因为主的道是「蒙福之道」。在第57节，诗人写道：「耶和华是我的福分」；也就是说，他知道神的道是「蒙福之道」。而在第58节，诗人也提到：神的道是「恩典之道」，因此，他愿意遵守，并且持守真道。　\n　　\n透过神的话语，认识神是我们的福分，而且更加明白祂的恩典及慈爱，乃是我们持守真道的原因。持守真道可能需要付上代价，甚至要面对环境的挑战；然而，我们深信，只要持守真道，就必蒙福！\n\n第二、诗人持守真道，是因为他认定主的道是「正直的道」！从第59和62节看见，诗人认定只有主的道才是正路，是公义、圣洁的道路，又是让人赞叹、感恩的路。所以，他存著感恩的心，走上主的道路。让我们也学习诗人的生命，以感恩的心走上属神正直、公义的道路。\n\n如何持守真道呢？在第58节，诗人提到他「一心」寻求主的话，表示他很认真渴慕主的话。而在第63节，他提到自己时常与一些敬畏神、爱慕神话语的人一起追求神。不仅如此，在第60节，诗人还提到他「急忙」遵行神的话语！甚至在第61节，诗人说，无论环境如何，都「没有忘记神的律法」！\n \n亲爱的弟兄姊妹，但愿我们也能像诗人一样，勇于持守真道！让我们在主前立志，要更多信靠、仰望祂的话语，坚定持守真道，永不回头！\n\n回应：主啊！愿祢亲自帮助我，天天喜乐地持守真道，并能经历从祢而来的平安和信心。奉主的名求，阿们！\n\n祷读：诗篇一一九篇57节\n耶和华是我的福分；我曾说，我要遵守祢的言语。\nQT: 诗篇一百一十九篇57~64节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "57 耶和华是我的福分；我曾说，我要遵守你的言语。\n58 我一心求过你的恩；愿你照你的话怜悯我！\n59 我思想我所行的道，就转步归向你的法度。\n60 我急忙遵守你的命令，并不迟延。\n61 恶人的绳索缠绕我，我却没有忘记你的律法。\n62 我因你公义的典章，半夜必起来称谢你。\n63 凡敬畏你、守你训词的人，我都与他作伴。\n64 耶和华啊，你的慈爱遍满大地；求你将你的律例教训我！"}, "8-25": {"theme": "无价之宝", "scripture": "诗篇一百一十九篇65~72节", "url": "https://www.youtube.com/watch?v=xqqHLdHP5nw&list=PLgFvTLP0QRDueudvaUg4OVhgrgf_GRzmi&index=17", "videoId": "xqqHLdHP5nw", "date_cn": "25/8/26(二)", "description": "主题：无价之宝\n经文：诗篇一百一十九篇65~72节\n　\n在第72节，诗人写道：「祢口中的训言与我有益，胜于千万的金银。」诗人爱慕神的话语，胜过千万金银！这也是每一个认识神的人应有的态度。感谢主！祂的话是无价之宝！让我们借由这段经文，一起来思想祂话语的宝贵。\n\n诗人将神的话当作无价之宝，是因为他深刻体会，神的话带给他的益处，远胜过千万金银！一方面，诗人发现神的道是「善道」、是「良善」的，如同他在第65节向神献上感谢：「耶和华啊，祢向来是照祢的话善待仆人。」而在第68节，他再次赞美神，说：「祢本为善，所行的也善」！感谢主！只有这一位良善的神是我们所喜爱的、是最可靠的，也只有祂能使我们成为良善！\n\n另一方面，诗人发现神的道是「真道」！在第69节，他感叹这个世界充满许多谎言，而唯独神的道是「真道」！所以，他在第66节求神赐给他，能作出人生中正确判断的知识和智慧，不要让他再次走迷了路！亲爱的弟兄姊妹，这也是你内心的祈求吗？愿我们每天活在主的道中，得著真正的「精明和智慧」（参66节）！\n\n然而，神如何使人珍惜祂的话呢？在第70节，诗人写道：「他们心蒙脂油，我却喜爱祢的律法。」诗人说许多的人「心蒙脂油」，意思是他们不明白神话语的宝贵，以致没有走在真道和善道上。然而，诗人却不同，他喜爱神的话语！\n　　\n神如何使诗人喜爱祂的话语，胜于千万的金银呢？透过经文，诗人表示，就是借由受苦！在第67节，诗人提到自己因为走迷了路而受苦，以致如今他更加珍爱神的话语！亲爱的弟兄姊妹，但愿我们因著偏行己路而受苦时，都能借此更深看见神话语的良善和真实，好能和诗人一样向主献上感恩：「我受苦是于我有益，为要使我学习祢的律例」（参67节）！\n\n回应：主啊！愿我喜爱祢的话语，胜过千万金银！求祢借由祢的话语，天天喂养我的生命，让我知道如何行在真理中，讨祢的喜悦！奉主的名求，阿们！\n\n祷读：诗篇一一九篇72节\n祢口中的训言与我有益，胜于千万的金银。\n\nQT: 诗篇一百一十九篇65~72节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "65 耶和华啊，你向来是照你的话善待仆人。\n66 求你将精明和知识赐给我，因我信了你的命令。\n67 我未受苦以先走迷了路，现在却遵守你的话。\n68 你本为善，所行的也善；求你将你的律例教训我！\n69 骄傲人编造谎言攻击我，我却要一心守你的训词。\n70 他们心蒙脂油，我却喜爱你的律法。\n71 我受苦是与我有益，为要使我学习你的律例。\n72 你口中的训言〔或作“律法”〕与我有益，胜于千万的金银。"}, "8-26": {"theme": "成为有影响力的人", "scripture": "诗篇一百一十九篇73~80节", "url": "https://www.youtube.com/watch?v=irsi3TXQM2s&list=PLgFvTLP0QRDueudvaUg4OVhgrgf_GRzmi&index=16", "videoId": "irsi3TXQM2s", "date_cn": "26/8/26(三)", "description": "主题：成为有影响力的人\n经文：诗篇一百一十九篇73~80节\n　　\n我们都是神按照祂的计划被创造的，而且祂要不断建造我们的生命！可是，祂建造我们生命的目的是什么呢？\n\n第74节写道：「敬畏祢的人见我就要欢喜」，而第79节又提到：「愿敬畏祢的人归向我」。可见，神建造我们的生命，是为了让我们对别人的生命，产生影响力！让我们从这一段经文来思想，如何成为有影响力的人！\n　　\n藉著神的话：在第73节，诗人写道：「祢的手制造我，建立我；求祢赐我悟性，可以学习祢的命令！」感谢主！总是藉著祂的话语来建造我们。祂要借由祂的话语，使我们的「旧人」转化成为「新人」，使我们的思想、价值观和性情，都越来越像祂！\n\n藉著环境：保罗在罗马书中写道：「我们晓得万事都互相效力，叫爱神的人得益处」（参罗八28）。他所指的「益处」是什么呢？就是叫我们「效法神儿子的模样」（参罗八29）！可见，神要藉著我们所遇见的每一件事情，建造我们的生命！\n\n藉著「受苦」而被神管教：「主所爱的，祂必管教」（参来十二6）！当诗人面临神的管教，他仍抱持学习的态度；如同在第75节，他提到：「祢使我受苦是以诚实待我」！他心里没有抱怨，而是省察自己，能更加紧紧倚靠神，并且顺服祂的话语！\n\n藉著「人」而得著熬炼：在第一百一十九篇中，诗人不断提到「人」带给他的痛苦（参23、51、61、69、78）。关于生命的建造，人际关系的确是很大的熬炼！然而，在第78节，诗人却写道：「但我要思想祢的训词」！他把这一切的问题都交给神，而他则是继续持守神的话语！ \n　　\n「愿我的心在祢的律例上完全，使我不致蒙羞。」（参80节）但愿我们都能在神给我们的考验中，坚守祂的话语，好让生命得著更扎实和坚固的建造，并能带给身边的人属灵的影响力！\n\n回应：主啊！祢创造我，是为了让我成为有影响力的人！这是何等大的荣耀，我感谢祢！愿祢亲自建造我的生命，好能完成祢对我的旨意！奉主的名求，阿们！\n\n祷读：诗篇一一九篇73节\n73 祢的手制造我，建立我；求祢赐我悟性，可以学习祢的命令！\nQT: 诗篇一百一十九篇73~80节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "73 你的手制造我，建立我；求你赐我悟性，可以学习你的命令！\n74 敬畏你的人见我就要欢喜，因我仰望你的话。\n75 耶和华啊，我知道你的判语是公义的；你使我受苦是以诚实待我。\n76 求你照着应许仆人的话，以慈爱安慰我。\n77 愿你的慈悲临到我，使我存活，因你的律法是我所喜爱的。\n78 愿骄傲人蒙羞，因为他们无理地倾覆我；但我要思想你的训词。\n79 愿敬畏你的人归向我，他们就知道你的法度。\n80 愿我的心在你的律例上完全，使我不致蒙羞。"}, "8-27": {"theme": "紧紧抓住神的话", "scripture": "诗篇一百一十九篇81~88节", "url": "https://www.youtube.com/watch?v=ow16Ycn-h94&list=PLgFvTLP0QRDueudvaUg4OVhgrgf_GRzmi&index=15", "videoId": "ow16Ycn-h94", "date_cn": "27/8/26(四)", "description": "主题：紧紧抓住神的话\n经文：诗篇一百一十九篇81~88节\n\n从第一百一十九篇经文中不断看见，诗人紧紧抓住神的话！但愿我们也能成为紧紧抓住神话语的人！让我们从这一段经文，来思想诗人如何紧紧抓住神的话。\n　\n在黑暗中紧紧抓住神的话：诗人不断提到，世人因为不跟从神的律法而逼迫他（参84~87节）！在第85节，诗人甚至提到，那些不从律法的人「为我掘了坑」！　\n\n亲爱的弟兄姊妹，世人知道我们是基督徒，因此想要逼迫我们，甚至利用我们对神的爱来为难我们！求主帮助我们如同诗人一样，对主说：「但我没有离弃祢的训词！」（参87节）虽然遵行神的话语并不容易，也充满挑战，但是，我们却能坚定相信：「祢的命令尽都诚实！」（参86节）　\n\n在苦难中紧紧抓住神的话：诗人在险恶与黑暗的环境中，以及许多逼迫他的人当中紧紧抓住神的话。他在痛苦、伤心及难过中，耐心等候神的话语带来的帮助和安慰！他不断提到，他「渴想」、「仰望」、「盼望」神的应许，到了一个地步，甚至「眼睛」失明（参81~82节），这表示他已经等候神，等候了许久！同样地，如同第83节提到，他等候神的话语，好像「烟薰的皮袋」！他认为自己好像一个挂在屋顶上的空酒袋，日子久了就变得又干又黑！这表示他觉得神的解救迟延，因此筋疲力竭！\n\n即便如此，诗人没有对神灰心，而是仍然相信，神必要透过祂的话语安慰和拯救他！亲爱的弟兄姊妹，让我们向诗人学习，无论是在黑暗或在苦难，都要渴想、仰望神的话语，因为「照著我所切慕、所盼望的，没有一事叫我羞愧。只要凡事放胆，无论是生是死，总叫基督在我身上照常显大」（参腓一20）！\n\n回应：主啊！无论环境如何艰难，我都要紧紧抓住祢的话语！求祢赐给我勇气和信心，天天仰望祢！奉主的名求，阿们！\n \n祷读：以赛亚书四十章8节　\n草必枯干，花必凋残，惟有我们神的话必永远立定。\nQT: 诗篇一百一十九篇81~88节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "81 我心渴想你的救恩，仰望你的应许。\n82 我因盼望你的应许眼睛失明，说：你何时安慰我？\n83 我好像烟熏的皮袋，却不忘记你的律例。\n84 你仆人的年日有多少呢？你几时向逼迫我的人施行审判呢？\n85 不从你律法的骄傲人为我掘了坑。\n86 你的命令尽都诚实；他们无理地逼迫我，求你帮助我！\n87 他们几乎把我从世上灭绝，但我没有离弃你的训词。\n88 求你照你的慈爱将我救活，我就遵守你口中的法度。"}, "8-28": {"theme": "生命的曙光", "scripture": "诗篇一百一十九篇89~96节", "url": "https://www.youtube.com/watch?v=7nxu9ehl2og&list=PLgFvTLP0QRDueudvaUg4OVhgrgf_GRzmi&index=14", "videoId": "7nxu9ehl2og", "date_cn": "28/8/26(五)", "description": "主题：生命的曙光\n经文：诗篇一百一十九篇89~96节\n\n在第92节，诗人写道：「我若不是喜爱祢的律法，早就在苦难中灭绝了！」苦难除了让人受伤、绝望，对于别人的错待和自己的前途感到沮丧、迷惘之外，甚至会对生命的喜乐与成长失去盼望。因此，当诗人经历世上诸多苦难之后，有感而发说：「我看万事尽都有限！」（参96节）\n\n然而，虽然苦难所带来的影响极大，却无法动摇信靠神的人！诗人告诉我们─神的话是黑夜的曙光，带领我们出黑暗入光明！如同第92、93节所说，诗人喜爱「神的话」，就不会被苦难打倒！感谢主！祂的话语使我们得著面对苦难的力量及盼望！神的话为何是苦难中的力量和盼望呢？\n\n苦难中的力量：从神的话语中，可以认识神是「信实的」（参90节）、「坚定的」（参90节），又是「大能的」神（参91节）；天地都在祂的掌管之下，万物都是祂的仆役！（参91节）没有任何事能够脱离神的掌权范围！神爱我们，因此祂所允许的苦难临到我们，必然有祂的美意！让我们学习诗人，在苦难中看见神是「信实的」、「坚定的」，是「大能的」神；因此，我们能够藉著祂的话，得著面对苦难的力量！\n\n苦难中的盼望：当我们落入苦难，神会不断藉著祂的话语，启示祂的同在与帮助，使我们知道苦难之后，必有盼望！感谢主！祂是赐盼望的神！只要跟随祂，与祂同行，必有勇气面对苦难！\n\n无论面对什么苦难，神的话是我们的力量；祂的话能将我们救活（参93节），藉著神话语中的应许，我们必得拯救！感谢主！\n\n亲爱的弟兄姊妹，若我们落入苦难，求主帮助我们选择不定睛在苦难上，不倚靠自己的聪明。让我们「喜爱」神的话（参92节）、「不忘记」神的话（参93节）、「寻求」神的话（参94节）、「揣摩」神的话（参95节）；更深地渴慕与神同行，靠神胜过人生中所有的苦难！\n\n祷读：诗篇一一九篇89节\n耶和华啊，祢的话安定在天，直到永远。\nQT: 诗篇一百一十九篇89~96节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "89 耶和华啊，你的话安定在天，直到永远。\n90 你的诚实存到万代；你坚定了地，地就长存。\n91 天地照你的安排存到今日；万物都是你的仆役。\n92 我若不是喜爱你的律法，早就在苦难中灭绝了！\n93 我永不忘记你的训词，因你用这训词将我救活了。\n94 我是属你的，求你救我，因我寻求了你的训词。\n95 恶人等待我，要灭绝我，我却要揣摩你的法度。\n96 我看万事尽都有限，惟有你的命令极其宽广。"}, "8-29": {"theme": "神宝贵的话语", "scripture": "诗篇一百一十九篇97~104节", "url": "https://www.youtube.com/watch?v=7xX38cwJ41Y&list=PLgFvTLP0QRDueudvaUg4OVhgrgf_GRzmi&index=13", "videoId": "7xX38cwJ41Y", "date_cn": "29/8/26(六)", "description": "主题：神宝贵的话语\n经文：诗篇一百一十九篇97~104节\n\n感谢主，祂的话何等宝贵！从这一段经文思想，如何得著神话语中宝贵的启示?\n　　\n「爱慕」神的话：诗人首先强调，要爱慕神的话！因此，在第97节，诗人说：「我何等爱慕祢的律法」；在第103节，他又说：「祢的言语在我上膛何等甘美，在我口中比蜜更甜！」我们从神的话经历祂的爱、祂应许的福分、祂赐下的安慰，并且领受奇妙的真理和美好的教训，真是觉得无比甘甜！\n\n「默想」神的话：在第97节，诗人提到他「终日不住地思想」神的话语！而在第99节，他又提到：「我比我的师傅更通达，因我思想祢的法度」！当我们愿意认真思想神的话语，就能更明白祂的心意。但愿我们时常默想神的话，领受祂话语的奇妙！\n\n「存记」神的话：在第98节，诗人写道：「祢的命令常存在我心里，使我比仇敌有智慧。」我们应当把神的话存记在心里，若是面临恶者的试探，就能以神的话来抵挡！正如耶稣在旷野面对撒但的试探，由于祂将神的道存记在心，就能以属神的智慧战胜撒但！但愿我们也能存记、使用神的话，经历基督的得胜！\n\n「遵行」神的话：本篇出现最多的词，就是「遵行」！遵行神道的人，才是真明白神道的人。在第100节，诗人写道：「我比年老的更明白，因我守了祢的训词。」许多人信主很久，听道无数，也很熟悉圣经；可是，如果没有认真行道，就仍不明白神的旨意！因为只有认真行道的人，才会发现神的道不但是可信的，也是可行的！\n\n亲爱的弟兄姊妹，但愿我们都因著爱慕、默想、存记及遵行神的道，而能真正明白，并经历神奇妙的道！\n\n回应：主啊！求赐下渴慕祢话语的心，并且使我能够认真默想、存记，并且遵行祢的道！奉主的名求，阿们！\n\n祷读：诗篇一百一十九篇97节\n我何等爱慕祢的律法，终日不住地思想。　\n\n\nQT: 诗篇一百一十九篇97~104节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "97 我何等爱慕你的律法，终日不住地思想。\n98 你的命令常存在我心里，使我比仇敌有智慧。\n99 我比我的师傅更通达，因我思想你的法度。\n100 我比年老的更明白，因我守了你的训词。\n101 我禁止我脚走一切的邪路，为要遵守你的话。\n102 我没有偏离你的典章，因为你教训了我。\n103 你的言语在我上膛何等甘美，在我口中比蜜更甜！\n104 我借着你的训词得以明白，所以我恨一切的假道。"}, "8-30": {"theme": "生命之光", "scripture": "诗篇一百一十九篇105~112节", "url": "https://www.youtube.com/watch?v=4lAhOdREuH4&list=PLgFvTLP0QRDueudvaUg4OVhgrgf_GRzmi&index=12", "videoId": "4lAhOdREuH4", "date_cn": "30/8/26(日)", "description": "主题：生命之光\n经文：诗篇一百一十九篇105~112节\n\n人生的道路上，有两种处于「黑暗」的情况需要「光」。一种是遇见「试炼」，前面道路崎岖，黑暗又看不清楚，所以需要光；如同诗人在第107节提到「我甚是受苦」，他表明自己在「试炼的黑暗」中。另外一个黑暗是「试探」。在第109节，诗人提到「我的性命常在危险之中」，而在第110节，他又提到「恶人为我设下网罗」。当我们人生的道路上充满危险和网罗，我们就需要光！ \n　　\n而在第105节，诗人写道：「祢的话是我脚前的灯，是我路上的光。」神的话如何成为我们生命的光呢？\n\n神的话是「试炼」中的光：本诗篇中，诗人不断地提到神的话能把人救活（参25、50、93节），而在第107节，诗人也再次提到，他相信神的话能把他救活！感谢主！唯有祂的话能赐给我们信心和勇气，面对困难与挑战！\n\n此外，诗人值得我们学习的地方，是在第108节，他提到自己虽然身处苦难，却仍然献上「赞美」为「供物」！这表示即便受苦，却仍以赞美来表明他对神的信心！你正处在艰难的光景中吗？让我们学习诗人的榜样，向神献上赞美，求神提升我们的信心，在祂的话语里得著生命的真光！\n\n神的话是「试探」中的光：在第109、110节，诗人不断地提到，他相信只有行在神的话语中，才不会落入危险及网罗。我们能不能胜过试探的关键，在于我们如何对待神的话语。诗人能够胜过试探，在于他「喜爱」神的话语（参111节）。因此，让我们喜爱，并且像诗人一样坚定遵行神的话！\n\n在第106节，诗人提到他曾经「起誓遵守」神的话，而且他「按誓」遵行神的话！在第112节，诗人又提到，他要「永远遵行，一直到底」！当诗人提到他「按誓」遵行神的话，代表他极度「看重」并且「决心」遵行神的话！亲爱的弟兄姊妹，我们是否也愿意「按誓」遵行神的话呢？愿主赐给我们遵行祂话语的决心，借由祂的话语引领我们经历得胜！\n\n回应：主啊！祢的话是我脚前的灯，路上的光！求祢帮助我坚定聆听、遵行祢的话，好能成为讨祢喜悦的儿女！奉主的名求，阿们！\n\n祷读：诗篇一一九篇111节\n我以祢的法度为永远的产业，因这是我心中所喜爱的。\nQT: 诗篇一百一十九篇105~112节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，
