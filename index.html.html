的人生智慧，在婚姻、家庭、人际关系和职场上凡事顺利！因此，只要我们像诗人一样，「一心」谨守遵行神的话语（参第129节），就必经历祂话语的奇妙！\n　　\n在第133节，诗人看见神的话语大有能力！诗人提到，神的话语能使我们的脚步稳当，以致罪孽无法辖制我们！感谢主！祂的话语引导我们走向真理，与世人以为正的死亡之路截然不同！唯独遵行神的真理，才能不被罪孽辖制！因此，让我们认真学习，并且遵行神奇妙、大能的话语，一生蒙福！\n\n从第136节，我们看见诗人不仅表达自己对神话语的渴慕，他也非常渴望神如此奇妙、大有能力的话语，能被更多的人遵守！甚至为著人们没有遵行神的话语，而「泪流成河」！他深切明白，人若不遵行神的话语，就必落在被恶者愚弄、被罪孽辖制的光景中！亲爱的弟兄姐妹，让我们迫切地传扬、教导真理，并为周遭的人祷告，求主引领我们遵行祂的话，享受祂的祝福！\n\n回应：主啊！求祢使我深深切慕、领受、遵行祢的话语，并且积极传扬，带领更多人归向祢，经历祢话语的奇妙和恩典！奉主的名求，阿们！\n\n祷读：诗篇一一九篇129节\n祢的法度奇妙，所以我一心谨守。\nQT: 诗篇一百一十九篇129~136节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "129 你的法度奇妙，所以我一心谨守。\n130 你的言语一解开就发出亮光，使愚人通达。\n131 我张口而气喘，因我切慕你的命令。\n132 求你转向我，怜悯我，好像你素常待那些爱你名的人。\n133 求你用你的话使我脚步稳当，不许什么罪孽辖制我。\n134 求你救我脱离人的欺压，我要遵守你的训词。\n135 求你用脸光照仆人，又将你的律例教训我。\n136 我的眼泪下流成河，因为他们不守你的律法。"}, "9-3": {"theme": "活命之道", "scripture": "诗篇一百一十九篇137~144节", "url": "https://www.youtube.com/watch?v=ogJzcMhnoWs&list=PLgFvTLP0QRDueudvaUg4OVhgrgf_GRzmi&index=8", "videoId": "ogJzcMhnoWs", "date_cn": "3/9/26(四)", "description": "主题：活命之道\n经文：诗篇一百一十九篇137~144节\n\n在第一百一十九篇中，诗人提到，神的话使他在遭遇患难时，得以「活命」！而在第144节，诗人再次提到：「求祢赐我悟性，我就活了」。诗人求主让他明白神的话语，因为他知道──只要紧紧抓住神的话，就能看见活命之路！越是艰难、困苦的环境，越让他「喜爱」神的话（参第143节）！\n\n诗人认为，患难中更要紧紧抓住神的话，因为他知道神的话语有两个特性：\n\n神的话是「公义的」：诗人不断提到，神的话是「公义的」、是「正直的」（参第137、138、142、144节）。他相信只要遵行神的话，谨守神的公义和信实，神必定会赐福给他，使他从苦境中转回！所以，他虽然落在艰难中，却没有离弃神的话，反而更加认真遵行神的话！\n\n神的话语是公义的，祂必定赐福遵行祂话语的人，因神是公义、正直的，所以诗人在第139节提到，当他看见别人忘记神的话，他的内心就焦急，如同火烧！他深知神按照公义和正直判断人，若人忘记神的话，就必落入黑暗的光景中。\n\n神的话是「真实的」、是「至诚的」（参第138、142节）：神的话不仅是公义、正直的，也是「真实」和「至诚」的！因此，祂的应许必然要实现在遵行祂话语的人身上！此外，在第140节，诗人提到他喜爱神的话，是因为神的话「极其精炼」，也就是神的话是经过考验的！历世历代许多圣徒告诉我们，神的话语都是「是」的，都是「阿们」的！诗人也说，神的话语不仅是「公义」的，而且是「永远都是公义」的，他愿意将自己交托在神真实、可靠的话语中！\n\n亲爱的弟兄姐妹，神的话何等宝贵！让我们倚靠圣灵，更深地进入神的话语中，经历祂全然的爱与能力！\n \n回应：主啊！我喜爱祢的话语！求祢点燃我内心对祢话语的渴慕，天天活在祢话语的权能之下！奉主的名求，阿们！\n\n祷读：诗篇一一九篇144节\n祢的法度永远是公义的；求祢赐我悟性，我就活了。\nQT: 诗篇一百一十九篇137~144节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "137 耶和华啊，你是公义的；你的判语也是正直的！\n138 你所命定的法度是凭公义和至诚。\n139 我心焦急，如同火烧，因我敌人忘记你的言语。\n140 你的话极其精炼，所以你的仆人喜爱。\n141 我微小，被人藐视，却不忘记你的训词。\n142 你的公义永远长存；你的律法尽都真实。\n143 我遭遇患难愁苦，你的命令却是我所喜爱的。\n144 你的法度永远是公义的；求你赐我悟性，我就活了。"}, "9-4": {"theme": "我要遵守祢的法度", "scripture": "诗篇一百一十九篇145~152节", "url": "https://www.youtube.com/watch?v=z4uY-63nLMU&list=PLgFvTLP0QRDueudvaUg4OVhgrgf_GRzmi&index=7", "videoId": "z4uY-63nLMU", "date_cn": "4/9/26(五)", "description": "主题：我要遵守祢的法度\n经文：诗篇一百一十九篇145~152节\n\n在第145至146节，诗人不断向神发出「呼吁」，如同心中的「呐喊」，向神表明心中的迫切及渴望！亲爱的弟兄姐妹，你内心的呐喊是什么呢？诗人向神呐喊：「我要遵守祢的法度」！一方面，诗人向神表明心中的渴望；另一方面，他十分清楚，人需要在神的帮助下，才能完全遵守神的法度！\n\n诗人深刻了解，完全遵守神的法度会面临许多挑战，如同第150节提到：「追求奸恶的人临近了」！当我们渴望遵守神的法度，逼迫、诱惑等恶事纷沓而至；导致我们容易陷入软弱，无法遵守神的法度。遇到这样的情况，我们要学习诗人向神呼求：「我向祢呼吁，求祢救我！我要遵守祢的法度。」（参146节）感谢主！当我们迫切地将生命的真实光景带到神面前，祂必定帮助我们！\n  \n另外，我们看见诗人不仅认真「呼求」神，也很认真「追求」神！在第147至148节，他如此说：「我趁天未亮呼求；我仰望了祢的言语。我趁夜更未换将眼睁开，为要思想祢的话语。」亲爱的弟兄姊妹，神必帮助那些渴慕及主动追求祂的人！因此，让我们认真安排灵修的时间，并且能够早起读经！\n　　\n在第151节，诗人这样祷告：「耶和华啊，祢与我相近」。我们越靠近神，就越能远离罪恶！在第149、151、152节，诗人认真追求神，是因为他明白神话语的好处及重要；神的话不仅能把人救活（参149节），而且「尽都真实」（参151节）！世上的情欲尽都虚空，唯有神的话语是真实、可靠的！感谢主！祂的话「永远立定」（参152节）！\n\n回应：主啊，我要遵行祢的法度！因为祢的法度尽都真实、永远立定！求祢帮助我渴慕祢的话，并且认真遵行，直到见祢面的那一天！奉主的名求，阿们！\n\n祷读：诗篇一一九篇152节\n我因学祢的法度，久已知道是祢永远立定的。\n\nQT: 诗篇一百一十九篇145~152节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 75节，诗人求主让他「经历」神话语的能力，例如在他落入危难时能搭救他（参170节）！亲爱的弟兄姐妹，这也应当是我们的祷告！求主让我们更加经历祂话语的大能，好让祂的名得著荣耀！\n\n最后，诗人在第176节向主求：虽然他如此认定、领受神的话话，但是知道自己非常软弱，容易「如亡羊走迷了路」！因此，他求神一定要「寻找」他，不要放弃他！\n\n在这一篇诗篇的结尾，诗人不仅献上他神圣的心愿，也更加仰望、倚靠神的慈爱与恩典！但愿他对神的谦卑、委身与认定，成为我们一生学习的榜样！\n\n回应：主啊！求祢掌管我的心思意念，赐给我悟性，好让我能够更加经历和赞美祢的话语！奉主的名求，阿们！\n\n祷读：诗篇一四五篇19节\n敬畏祂的，祂必成就他们的心愿，也必听他们的呼求，拯救他们。\n\nQT: 诗篇一百一十九篇169~176节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "169 耶和华啊，愿我的呼吁达到你面前，照你的话赐我悟性。\n170 愿我的恳求达到你面前，照你的话搭救我。\n171 愿我的嘴发出赞美的话，因为你将律例教训我。\n172 愿我的舌头歌唱你的话，因你一切的命令尽都公义。\n173 愿你用手帮助我，因我拣选了你的训词。\n174 耶和华啊，我切慕你的救恩！你的律法也是我所喜爱的。\n175 愿我的性命存活，得以赞美你！愿你的典章帮助我！\n176 我如亡羊走迷了路，求你寻找仆人，因我不忘记你的命令。"}, "9-8": {"theme": "脱离不敬畏神之民", "scripture": "诗篇一百二十篇1~7节", "url": "https://www.youtube.com/watch?v=irTtw3PEmAk&list=PLgFvTLP0QRDueudvaUg4OVhgrgf_GRzmi&index=3", "videoId": "irTtw3PEmAk", "date_cn": "8/9/26(二)", "description": "经文：诗篇一百二十篇1~7节\n主题：脱离不敬畏神之民\n \n从第一百二十至一百三十四篇，这十五篇诗篇中每一篇的标题，都是「上行之诗」。什么是上行之诗？圣经学者对此看法不一，不过大部分学者认为，这十五篇诗篇可能是犹太人经历被掳、归回以后，在每一年的三大节期上锡安崇拜时，经常采用的「朝圣」之诗。因此，这十五篇诗篇除了充满朝圣的精神，也将百姓历经被掳及归回的心情描述出来。\n\n在第一百二十篇中，诗人提到自己处在不敬畏神的人当中（参5节），以致他的心灵极其痛苦；因为他们充满「说谎的嘴唇和诡诈的舌头」（参2节），又恨恶和睦、喜爱争战（参6~7节）。诗人与他们同住许久，内心就深感痛苦！因此，在第1至2节，他求神拯救他，脱离这样的患难！　\n\n亲爱的弟兄姐妹，如今我们是否也和诗人一样，处于类似光景呢？我们或许也曾是充满说谎和诡诈的人，又恨恶和睦、喜爱争战；但是，遇见主之后，就知道祂不喜悦我们这样，而是喜悦我们寻求和睦。因此，当人不听从神的话，而我们必须在这些不敬畏神的人当中时，想必会如同诗人深感痛苦！这时，就应当学习诗人，来到主的面前承认自己的痛苦，求祂赐与智慧，能够在这些人当中为主作见证！\n\n另外，我们也需要心怀儆醒，不要因为处于不敬畏神的环境，自己的生命也和不敬畏神的人一样！让我们时常认真省察，自己是否也有「说谎的嘴唇和诡诈的舌头」呢（参2节）？在第4节，诗人强调神恨恶说谎和诡诈，所以祂要用勇士的利箭，和最耐烧的罗腾木所燃烧出来的炭火，来刑罚他们！ \n\n亲爱的弟兄姐妹，求主让我们勒住自己的舌头（参雅一26），并且好好省察自己，是否也成了恨恶和睦、喜爱争战的人呢？许多人即便信主多年，却因喜爱妒忌、纷争、不愿意饶恕，心中仍充满苦毒和怒气！求主光照我们，并且从我们心中除去这一切不讨神喜悦的意念，好能为祂作见证！\n\n回应：主啊！我愿意努力寻求与人和睦，好让祢的名在外邦中得荣耀！求祢保守我的口舌，诉说敬畏祢的智慧！奉主的名求，阿们！\n\n祷读：彼得前书三章10~11节\n10 因为经上说：「人若爱生命，愿享美福，须要禁止舌头不出恶言，嘴唇不说诡诈的话；\n11 也要离恶行善，寻求和睦，一心追赶。」\nQT: 诗篇一百二十篇1~7节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔上行〔或作登阶下同〕我在急难中求告耶和华，他就应允我。\n2 耶和华啊，求你救我脱离说谎的嘴唇和诡诈的舌头！\n3 诡诈的舌头啊，要给你什么呢？要拿什么加给你呢？\n4 就是勇士的利箭和罗腾木的炭火〔“罗腾”，小树名，松类。〕。\n5 我寄居在米设，住在基达帐棚之中，有祸了！\n6 我与那恨恶和睦的人许久同住。\n7 我愿和睦，但我发言，他们就要争战。"}, "9-9": {"theme": "耶和华是我的帮助", "scripture": "诗篇一百二十一篇1~8节", "url": "https://www.youtube.com/watch?v=CbZfoTAmUVw&list=PLgFvTLP0QRDueudvaUg4OVhgrgf_GRzmi&index=2", "videoId": "CbZfoTAmUVw", "date_cn": "9/9/26(三)", "description": "经文：诗篇一百二十一篇1~8节\n主题：耶和华是我的帮助\n\n在第1节，诗人问自己：「我要向山举目；我的帮助从何而来？」而在下一节，他斩钉截铁地回答：「我的帮助是从造天地的耶和华而来。」诗人非常清楚，只有耶和华是他的「靠山」！亲爱的弟兄姐妹，但愿我们也能时常大声地告诉自己：「我的帮助是从造天地的耶和华而来。」\n\n让我们透过这一篇诗篇，来思想为什么耶和华是我们最大、也是唯一的靠山和帮助：\n\n在第2节，诗人提到耶和华是「造天地的耶和华」。感谢主！我们所倚靠的神是创造天地的神！因此，在祂没有难成的事！在我们的生命中，没有任何难处大过祂！亲爱的弟兄姐妹，我们再次向一切难处宣告：「我的帮助是从造天地的耶和华而来！神必帮助我胜过一切的问题！」\n\n在第3、4节，诗人提到耶和华是「不打盹、不睡觉」的神！世上的人再有能力，也都需要打盹和睡觉。因此，只有这一位眼目永远看顾保守我们的神，才是最大的帮助和倚靠！倘若没有祂的允许，我们连一根头发都不会掉在地上（参路二十一18）！让我们将自己的生命，安心地交托给神吧！\n\n在第5节，诗人提到耶和华是「与我们同在」的神。祂不是远在天边，而是无论我们在哪里，都与我们同在，时刻保护我们的神！！因此，在第6节，诗人写道：不论是白日的太阳、或者是夜间的月亮，都不能伤害我们；而第7节提到，一切的灾害也不能靠近我们，因为神与我们同在。感谢主！亲爱的弟兄姐妹，让我们刚强壮胆面对每一天所遇见的人、事、物，因为神与我们同在！\n\n在第8节，诗人提到耶和华对我们的保护，是「从今时直到永远」的。这世上一切的倚靠都会过去，也都会改变；唯有我们所倚靠的耶和华，祂要保护我们，「从今时直到永远」！感谢主！这是何等大的恩典！因此，让我们再次像诗人一样，大声地宣告：「我的帮助是从造天地的耶和华而来」！\n\n回应：主啊！谢谢祢成为我一生的倚靠！求祢使我在任何景况下，都能专心倚靠祢！奉主的名求，阿们！\n\n祷读：诗篇一二一篇1~2节\n1 我要向山举目；我的帮助从何而来？\n2 我的帮助从造天地的耶和华而来。\nQT: 诗篇一百二十一篇1~8节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT 续对焦在神的身上，并且向祂怀抱一颗谦卑、专注和坚持的心，相信时候到了，我们必从祂得著最真实的帮助！\n\n回应：主啊！求祢赐我一颗谦卑、专注和坚持的心，耐心仰望祢为我成就大事，并且向众人见证祢的荣耀！奉主的名求，阿们！\n祷读：诗篇一百二十三篇2节\n看哪，仆人的眼睛怎样望主人的手，使女的眼睛怎样望主母的手，我们的眼睛也照样望耶和华─我们的神，直到祂怜悯我们。\nQT: 诗篇一百二十三篇1~4节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔上行之诗。〕坐在天上的主啊，我向你举目。\n2 看哪，仆人的眼睛怎样望主人的手，使女的眼睛怎样望主母的手，我们的眼睛也照样望耶和华──我们的神，直到他怜悯我们。\n3 耶和华啊，求你怜悯我们，怜悯我们！因为我们被藐视，已到极处。\n4 我们被那些安逸人的讥诮和骄傲人的藐视，已到极处。"}, "9-12": {"theme": "倚靠造天地的耶和华", "scripture": "诗篇一百二十四篇1~8节", "url": "https://www.youtube.com/watch?v=odQjUl2CvUg&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=30", "videoId": "odQjUl2CvUg", "date_cn": "12/9/26(六)", "description": "经文：诗篇一百二十四篇1~8节\n主题：倚靠造天地的耶和华\n\n在第4、5节，诗人提到自己正在面对许多艰难问题，而这些艰难好像「狂傲的水」，快要将他淹没！而在第6、7节，诗人也让我们看见，他的仇敌一直在追赶他和属他的人。他们好像猎物一样遭受危险，落在敌人设计的网罗中！\n\n亲爱的弟兄姐妹，你是否也和诗人处在类似的景况呢？你的生命是否也出现许多的问题，也许是婚姻、亲子关系、经济难关或是罪的问题，而这些困境好像也快要将你淹没了呢？你是否也身陷问题的网罗，却发现靠自己努力，总是挣脱不了呢？而这样的痛苦，诗人也曾经历过。\n\n在第7节，我们发现诗人开心地提到─网罗破裂了！他终于逃脱了！他是如何逃脱的呢？在第1、2节，诗人以感恩的心，两次提到「若不是耶和华帮助我们」，他早就被这些苦难淹没了！他早就被仇敌吞吃了！诗人一直强调「若不是耶和华帮助」，也许是因为他曾经倚靠自己的力量，想要挣脱敌人的网罗，却总是挣脱不了，因此，他深刻体会，当他专心倚靠造天地的耶和华，果然得著神的帮助，使仇敌的网罗破裂，他得以逃脱！\n\n亲爱的弟兄姐妹，你是否也仍然倚靠自己的力量，努力挣脱一些艰难问题呢？那些问题是否快要把你淹没了，导致你一直定睛在问题上，没有来到神的面前亲近祂呢？你是否因为忙著寻找别人的帮助，而没有时间来寻求神呢？诗人如此写道：「我们得帮助，是在乎倚靠造天地之耶和华的名。」（参8节）感谢主！当我们专心来寻求神，这一位全能的造物主，必要在我们身上施行奇妙的事，以致我们也能如同诗人一样，雀跃地向众人作见证：「耶和华是应当称颂的」（参6节）！\n\n回应：主啊！我感谢祢！无论我的问题有多大，都不能大过祢！求祢使我专心倚靠祢，直到看见祢的荣耀！奉主的名求，阿们！\n\n祷读：诗篇一百二十四篇8节\n我们得帮助，是在乎倚靠造天地之耶和华的名。\n\nQT: 诗篇一百二十四篇1~8节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔大卫上行之诗。〕以色列人要说：若不是耶和华帮助我们，\n2 若不是耶和华帮助我们，当人起来攻击我们、\n3 向我们发怒的时候，就把我们活活地吞了。\n4 那时，波涛必漫过我们，河水必淹没我们，\n5 狂傲的水必淹没我们。\n6 耶和华是应当称颂的！他没有把我们当野食交给他们吞吃〔原文作“牙齿”〕。\n7 我们好像雀鸟，从捕鸟人的网罗里逃脱；网罗破裂，我们逃脱了。\n8 我们得帮助，是在乎倚靠造天地之耶和华的名。"}, "9-13": {"theme": "永不动摇", "scripture": "诗篇一百二十五篇1~5节", "url": "https://www.youtube.com/watch?v=p6DC0w2q-eg&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=29", "videoId": "p6DC0w2q-eg", "date_cn": "13/9/26(日)", "description": "经文：诗篇一百二十五篇1~5节\n主题：永不动摇\n\n在第1节，诗人提到：当我们倚靠耶和华，就会像山一样「永不动摇」。许多诱惑、苦难、试炼，或是来自魔鬼的试探，都会动摇我们心里的平安、喜乐，甚至是对神的爱！然而，感谢主！神应许我们，只要倚靠祂，就永不动摇！\n\n在第2节，诗人告诉我们，倚靠耶和华的人可以永不动摇，是因为耶和华如同众山一样，围绕我们！「山」是坚固、安全、「永不动摇」的象征！感谢主！我们若能「永不动摇」，是因为祂的能力、慈爱、信实及公义，是「永不动摇」的；而且祂要围绕我们，「从今时直到永远」（参2节）！因此，不论是世界、撒但、苦难、试炼、试探、罪恶或疾病，都不能动摇我们的信心、平安及喜乐！\n\n在第3至5节，诗人特别求神保守我们脱离试炼。如同第3节所提到的，信靠神的义人，还是可能遭受恶人的伤害，以致「动摇」。因此，诗人求主保守我们，不要因为受到恶人的苦待而「动摇」！另外，诗人也劝勉我们，面对从恶人来的伤害，要相信神的公义永不动摇！祂允许恶人暂时迫害义人，是为著要叫属神的人得益处，但祂必为义人伸冤！\n\n亲爱的弟兄姐妹，你是否正面对一些不公平的对待，或从人来的伤害呢？你要记得，不要因而「伸手作恶」（参3节），也不要因而心生苦毒！只要继续「为善」、「心里正直」（参4节），并且相信那一位「公义永不动摇」的神，必要补偿我们，将祂的公义带进我们的生命中！\n\n在本诗篇的结尾，诗人写道：「愿平安归于以色列」（参5节）！感谢主！无论发生什么样的事，神都与我们同在，平安必定属于我们！\n\n回应：主啊，谢谢祢时刻环绕我！不论我遭遇什么事，我要选择信靠祢！求主保守我，对祢的信心永不动摇！奉主的名求，阿们！\n\n祷读：诗篇一百二十五篇1~2节\n倚靠耶和华的人好像锡安山，永不动摇。众山怎样围绕耶路撒冷，耶和华也照样围绕祂的百姓，从今时直到永远。\n\nQT: 诗篇一百二十五篇1~5节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔上行之诗。〕倚靠耶和华的人好像锡安山，永不动摇。\n2 众山怎样围绕耶路撒冷，耶和华也照样围绕他的百姓，从今时直到永远。\n3 恶人的杖不常落在义人的分上，免得义人伸手作恶。\n4 耶和华啊，求你善待那些为善和心里正直的人。\n5 至于那偏行弯曲道路的人，耶和华必使他和作恶的人一同出去受刑。愿平安归于以色列！"}, "9-14": {"theme": "收割的人", "scripture": "诗篇一百二十六篇1~6节", "url": "https://www.youtube.com/watch?v=Hf7Dos3_ej8&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=28", "videoId": "Hf7Dos3_ej8", "date_cn": "14/9/26(一)", "description": "经文：诗篇一百二十六篇1~6节\n主题：收割的人\n\n在第5、6节，诗人提到了「欢呼收割」的概念。每一个基督徒和教会都期望经历「属灵的丰收」，看见更多人得救！今天，让我们从这一段经文来思想，什么样的人能够成为「收割的人」？\n\n有负担的人：一个基督徒若对福音禾场有负担，期盼收割季节早日来到，就必须明白收割的对象乃是「被掳的」（参1、4节），因为福音是他们最大的需要！人们需要主！\n\n此外，对灵魂有负担的人，必须认同传福音是我们「最大的喜乐」！在这一段经文中，最常出现的词汇就是「欢呼」、「欢乐」（参2、3、5、6节）。要获得满足的喜乐，就必须往外传福音，不能让自己的脚步停留在教会里面！另外，传福音是我们「最大的荣耀」，如同第2节提到的，当我们中间不断有人得救、加入教会，世人就必看见我们所信的这一位神，是真神；因为一个生命得救，就是神迹！\n\n做梦的人：第1至4节，诗人在被掳的人归回以前，就先做了这样的梦。所有被神使用的人，都是有梦的人！亲爱的弟兄姐妹，千万不要满足于现况，要起来为主做梦！认真想像─我们的家人信主了，所关心的人信主了！我们的小组倍增了！想像你成为小组长、区长了！感谢主！神使用乐意为祂做梦的人！\n\n流泪的人：第5、6节，唯有「流泪撒种」，也就是流著泪、不断祷告、为著灵魂得救，心中感到迫切的人，才能「欢呼收割」！亲爱的弟兄姐妹，让我们一起为灵魂得救迫切祷告！\n\n撒种的人：第5、6节，一个收割的人，不仅有负担、会做梦、肯祷告，还要「出去撒种」，殷勤地传福音！所以，亲爱的弟兄姐妹，要勇敢地走出去，迈开传福音的步伐！因为我们拥有最美好的消息！要殷勤地走出去，不灰心地走出去！撒种是我们的责任，总有一天，神将使它发芽生长，并让我们欢呼收割！\n\n回应：主啊！我渴望看见祢把被掳的人，带回属于祢的国度！我愿意流泪撒种，并且和祢一同欢呼收割！奉主的名求，阿们！\n\n祷读：诗篇一百二十六篇5~6节\n流泪撒种的，必欢呼收割！那带种流泪出去的，必要欢欢乐乐地带禾捆回来！\n\nQT: 诗篇一百二十六篇1~6节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近 s://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔所罗门上行之诗。〕若不是耶和华建造房屋，建造的人就枉然劳力；若不是耶和华看守城池，看守的人就枉然警醒。\n2 你们清晨早起，夜晚安歇，吃劳碌得来的饭，本是枉然；惟有耶和华所亲爱的，必叫他安然睡觉。\n3 儿女是耶和华所赐的产业；所怀的胎是他所给的赏赐。\n4 少年时所生的儿女好像勇士手中的箭。\n5 箭袋充满的人便为有福；他们在城门口和仇敌说话的时候，必不至于羞愧。"}, "9-16": {"theme": "敬虔生活的福分", "scripture": "诗篇一百二十八篇1~6节", "url": "https://www.youtube.com/watch?v=v4fEUVwNAbE&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=26", "videoId": "v4fEUVwNAbE", "date_cn": "16/9/26(三)", "description": "经文：诗篇一百二十八篇1~6节\n主题：敬虔生活的福分\n\n在本诗篇起头，诗人提到，当人选择过敬虔生活，凡事遵行神的道，他就是有福的！而在第2至6节，诗人告诉我们，活出敬虔生活的人如何蒙福：\n\n「个人」必定蒙福（参2节）：当人活出敬虔的生活，他的工作会顺利，他一切辛苦劳碌的，都必蒙主的保守；换句话说，他会经历凡事顺利的福分！在圣经中，神不断应许：敬畏祂、遵行祂道的人，就必经验「凡他所做的尽都顺利！」他的工作、人际关系、一切与他有关的事情，都必经历从神而来的赐福！因此，让我们活出敬畏神、遵行祂道的生活，好能经历凡事兴盛的祝福！\n\n「家庭」必定蒙福（参2~3节）：诗人描写了一幅关于家庭的美好画面：妻子贤淑、儿女承欢、家庭生活一片祥和、喜乐、满有活力！并以第6节所提及：「愿你看见你儿女的儿女！」，臻至幸福家庭的极致。敬畏神的人，能够享受长寿、子孙满堂的福分！神乐意赐福给一个敬畏神的家庭，因为透过家庭的见证，可让世人看见，只要敬畏神就必蒙福，借此吸引他们来认识神！\n\n「神的国度」必定因他而蒙福：在第5节，诗人特别提到：「愿耶和华从锡安赐福给你！」当一个人敬畏神，他的心会与「锡安」，也就是新约时代的「教会」相连！而当神的教会蒙福，神的百姓也就一同蒙福！因此，若人活出真正敬虔的生活，他不会只关心自己或家庭是否蒙福，他会关心神的教会是否平安？是否有神的同在？是否兴旺？因为他知道，当他爱神的教会，他也必定蒙福！在第5节，诗人也提到，当我们敬畏神、爱神、遵行神的道，就必「一生一世看见耶路撒冷的好处」！\n\n感谢主！祂是如此乐意施恩在我们身上！但愿我们都能活出敬虔的生活，蒙神丰富的赐福，并成为祂美好的见证！\n\n回应：主啊！我愿意一生敬畏祢、遵行祢的道！求祢指教我活出真实的敬虔，承受祢的祝福，并且荣耀祢的名！奉主的名求，阿们！\n\n祷读：诗篇一百二十八篇1节\n凡敬畏耶和华、遵行祂道的人便为有福！\n\nQT: 诗篇一百二十八篇1~6节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔上行之诗。〕凡敬畏耶和华、遵行他道的人便为有福！\n2 你要吃劳碌得来的；你要享福，事情顺利。\n3 你妻子在你的内室，好像多结果子的葡萄树；你儿女围绕你的桌子，好像橄榄栽子。\n4 看哪，敬畏耶和华的人必要这样蒙福！\n5 愿耶和华从锡安赐福给你！愿你一生一世看见耶路撒冷的好处！\n6 愿你看见你儿女的儿女！愿平安归于以色列！"}, "9-17": {"theme": "耶和华总必得胜", "scripture": "诗篇一百二十九篇1~8节", "url": "https://www.youtube.com/watch?v=I1OPr8In2gs&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=25", "videoId": "I1OPr8In2gs", "date_cn": "17/9/26(四)", "description": "经文：诗篇一百二十九篇1~8节\n主题：耶和华终必得胜 \n\n在第1节，诗人提到以色列长久以来，遭到敌人的「苦害」。以色列人的历史，确实是一篇血泪史！最初他们在埃及作奴仆，后来到了迦南，也时常受到敌人的苦害！如同第3节所形容的，敌人像是在他们背上「扶犁而耕，耕的犁沟甚长」！之后，他们又好像被绳索捆到巴比伦，再度遭到敌国恶劣的对待。即便如此，诗人却认为敌人从来没有胜过他们（参2节）！这是为什么呢？\n\n如同第4节写道：「耶和华是公义的」，所以诗人相信，敌人一切的计谋，必定「像房顶上的草，未长成而枯干，收割的不够一把，捆禾的也不满怀」（参6~7节）。因为耶和华是公义的神！邪恶虽然可以暂时得胜，却终究无法抵挡神的公义！\n\n亲爱的弟兄姐妹，你是否也正在面对一些从人而来的苦害？让我们学习和诗人一样，相信耶和华是公义的神，祂必为我们砍断恶人的绳索（参4节）！尽管恶人的计谋暂时得逞，终必无法长成、收割！你是否愿意耐心等候神呢？但愿我们都能持续信靠神，相信神必得胜！\n\n在第5节中，诗人提到：「愿恨恶锡安的都蒙羞退后！」这是为什么呢？因为「锡安」是神所拣选的地方！锡安的民，是神的选民、神的宝贝、是神所爱的。诗人相信敌人无法胜过他，是因为他相信，既然锡安是神所爱、所宝贝的，因此「恨恶锡安」的人，就是「恨恶耶和华」！而神怎会让恨恶锡安的人，有机会得逞呢？\n\n亲爱的弟兄姐妹，即便我们落在苦难中，却依然能够保持对神的信心，是因为我们相信自己是神的儿女！而那些苦害我们、恨恶我们的人，就是恨恶耶和华，与神作对！神必定要败坏他们一切的计谋，使他们蒙羞退后，并且使我们荣耀得胜！感谢主！祂是得胜的君王！但愿我们天天经历属祂的得胜，对祂的信心一天比一天更加深刻！\n\n回应：主啊，祢是公义的神！我感谢祢！求祢在我的生命中完全掌权，使仇敌的计谋无法得逞，好让我经历祢的得胜！奉主的名求，阿们！\n\n祷读：诗篇一百二十九篇4~5节\n耶和华是公义的；祂砍断了恶人的绳索。愿恨恶锡安的都蒙羞退后！\n\nQT: 诗篇一百二十九篇1~8节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔上行之诗。〕以色列当说：从我幼年以来，敌人屡次苦害我，\n2 从我幼年以来，敌人屡次苦害我，却没有胜了我。\n3 如同扶犂的在我背上扶犂而耕，耕的犂沟甚长。\n4 耶和华是公义的；他砍断了恶人的绳索。\n5 愿恨恶锡安的都蒙羞退后！\n6 愿他们像房顶上的草，未长成而枯干，\n7 收割的不够一把，捆禾的也不满怀。\n8 过路的也不说：愿耶和华所赐的福归与你们！我们奉耶和华的名给你们祝福！"}, "9-18": {"theme": "深处的求告", "scripture": "诗篇一百三十篇1~8节", "url": "https://www.youtube.com/watch?v=OwZVWcnJ--k&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=24", "videoId": "OwZVWcnJ--k", "date_cn": "18/9/26(五)", "description": "经文：诗篇一百三十篇1~8节\n主题：深处的求告\n\n诗人如此向神祷告：「耶和华啊，我从深处向祢求告！」（参1节）诗人之所以提及「深处」，也许是因为他遭遇到了极大的痛苦、患难或是疾病。然而，他在这样的光景中，却没有绝望、也没有失去对主的信心，而是紧紧抓住神，呼求祂的拯救！\n\n亲爱的弟兄姐妹，当你处在痛苦的深处，你是自怨自艾、灰心绝望？还是像诗人一样，更加紧紧抓住神，在祂的面前求告祂呢？让我们从本诗篇，学习诗人如何在深处中呼求神。\n\n首先，我们从第3节看见，诗人面对各种困苦和患难，却没有责怪神，也没有责怪人，而是深切省察自己，谦卑反省自己的罪孽！诗人谦卑自省的态度，比起那些自以为义的人，更加讨神喜悦！亲爱的弟兄姐妹，但愿我们在面对苦难的时候，也能如同诗人的态度，先谦卑在神的面前寻求光照，察看生命中是否有得罪神、不讨神喜悦、亏欠人的地方，并且在祂的面前深切悔改！\n\n再来，我们从第4节看见，诗人在神的面前认罪之后，没有停留在罪恶感中，而是深深相信，在神有赦罪之恩！他靠著神的赦免，重新站立起来！今天，许多人看见自己的罪孽，却在神面前站立不住，甚至生命更加软弱、活在撒但的控告中，最终远离了神！亲爱的弟兄姐妹，我们真要看清楚撒但的诡计，并仰望神的赦罪之恩，重新站立起来！\n\n此外，我们从第4节看见，诗人经历神赦免的恩典之后，就变得更加敬畏神！他相信神赦免人的目的，不是要人更放纵自己，而是要更敬畏神、更爱神，以致愿意离弃罪恶！亲爱的弟兄姐妹，但愿我们除了感谢神的赦罪之恩，也要更加敬畏神、远离恶事，来讨祂喜悦！\n\n最后，我们从第5至7节看见，诗人对神不变的信心。他呼吁百姓，即便是在很深的患难中，也要持续仰望、等候神！他不断告诉百姓，不论环境如何险恶，神永远都「有慈爱，有丰盛的救恩」（参7节）！亲爱的弟兄姐妹，每当我们的生命面临黑夜的深处，让我们不断仰望、等候神，直到看见黎明的曙光！\n\n回应：主啊！不论我如今面对什么样的景况，我都要坚定仰望祢、等候祢！因为祢有慈爱、有丰盛的救恩！求祢记念我，使我领受祢的恩典！奉主的名求，阿们！\n \n祷读：诗篇一百三十篇5~6节\n我等候耶和华，我的心等候；我也仰望祂的话。我的心等候主，胜于守夜的，等候天亮，胜于守夜的，等候天亮。\n\nQT: 诗篇一百三十篇1~8节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔上行之诗。〕耶和华啊，我从深处向你求告！\n2 主啊，求你听我的声音！愿你侧耳听我恳求的声音！\n3 主──耶和华啊，你若究察罪孽，谁能站得住呢？\n4 但在你有赦免之恩，要叫人敬畏你。\n5 我等候耶和华，我的心等候；我也仰望他的话。\n6 我的心等候主，胜于守夜的，等候天亮，胜于守夜的，等候天亮。\n7 以色列啊，你当仰望耶和华！因他有慈爱，有丰盛的救恩。\n8 他必救赎以色列脱离一切的罪孽。"}, "9-19": {"theme": "平稳安静的心", "scripture": "诗篇一百三十一篇1~3节", "url": "https://www.youtube.com/watch?v=E2h_IXcKDQY&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=23", "videoId": "E2h_IXcKDQY", "date_cn": "19/9/26(六)", "description": "经文：诗篇一百三十一篇1~3节\n主题：平稳安静的心\n\n大卫写道：「我的心平稳安静」（参2节）。这样的心境，何等令人羡慕！今天，许多人内心忧闷、烦躁、不安，为著生活、工作、经济、人际关系、婚姻、亲子关系的冲突，而感到烦乱、愁苦，心中没有安息！然而，耶稣却告诉我们：「凡劳苦担重担的人可以到我这里来，我就使你们得安息」（参太十一28）！感谢主！唯独祂能使我们的心平静安稳！\n\n在第3节，我们看见大卫的平静安稳，是从仰望耶和华而来的。他因专心仰望耶和华，而得著生命的力量。神告诉我们：「你们得力乃在乎平静安稳」（参赛三十15）！亲爱的弟兄姐妹，无论我们现在生命的光景如何，让我们专心仰望耶和华，如同大卫在忙碌的生活中，因倚靠神而得著平静安稳，生命充满力量！\n\n然而，为什么许多基督徒，即使信主多年，心中却不平静安稳呢？在第1节，诗人暗示自己的属灵生命曾经十分幼稚，没有脱离吃奶的阶段，时常感到烦躁不安；正如保罗所说的，是一个属肉体的基督徒（参罗八8）。他心里狂傲、眼目高大，总是倚靠自己，内心没有平安！\n\n今天，许多基督徒自称是属神的人，却仍然骄傲地倚靠自己的才能、智慧，心中失去了平安！亲爱的弟兄姐妹，但愿我们像一个断奶的孩子，安息在母亲的怀中（参2节），单单仰望神，承认自己的软弱！让我们不再倚靠自己的聪明，而是寻求神的带领，领受基督所赐的平安与智慧，成为我们生命的舵。若能如此行，不论生活中有多少重担，所处的环境如何艰难，都能如同诗人，享受内心的平静安稳！\n\n回应：主啊！我是如此骄傲、时常倚靠自己，以致心中失去安息！求祢指教我单单仰望祢，寻求祢的引导，经历祢所赐的平安与力量！奉主的名求，阿们！\n\n祷读：以赛亚书三十章15节 \n主耶和华─以色列的圣者曾如此说：「你们得救在乎归回安息；你们得力在乎平静安稳。」\n\n\nQT: 诗篇一百三十一篇1~3节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督 会，帮助人打开心门接受主！彼此相爱的教会，如同诗人所形容，像贵重的油，从大祭司亚伦的头上一直流到衣襟；圣灵的能力将充满在基督里的每一个人，而教会也将吸引人，来到神的面前！但愿我们都能「竭力保守圣灵所赐合而为一的心」（参弗四3），并且在教会里带下圣灵的恩膏！\n\n蒙福、成长的生命（参3节）：在诗人眼中，一群和睦同居的百姓，必定如同植物得著甘露般的滋润，并且一起蒙福、成长，进入永生！\n\n教会中若有爱涌流，人的生命就会被神的生命滋润，不断成长、茁壮！神的话能指引生命成长的方向；但唯有恩典、爱、接纳、饶恕、鼓励的环境，才能够让生命在其中成长！但愿我们的教会，是有爱、接纳及饶恕的教会，使神的百姓都能在爱中建立自己，满有基督长成的身量！\n\n回应：主啊！我愿意竭力保守圣灵所赐合而为一的心，好让祢的教会充满圣灵的恩膏，以及生命的大能！奉主的名求，阿们！\n \n祷读：以弗所书四章2~3节\n凡事谦虚、温柔、忍耐，用爱心互相宽容，用和平彼此联络，竭力保守圣灵所赐合而为一的心。\n\nQT: 诗篇一百三十三篇1~3节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔大卫上行之诗。〕看哪，弟兄和睦同居是何等地善，何等地美！\n2 这好比那贵重的油浇在亚伦的头上，流到胡须，又流到他的衣襟；\n3 又好比黑门的甘露降在锡安山；因为在那里有耶和华所命定的福，就是永远的生命。"}, "9-22": {"theme": "永不止息的赞美", "scripture": "诗篇一百三十四篇1~3节", "url": "https://www.youtube.com/watch?v=avZ0lnkOdwY&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=20", "videoId": "avZ0lnkOdwY", "date_cn": "22/9/26(二)", "description": "经文：诗篇一百三十四篇1~3节\n主题：永不止息的赞美\n\n本诗篇虽短，画面却十分丰富，分成两部份：\n\n第1至2节，是会众对祭司道别。夜晚来临，敬拜神的人准备离开圣殿，向那些夜间看守圣殿的祭司挥手道别时，会唱一首辞行的诗歌。神借由本诗篇表达神喜悦祂的教会热烈献上赞美！而且日日夜夜，都有人在那里赞美神！\n\n亲爱的弟兄姐妹，我们是否也应当不断地以颂赞为祭献给神呢？我们是否时常向神诉说赞美与感谢呢？当我们来到教会，是否热情地敬拜神？在小组中，是否也在赞美中将感谢的祭献给祂，荣耀祂呢？但愿神的教会充满赞美的声音，我们也时常心怀感恩将颂赞献给神，讨祂喜悦！\n\n第3节是祭司对会众的回应。当会众呼求祭司继续赞美神，祭司就为他们祝福，说：「愿造天地的耶和华，从锡安赐福给你们！」锡安是神所拣选的地方，预表新约时代的教会。而祭司在对百姓的回应中提到：这一位造天地的耶和华，是乐意赐福的神，而祂拣选教会成为祂赐福的管道！\n\n亲爱的弟兄姐妹，我们何等蒙恩，能够成为神所拣选的子民！然而，神不仅要赐福给我们，也要使祂对亚伯拉罕的心意，实现在我们身上，那就是「地上的万族都要因你得福！」（参创十二3）感谢主！神要藉著我们，让更多的人得著丰盛的祝福！\n\n最后，我们从第1、2节看见，最能得蒙神的赐福的教会，乃是那些时常赞美神的教会，因为神是「用以色列的赞美为宝座的」（参诗二十二3）！当神的百姓以赞美击退仇敌，并且表明对神的信心，神就设立祂的宝座在他们当中！必有恩典和能力从祂的宝座流出，使众人得著祝福！\n\n感谢主！但愿我们的教会是赞美神的教会，教会的会众也都是赞美神的子民，使得神的恩福藉著我们涌流出去！\n\n回应：主啊，我愿意时常为我的教会守望！求祢亲自建立、赐福我的教会，成为祢赐下祝福的管道！奉主的名求，阿们！\n\n祷读：诗篇一三四篇1~2节\n耶和华的仆人夜间站在耶和华殿中的，你们当称颂耶和华！你们当向圣所举手，称颂耶和华！\n\nQT: 诗篇一百三十四篇1~3节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔上行之诗。〕耶和华的仆人夜间站在耶和华殿中的，你们当称颂耶和华！\n2 你们当向圣所举手，称颂耶和华！\n3 愿造天地的耶和华，从锡安赐福给你们！"}, "9-23": {"theme": "赞美的子民", "scripture": "诗篇一百三十五篇1~21节", "url": "https://www.youtube.com/watch?v=h0d9iucFJAo&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=19", "videoId": "h0d9iucFJAo", "date_cn": "23/9/26(三)", "description": "经文：诗篇一百三十五篇1~21节\n主题：赞美的子民\n\n在本诗篇的开头，诗人热切地再三呼吁神的选民和祂的仆人，要一同来赞美、歌颂神（参1~4节）。到了结尾，他又再次呼吁神的百姓，一起来称颂耶和华！由此可见，诗人极其渴望神的子民都能成为「赞美的子民」！如同诗人在第3节写道：「你们要赞美耶和华！耶和华本为善；要歌颂祂的名，因为这是美好的！」但愿神的子民都热切地来到祂的面前赞美、歌颂祂！但愿神的殿，时常被赞美的歌声所充满！\n\n诗人为什么急切地呼吁神的百姓来赞美神呢？因为神的百姓，是最认识神的人！如同他在第5节所写道：「原来我知道耶和华为大，也知道我们的主超乎万神之上。」亲爱的弟兄姐妹，我们不仅深刻明白，也都亲身经历，我们所信的这一位神，是如此伟大奇妙！虽然世人能从神所创造的万物，看到神的能力及伟大（参6~7节），但诗人在第8至14节却说，唯有神的选民，能够经历祂大能的拯救！祂施行神迹奇事，将我们从世界中救拔出来！如同祂将以色列人从埃及拯救出来，神也从黑暗、痛苦，以及被撒但欺压的生活中，拯救并释放我们！\n\n一旦我们经历了神奇妙的作为，就应当和诗人一样，热切并欢喜地赞美神！当我们赞美神，外邦人也会看见，祂真是又真又活的神！感谢主！我们的神是说话的神，是时常看顾我们的神，也是垂听祷告的神！让我们天天更加喜乐地赞美神，并为主作美好的见证！\n\n「住在耶路撒冷的耶和华该从锡安受称颂。你们要赞美耶和华！」（参21节）但愿神的教会，充满称颂祂的百姓！\n\n回应：主啊，我愿意时常称颂祢的圣名！求祢使我的口舌充满对祢的赞美与感恩，好向世人作见证，让他们看见，祢是真神！奉主的名求，阿们！\n \n祷读：诗篇一三五篇3节\n你们要赞美耶和华！耶和华本为善；要歌颂祂的名，因为这是美好的。\n\nQT: 诗篇一百三十五篇1~21节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延 才华，包括所拥有的金钱，都是从神而来！我们是否愿意将这一切献给神，而不是满足自我呢？但愿我们能像诗人一样，一心渴望让神和祂的教会得著荣耀！\n\n另外，诗人的喜怒哀乐，与耶路撒冷紧紧连结在一起，他为锡安的灭亡痛哭！第6节提到，他以耶路撒冷为他生命中「最喜乐的」！第7至9节更说，诗人痛恨的对象不是他个人的仇敌，而是耶路撒冷的仇敌；让他最感到痛心的不是自己的苦难，而是耶路撒冷的苦难！\n\n但愿我们也像诗人一样，因爱神而爱神的家！但愿我们不再单顾自己的事，不再只注意自己的问题和需要，而是为神国的荒凉焦急，并且为著教会的荣耀喜乐，胜过世上一切！但愿神扩张我们的心志，使我们知道如何讨祂喜悦！\n\n回应：主啊，我愿意学习因著爱祢而爱教会！我要更深地为祢摆上生命，在教会的事奉中更加经历祢的同在和恩典！奉主的名求，阿们！\n\n祷读：诗篇一三七篇5~6节\n耶路撒冷啊，我若忘记你，情愿我的右手忘记技巧！我若不记念你，若不看耶路撒冷过于我所最喜乐的，情愿我的舌头贴于上膛！\n\nQT: 诗篇一百三十七篇1~9节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 我们曾在巴比伦的河边坐下，一追想锡安就哭了。\n2 我们把琴挂在那里的柳树上；\n3 因为在那里，掳掠我们的要我们唱歌，抢夺我们的要我们作乐，说：给我们唱一首锡安歌吧！\n4 我们怎能在外邦唱耶和华的歌呢？\n5 耶路撒冷啊，我若忘记你，情愿我的右手忘记技巧！\n6 我若不记念你，若不看耶路撒冷过于我所最喜乐的，情愿我的舌头贴于上膛！\n7 耶路撒冷遭难的日子，以东人说：拆毁！拆毁！直拆到根基！耶和华啊，求你记念这仇！\n8 将要被灭的巴比伦城啊〔“城”原文作“女子”〕，报复你像你待我们的，那人便为有福！\n9 拿你的婴孩摔在磐石上的，那人便为有福！"}, "9-26": {"theme": "一心称谢神", "scripture": "诗篇一百三十八篇1~8节", "url": "https://www.youtube.com/watch?v=nCkcPnIDt2A&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=16", "videoId": "nCkcPnIDt2A", "date_cn": "26/9/26(六)", "description": "经文：诗篇一百三十八篇1~8节\n主题：一心称谢神\n\n诗人向神表达：「我要一心称谢祢」（参1节），表示他要专心、全心、尽心地赞美神。而且诗人特别指出，他要因著神的「慈爱」和「信实」，来称赞祂（参2节）！\n\n首先，诗人提到神的「信实」，祂不仅成就祂的应许，而且还成就过于祂所应许的！亲爱的弟兄姐妹，这也是你的经历吗？感谢主！祂是如此信实、慷慨！因此，我们要在众人面前，特别是在还没有认识神的人面前，传扬祂的信实！\n\n再来，诗人从不同层面，称赞神的「慈爱」：\n\n我们从第3、4节看见，神会透过「垂听我们的祷告」，来展现祂的慈爱。感谢主！「神是应当称颂的！祂并没有推却我的祷告，也没有叫祂的慈爱离开我。」（参诗六十六20）而耶稣也应许我们：「你们祈求，就给你们；寻找，就寻见」（参太七7）。亲爱的弟兄姐妹，让我们坦然无惧，来到神的面前求告祂！相信必能更深的透过祷告，经历神向我们展现祂的慈爱！\n\n另外，神也要透过「向我们说话」，来展现祂的慈爱！我们从第3节看见，诗人在困境、难过的时候求告神，以致经历神鼓励他，使他重新得力！感谢主！神是慈爱的神！祂乐意时常安慰我们！只要我们全心倚靠祂，祂必要向我们显现！\n\n在第6节，诗人提到，神要借由「看顾我们」，来彰显祂的慈爱。「耶和华虽高，仍看顾低微的人」（参6节）。感谢主！这是何等令人感动的慈爱！亲爱的弟兄姐妹，你是否曾经在遭到人的遗忘时，深切经历神的看顾？你是否正落在卑微、被冷落的地步呢？让我们来投靠神吧！因为祂不会离弃祂手所造的！（参8节）\n\n最后，诗人提到，神要透过「成全关乎我们的事」，来展现祂的慈爱（参8节）。神十分在乎关于我们生命的一切，包括我的身体、心灵、工作、婚姻、家庭、服事、人际关系！只要是关乎我的事，神都在乎，并且乐意成全！因此，让我们把生命中一切的重担，都交托给祂吧！祂必成全关乎我们的事！\n\n回应：主啊，我要一心称谢祢！因为祢是慈爱与信实的主！奉主的名求，阿们！\n\n祷读：诗篇一三八篇2节\n我要向祢的圣殿下拜，为祢的慈爱和诚实称赞祢的名；因祢使祢的话显为大，过于祢所应许的。\n\nQT: 诗篇一百三十八篇1~8节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔大卫的诗。〕我要一心称谢你，在诸神面前歌颂你。\n2 我要向你的圣殿下拜，为你的慈爱和诚实称赞你的名；因你使你的话显为大，过于你所应许的〔或作“超乎你的名声”〕。\n3 我呼求的日子，你就应允我，鼓励我，使我心里有能力。\n4 耶和华啊，地上的君王都要称谢你，因他们听见了你口中的言语。\n5 他们要歌颂耶和华的作为，因耶和华大有荣耀。\n6 耶和华虽高，仍看顾低微的人；他却从远处看出骄傲的人。\n7 我虽行在患难中，你必将我救活；我的仇敌发怒，你必伸手抵挡他们；你的右手也必救我。\n8 耶和华必成全关乎我的事；耶和华啊，你的慈爱永远长存！求你不要离弃你手所造的。"}, "9-27": {"theme": "无所不知 无所不在的神", "scripture": "诗篇一百三十九篇1~12节", "url": "https://www.youtube.com/watch?v=7P99oOH-FGI&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=15", "videoId": "7P99oOH-FGI", "date_cn": "27/9/26(日)", "description": "经文：诗篇一百三十九篇1~12节\n主题：无所不知 无所不在的神\n\n本诗篇的作者是大卫。许多解经家认为，这一篇诗篇可能是大卫在与拔示巴犯了奸淫、后来谋杀了乌利亚，并且被先知拿单指出他的罪行之后写成的。因此，大卫在这一篇诗篇中极其谦卑地承认，神是无所不知、无所不在的神！让我们透过本诗篇，思想神的全能：\n\n神知道人心中的意念及谋算（参2节）。大卫知道，无论是他口中的言语，还是行为，神都「细察」（参3~4节）。所以，他认知一件事，不论人躲藏在哪里，哪怕是在天上、在阴间、在海极，神都在那里（参7~9节）！人在黑暗中所做的一切恶事，神也都知道（参11~12节）！\n\n亲爱的弟兄姐妹，我们的所思、所言及所行，神都了若指掌！但愿藉著圣经、藉著经历神，我们也能够和大卫一样，更加认识神，将来得以坦然无惧地面对神！\n\n另外，我们也要从本诗篇思想，应当如何面对这一位无所不知、无所不在的神：\n\n更加敬畏祂：我们既然知道自己一切的所思、所言和所行，都在神的手中，就应当更加注重自己的心思、意念、言语，以及一切在明处、暗处所行的，是否讨神的喜悦？如同诗人在第23、24节所祈求的：「神啊，求祢鉴察我，知道我的心思，试炼我，知道我的意念，\n看在我里面有什么恶行没有，引导我走永生的道路。」亲爱的弟兄姐妹，但愿我们真实地在神的面前，活出讨祂喜悦的生命！\n\n更加信靠祂：知道神无所不知、无所不在，固然让我们戒慎恐惧，却也让我们能够更加安息在祂的手中！正如诗人写道，神在我们前后环绕、保护我们，并且按手在我们身上；祂给我们安慰、赐给我们力量（参5节），而且不论我们在哪里，祂的手也必引导、扶持我们（参10节）。感谢主！我们是何等有福啊！\n\n\n\n回应：主啊！求祢鉴察我、试炼我，引导我走永生的道路！我将自己全然交托在祢的手中，相信祢必要安慰和帮助我！奉主的名求，阿们！\n \n祷读：诗篇一百三十九篇1节\n耶和华啊，祢已经鉴察我，认识我。\n\nQT: 诗篇一百三十九篇1~12节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔大卫的诗，交与伶长。〕耶和华啊，你已经鉴察我，认识我。\n2 我坐下，我起来，你都晓得；你从远处知道我的意念。\n3 我行路，我躺卧，你都细查；你也深知我一切所行的。\n4 耶和华啊，我舌头上的话，你没有一句不知道的。\n5 你在我前后环绕我，按手在我身上。\n6 这样的知识奇妙，是我不能测的，至高，是我不能及的。\n7 我往哪里去躲避你的灵？我往哪里逃、躲避你的面？\n8 我若升到天上，你在那里；我若在阴间下榻，你也在那里。\n9 我若展开清晨的翅膀，飞到海极居住，\n10 就是在那里，你的手必引导我；你的右手也必扶持我。\n11 我若说：黑暗必定遮蔽我，我周围的亮光必成为黑夜；\n12 黑暗也不能遮蔽我，使你不见，黑夜却如白昼发亮。黑暗和光明，在你看都是一样。"}, "9-28": {"theme": "造我的神", "scripture": "诗篇一百三十九篇13~24节", "url": "https://www.youtube.com/watch?v=0VXmaQpfjwY&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=14", "videoId": "0VXmaQpfjwY", "date_cn": "28/9/26(一)", "description": "经文：诗篇一百三十九篇13~24节\n主题：造我的神\n\n在这一段经文中，诗人特别提到─我们是神所造的！让我们思想下述信息：\n\n神创造了我：诗人提到当我们在母腹中，神就已经「覆庇」我们（参13节），并且知道我们（参15~16节）。因此，我们的出生并非偶然，而是在神细心的照顾之下。或许有一些人的父母，起初并不想生下他们，但并不影响他们是神精心的创造！不仅如此，诗人还提到，我们的受造「奇妙可畏」（参14节）。感谢主！我们是祂奇妙、伟大的创造！因此，不需要看轻，或贬低自己！让我们不断地告诉自己：「我是那一位伟大、奇妙的神所创造的！因此，我是奇妙的！我是独特、重要的」！\n\n神定我一生的日子：在第16节，诗人写道：「祢所定的日子，我尚未度一日，祢都写在祢的册上了。」亲爱的弟兄姐妹，我们一生所遭遇的事情，神都知道！原生家庭如何、童年如何、成长过程如何，神都早已知道；而且这一切都是祂所定的日子，也就是祂许可的。因此，不论我们是否曾经遭遇过不幸、不公平，或是不快乐的事，让我们都存著感恩的心，交托在主的手中，让祂转化这一切，变成我们的祝福！ \n\n神将要审判我们的一生：在第17、18节，诗人写道：「神啊，祢的意念向我何等宝贵！其数何等众多！我若数点，比海沙更多；我睡醒的时候，仍和祢同在。」感谢主！祂向我们怀抱许多意念，也就是说，祂对我们的一生有很多想法、安排和计划！而且在第19至24节，我们也看见，有一天神将要审判我们。因此，诗人勉励我们，当恨恶罪恶（参19~22节），并且渴望活出圣洁！求主时刻光照我们，特别是生命中，一些不为人知的事。亲爱的弟兄姐妹，但愿我们都能认真省察，自己的心思意念是否有得罪神的地方？求主在这个充满黑暗与罪恶的世代中，炼净和引导我们，保守我们走永生的道路！（参23~24节）\n\n回应：主啊！谢谢祢创造了我！我要宣告并且相信自己是祢的杰作！我要活在祢对我一生的计划中，并要活出圣洁，直到见祢面的那一天！奉主的名求，阿们！\n \n祷读：诗篇一三九篇14节\n我要称谢祢，因我受造，奇妙可畏；祢的作为奇妙，这是我心深知道的。\n\nQT: 诗篇一百三十九篇13~24节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "13 我的肺腑是你所造的；我在母腹中，你已覆庇我。\n14 我要称谢你，因我受造，奇妙可畏；你的作为奇妙，这是我心深知道的。\n15 我在暗中受造，在地的深处被联络；那时，我的形体并不向你隐藏。\n16 我未成形的体质，你的眼早已看见了；你所定的日子，我尚未度一日〔或作“我被造的肢体尚未有其一”〕，你都写在你的册上了。\n17 神啊，你的意念向我何等宝贵！其数何等众多！\n18 我若数点，比海沙更多；我睡醒的时候，仍和你同在。\n19 神啊，你必要杀戮恶人；所以，你们好流人血的，离开我去吧！\n20 因为他们说恶言顶撞你；你的仇敌也妄称你的名。\n21 耶和华啊，恨恶你的，我岂不恨恶他们吗？攻击你的，我岂不憎嫌他们吗？\n22 我切切地恨恶他们，以他们为仇敌。\n23 神啊，求你鉴察我，知道我的心思，试炼我，知道我的意念，\n24 看在我里面有什么恶行没有，引导我走永生的道路。"}, "9-29": {"theme": "救恩的力量", "scripture": "诗篇一百四十篇1~13节", "url": "https://www.youtube.com/watch?v=O6uTEA_pgpQ&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=13", "videoId": "O6uTEA_pgpQ", "date_cn": "29/9/26(二)", "description": "经文：诗篇一百四十篇1~13节\n主题：救恩的力量\n\n在本诗篇一开始，诗人就呼求耶和华拯救他！他来到神前，向祂表明心中的委屈及苦情。感谢主！当困难临到，我们并非无依无靠，而是可以来到神前，向祂倾心吐意！\n\n诗人提到他遇见了凶恶的人，以及强暴的人（参1、4、11节），这些人最让诗人感到痛苦的，就是他们尖利如蛇的舌头；他们说出来的话如同毒气（参3节），充满奸恶！（参9、11节）\n\n亲爱的弟兄姐妹，我们或许也和诗人一样，经历从人而来的误解、诽谤、诬告，并且听见尖利、奸恶如同毒气的话语，以致心里满是伤痕！今天我们要从本诗篇思想，如何避免犯下言语上的罪，并且从他人的言语伤害中，经历神的拯救。\n\n我们要寻求主的帮助，求祂掌管我们的口舌，不说尖利、伤人的言语。我们没有用拳头打人，或是用武器伤人，自觉并非凶恶、强暴之人；但是，若用舌头毁谤人，或是用尖酸、刻薄的话伤害人，在神的眼中，我们就是凶恶、强暴的人！\n\n另方面，如果我们因被人话语伤害感到痛苦，也可以和诗人一样来到主前，向祂陈明心中的痛苦，因为神是我们救恩的力量！祂会遮蔽我们的头，也必保护我们（参7节）。祂除了留心听我们恳求的声音（参6节），也知道我们心中的「困苦」和冤屈，祂必为我们「辨屈」（参12节）。祂会让那些企图暗设网罗，来陷害、伤害我们的人，落入自己所挖的深坑中（参10节）；而那些设计谋陷害我们的人，必会「陷害自己」，如同原先想要陷害末底改的哈曼一样！\n\n感谢主！祂必为著祂自己的荣耀，不让恶人得逞，以致骄傲（参8节）！祂要为著自己荣耀的缘故，拯救义人和心里正直的人，好让祂听见义人赞美的声音（参13节）！亲爱的弟兄姐妹，愿主保守我们的口舌，更深仰望、倚靠祂救恩的力量，胜过言语的伤害与攻击，和祂一同得胜！\n\n回应：主啊！求祢保守我的口舌，不出恶言伤害人，也求祢救我脱离口舌的争闹，好能享受祢所赐的平安与得胜！奉主的名求，阿们！\n \n祷读：诗篇一四〇篇12~13节\n我知道耶和华必为困苦人伸冤，必为穷乏人辨屈。义人必要称赞祢的名；正直人必住在祢面前。\n\nQT: 诗篇一百四十篇1~13节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔大卫的诗，交与伶长。〕耶和华啊，求你拯救我脱离凶恶的人，保护我脱离强暴的人！\n2 他们心中图谋奸恶，常常聚集要争战。\n3 他们使舌头尖利如蛇，嘴里有虺蛇的毒气。（细拉）\n4 耶和华啊，求你拯救我脱离恶人的手，保护我脱离强暴的人！他们图谋推我跌倒。\n5 骄傲人为我暗设网罗和绳索；他们在路旁铺下网，设下圈套。（细拉）\n6 我曾对耶和华说：你是我的神。耶和华啊，求你留心听我恳求的声音！\n7 主──耶和华、我救恩的力量啊，在争战的日子，你遮蔽了我的头。\n8 耶和华啊，求你不要遂恶人的心愿；不要成就他们的计谋，恐怕他们自高。（细拉）\n9 至于那些昂首围困我的人，愿他们嘴唇的奸恶陷害〔原文作“遮蔽”〕自己！\n10 愿火炭落在他们身上！愿他们被丢在火中，抛在深坑里，不能再起来。\n11 说恶言的人在地上必坚立不住；祸患必猎取强暴的人，将他打倒。\n12 我知道耶和华必为困苦人伸冤，必为穷乏人辨屈。\n13 义人必要称赞你的名；正直人必住在你面前。"}, "9-30": {"theme": "晚祭的祷告", "scripture": "诗篇一百四十一篇1~10节", "url": "https://www.youtube.com/watch?v=LDmE7nWgy0w&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=12", "videoId": "LDmE7nWgy0w", "date_cn": "30/9/26(三)", "description": "经文：诗篇一百四十一篇1~10节\n主题：晚祭的祷告\n\n本诗篇是诗人的晚祷。古代许多圣徒，时常使用它作为晚祷内容。因此，愿本诗篇也成为我们每一天的祷告。另外，诗人在晚祷中提到，他在一天之中，经历许多试探和苦难；所以，我们可以从本诗篇思想，如何为每一天所面对的试探及苦难求告神。\n\n在第3节，诗人祈求神保守他的口。诗人也许承受了从人而来的伤害与攻击，使他很想以恶言回击；因此，他求主禁止他的口，不出恶言！亲爱的弟兄姐妹，当我们面对人的伤害及攻击，求主帮助我们，使我们不以口犯罪！另外，诗人在面对苦难时，他也求主禁止他说出一些抱怨神、不信靠神的话语，这真是很重要的提醒！\n\n在第4节，诗人求神保守他的心不偏于邪，不会受到恶人的诱惑，而与他们一同行恶。亲爱的弟兄姐妹，我们也要天天求主保守我们的心，使我们不会因为不法的利益和诱惑，落入罪恶之中！求主拯救我们脱离试探！\n\n在第5节后段，诗人求神让他心怀谦卑，接受义人的击打和责备，使他知道，义人的责备和击打的背后，是出于爱和祝福！亲爱的弟兄姐妹，我们在日常生活中，也许会遇见恶人无理的击打，却也会遇见一些义人带来的责备与提醒。求主赐给我们一颗柔软的心，能接受合乎真理的劝戒，以致行事为人讨主喜悦！\n\n在第5节后段，以及第6至10节，诗人求主让他不要以恶报恶，而是为恶人祈祷（参6节）。亲爱的弟兄姐妹，每当我们承受恶人的攻击，千万不要将眼光和心思放在报复上，而是要专心仰望神（参9节），相信祂必救拔我们！求主使我们内心安静，让主为我们伸冤！神的大能必击打恶人、击打恶人的领袖，人终必回转听义人的话，并且以神的话语为甘甜，为真实可靠的！ \n\n但愿我们每天夜晚，都能参考本诗篇，作睡前祷告，将生命中的重担与愁烦交托给神，更深经历祂的恩典！\n\n回应：主啊！求祢保守我的生命，不受到罪恶的诱惑，并且赐给我一颗谦卑受教的心，专心仰望祢的慈爱与权能！奉主的名求，阿们！ \n\n祷读：诗篇一四一篇2节\n愿我的祷告如香陈列在祢面前！愿我举手祈求，如献晚祭！\n\nQT: 诗篇一百四十一篇1~10节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 如何经历神！\n\n定睛于神的属性：大卫在第1节就宣告：神是信实的！而他也在第8节宣告：当他倚靠神、仰望神，神一定拯救他，因为这是祂的应许！在第10节，大卫宣告神是良善的，所以必要领他到平坦之地。另外，他也不断地宣告：神是公义的（参1、11节）、是慈爱的（参12节），所以神必定会剪除敌人，并且恩待祂的仆人（参12节）。感谢主！祂是乐意施恩的神！但愿我们在祷告中，更多地宣告和称颂祂的属性！\n\n定睛神的荣耀（参11节）：大卫再次把自己的命运，和神的荣耀连在一起！他将神的荣耀作为祷告的起点，这样的祷告必能摸著神的心！\n\n感谢主！祂是乐意扶持人，走出灵性低潮的神！但愿我们一天比一天，更深切地摸著祂的心，并时刻从祂领受最真实的力量！\n\n回应：主啊，我感谢祢！因为祢对我的爱永不改变！求祢提升我的信心，让我在灵性低潮中，更真实地摸著祢的心意！奉主的名求，阿们！\n\n祷读：诗篇一四三篇8节\n求祢使我清晨得听祢慈爱之言，因我倚靠祢；求祢使我知道当行的路，因我的心仰望祢。\n\nQT: 诗篇一百四十三篇1~12节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔大卫的诗。〕耶和华啊，求你听我的祷告，留心听我的恳求，凭你的信实和公义应允我。\n2 求你不要审问仆人；因为在你面前，凡活着的人没有一个是义的。\n3 原来仇敌逼迫我，将我打倒在地，使我住在幽暗之处，像死了许久的人一样。\n4 所以，我的灵在我里面发昏；我的心在我里面凄惨。\n5 我追想古时之日，思想你的一切作为，默念你手的工作。\n6 我向你举手；我的心渴想你，如干旱之地盼雨一样。（细拉）\n7 耶和华啊，求你速速应允我！我心神耗尽！不要向我掩面，免得我像那些下坑的人一样。\n8 求你使我清晨得听你慈爱之言，因我倚靠你；求你使我知道当行的路，因我的心仰望你。\n9 耶和华啊，求你救我脱离我的仇敌！我往你那里藏身。\n10 求你指教我遵行你的旨意，因你是我的神。你的灵本为善；求你引我到平坦之地。\n11 耶和华啊，求你为你的名将我救活，凭你的公义，将我从患难中领出来，\n12 凭你的慈爱剪除我的仇敌，灭绝一切苦待我的人，因我是你的仆人。"}, "10-3": {"theme": "有福的人", "scripture": "诗篇一百四十四篇1~15节", "url": "https://www.youtube.com/watch?v=zhGCgIM4LbY&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=9", "videoId": "zhGCgIM4LbY", "date_cn": "3/10/26(六)", "description": "经文：诗篇一百四十四篇1~15节\n主题：有福的人\n\n在第12至14节，大卫描述了一个幸福家庭，或国家的美好景象。第12节提到他们的儿女满堂，第13节则提到他们经历田园丰盛、丰衣足食、繁荣快乐、田产茂盛、牛羊成群！不仅如此，第14节还提到他们的家园、社会十分安宁，人民安居乐业，没有偷窃、没有战争流血、没有哭号悲哀，人人知足而快乐。这真是人间的乐园！\n\n而第15节特别提到，这个家庭能够如此幸福、美满，是因为「有耶和华为他们的神」。亲爱的弟兄姐妹，当我们认识神、以祂为生命的主，就能看见我们的家庭深深蒙主赐福！感谢主！「有耶和华为他们的神，这百姓便为有福！」（参15节）\n\n大卫在上述景象中，描述了神所赐福的家庭或国家。而在第1至11节，他描述了自己与神的关系。国家若要幸福、和谐地运作，与它的君王有很大的关系！大卫的国家能够如此的幸福、和谐，与他个人绝对有很大的关系！因此，如果我们要在家庭、教会，和任何属神的群体中经历神的赐福，领袖与神的关系是极其重要的关键。\n\n我们从这一段经文中，深刻感受到大卫拥有一样很美好的特质，那就是他虽然贵为君王，也满有智慧和能力，内心深处对神却极其谦卑！第3、4节，他谦卑地承认自己何等微小，而神竟然顾念他，使他拥有手中的一切！\n\n在第1节，大卫谦卑地写道：由于主教导他打仗，他才能胜过许多的仇敌（参5~11节）。亲爱的弟兄姐妹，我们也应当谦卑承认，倘若自己能够争战得胜，都是因为主的缘故！\n\n在第2节，大卫谦卑地写道：主是他的保护，而这就是他时刻得力的秘诀！另外，他也谦卑地提到：是神「使百姓服在我以下的」，以致他能够带领国家，走向神所命定的道路！\n\n感谢主！神不仅要赐福属祂的百姓，也要透过心怀谦卑的领袖，成为祂施恩的管道！但愿每一个属灵的家庭和领袖，都能如同大卫，谦卑地来到神的面前，更深经历祂荣耀的心意！\n\n回应：主啊！愿祢记念我地上的家与属灵的家，都活在祢的祝福中！求祢帮助我成为谦卑的领袖，让我紧紧跟随祢，使多人得福！奉主的名求，阿们！\n\n祷读：诗篇一四四篇15节\n遇见这光景的百姓便为有福！ 有耶和华为他们的神，这百姓便为有福！\n\nQT: 诗篇一百四十四篇1~15节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏202 许，诚心来求告祂，好能更深经历祂奇妙的同在！\n\n再来，大卫在第19节提到：神要垂听那些「敬畏」祂的人心中的祈求，拯救他们脱离一切患难，并且成就他们的心愿。感谢主！祂乐意将各样福分赐给我们，使我们有丰盛的生命，并且只要我们敬畏祂、尊祂为王，祂就必使我们活出最满足的人生！\n\n最后，大卫在第20节提到，神要保护那些「爱祂的人」！感谢主！祂是如此丰盛、慷慨！如果我们真心爱祂，祂必要将丰盛的慈爱倾倒在我们身上，甚至多到无处可容！\n\n\n回应：主啊，祢一切所做的都有慈爱！我要天天亲近祢、敬畏祢、爱祢，因为我渴慕得著祢更深、更丰盛的慈爱！奉主的名求，阿们！\n \n祷读：诗篇一四五篇17节　\n耶和华在祂一切所行的，无不公义；在祂一切所做的都有慈爱。\n\nQT: 诗篇一百四十五篇14~21节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "14 凡跌倒的，耶和华将他们扶持；凡被压下的，将他们扶起。\n15 万民都举目仰望你；你随时给他们食物。\n16 你张手，使有生气的都随愿饱足。\n17 耶和华在他一切所行的，无不公义；在他一切所做的都有慈爱。\n18 凡求告耶和华的，就是诚心求告他的，耶和华便与他们相近。\n19 敬畏他的，他必成就他们的心愿，也必听他们的呼求，拯救他们。\n20 耶和华保护一切爱他的人，却要灭绝一切的恶人。\n21 我的口要说出赞美耶和华的话；惟愿凡有血气的都永永远远称颂他的圣名。"}, "10-6": {"theme": "以神为帮助的人有福了", "scripture": "诗篇一百四十六篇1~10节", "url": "https://www.youtube.com/watch?v=7Me82vNNAWk&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=6", "videoId": "7Me82vNNAWk", "date_cn": "6/10/26(二)", "description": "主题：以神为帮助的人有福了　\n经文：诗篇一百四十六篇1~10节\n\n在本诗篇的开头，诗人就表明了心中极深的渴望：他心中充满歌颂和赞美，他也要为耶和华作见证！亲爱的弟兄姐妹，但愿我们也时常被神的恩典充满，而终日歌颂、赞美祂，并且渴望为祂作见证，让人知道祂是何等的伟大及美好！\n\n在第5节，诗人向世人见证，他所相信的这一位神，是乐意赐福给人的神─「以雅各的神为帮助、仰望耶和华─他神的，这人便为有福！」而他也在第3、4节告诉我们：人绝对不可靠！即便是君王，也不可靠！因为他们不过是世人而已，他的权力有限，即或有帮助，也都不久远。「他的气一断，就归回尘土；他所打算的，当日就消灭了。」（参4节）因此，只有当人倚靠神，才是真正有福的！\n\n亲爱的弟兄姐妹，我们或许都曾经期望，从一些有权、有势的人身上，得著及时的帮助。然而，后来却发现，原本以为最有能力提供帮助的人，却是何等无能为力！因此，我们必须清楚，人是何等有限！让我们回转向神，并且专心仰望神！\n\n接下来，诗人告诉我们，为什么倚靠神的帮助，才是真正的有福呢？\n\n因为神是全能的神：在第6节，诗人提到神是创造的主，因此祂无所不能！而我们倚靠这一位无所不能的神，当然强过倚靠世上的人！\n\n因为神是慈爱的神：在第7至9节，诗人提到神是慈爱的神。无论什么样的人，是受屈的、饥饿的、被囚的、瞎眼的、受压的、寄居的、孤苦的，慈爱的主都愿意帮助！无论是身体痛苦的，是灵性有疾病的，祂都愿意拯救、医治！感谢主！无论我们的生命中有任何问题，或自认何等不配和卑微，这一位慈爱的主都愿意帮助我们！感谢主！倚靠祂的人，真是有福！\n\n因为神是永远的神：我们从上述内容看见，诗人强调：地上的君王虽然有权、有能力，但是他们的权势都是短暂的；只有天上的君王，祂的宝座安定在天，永远不会动摇！祂对我们的保护，以及祂的能力、权柄、慈爱，都是永远的！所以，倚靠祂的人，真是有福！\n\n回应：主啊！谢谢祢愿意成为我的帮助！从今以后，我不再倚靠人的帮助，而要全心倚靠祢，因为祢的慈爱、能力及权柄存到永远！奉主的名求，阿们！\n \n祷读：诗篇一四六篇5节\n以雅各的神为帮助、仰望耶和华─他神的，这人便为有福！\nQT: 诗篇一百四十六篇1~10节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 你们要赞美耶和华！我的心哪，你要赞美耶和华！\n2 我一生要赞美耶和华！我还活的时候要歌颂我的神！\n3 你们不要倚靠君王，不要倚靠世人；他一点不能帮助。\n4 他的气一断，就归回尘土；他所打算的，当日就消灭了。\n5 以雅各的神为帮助、仰望耶和华──他神的，这人便为有福！\n6 耶和华造天、地、海，和其中的万物；他守诚实，直到永远。\n7 他为受屈的伸冤，赐食物与饥饿的。耶和华释放被囚的；\n8 耶和华开了瞎子的眼睛；耶和华扶起被压下的人。耶和华喜爱义人。\n9 耶和华保护寄居的，扶持孤儿和寡妇，却使恶人的道路弯曲。\n10 耶和华要作王，直到永远！锡安哪，你的神要作王，直到万代！你们要赞美耶和华！"}, "10-7": {"theme": "面对人生的力量", "scripture": "诗篇一百四十七篇1~10节", "url": "https://www.youtube.com/watch?v=Hq6ZDVldAS8&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=5", "videoId": "Hq6ZDVldAS8", "date_cn": "7/10/26(三)", "description": "主题：面对人生的力量\n经文：诗篇一百四十七篇1~10节\n\n在第5节，诗人提到我们的主为大，祂的能力和智慧无法测度！人若要认识神，最重要的就是先承认自己渺小，然后从神的话语中，认识神全然的能力和智慧！当我们对神、对自己有了这样的认知，就能知道如何面对人生：\n\n在患难中不失去对神的信心：我们从第2、3节知道，这一篇诗篇可能是以色列民被掳归回，重建圣城之后所写的。诗人赞美神如何为他们「建造耶路撒冷」，「聚集……被赶散的人」（参2节），并且「医好伤心的人」（参3节）。另外，我们从以赛亚书四十章26至28节看见，当以色列人面对亡国被掳的苦难，神要他们「向上举目，看谁创造这万象，按数目领出，祂一一称其名！」而我们也从这一篇诗篇的第4，以及第8、9节看见，神提醒那些落在伤心、痛苦中，以致无法感受到祂帮助的人，要从祂所造的万物中看见祂的大能、智慧和慈爱是何等伟大，以致不会失去对祂的信心！\n\n亲爱的弟兄姐妹，你是否也正处在伤心和痛苦中，而看不见神的帮助？从今天起，让我们一起举目观看神所造的万象，并且如同诗人在第7节所写的一样：无论如何都要感谢、赞美神，并重拾对祂的信心！\n\n更加谦卑在神的面前：在第10节，诗人写道：神「不喜悦马的力大，不喜爱人的腿快。」亲爱的弟兄姐妹，神不喜悦我们骄傲地靠著自己的力量，而不倚靠祂！祂不喜悦我们靠著自以为的聪明，冲动行事，而不寻求祂的智慧！在第6节，我们看见神喜爱谦卑的人，也就是那些相信祂的能力和智慧的人；祂必扶持他们，拯救他们脱离苦难及恶人！\n\n因此，如同先知以赛亚对我们的劝勉：「疲乏的，祂赐能力；软弱的，祂加力量。就是少年人也要疲乏困倦；强壮的也必全然跌倒。但那等候耶和华的必从新得力。他们必如鹰展翅上腾；他们奔跑却不困倦，行走却不疲乏。」（参赛四十29~31）感谢主！让我们耐心等候神，不再倚靠自己的能力，不再跑在神的前面，而能谦卑地跟随祂，以致时刻得力，领受祂丰盛的恩典！\n\n回应：主啊！求祢赐我一颗谦卑的心，因为我愿意讨祢的喜悦！求祢使我在艰难的环境中，选择不看自己和环境，而是专心等候祢！奉主的名求，阿们！\n \n祷读：诗篇二十二篇26节\n谦卑的人必吃得饱足；寻求耶和华的人必赞美祂。愿你们的心永远活著！\n\nQT: 诗篇一百四十七篇1~10节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉 ，我们亲近神、认识神，当然要开口赞美神！但愿所有属神的百姓，都大声开口赞美祂；但愿神的教会，充满欢喜快乐、火热赞美神的声音，让神得著祂当得的荣耀！\n\n在本诗篇中，诗人呼吁全宇宙加入赞美神的行列！特别是第8节──火、冰雹、雪、雾气及狂风也要来赞美神！因为这些自然现象都会成就神的旨意！感谢主！即便在艰困中，也有主的旨意！所以，让我们在经历生命困境的时候，不要停止赞美神，即使遭逢艰困的环境，神也是可赞美的！相信神喜悦这样的赞美！\n\n回应：主啊！我愿意天天以颂赞为祭献给祢！因为祢是爱我、拣选我、赐福给我的主！感谢赞美主，奉主的名求，阿们！\n \n祷读：诗篇一百四十八篇13节\n愿这些都赞美耶和华的名！因为独有祂的名被尊崇；祂的荣耀在天地之上。\n\nQT: 诗篇一百四十八篇1~14节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 你们要赞美耶和华！从天上赞美耶和华，在高处赞美他！\n2 他的众使者都要赞美他！他的诸军都要赞美他！\n3 日头月亮，你们要赞美他！放光的星宿，你们都要赞美他！\n4 天上的天和天上的水，你们都要赞美他！\n5 愿这些都赞美耶和华的名！因他一吩咐便都造成。\n6 他将这些立定，直到永永远远；他定了命，不能废去〔“废去”或作“越过”〕。\n7 所有在地上的，大鱼和一切深洋，\n8 火与冰雹，雪和雾气，成就他命的狂风，\n9 大山和小山，结果的树木和一切香柏树，\n10 野兽和一切牲畜，昆虫和飞鸟，\n11 世上的君王和万民，首领和世上一切审判官，\n12 少年人和处女，老年人和孩童，都当赞美耶和华！\n13 愿这些都赞美耶和华的名！因为独有他的名被尊崇；他的荣耀在天地之上。\n14 他将他百姓的角高举，因此他〔“因此他”或作“他使”〕一切圣民以色列人，就是与他相近的百姓，都赞美他！你们要赞美耶和华！"}, "10-10": {"theme": "赞美的大能", "scripture": "诗篇一百四十九篇1~9节", "url": "https://www.youtube.com/watch?v=Cqj5GcNNcu8&list=PLgFvTLP0QRDubduKQfr0bd7fsZAvoQNmW&index=2", "videoId": "Cqj5GcNNcu8", "date_cn": "10/10/26(六)", "description": "主题：赞美的大能\n经文：诗篇一百四十九篇1~9节\n\n在本诗篇中，诗人不断提到这一句话：「你们要赞美耶和华」。可是，为什么应当赞美神呢？我们之所以赞美神，除了因为神配得我们的赞美，诗人及历世历代的圣徒，都深刻经历──赞美能对我们的属灵生命，带来极大的帮助！今天，让我们从这一篇诗篇，来思想赞美的大能：\n\n赞美使我们得著喜乐：诗人不断提到，赞美使我们「欢喜」、「快乐」（参2节）、「高兴」、「欢呼」（参5节）！充满赞美的基督徒，必定是喜乐的人。亲爱的弟兄姐妹，你是一个喜乐的人吗？今天有许多人，包括基督徒，都活在愁苦、哀怨的生活中，因为他们受到环境影响。然而，赞美神的人，是「以神为乐」的人──他不是不会受到环境影响；乃是如同诗人：「因造他的主欢喜！……因他们的王快乐！」（参2节）\n\n这样的人知道神是至高神（参6节），而且神喜爱祂的百姓，愿意施恩给他们（参4节），所以不论环境如何，都能在神的手中平静安稳，获得喜乐！亲爱的弟兄姐妹，这就是赞美的大能！如果我们时常赞美神、向祂歌唱，神就必将祂的喜乐浇灌在我们的心中！\n\n赞美是我们争战的武器：诗人在第6至9节提到，当我们口中称赞神为高，就能拥有「两刃的刀」，可以与仇敌争战！亲爱的弟兄姐妹，赞美是我们战胜仇敌，最有力的武器！如同约沙法王藉著赞美的大军击败仇敌（参代下二十20~23）；保罗和西拉在监狱中赞美神，而经历神的拯救（参徒十六25~26）──赞美真是我们得胜仇敌、震动黑暗权势、断开锁链的最佳武器！感谢主！但愿当我们时刻赞美神，亲眼看见祂的大能与同在！\n\n回应：主啊！我愿意时常称颂祢的名，因为祢配得所有赞美！求祢的喜乐充满我，使我靠赞美神得胜！奉主的名求，阿们！\n\n祷读：诗篇一百四十九篇1节\n你们要赞美耶和华！向耶和华唱新歌，在圣民的会中赞美祂！\n\nQT: 诗篇一百四十九篇1~9节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传 （参31节）。\n\n每一天，我们的生命为吵杂的声音所充满，就像行在车水马龙的街上，要面对不同的喧嚣或呼唤。「智慧」在我们身边呼喊，想要得著我们的心；我们有没有认真倾听，并且回应呢？还是同样也轻忽、藐视、厌弃祂呢？但愿我们能够摒除杂音，单单听从神而来的声音，得著「安然居住、得享安静、不怕灾祸」的平安（参33节）！\n\n回应：主啊！求祢开我的耳、开我的心，使我领受祢话语的奇妙！让我活出生命的智慧，好能领受祢所应许的平安！奉主的名求，阿们！\n\n祷读：箴言一章33节\n惟有听从我的，必安然居住，得享安静，不怕灾祸。\n\nQT: 箴言一章20~33节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "20 智慧在街市上呼喊，在宽阔处发声，\n21 在热闹街头喊叫，在城门口，在城中发出言语，\n22 说：你们愚昧人喜爱愚昧，亵慢人喜欢亵慢，愚顽人恨恶知识，要到几时呢？\n23 你们当因我的责备回转；我要将我的灵浇灌你们，将我的话指示你们。\n24 我呼唤，你们不肯听从；我伸手，无人理会；\n25 反轻弃我一切的劝戒，不肯受我的责备。\n26 你们遭灾难，我就发笑；惊恐临到你们，我必嗤笑。\n27 惊恐临到你们，好像狂风；灾难来到，如同暴风；急难痛苦临到你们身上。\n28 那时，你们必呼求我，我却不答应，恳切地寻找我，却寻不见。\n29 因为，你们恨恶知识，不喜爱敬畏耶和华，\n30 不听我的劝戒，藐视我一切的责备，\n31 所以必吃自结的果子，充满自设的计谋。\n32 愚昧人背道，必杀己身；愚顽人安逸，必害己命。\n33 惟有听从我的，必安然居住，得享安静，不怕灾祸。"}, "10-14": {"theme": "寻求真智慧", "scripture": "箴言二章1~22节", "url": "https://www.youtube.com/watch?v=YjXxjiVSKZg&list=PLgFvTLP0QRDv7loBanDX5oRTdniG9ik27&index=29", "videoId": "YjXxjiVSKZg", "date_cn": "14/10/26(三)", "description": "主题：寻求真智慧 \n经文：箴言二章1~22节\n\n在我们的生命中，什么是最值得珍惜与追求的呢？我们心中有许多的目标，还有许多渴望得著的恩典与祝福。然而，箴言的作者提醒我们：在一切以先，要追求「敬畏耶和华，得以认识神」（参5节），因为这是真正的智慧！\n\n真正的智慧是从神而出，而不是出于人的思想与哲理。亲爱的弟兄姐妹，我们都是神所创造的，是按著祂的形像造的。这个世界也是祂造的，祂知晓一切运作的法则。因此，祂赐给人智慧、话语就是知识与聪明（参6节）。虽然这世界上也有许多看似为真正的智慧，但从神的眼光来看，这些智慧不过是乖谬的话语（参12节），会将我们的脚步引到弯曲偏僻的道路上。\n\n属神的智慧可以保守、拯救我们，引导人生的方向，并且将我们带往祝福，脱离灭亡！感谢主！神要透过祂的智慧改变我们的心，使生命充满聪明和美善，不再沾染污秽与邪恶、黑暗与愚昧！人若渴慕智慧，他的心灵就以知识智慧为美！\n\n得著真智慧的前提，是拥有正确的态度。箴言的智者提醒我们，内心必须怀抱真正的渴慕：要细细地找、专心地求、全力搜寻（参2~4节），终必得著属神的智慧。有些人费尽一切的心力和方法，只求拥有奢华的物质及外在的名气；这些人虽然拥有竭力追求的态度，追求的目标却不能带来真实的满足！真正能带来生命的珍宝，是真智慧。亲爱的弟兄姐妹，我们有没有这种竭力追求的态度呢？\n\n愿神帮助、打开我们的心，领受智者的言语、存记智者的命令，珍惜智慧的宝贵，专心寻求，认真探索！相信神必照著祂的应许，将美好的智慧赏赐给我们，带领我们进入生命的平安！\n\n回应：主啊，唯有祢是智慧的源头！求祢开我的心窍，使我看见祢智慧的宝贵，并能寻见和活出智慧。奉主的名求，阿们！\n \n祷读：箴言二章6节\n因为，耶和华赐人智慧；知识和聪明都由祂口而出。\n\n\nQT: 箴言二章1~22节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 我儿，你若领受我的言语，存记我的命令，\n2 侧耳听智慧，专心求聪明，\n3 呼求明哲，扬声求聪明，\n4 寻找它，如寻找银子，搜求它，如搜求隐藏的珍宝，\n5 你就明白敬畏耶和华，得以认识神。\n6 因为，耶和华赐人智慧；知识和聪明都由他口而出。\n7 他给正直人存留真智慧，给行为纯正的人作盾牌，\n8 为要保守公平人的路，护庇虔敬人的道。\n9 你也必明白仁义、公平、正直、一切的善道。\n10 智慧必入你心；你的灵要以知识为美。\n11 谋略必护卫你；聪明必保守你，\n12 要救你脱离恶道〔“恶道”或作“恶人的道”〕，脱离说乖谬话的人。\n13 那等人舍弃正直的路，行走黑暗的道，\n14 欢喜作恶，喜爱恶人的乖僻，\n15 在他们的道中弯曲，在他们的路上偏僻。\n16 智慧要救你脱离淫妇，就是那油嘴滑舌的外女。\n17 她离弃幼年的配偶，忘了神的盟约。\n18 她的家陷入死地；她的路偏向阴间。\n19 凡到她那里去的，不得转回，也得不着生命的路。\n20 智慧必使你行善人的道，守义人的路。\n21 正直人必在世上居住；完全人必在地上存留。\n22 惟有恶人必然剪除；奸诈的，必然拔出。"}, "10-15": {"theme": "智慧的赏赐", "scripture": "箴言三章1~20节", "url": "https://www.youtube.com/watch?v=CNCNaar3heo&list=PLgFvTLP0QRDv7loBanDX5oRTdniG9ik27&index=28", "videoId": "CNCNaar3heo", "date_cn": "15/10/26(四)", "description": "主题：智慧的赏赐 \n经文：箴言三章1~20节\n\n人生各种处境，都需要智慧来面对和处理。尽管人的思虑烦恼穷尽，神的智慧却总是披荆斩棘带来祝福与平安。虽然人看不见前面的道路，但神却是全知、全能！愿我们都将所思、所想、所言、所行的事交托给祂，好能领受丰盛的恩典与赏赐。\n\n当我们愿意将神的话、神的智慧刻在心版上，并且敬畏神、遵守祂的话，就能领受极大的祝福，使我们的生命有平安，所走的道路有指引。同时，在神、在人的面前都得恩宠，获得物质的祝福，并且身、心、灵都得著滋润。感谢主！祂的智慧带给我们无比的恩赐！活在神话语中的人，真是有福！\n\n人生的道路上，我们喜欢安排、策画、掌控，总以为自己所做的抉择万无一失。但是，箴言的作者提醒我们：不可倚靠自己的聪明，不要自以为有智慧，不可轻看耶和华的管教，不可厌烦祂的责备！而这些警告，实在显出了我们本性的卑劣；当我们越多倚靠自己，就越发轻看神；我们越自以为是，就越发厌烦神的提醒与责备。\n\n亲爱的弟兄姐妹，当神的管教临到，我们是否先谦卑降服，以看见生命中的软弱与不足？神的责备临到时，我们是否虚心领受？或是我们的心刚硬、耳朵封闭，活在自我的世界，以致无法进入神丰盛的恩典？\n\n感谢主！祂总是乐意帮助我们！祂为我们预备极其丰富的恩典，又赐下生命与平安、各样丰富的财物与福气给敬畏祂的人！如同歌罗西书的作者告诉我们：「神本性一切的丰盛都有形有体的居住在基督里面」（参西二9）。当我们得著基督，祂就成为我们的智慧、公义、圣洁和救赎（参林前一30）。感谢主！耶稣基督是一切智慧与祝福的源头！我们若愿意信靠祂、仰望祂、寻求祂，就必得著一切的赏赐！\n\n回应：主啊！谢谢祢赐给我各样的祝福！我愿意完全降服于祢，专心倚靠祢。奉主的名求，阿们！\n\n祷读：箴言三章5~6节\n你要专心仰赖耶和华，不可倚靠自己的聪明，在你一切所行的事上都要认定祂，祂必指引你的路。\n\nQT: 箴言三章1~20节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「 是指敬畏神、谨守真智慧的人。\n\n亲爱的弟兄姐妹，如果我们能以神的信实、慈爱和温柔，来对待众人，我们的家庭就必蒙福！因为我们所信靠的这一位神，是乐意赐福与人的神！但愿我们的居所，都蒙神看顾与施恩。\n\n回应：主啊！求祢使我更像祢，在各个关系中能以恩慈彼此相待，活出真正的智慧，并且享受至深的平安与祝福。奉主的名求，阿们！\n \n祷读：箴言三章33~34节\n耶和华咒诅恶人的家庭，赐福与义人的居所。祂讥诮那好讥诮的人，赐恩给谦卑的人。\n\nQT: 箴言三章21~35节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "21 我儿，要谨守真智慧和谋略，不可使她离开你的眼目。\n22 这样，她必作你的生命，颈项的美饰。\n23 你就坦然行路，不致碰脚。\n24 你躺下，必不惧怕；你躺卧，睡得香甜。\n25 忽然来的惊恐，不要害怕；恶人遭毁灭，也不要恐惧。\n26 因为耶和华是你所倚靠的；他必保守你的脚不陷入网罗。\n27 你手若有行善的力量，不可推辞，就当向那应得的人施行。\n28 你那里若有现成的，不可对邻舍说：去吧，明天再来，我必给你。\n29 你的邻舍既在你附近安居，你不可设计害他。\n30 人未曾加害与你，不可无故与他相争。\n31 不可嫉妒强暴的人，也不可选择他所行的路。\n32 因为，乖僻人为耶和华所憎恶；正直人为他所亲密。\n33 耶和华咒诅恶人的家庭，赐福与义人的居所。\n34 他讥诮那好讥诮的人，赐恩给谦卑的人。\n35 智慧人必承受尊荣；愚昧人高升也成为羞辱。"}, "10-17": {"theme": "智慧的道路", "scripture": "箴言四章1~27节", "url": "https://www.youtube.com/watch?v=tu2qBz-NQ5g&list=PLgFvTLP0QRDv7loBanDX5oRTdniG9ik27&index=26", "videoId": "tu2qBz-NQ5g", "date_cn": "17/10/26(六)", "description": "主题：智慧的道路 \n经文：箴言四章1~27节\n\n在人生旅途中，每个人都会面临许多抉择。哪一条道路是我们所当行的呢？人的思想何其有限！尽管我们针对抉择，认真分析其优、缺、得、失，却发现─人心的筹算，依然跟不上环境的变化！而箴言告诉我们：有一条道路，会带领我们走向光明，以及丰盛的祝福！这一条路是智慧的道路，也就是神的道路。\n\n箴言所强调的智慧，不是人的聪明筹划，以及理性分析；因为真智慧是出自于神，是顺服祂的生命必有的经历。如同一位父亲在对孩子的教导中提到的（参1节），我们和智慧的关系，是一种关乎爱与生命的关系（参6、13节）。每一天我们的生命，都要儆醒谨守、活在智慧的道中。智慧是极其高超的，祂是首，值得我们用一切所有来换取；祂要我们爱祂，不可离弃祂；当我们珍爱智慧，以祂居首位，祂也将回报我们极大的尊荣，也就是生命的冠冕。\n\n感谢主！当我们活出满有生命的智慧之道，就能经历高升和尊荣，我们的道路也如同「黎明的光，越照越明，直到日午」（参18节）；我们行走，脚步必不致狭窄；奔跑，也不致跌倒（参11~12节）。然而，我们要如何活在智慧中呢？\n\n其实，要寻得智慧的道路并不困难，重要的是，我们是否真正爱智慧、真正信服智慧的言语？如同本章的叙述者父亲，不断耳提面命：要「听受、持定、不可放松、要存记、要坚定……」，智慧如此乐意指教我们的脚步，而我们是否乐意听从？\n\n智慧对于人的一生，真是太重要了！祂是我们的生命！当我们活在智慧中，不仅个人得益处，也能使周围的人同享祝福（参22节）。感谢主！智慧是我们生命的根基，祂保守我们的心思意念，使我们无论是在顺境或逆境中，都不致落入恶者的网罗！\n\n亲爱的弟兄姐妹，智慧决定了我们生命的品质（参23节）！但愿我们都能留心倾听智慧的言语，并且时刻走在智慧的道路上，活出尊荣、美好的人生。 \n\n回应：主啊！我愿意天天走在智慧的道路上，活出祢的丰盛与尊荣！求祢亲自指教我，如何存谦卑的心，与祢同行！奉主的名求，阿们！\n \n祷读：箴言四章6节\n不可离弃智慧，智慧就护卫你；要爱他，他就保守你。\n\nQT: 箴言四章1~27节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 众子啊，要听父亲的教训，留心得知聪明。\n2 因我所给你们的是好教训；不可离弃我的法则〔或作“指教”〕。\n3 我在父亲面前为孝子，在母亲眼中为独一的娇儿。\n4 父亲教训我说：你心要存记我的言语，遵守我的命令，便得存活。\n5 要得智慧，要得聪明，不可忘记，也不可偏离我口中的言语。\n6 不可离弃智慧，智慧就护卫你；要爱她，她就保守你。\n7 智慧为首；所以，要得智慧。在你一切所得之内必得聪明〔或作“用你一切所得的去换聪明”〕。\n8 高举智慧，她就使你高升；怀抱智慧，她就使你尊荣。\n9 她必将华冠加在你头上，把荣冕交给你。\n10 我儿，你要听受我的言语，就必延年益寿。\n11 我已指教你走智慧的道，引导你行正直的路。\n12 你行走，脚步必不致狭窄；你奔跑，也不致跌倒。\n13 要持定训诲，不可放松；必当谨守，因为它是你的生命。\n14 不可行恶人的路；不要走坏人的道。\n15 要躲避，不可经过；要转身而去。\n16 这等人若不行恶，不得睡觉；不使人跌倒，睡卧不安；\n17 因为他们以奸恶吃饼，以强暴喝酒。\n18 但义人的路好像黎明的光，越照越明，直到日午。\n19 恶人的道好像幽暗，自己不知因什么跌倒。\n20 我儿，要留心听我的言词，侧耳听我的话语，\n21 都不可离你的眼目，要存记在你心中。\n22 因为得着它的，就得了生命，又得了医全体的良药。\n23 你要保守你心，胜过保守一切〔或作“你要切切保守你心”〕，因为一生的果效是由心发出。\n24 你要除掉邪僻的口，弃绝乖谬的嘴。\n25 你的眼目要向前正看；你的眼睛〔原文作“皮”〕当向前直观。\n26 要修平你脚下的路，坚定你一切的道。\n27 不可偏向左右；要使你的脚离开邪恶。"}, "10-18": {"theme": "邪恶的引诱", "scripture": "箴言五章1~23节", "url": "https://www.youtube.com/watch?v=MHyehjoj7Vg&list=PLgFvTLP0QRDv7loBanDX5oRTdniG9ik27&index=25", "videoId": "MHyehjoj7Vg", "date_cn": "18/10/26(日)", "description": "主题：邪恶的引诱\n经文：箴言五章1~23节\n\n箴言用「淫妇」这个很强烈的字眼，与「智慧」作对比；从字里行间可以看见神忌邪的心！这表示人生道路没有任何灰色地带；如果我们不照著神的智慧行，就会走在「淫妇」这一条变迁不定的道路上，落在罪恶中！\n\n感谢主！祂的智慧带给我们极大的赏赐！当我们爱智慧，并且持守智慧，就会得著尊荣与生命。但是，如果走上另外一条道路，我们的尊荣和岁月，就都会给了别人（参9节）！若是这样，人生将充满悲叹！亲爱的弟兄姐妹，一个是充满尊荣与祝福的人生，另一个却是徒然劳碌与充满悲叹的人生，我们要选择哪一条路呢？\n\n即使淫妇的道路走向灭亡，却是很有吸引力的！她的「嘴滴下蜂蜜，她的口比油更滑」（参3节）。而如果我们的心里没有真理，就很容易受到她甜言蜜语的引诱，以为人生充满希望，却在变迁不定的道路中倍增愁苦（参3~6节）。\n\n另外，作者提到，从世界而来的引诱，也能对我们的婚姻产生很大的影响（参15~20节）。婚姻是盟约，是神所赏赐的祝福，在其中最宝贵的是夫妻彼此的爱与忠诚。但是，「淫妇」所要达成的目的，是以虚假的快乐和满足，破坏婚约中努力持守的忠诚！就属灵的意义来说，这象征我们落入世上虚假的享乐，失去对神的单一忠诚。 \n\n然而，现今世代显然正是如此！各种错误的价值观与思想，不断引诱我们的生活、破坏我们的家庭；又侵蚀我们与神的关系，使我们脚步滑跌，走向败坏与毁灭！「淫妇」画下一幅美好的图画，吸引我们投下各样资源与能力，最后却在变化不定的环境中饱尝苦果！\n\n亲爱的弟兄姐妹，如果我们倚靠世界的力量，终必明白一切都不在自己的掌握中！唯有回到神的面前，存心领受祂的训诲与责备，单单敬拜祂，享受在祂里面的活水泉源，才能走在平坦、明确的人生道路上，时时知足，充满喜乐！\n\n回应：主啊！求祢帮助我，将祢的训诲与责备存在心里，好能分辨真理与谎言，走在平安的道路上。奉主的名求，阿们！ \n\n祷读：箴言五章21节\n因为，人所行的道都在耶和华眼前；祂也修平人一切的路。\n　\n\nQT: 箴言五章1~23节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧 双脚所行的道路等，都表现出内在的生命光景。我们是否偶尔心怀骄傲，看别人不顺眼？我们的口是否实在，是就说是，不是就说不是？我们是否往来传舌，甚至造成纷争？箴言以生动的描述，向我们说明神所恨恶的生命光景。盼望我们都能蒙神保守，脱离祂所恨恶的生命！\n\n另外，神的智慧，彰显在生命的每一个层面；像是如何兼顾朋友之情，又能划出清楚的界线（参1~3节）？如何看待懒惰与贫穷的关系（参6~11节）？是否能清楚分辨灾难与罪的因果（参12~15节）？也许我们没有足够的分辨能力，在每一个处境中辨别是非对错，但是可以明白─神的心意是要我们承担生活的责任！因此祂将智慧赏赐给我们，期望我们活出讨祂喜悦的生命。外，尽管我们与朋友彼此分担重担，却要清楚自己所能承受的极限。我们必须培养勤奋、认真的生活态度，不能任性地活在罪中，却抱怨神不祝福我们。\n\n亲爱的弟兄姐妹，神的救恩是无条件的，从生活的各个层面，我们都能体会到祂无条件的爱。然而，当我们面对这一位圣洁的神，要清楚祂对于罪的恨恶，并且因为爱祂而远避恶行！但愿我们每一天都能因为爱主、认识主、敬畏主，而有属天的智慧，活出讨祂喜悦的生命！\n\n回应：主啊！我感谢祢！因为祢乐意将爱和恩典赏赐给我！求祢帮助我更深敬畏祢，恨恶祢所恨恶的，活出讨祢喜悦的生命。奉主的名求，阿们！\n\n祷读：箴言十六章6节 \n敬畏耶和华的，远离恶事。\n\nQT: 箴言六章1~19节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 我儿，你若为朋友作保，替外人击掌，\n2 你就被口中的话语缠住，被嘴里的言语捉住。\n3 我儿，你既落在朋友手中，就当这样行才可救自己：你要自卑，去恳求你的朋友。\n4 不要容你的眼睛睡觉；不要容你的眼皮打盹。\n5 要救自己，如鹿脱离猎户的手，如鸟脱离捕鸟人的手。\n6 懒惰人哪，你去察看蚂蚁的动作就可得智慧。\n7 蚂蚁没有元帅，没有官长，没有君王，\n8 尚且在夏天预备食物，在收割时聚敛粮食。\n9 懒惰人哪，你要睡到几时呢？你何时睡醒呢？\n10 再睡片时，打盹片时，抱着手躺卧片时，\n11 你的贫穷就必如强盗速来，你的缺乏仿佛拿兵器的人来到。\n12 无赖的恶徒，行动就用乖僻的口，\n13 用眼传神，用脚示意，用指点划，\n14 心中乖僻，常设恶谋，布散纷争。\n15 所以，灾难必忽然临到他身；他必顷刻败坏，无法可治。\n16 耶和华所恨恶的有六样，连他心所憎恶的共有七样：\n17 就是高傲的眼，撒谎的舌，流无辜人血的手，\n18 图谋恶计的心，飞跑行恶的脚，\n19 吐谎言的假见证，并弟兄中布散纷争的人。"}, "10-20": {"theme": "训诲的责备是生命的道", "scripture": "箴言六章20~35节", "url": "https://www.youtube.com/watch?v=XSFWwXmQsVM&list=PLgFvTLP0QRDv7loBanDX5oRTdniG9ik27&index=23", "videoId": "XSFWwXmQsVM", "date_cn": "20/10/26(二)", "description": "主题：训诲的责备是生命的道\n经文：箴言六章20~35节\n\n美色情欲的诱惑，像是包著糖衣的毒药，一开始让人恋慕，终究会像火烧衣服般，一发不可收拾。情色的诱惑力量如此之大，如何才能脱离这致命的吸引力呢？在训诲中领受责备，是建立生命的道！神的话和长者的教导，是引导我们的光！可是，我们经常选择错误的道路，以致后来承受无可避免的灾祸。\n\n当人一旦陷入情欲，往往会沉溺于罪中之乐，以为自己可以作好各种安排，不会东窗事发。但是，箴言提出警告─如果我们怀中搋火，衣服一定会烧起来；如果我们的脚在火炭上行走，也会烫伤。若沉溺于罪中，怎能避开罪的结果？外面的女人虽然拥有谄媚的舌头、美丽的容貌、勾引人的眼睛（参24~25节）；然而，她所带来的结果，却是「丧掉生命」、「必受伤损」、「必被凌辱」、「羞耻不得涂抹」（参32~33节）！此外，若落在情欲中，心中会产生极其强烈的嫉恨，甚至会在愤怒中报仇，毫不留情（参34~35节）。\n\n情欲所带来的种种诱惑，以及因其所产生的暴行，显明了人性的软弱，也带来生命的死亡！我们有什么力量，可以胜过这样的诱惑呢？箴言告诉我们，「诫命」是「灯」，「法则」是「光」，「训诲的责备」是「生命的道」（参23节）。亲爱的弟兄姐妹，我们唯有认真领受神的训诲、聆听智者的言语，并且虚心接受引导与保守，才能胜过罪恶！愿神保守我们时常活在祂话语的光中，好能脱离黑暗和情欲！\n\n世界上充满各样的诱惑和试探，如果我们不能持守神的诫命，很容易偏离真道，进入情欲所衍生的罪恶当中，最终只得承受诸般的恶果。但愿我们天天都能仰望神的智慧，不偏离左右，享受生命之道的美好！\n\n回应：主啊！我的心时常偏邪，受到各样情欲的诱惑！求祢引导、保守我走在生命之道上，领受最真实的祝福。奉主的名求，阿们！\n\n祷读：箴言六章23节\n因为诫命是灯，法则是光，训诲的责备是生命的道。\n\nQT: 箴言六章20~35节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制
