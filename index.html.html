*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif;background:#eef2f7;color:#1a1a2e;}

<script>
var D={"6-1": {"theme": "讨神喜悦的崇拜", "scripture": "诗篇五十篇1~23节", "url": "https://www.youtube.com/watch?v=svyTnNUDGXY&list=PLgFvTLP0QRDsVJHC0SEvkVM4XLP_eIjCa&index=13", "videoId": "svyTnNUDGXY", "date_cn": "1/6/26(一)", "description": "主题：讨神喜悦的崇拜\n经文：诗篇五十篇1~23节\n\n今天的诗篇，主要在斥责徒具仪式，却没有实质的崇拜，并且阐明何谓真实的崇拜。当时的犹太人将信仰与生活脱节，以为只要透过献祭来安抚神，就能得著神的喜悦。然而，神却希望祂的百姓怀抱感恩、怜恤他人的心，行出正直（参撒上十五22；何六6；弥六8）。\n\n在第1至6节，诗人借由传统的描述手法，来陈述神向人显现的方式。诗人提到大君王耶和华像是一名显赫、威严的法官，风、火为祂开路，而「祂招呼上天下地，为要审判祂的民」（4节）。　\n\n接著，在第7至15节，诗人斥责形式主义的错误。单从外表、形式来看，当时百姓的献祭是无可指责的（8节）；可是，他们若认为只要完成献祭的仪式，神就会悦纳或保护他们，那就真是大错特错了！神所要的，不单是这些物质的供奉和外在的仪式，而且这世界和其中所充满的一切，原本就都属乎祂（参9~12节）。因此，诗人告诉百姓──他们的问题不在乎献祭的仪式，而是在乎他们没有对神怀抱感恩的心，并且履行所许的誓愿（参14节）。人要来求告神，并且完全倚靠祂，才能荣耀祂的名！　\n\n在第7至15节，诗人指出百姓违反十诫中对「神」的部分，而在第16至21节，他则是指责百姓违反十诫中对「人」的部分。亲爱的弟兄姊妹，当我们与神的关系出了问题，与人的关系也必然产生问题！因为人若眼中无神（参16~17节），就容易目中无人，而当时的百姓就是这样！他们一边在大会中表现得无比敬虔，但是出了殿堂的大门就偷盗、奸淫、毁谤（参18~20节）──他们就像是有名无实的基督徒，行事为人与信仰毫不相称（参太三8）！　\n\n而在这一篇诗篇的结尾，诗人对恶人提出了警戒（参22节），又对义人提出了安慰（参23节）。「凡以感谢献上为祭的便是荣耀我；那按正路而行的，我必使他得著我的救恩。」（23节）感谢主！但愿我们时刻在神的面前献上感恩，谦卑遵行祂的教导和心意，并且以生命来敬拜祂！\n\n回应：主啊！求祢赐给我感恩的心，让我的生命结出与悔改相称的果子，好能荣耀祢奇妙的名。奉主的名求，阿们！\n\n祷读：诗篇五十篇23节\n凡以感谢献上为祭的便是荣耀我；那按正路而行的，我必使他得著我的救恩。\n\nQT：诗篇五十篇1~23节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔亚萨的诗。〕大能者神──耶和华已经发言招呼天下，从日出之地到日落之处。\n2 从全美的锡安中，神已经发光了。\n3 我们的神要来，决不闭口。有烈火在他面前吞灭；有暴风在他四围大刮。\n4 他招呼上天下地，为要审判他的民，\n5 说：招聚我的圣民到我这里来，就是那些用祭物与我立约的人。\n6 诸天必表明他的公义，因为神是施行审判的。（细拉）\n7 我的民哪，你们当听我的话！以色列啊，我要劝戒你；我是神，是你的神！\n8 我并不因你的祭物责备你；你的燔祭常在我面前。\n9 我不从你家中取公牛，也不从你圈内取山羊；\n10 因为，树林中的百兽是我的，千山上的牲畜也是我的。\n11 山中的飞鸟，我都知道；野地的走兽也都属我。\n12 我若是饥饿，我不用告诉你，因为世界和其中所充满的都是我的。\n13 我岂吃公牛的肉呢？我岂喝山羊的血呢？\n14 你们要以感谢为祭献与神，又要向至高者还你的愿，\n15 并要在患难之日求告我；我必搭救你，你也要荣耀我。\n16 但神对恶人说：你怎敢传说我的律例，口中提到我的约呢？\n17 其实你恨恶管教，将我的言语丢在背后。\n18 你见了盗贼就乐意与他同伙，又与行奸淫的人一同有分。\n19 你口任说恶言；你舌编造诡诈。\n20 你坐着毁谤你的兄弟，谗毁你亲母的儿子。\n21 你行了这些事，我还闭口不言，你想我恰和你一样；其实我要责备你，将这些事摆在你眼前。\n22 你们忘记神的，要思想这事，免得我把你们撕碎，无人搭救。\n23 凡以感谢献上为祭的便是荣耀我；那按正路而行的，我必使他得着我的救恩。"}, "6-2": {"theme": "真实的悔改", "scripture": "诗篇五十一篇1~19节", "url": "https://www.youtube.com/watch?v=7H7f-iHAg5c&list=PLgFvTLP0QRDsVJHC0SEvkVM4XLP_eIjCa&index=11", "videoId": "7H7f-iHAg5c", "date_cn": "2/6/26(二)", "description": "主题：真实的悔改\n经文：诗篇五十一篇1~19节\n\n大卫与拔示巴行奸淫之后，先知拿单来责备他。后来，大卫在神的面前彻底认罪、悔改，写成了这一篇诗篇。这一篇诗篇是一首「交与伶长」的诗篇。我们能够借此看见，大卫除了在密室中向神或先知认罪，还将这一篇诗篇谱成曲，叫人公开唱诵，而他这样做等于是在向全国百姓认罪。以下是这一篇诗篇的主要结构和信息：\n\n求神赦罪：在第1至4节，大卫承认自己固然得罪了「人」；但是，在本质上，他是违反了神的诫命，以致得罪神！所以，大卫这样恳求神：「神啊，求祢按祢的慈爱怜恤我！按祢丰盛的慈悲涂抹我的过犯！」（1节）大卫没有为自己所犯下的罪，在神面前作出任何的申辩（参3节），因为他深知犯罪是得罪神，也必承受神的审判（4节）。\n\n求能成圣：接著，在第5至9节，大卫更进一步自述：「我是在罪孽里生的，在我母亲怀胎的时候就有了罪。」（5节）我们从这一节经文可以看见，大卫的态度已经从承认罪行，到承认罪性！这是更深切的认罪！大卫知道神察看内心，而祂所爱的是内里的诚实（参6节）；所以，大卫不以在神面前得著赦免为满足，更希望能被神完全洁净，以致迈向成圣。可是，大卫也非常清楚──人无法靠自己的力量，除去罪行的后果及罪性的影响！所以，他求神用牛膝草洁净他（参7节；利十四4），并且求神掩面不看他的罪，涂抹他一切的罪孽（参9节）。\n\n求得圣灵：在第10至12节，大卫更进一步向神呼求：「神啊，求祢为我造清洁的心，使我里面重新有正直的灵。不要丢弃我，使我离开祢的面；不要从我收回祢的圣灵。」（10~11节）这是更深切的祷告！在神面前认罪、得著赦免，只是对付罪消极的作法，积极的作法则是要重新在神的里面，得著清洁的心和正直的灵！\n\n求主复兴：在第13至19节，大卫指出蒙恩者的使命，就是成为「见证者」，时刻分享神的恩惠。或许有人蒙恩，全职服事成为传道、长老，或许有人蒙恩带职事奉；但是，无论我们是哪一种，都是「全职」的见证者！因为凡是属基督的儿女，都要回应作主见证的福分和使命（参徒一8）！\n\n回应：主啊！求祢帮助我除去恐惧和忧伤，在悔改的过程中经历祢的荣耀与慈爱！但愿我在祢面前常存清洁、无愧的心！奉主的名求，阿们！\n\n祷读：诗篇五十一篇10节\n神啊，求祢为我造清洁的心，使我里面重新有正直的灵。\n\nQT：诗篇五十一篇1~19节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔大卫与拔示巴同室以后、先知拿单来见他‧他作这诗、交与伶长。〕神啊，求你按你的慈爱怜恤我！按你丰盛的慈悲涂抹我的过犯！\n2 求你将我的罪孽洗除净尽，并洁除我的罪！\n3 因为，我知道我的过犯；我的罪常在我面前。\n4 我向你犯罪，惟独得罪了你；在你眼前行了这恶，以致你责备我的时候显为公义，判断我的时候显为清正。\n5 我是在罪孽里生的，在我母亲怀胎的时候就有了罪。\n6 你所喜爱的是内里诚实；你在我隐密处，必使我得智慧。\n7 求你用牛膝草洁净我，我就干净；求你洗涤我，我就比雪更白。\n8 求你使我得听欢喜快乐的声音，使你所压伤的骨头可以踊跃。\n9 求你掩面不看我的罪，涂抹我一切的罪孽。\n10 神啊，求你为我造清洁的心，使我里面重新有正直的灵〔“正直”或作“坚定”〕。\n11 不要丢弃我，使我离开你的面；不要从我收回你的圣灵。\n12 求你使我仍得救恩之乐，赐我乐意的灵扶持我，\n13 我就把你的道指教有过犯的人，罪人必归顺你。\n14 神啊，你是拯救我的神；求你救我脱离流人血的罪！我的舌头就高声歌唱你的公义。\n15 主啊，求你使我嘴唇张开，我的口便传扬赞美你的话！\n16 你本不喜爱祭物，若喜爱，我就献上；燔祭，你也不喜悦。\n17 神所要的祭就是忧伤的灵；神啊，忧伤痛悔的心，你必不轻看。\n18 求你随你的美意善待锡安，建造耶路撒冷的城墙。\n19 那时，你必喜爱公义的祭和燔祭并全牲的燔祭；那时，人必将公牛献在你坛上。"}, "6-3": {"theme": "永远倚靠神", "scripture": "诗篇五十二篇1~9节", "url": "https://www.youtube.com/watch?v=-eV5yrAWSS0&list=PLgFvTLP0QRDsVJHC0SEvkVM4XLP_eIjCa&index=10", "videoId": "-eV5yrAWSS0", "date_cn": "3/6/26(三)", "description": "主题：永远倚靠神\n经文：诗篇五十二篇1~9节\n\n以东人多益在扫罗面前挑唆是非，以致祭司亚希米勒家的八十五人尽被杀害（参撒上二十二）。在这样的事情发生之后，大卫写了这首诗篇。\n\n本篇诗篇主要是在比较两种人：一种人以作恶自夸，只要对他有利，他就无恶不作；第二种人则因著晓得「神的慈爱是常存的」（1节），所以他就「永永远远倚靠神的慈爱」（8节）。第一种人作恶、诡诈，并且波及旁人；而第二种人愤怒地谴责这样的人，并且宣布自己要像神殿中的橄榄树一样，绝不动摇！以下内容是这一篇诗篇的主要结构和信息：\n\n恶人必永被毁灭：在第1至5节，大卫谴责恶人的行为，尤其是舌头上的罪恶。大卫的受苦和祭司一家的被灭，都是拜多益所赐。当大卫提到多益，说他是一位「勇士」，绝对是要讽刺他！因为多益勇于作恶，并且自夸！然而，令我们讶异的是，大卫面对这样的事情，却依然能宣告──神的慈爱是常存的（1节）！\n\n义人必永被建立：在第5至9节，大卫提到──义人将要看见恶人遭报、受警戒，以致欢喜赞美神！义人将要看见──那些「不以神为他力量」、「只倚仗他丰富的财物」，并且硬著心肠、不悔改，又「在邪恶上坚立自己」的恶人（7节），最终将要面对神的毁灭（参5节）！\n\n由于大卫拥有属灵的眼光，因此他在神的面前立志──他将如同圣殿中的青橄榄树一样，永远被神所建立！所以，就算他受到各方的攻击，他也要选择「永永远远倚靠神的慈爱」（8节）！\n\n亲爱的弟兄姊妹，你正在承受各方而来的压迫与重担吗？来到神的面前吧！让我们真实地呼求祂的名，祂必要坚固我们的生命，而我们要永永远远倚靠祂！\n\n回应：主啊！当我面临各样的逆境与攻击，求祢保守我能够完全倚靠祢的慈爱！奉主的名求，阿们！\n\n祷读：诗篇五十二篇8节\n至于我，就像神殿中的青橄榄树；我永永远远倚靠神的慈爱。\n\nQT：诗篇五十二篇1~9节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔以东人多益来告诉扫罗说：“大卫到了亚希米勒家。”那时，大卫作这训诲诗，交与伶长。〕勇士啊，你为何以作恶自夸？神的慈爱是常存的。\n2 你的舌头邪恶诡诈，好像剃头刀，快利伤人。\n3 你爱恶胜似爱善，又爱说谎，不爱说公义。（细拉）\n4 诡诈的舌头啊，你爱说一切毁灭的话！\n5 神也要毁灭你，直到永远；他要把你拿去，从你的帐棚中抽出，从活人之地将你拔出。（细拉）\n6 义人要看见而惧怕，并要笑他，\n7 说：看哪，这就是那不以神为他力量的人，只倚仗他丰富的财物，在邪恶上坚立自己。\n8 至于我，就像神殿中的青橄榄树；我永永远远倚靠神的慈爱。\n9 我要称谢你，直到永远，因为你行了这事。我也要在你圣民面前仰望你的名；这名本为美好。"}, "6-4": {"theme": "拒绝神主权的结局", "scripture": "诗篇五十三篇1~6节", "url": "https://www.youtube.com/watch?v=szfndbZvTrk&list=PLgFvTLP0QRDsVJHC0SEvkVM4XLP_eIjCa&index=9", "videoId": "szfndbZvTrk", "date_cn": "4/6/26(四)", "description": "主题：拒绝神主权的结局\n经文：诗篇五十三篇1~6节\n\n今天的这一篇诗篇在原文里提到「神」的时候，都没有使用「耶和华」（自有永有、慈爱信实的神）这个词，而是用「以罗欣」（审判公义的神）。诗人这样做，是为了严厉地指出──不信神的人犯罪、作恶的结局。\n\n愚顽人的特色：第1至3节所提到的「愚顽人」，指的不是愚笨的人，而是指「不承认神主权」的人，他们的自夸、自媚及邪恶。诗人如此描述：「愚顽人心里说：『没有神』」（1节）！这样的人并非否认「神的存在」，而是否认「神的权能」，拒绝寻求神。而且，拒绝神的主权是一个普遍的现象（参2节）！\n\n不仅如此，这样的心态还会不断地向外扩散，以致影响更多人（参3节；罗三10~17）。神从天上垂顾世人，要看有没有寻求祂的，却遍寻不著（参2节），因为世人都偏离神（罗三23）、与神为敌，并且厌恶属神的真理！倘若耶稣基督没有主动来寻找人，赐下救恩的盼望，人的本性其实是倾向拒绝真光的（参约一5）。所以，亲爱的弟兄姊妹！我们如今能够成为神的儿女，都是因为从神蒙了极大的恩典！我们不应当为所得的恩典与恩赐自夸，而是要为此怀抱感恩，并且尽力传扬神的恩惠与福音（参罗一14）。\n\n愚顽人的结局：我们在第4、5节看到，神的百姓会受到恶者的攻击、捆绑与陷害（参4节；约十六33）。然而，当魔鬼看似已经得胜，神却要在转瞬之间「使他们蒙羞」（5节）。当目中无神的人对神的儿女发出攻击，或许能取得暂时的胜利，以致得意忘形；但是，等到神的时候满足，祂就要显明自己，为祂的百姓伸冤（参来十30），好叫世人知道──「耶和华在天上立定宝座；祂的权柄统管万有」（诗一零三19）！\n\n诗人的盼望：所以，在第6节，诗人带著盼望宣告：「神救回祂被掳的子民」！到了那个时候，「雅各要快乐，以色列要欢喜」！诗人深信──神将拯救祂的百姓脱离那恶者的手。\n\n亲爱的弟兄姊妹，无论你正在面临什么考验，让我们学习一天比一天更加信靠神的权柄，相信祂的名统管万有，直到永远！\n\n回应：主啊！祢比我还要清楚我所遭遇的一切！求祢保守我的心，胜过保守一切，并且在我的身上施行公义与怜悯！奉主的名求，阿们！\n\n祷读：诗篇五十三篇6节\n但愿以色列的救恩从锡安而出。神救回祂被掳的子民那时，雅各要快乐，以色列要欢喜。\n\nQT：诗篇五十三篇1~6节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上 要承受儿子的叛乱，就能理解他内心怀抱的愤恨！\n\n当我们面临像大卫一样的遭遇时，神也没有要我们伪装内心最真实的感受。今天的这一篇诗篇也使我们明白，我们不需要在神面前，掩饰任何不安与不满，而是只要真实地来到祂的面前寻求祂！\n\n大卫的信心：第16至23节让我们看见，当大卫认清人是如此地不可靠，他就转而思想神的信实（19节）。所以，他如此写道：「至于我，我要求告神」（16节）。这是大卫生命的转捩点！虽然他的处境尚未改变，但是我们若比较第6节与第18节的内容，就可以发现──大卫之前心里充满担忧，以为逃避到别处才能得著安息；现在，他却只逃到神的怀里，就能够得著安息！感谢主！单单在主里就能得著安息，真是我们的盼望！\n\n因此，大卫在这一篇诗篇的结尾，这样劝勉众人：「你要把你的重担卸给耶和华，祂必抚养你；祂永不叫义人动摇。」（22节）\n\n回应：主啊！求祢帮助我在祢的里面得享安息！让我知道并且相信，唯独祢是我的倚靠和盼望！奉主的名求，阿们！\n\n祷读：诗篇五十五篇22节\n你要把你的重担卸给耶和华，祂必抚养你；祂永不叫义人动摇。\n\nQT：诗篇五十五篇1~23节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔大卫的训诲诗、交与伶长。用丝弦的乐器。〕神啊，求你留心听我的祷告，不要隐藏不听我的恳求！\n2 求你侧耳听我，应允我。我哀叹不安，发声唉哼，\n3 都因仇敌的声音，恶人的欺压；因为他们将罪孽加在我身上，发怒气逼迫我。\n4 我心在我里面甚是疼痛；死的惊惶临到我身。\n5 恐惧战兢归到我身；惊恐漫过了我。\n6 我说：但愿我有翅膀像鸽子，我就飞去，得享安息。\n7 我必远游，宿在旷野。（细拉）\n8 我必速速逃到避所，脱离狂风暴雨。\n9 主啊，求你吞灭他们，变乱他们的舌头！因为我在城中见了强暴争竞的事。\n10 他们在城墙上昼夜绕行；在城内也有罪孽和奸恶。\n11 邪恶在其中；欺压和诡诈不离街市。\n12 原来不是仇敌辱骂我，若是仇敌，还可忍耐；也不是恨我的人向我狂大，若是恨我的人就必躲避他。\n13 不料是你；你原与我平等，是我的同伴，是我知己的朋友！\n14 我们素常彼此谈论，以为甘甜；我们与群众在神的殿中同行。\n15 愿死亡忽然临到他们！愿他们活活地下入阴间！因为他们的住处，他们的心中，都是邪恶。\n16 至于我，我要求告神；耶和华必拯救我。\n17 我要晚上、早晨、晌午哀声悲叹；他也必听我的声音。\n18 他救赎我命脱离攻击我的人，使我得享平安，因为与我相争的人甚多。\n19 那没有更变、不敬畏神的人，从太古常存的神必听见而苦待他。\n20 他背了约，伸手攻击与他和好的人。\n21 他的口如奶油光滑，他的心却怀着争战；他的话比油柔和，其实是拔出来的刀。\n22 你要把你的重担卸给耶和华，他必抚养你；他永不叫义人动摇。\n23 神啊，你必使恶人下入灭亡的坑；流人血、行诡诈的人必活不到半世，但我要倚靠你。"}, "6-7": {"theme": "惧怕与信靠", "scripture": "诗篇五十六篇1节~五十七篇11节", "url": "https://www.youtube.com/watch?v=E5UrMFAiZs4&list=PLgFvTLP0QRDsVJHC0SEvkVM4XLP_eIjCa&index=6", "videoId": "E5UrMFAiZs4", "date_cn": "7/6/26(日)", "description": "主题：惧怕与信靠\n经文：诗篇五十六篇1节~五十七篇11节\n这两篇诗篇的性质十分相似，都在描述诗人的个人经验。第五十六篇提到了大卫在遭到扫罗追杀的过程中，被迫流亡到外邦，却在外邦国家不被信任，时常活在惧怕中。而到了最后，他甚至只好装疯卖傻，好能逃命（参撒上二十一10~15）。第五十七篇则是大卫在躲避扫罗的过程中，逃到亚杜兰洞或隐基底洞时所写成的作品（参撒上二十二1~2，二十四1~3）。\n第五十六篇是历代圣徒非常喜爱诵读的一篇诗篇，因为它告诉我们如何应付生命中的恐惧！毕竟，谁没有经历过患难呢？当人们扭曲我们的话语，我们岂不会心怀愁烦和愤恨呢（参五十六5）？可是，如同大卫所写道：「我惧怕的时候要倚靠祢……我倚靠神，必不惧怕」（五十六3~4）。这是何等大的安慰与启示啊！\n当初，大卫本以为投靠外邦就能得著安稳，想不到，他反倒在外邦饱受欺压，陷入不安。然而，在这个惧怕与信靠彼此挣扎的时刻，他却选择降服、信靠神，并且这样回应：「我惧怕的时候要倚靠祢……我倚靠神，必不惧怕」（五十六3~4）。尽管问题依然非常艰难，环境也依旧危机重重，大卫却能看见──神的力量大过一切的困难！因此，他深信──我既然在主的手里，我是永生神的儿女，我就必不惧怕！\n第五十七篇描述了大卫如何从怀抱惧怕，到真实信靠神的过程──他透过祷告，经历了从黑夜到黎明的心境（参五十七4、8）。如今，虽然患难依旧，然而当他投靠在神的翅膀下（参五十六1），就能高唱──「神啊，我心坚定，我心坚定；我要唱诗，我要歌颂」（五十七7）！\n基督徒的一生，充满著「信靠与惧怕」两者的挣扎！然而，神永不改变的应许（参约十三1，十五9），将是我们在软弱中最大的安慰！亲爱的弟兄姊妹，无论你正在面对什么样的困难，让我们都来「投靠在神的翅膀荫下」吧！\n回应：主啊！在这个快速变迁、充满试探的世界中，求祢让我时刻仰望祢那不能震动的国，在祢那里得著最真实的平安！奉主的名求，阿们！\n祷读：诗篇五十六篇10节\n 我倚靠神，我要赞美祂的话；我倚靠耶和华，我要赞美祂的话。\n\nQT: 诗篇五十六篇1节~五十七篇11节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n 永恒的荣耀中，体验到的喜乐与福分！所以，虽然我们总是在各样的忧愁与喜乐中挣扎，却都能怀抱著至深的盼望等候神──因为属于我们的奖赏，终会到来！\n回应：主啊！即便罪恶看似得胜，求祢赐给我信心的眼光，相信祢仍然掌权，\n也必审判！奉主的名求，阿们！\n祷读：诗篇一篇6节\n 因为耶和华知道义人的道路；恶人的道路却必灭亡。\n\nQT: 诗篇五十八篇1~11节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔大卫的金诗、交与伶长。调用休要毁坏。〕世人哪，你们默然不语，真合公义吗？施行审判，岂按正直吗？\n2 不然！你们是心中作恶；你们在地上秤出你们手所行的强暴。\n3 恶人一出母胎就与神疏远，一离母腹便走错路，说谎话。\n4 他们的毒气好像蛇的毒气；他们好像塞耳的聋虺，\n5 不听行法术的声音，虽用极灵的咒语也是不听。\n6 神啊，求你敲碎他们口中的牙！耶和华啊，求你敲掉少壮狮子的大牙！\n7 愿他们消灭，如急流的水一般；他们瞅准射箭的时候，愿箭头仿佛砍断。\n8 愿他们像蜗牛消化过去，又像妇人坠落未见天日的胎。\n9 你们用荆棘烧火，锅还未热，他要用旋风把青的和烧着的一齐刮去。\n10 义人见仇敌遭报就欢喜，要在恶人的血中洗脚。\n11 因此，人必说：义人诚然有善报；在地上果有施行判断的神！"}, "6-9": {"theme": "神是我的高台", "scripture": "诗篇五十九篇1~17节", "url": "https://www.youtube.com/watch?v=HhstdO7uF9s&list=PLgFvTLP0QRDsVJHC0SEvkVM4XLP_eIjCa&index=4", "videoId": "HhstdO7uF9s", "date_cn": "9/6/26(二)", "description": "主题：神是我的高台\n经文：诗篇五十九篇1~17节\n这一篇诗篇的写作背景，是撒母耳记上第十八至十九章。大卫对扫罗忠心耿耿，却因为功高而遭到他的猜忌和陷害！不过，想要毁掉大卫的人，绝对不只扫罗一人（参3节）！大卫很可能也让扫罗身旁的许多臣仆心怀忌妒，所以他们就在扫罗的耳边抹黑大卫（参12节）。\n这一篇诗篇的结构，大致可以分成两段。第1至9节，是大卫在急难中求主拯救；第10至17节，则是大卫求主为他伸冤，并且凭著信心宣告他所蒙的拯救。在第1节，大卫求神保护他、作他的高台，而到了最后一节，大卫高声歌颂神是他的高台。\n求主拯救：在第1至9节，大卫迫切地重复向主说出「求祢救我」（1、2节）、「求祢兴起」（4、5节）的求救信号！而特别值得注意的是──当他向神呼求，他也求公义的主鉴察他自己！亲爱的弟兄姊妹，我们受到的苦难，不一定都是出于他人的过犯；让我们在受苦的时刻，效法大卫的榜样，先来到神的面前省察自己的生命。\n大卫认为他的敌人像是一群野狗，夜间在城里飘荡、狂吠、用话语伤人，甚至藐视神（参6、7节）。然而，第8节的「但」这一个字，引导我们看见一个强烈的对比──尽管仇敌四处咆哮，大卫仍能以属灵的眼光，看见那一位守约、施慈爱的神，在天上嗤笑恶人（参8、9节）。\n求主伸冤：在第10至17节，大卫对他的仇敌作出了进一步的描述，说他们善用话语抹黑、毁谤人（参12节）。可是，第16节的「但」这一个字，和第8节的「但」字一样，作出了一个强烈的对比，并且再次将我们的眼光，从地上提升到天上的那一位神身上──如同大卫注目于神的慈爱，而不是仇敌的伤害（参10节）。\n亲爱的弟兄姊妹，你是否也曾经像大卫一样，遭受毁谤、误解、抹黑，甚至是生命的危险？大卫之所以能够得胜，是因为他是一个讨神喜悦的人，而且他在急难中不仅没有丧志，反而向万军之耶和华大声呼求！让我们也从他的身上学习生命的功课──凡事单单仰望神，让神作我们的高台。\n回应：主啊！无论环境如何，求祢作我的高台，使我更深经历祢的信实与慈爱！奉主的名求，阿们！\n祷读：诗篇五十九篇17节\n我的力量啊，我要歌颂祢；因为神是我的高台，是赐恩与我的神。\n\nQT: 诗篇五十九篇1~17节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔扫罗打发人窥探大卫的房屋、要杀他‧那时大卫用这金诗、交与伶长。调用休要毁坏。〕我的神啊，求你救我脱离仇敌，把我安置在高处，得脱那些起来攻击我的人。\n2 求你救我脱离作孽的人和喜爱流人血的人！\n3 因为，他们埋伏要害我的命；有能力的人聚集来攻击我。耶和华啊，这不是为我的过犯，也不是为我的罪愆。\n4 我虽然无过，他们预备整齐，跑来攻击我。求你兴起鉴察，帮助我！\n5 万军之神──耶和华以色列的神啊！求你兴起，惩治万邦！不要怜悯行诡诈的恶人！（细拉）\n6 他们晚上转回，叫号如狗，围城绕行。\n7 他们口中喷吐恶言，嘴里有刀；他们说：有谁听见？\n8 但你──耶和华必笑话他们；你要嗤笑万邦。\n9 我的力量啊，我必仰望你，因为神是我的高台。\n10 我的神要以慈爱迎接我；神要叫我看见我仇敌遭报。\n11 不要杀他们，恐怕我的民忘记。主啊，你是我们的盾牌；求你用你的能力使他们四散，且降为卑。\n12 因他们口中的罪和嘴里的言语，并咒骂虚谎的话，愿他们在骄傲之中被缠住了。\n13 求你发怒，使他们消灭，以致归于无有，叫他们知道神在雅各中间掌权，直到地极。（细拉）\n14 到了晚上，任凭他们转回；任凭他们叫号如狗，围城绕行。\n15 他们必走来走去，寻找食物，若不得饱就终夜在外。\n16 但我要歌颂你的力量，早晨要高唱你的慈爱；因为你作过我的高台，在我急难的日子作过我的避难所。\n17 我的力量啊，我要歌颂你；因为神是我的高台，是赐恩与我的神。"}, "6-10": {"theme": "反败为胜的秘诀", "scripture": "诗篇六十篇1~12节", "url": "https://www.youtube.com/watch?v=gj9TzXT921M&list=PLgFvTLP0QRDsVJHC0SEvkVM4XLP_eIjCa&index=3", "videoId": "gj9TzXT921M", "date_cn": "10/6/26(三)", "description": "主题：反败为胜的秘诀\n经文：诗篇六十篇1~12节\n这一篇诗篇的标题是要记念胜利，内容却在描述失败！因此，有人认为这一篇诗篇可能是在神的百姓既败未胜之前所写，或是在反败为胜之时所写，好使人晓得「人的帮助是枉然的」（第11节），而真实的胜利来自倚赖神的大能（参12节）。\n本篇诗篇的写作背景，是撒母耳记下八章3至6节，以及历代志上十八章12、13节。当时可能发生了这样的事：大卫在北方战胜两河间的亚兰与琐巴的亚兰，南方的以东人却乘虚入侵犹太境内，导致犹太人最后败战。以下内容是这一篇诗篇的主要结构：\n为国哀诉（1~4节）：大卫在哀诉战事的失败时，使用「震动」、「崩裂」、「摇动」、「艰难」、「东倒西歪」等词来描述战局，表明以色列人在遭遇大败以后，人心涣散、全国混乱的情境。然而，此时大卫却认为──他们之所以失败，是因为神「丢弃」他们，向他们「发怒」（1节），而一切都是出于神的许可。因此，大卫就求神降下复兴与医治（参1~2节）。人生的许多问题，都可以推究到我们与神之间的关系。有时我们需要在神的面前认罪、悔改，有时我们必须顺服祂的旨意。\n　　大卫在第4节写道：「祢把旌旗赐给敬畏祢的人，可以为真理扬起来。」旌旗代表统帅所在之地──大卫要神授旗给他，这表示他期盼神再次与属祂的百姓同在！而大卫之所以出战，不是要为自己报仇，而是要为著神的真理而战。\n胜利远象（5~8节）：大卫因著为真理而战，而能看见胜利的远象。第5节是他向神的祈求，第6至8节则是他叙述神如何回应他的祷告。「神已经指著祂的圣洁说」──这句话表明神绝不信口雌黄！祂只要一说出口，事情就必作成！\n为国祈祷（9~12节）：大卫在第9节如此问道－－「谁能领我进坚固城」？他深知自己只是「副手」，唯独神是「元帅」！大卫因著跟随这一位得胜的主，他就清楚自己无须惧怕与忧虑，而是能够安息在主的得胜里面。\n亲爱的弟兄姊妹，但愿今天这一篇信心的诗篇，能够提升我们属灵的生命！但愿全能的神与我们同在、赐给我们盼望及帮助，并且最终引领我们得胜！\n回应：主啊，求祢作我的旌旗！我要全心倚靠祢，直到看见祢引领我得胜！奉主的名求，阿们！\n祷读：诗篇六十篇12节\n我们倚靠神才得施展大能，因为践踏我们敌人的就是祂。\nQT: 诗篇六十篇1~12节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365 敢于先一步宣告──他必然再次经历神的「慈爱和诚实」（7节）！而他要立定心志化伤痛为赞美，在歌颂中等候神的作为，好向祂履行所许的愿（参8节）。\n亲爱的弟兄姊妹，或许你也曾经尝过神恩典的滋味，如今却被计划、问题及忧郁所淹没，以致远离了神。今天，让我们再度转向神，向祂呼求：「求祢领我到那比我更高的磐石」！\n回应：主啊，求祢再次侧耳垂听我的呼求！不论如何，求祢领我到那比我更高的磐石。奉主的名求，阿们！\n祷读：诗篇九十四篇22节\n但耶和华向来作了我的高台；我的神作了我投靠的磐石。\n\nQT: 诗篇六十一篇1~8节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔大卫的诗，交与伶长。用丝弦的乐器。〕神啊，求你听我的呼求，侧耳听我的祷告！\n2 我心里发昏的时候，我要从地极求告你。求你领我到那比我更高的磐石！\n3 因为你作过我的避难所，作过我的坚固台，脱离仇敌。\n4 我要永远住在你的帐幕里！我要投靠在你翅膀下的隐密处！（细拉）\n5 神啊，你原是听了我所许的愿；你将产业赐给敬畏你名的人。\n6 你要加添王的寿数；他的年岁必存到世世。\n7 他必永远坐在神面前；愿你预备慈爱和诚实保佑他！\n8 这样，我要歌颂你的名，直到永远，好天天还我所许的愿。"}, "6-12": {"theme": "默然等候 专心寻求", "scripture": "诗篇六十二篇1节~六十三篇11节", "url": "https://www.youtube.com/watch?v=4NJicRO0zGQ&list=PLgFvTLP0QRDsVJHC0SEvkVM4XLP_eIjCa&index=1", "videoId": "4NJicRO0zGQ", "date_cn": "12/6/26", "description": "主题：默然等候 专心寻求\n经文：诗篇六十二篇1节~六十三篇11节\n\n今天的这两篇诗篇，是大卫在遭到儿子押沙龙，以及好友亚希多弗背叛的时候写成的。大卫在这两篇诗篇中，除了叙述悲痛万分的感受，也提到了他如何仍然专心寻求，并且静默倚靠神。「安静」是一种伟大的力量，却不容易做到。一个人可以不说话，但未必能使自己的「心默默无声，专等候神」（参六十二1）；因为每当我们试著安静下来，就会发现自己的内心何等吵杂，意念何其纷乱。为什么诗人能默然等候神（参六十二5）？因为他知道──「惟独祂是我的磐石，我的拯救」（参六十二2）；祂能救我脱离危险，祂是我的盼望（参六十二5）；祂是我们的避难所（参六十二8）；祂是我的辩护（参六十二11、12）。因此，诗人可以安然等候神的时间成就。\n\n当大卫在旷野遇到危难，甚至心灵枯干时，他首先想到的是寻求神（参六十三1）。大卫曾经在会幕中经历神的荣耀，但并不以此为满足。他希望藉著旷野的经历，再度看见神的荣耀，如同先前在会幕中所经历的。其次，他称颂神──「我还活的时候要这样称颂祢……我也要以欢乐的嘴唇赞美祢」（参六十三4~5）。最后，纵然环境尚未改变，他却已经能在神的里面享受喜乐（参六十三11）。外在的环境，无法夺去他内在的喜乐与满足。\n\n大卫认识神的性情，知道祂必然不离弃寻求祂的人，所以敢于「默然等候」，敢于「扬声赞美」！亲爱的弟兄姊妹，但愿我们面临人、事及环境的难处时，都能再次来到神的面前，更深认识祂、经历祂，好得著等候祂的能力，并且再次看见祂的作为！\n\n回应：主啊！每当我遇见难处，求祢约束我的口，使我默然等候祢、扬声赞美祢，以致能看见祢奇妙的作为！奉主的名求，阿们！\n\n祷读：诗篇六十二篇5节\n我的心哪，你当默默无声，专等候神，因为我的盼望是从祂而来。\n\n\nQT: 诗篇六十二篇1节~六十三篇11节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔大卫的诗，照耶杜顿的作法、交与伶长。〕我的心默默无声，专等候神；我的救恩是从他而来。\n2 惟独他是我的磐石，我的拯救；他是我的高台，我必不很动摇。\n3 你们大家攻击一人，把他毁坏，如同毁坏歪斜的墙、将倒的壁，要到几时呢？\n4 他们彼此商议，专要从他的尊位上把他推下；他们喜爱谎话，口虽祝福，心却咒诅。（细拉）\n5 我的心哪，你当默默无声，专等候神，因为我的盼望是从他而来。\n6 惟独他是我的磐石，我的拯救；他是我的高台，我必不动摇。\n7 我的拯救、我的荣耀都在乎神；我力量的磐石、我的避难所都在乎神。\n8 你们众民当时时倚靠他，在他面前倾心吐意；神是我们的避难所。（细拉）\n9 下流人真是虚空；上流人也是虚假；放在天平里就必浮起；他们一共比空气还轻。\n10 不要仗势欺人，也不要因抢夺而骄傲；若财宝加增，不要放在心上。\n11 神说了一次、两次，我都听见：就是能力都属乎神。\n12 主啊，慈爱也是属乎你，因为你照着各人所行的报应他。"}, "6-13": {"theme": "静默不语仰望主", "scripture": "诗篇六十四篇1~10节", "url": "https://www.youtube.com/watch?v=ExN1_DbyXEY&list=PLgFvTLP0QRDsarwUxSyXa2mhzxmGsc-V6&index=29", "videoId": "ExN1_DbyXEY", "date_cn": "13/6/26(六)", "description": "主题：静默不语仰望主\n经文：诗篇六十四篇1~10节\n\n今天所读的诗篇，是大卫遭到扫罗迫害的时候所写的。内容特别提到敌人的谗言毁谤，如同利剑一般（参3~4节），使得大卫感到身心俱疲，惊恐莫名（参1节）。当时，大卫的仇敌不仅大放流言，又暗箭伤人（参5节）；所以，他在诗篇中向神祷告，呼求神保护他脱离仇敌的手。\n\n仇敌的毒计（参1~6节）：所谓明枪易躲，暗箭难防。舌头是杀人不见血的利器，如同雅各写道:「舌头就是火，在我们百体中，舌头是个罪恶的世界，能污秽全身，也能把生命的轮子点起来，并且是从地狱里点著的。」（参雅三6）敌人暗中仔细策划（参5~6节），捏造各种子虚乌有的事陷害大卫（参3~4节），使他百口莫辩！当大卫面临这样的光景，他呼求神的保护，求神将他隐藏起来（参1~2节）。\n\n流言止于智者！但是，现今又有多少智者，能不受到流言的影响呢？各类媒体为求生存，竞相捕风捉影、夸大捏造；这样的风气不仅影响社会，也充斥在教会与基督徒的生活中，败坏基督徒的生命。亲爱的弟兄姊妹，我们是否也曾有意无意，成为流言的传递者或无故成为受害者呢？\n\n仇敌的报应（参7~10节）：尽管大卫饱受谗言和毁谤的伤害，他却能在信心中看见神的拯救，以及恶人的结局！尤其是他看见恶人想要「射」人（参4节），最后反被神「射」中（参7节）!\n\n诗人说：「因我所遭遇的是出于祢，我就默然不语。」（参诗三十九9）当我们被误会或受委屈时，想要接受这一切都是神所允许的，以致能够「默然不语」，是何等困难！然而，「静默有时」（参传三7），若交给神，伸冤在主，就不必自己说话。亲爱的弟兄姊妹，你正在面临枯竭、无奈的光景吗？你认为自己在一些紧张关系中，遭受逼迫和攻击吗？让我们以一颗单纯、安静的心，来到神的面前仰望祂，直到看见耶和华为我们成就大事（参出十四13）！\n\n回应：主啊！求祢帮助我安静自己的心，等候祢的旨意成就在我的身上！奉主的名求，阿们！\n\n祷读：箴言一章33节\n惟有听从我的，必安然居住，得享安静，不怕灾祸。\nQT: 诗篇六十四篇1~10节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近 ，施恩在百姓中间；如今，他相信神也必如此行！我们要留意接下来两节经文所使用的意象──「祢使我们进入网罗，把重担放在我们的身上。祢使人坐车轧我们的头；我们经过水火，祢却使我们到丰富之地。」（参11~12节）这段经文向我们表明，神要引领我们进入如同水火一般的淬炼，而祂也必要带领我们走过！当祂带我们经过百般试炼后，会进入丰富之地，并且领受比金子更宝贵的信心（参彼前一7）。\n还愿与见证（参13~20节）：诗人处处看见神的恩典，以致不禁开口欢呼，要向神还愿！他不但邀请人前来，聆听神在他身上的作为，还分享了在患难中向神祷告的经历──「我若心里注重罪孽，主必不听。」（参18节）诗人从亲身的经历，见证神不拒绝人的祷告，因此不要让恶者用以往的罪过来控告自己！他带著感恩的心写道：「神是应当称颂的！祂并没有推却我的祷告，也没有叫祂的慈爱离开我」（参20节）。\n\n感谢主！主是乐意聆听祷告的神！但愿我们能从诗人思想神的方式和内容，更深学习信\n靠祂，时刻看见祂的恩典，并且与人分享！\n \n回应：主啊！谢谢祢引领我走过死荫幽谷，并且炼净我的生命，使我能更像祢。求祢\n使我在祷告中更加经历祢的慈爱！奉主的名求，阿们！\n\n祷读：诗篇六十六篇20节\n神是应当称颂的！祂并没有推却我的祷告，也没有叫祂的慈爱离开我。\n\nQT: 诗篇六十六篇1~20节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔一篇诗歌、交与伶长。〕全地都当向神欢呼！\n2 歌颂他名的荣耀！用赞美的言语将他的荣耀发明！\n3 当对神说：你的作为何等可畏！因你的大能，仇敌要投降你。\n4 全地要敬拜你，歌颂你，要歌颂你的名。（细拉）\n5 你们来看神所行的，他向世人所做之事是可畏的。\n6 他将海变成干地，众民步行过河；我们在那里因他欢喜。\n7 他用权能治理万民，直到永远。他的眼睛鉴察列邦；悖逆的人不可自高。（细拉）\n8 万民哪，你们当称颂我们的神，使人得听赞美他的声音。\n9 他使我们的性命存活，也不叫我们的脚摇动。\n10 神啊，你曾试验我们，熬炼我们，如熬炼银子一样。\n11 你使我们进入网罗，把重担放在我们的身上。\n12 你使人坐车轧我们的头；我们经过水火，你却使我们到丰富之地。\n13 我要用燔祭进你的殿，向你还我的愿，\n14 就是在急难时我嘴唇所发的、口中所许的。\n15 我要把肥牛作燔祭，将公羊的香祭献给你，又把公牛和山羊献上。（细拉）\n16 凡敬畏神的人，你们都来听！我要述说他为我所行的事。\n17 我曾用口求告他；我的舌头也称他为高。\n18 我若心里注重罪孽，主必不听。\n19 但神实在听见了；他侧耳听了我祷告的声音。\n20 神是应当称颂的！他并没有推却我的祷告，也没有叫他的慈爱离开我。"}, "6-16": {"theme": "经历与分享", "scripture": "诗篇六十七篇1~7节", "url": "https://www.youtube.com/watch?v=TcSk9w34gFI&list=PLgFvTLP0QRDsarwUxSyXa2mhzxmGsc-V6&index=26", "videoId": "TcSk9w34gFI", "date_cn": "16/6/26(二)", "description": "主题：经历与分享\n经文：诗篇六十七篇1~7节\n\n第六十七篇是一篇宣教诗篇。它让我们看到神永恒的计划，并且了解神在基督里为我们预备的救恩，是关乎万民的。首先，诗人祷告，求神赐下祝福。第1节的内容：「愿神怜悯我们，赐福与我们，用脸光照我们」，乃是引用民数记六章23至25节，神吩咐大祭司亚伦和他的儿子，为以色列百姓所作的祝福，而往后的祭司，也沿用同样的内容来祝福百姓，宣告神是一切祝福的源头！\n\n我们来到神的面前，要先认清自己的光景；除了可能受到罪恶的辖制，也可能遭遇外来的压力和仇敌的攻击，以致无法自救；于是，只能从灵魂的最深处，向神发出呐喊：「愿神怜悯我们」（参1节）！在罗马书第七章，保罗也曾经发出同样的呐喊。他在神的面前扪心自问，不得不承认，在他的里头没有良善（参罗七18）！因此，保罗呐喊：「我真是苦啊！谁能救我脱离这取死的身体呢？」（参罗七24）感谢主！唯有当我们经历神的饶恕与救赎的恩典、与祂建立亲密的关系之后，才能进一步经历祂的祝福！\n\n从第2、3、5节看见，神所要赐下的福气，不只是给我们而已！神祝福我们，是要让我们与万国、万民及万邦分享，好让众人看见祂的作为，「认识祂的道路」，并经历「祂的救恩」（参2节）！\n\n另外，诗人在第4节慎重地提醒我们，神并不是有求必应、一味赐福人的神，因为祂是我们的主，祂对我们有所期望和要求！而神对我们的期望，如同先知所说的话：「世人哪，耶和华已指示你何为善。祂向你所要的是什么呢？只要你行公义，好怜悯，存谦卑的心，与你的神同行」（参弥六8）。最后，诗人祷告，求神赐下祝福。第6节的「地已经出了土产」，这句是本篇诗篇里面唯一的过去式，说明蒙福的印证──神已经祝福了大地，而祂也必祝福我们，并要藉著我们，使万族、万民来认识祂，领受祂的祝福，并且敬畏祂，尊祂为万王之王！\n\n回应：主啊！感谢祢使我成为蒙福的人！我要称颂祢的大能与荣耀，并让众人知道祢奇妙的\n作为！奉主的名祷告，阿们！\n\n祷读：诗篇六十七篇6节\n地已经出了土产；神，就是我们的神，要赐福与我们。\n\nQT: 诗篇六十七篇1~7节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却 主！他发出声音，是极大的声音。\n34 你们要将能力归给神。他的威荣在以色列之上；他的能力是在穹苍。\n35 神啊，你从圣所显为可畏；以色列的神是那将力量权能赐给他百姓的。神是应当称颂的！"}, "6-18": {"theme": "天父知道", "scripture": "诗篇六十九篇1~36节", "url": "https://www.youtube.com/watch?v=lihUJxG8U3I&list=PLgFvTLP0QRDsarwUxSyXa2mhzxmGsc-V6&index=24", "videoId": "lihUJxG8U3I", "date_cn": "18/6/26(四)", "description": "主题：天父知道\n经文：诗篇六十九篇1~36节\n\n本诗篇是大卫的作品，写作年代不详。不过，从内容来看，会发现他正遭逢极大的患难；可能是因为他热心服事神，以致受到别人的嘲讽（参7~12节）。诗人写道：「求祢按祢丰盛的慈悲回转眷顾我」（参16节）！诗人即便遭逢患难，却依然倚靠神的慈爱！神的慈爱是所有祷告的人，生命最大的依靠与盼望！因为我们知道──神垂听祷告，不是因为我们的能力多好、生命多成熟，而是按著祂的属性，因为祂是一位垂听并且回应祷告的神（参路十一9）。\n\n诗人的心里充满孤单，他的心也被人伤害！除了仇敌的攻击之外，在他人生经历呼天不应、叫地不闻的时候，就连原本可以安慰、扶持他的亲友，也都疏离、远避他（参8节）。亲爱的弟兄姊妹，有时候我们也会经历如同诗人的光景。当我们陷入困境或情绪的低潮，想要找人倾诉，好得著安慰与体恤，却发现没有人能成为我们的帮助！这样的状况，真是十分令人沮丧！\n\n然而，经文写道：「投靠耶和华，强似倚赖人。」（参诗一一八8）诗人在找不到安慰的时候，他抬头仰望，却领受「祢知道我受的辱骂、欺凌、羞辱；我的敌人都在祢面前」的感动。（参19节） 感谢主！神「知道」、神「看见」、神「听见」（参出三7~8），这是受苦的人最大的安慰！如同耶稣安慰门徒时，说：「你们需用的这一切东西，你们的天父是知道的」（参太六32）。「天父知道」──这真是一句宝贵的话啊！耶稣在最不如意时，也曾经这样说：「父啊，是的，因为祢的美意本是如此」（参太十一26）。\n\n当诗人仰望神，从祂得著面对困境的力量，就转而写道：「我要以诗歌赞美神的名，以感谢称祂为大！」（参30节）亲爱的弟兄姊妹，若有人正在逼迫、打击你，或是你觉得一切都不对劲，环境压得你喘不过气来的时候，来到神的面前赞美祂、寻求祂、尊祂为大；并且衷心向祂献上感恩，你将重拾喜乐与盼望！\n\n回应：主啊！就算所有人都不了解我，祢却知道我一切的软弱与伤痛！但愿我时时开口敬拜祢、向祢祷告，好能看见祢奇妙的作为。奉主的名求，阿们！\n\n祷读：诗篇六十九篇32节\n谦卑的人看见了就喜乐；寻求神的人，愿你们的心苏醒。\n\nQT: 诗篇六十九篇1~36节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下 莫名奇妙」(无法明白)！为什么神总是拖拖拉拉，不尽快采取行动？如果神行动的速度，不如所预期，甚至不符合我们心中所期待的，该怎么办呢？\n\n在今天所读的诗篇中，可以明显看见──诗人心急如焚，因为神似乎耽延了！若换作我们，该如何面对这景况呢？本诗篇虽然只有5节，其中却有五个「愿」字。尤其是第4节：「愿一切寻求祢的，因祢高兴欢喜；愿那些喜爱祢救恩的，常说：『当尊神为大』！」「当尊神为大」的原文，是「愿尊神为大！」感谢主，这实在是我们必须学习的生命课题──将一切的期盼，归结于「当尊神为大」！\n\n「我们晓得万事都互相效力，叫爱神的人得益处，就是按祂旨意被召的人。」（参罗八28）亲爱的弟兄姊妹，让我们将时间表交给神处理吧！我们只要在祂的里面安息，并且尊祂为大，就必得帮助！这位以便以谢的神（参撒上七12），直到如今都帮助我们，祂将等候最佳时机，来彰显祂的得胜。\n\n「鼎为炼银，炉为炼金；惟有耶和华熬炼人心。」（参箴十七3）或许，神的耽延是为了雕塑我们的品格，这是成为祂贵重器皿的必要过程。虽然这个过程并不好受，事情的终局却值得期盼！亲爱的弟兄姊妹，让我们不要失去信心，天天来到神的面前等候祂，相信祂将为我们开路！\n\n回应：主啊！求祢使我常在祢的光中得见祢！我愿意与祢同行，学习耐心等候，好让我的生命讨祢喜悦，并且尊祢为大。奉主的名求，阿们！\n祷读：诗篇七十篇4节\n愿一切寻求祢的，因祢高兴欢喜；愿那些喜爱祢救恩的，常说：「当尊神为大」！\n\nQT: 诗篇七十篇1~5节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔大卫的记念诗、交与伶长。〕神啊，求你快快搭救我！耶和华啊，求你速速帮助我！\n2 愿那些寻索我命的，抱愧蒙羞；愿那些喜悦我遭害的，退后受辱。\n3 愿那些对我说阿哈、阿哈的，因羞愧退后。\n4 愿一切寻求你的，因你高兴欢喜；愿那些喜爱你救恩的，常说：当尊神为大！\n5 但我是困苦穷乏的；神啊，求你速速到我这里来！你是帮助我的，搭救我的。耶和华啊，求你不要耽延！"}, "6-20": {"theme": "从年少到发白", "scripture": "诗篇七十一篇1~24节", "url": "https://www.youtube.com/watch?v=zB7YWM4WDiw&list=PLgFvTLP0QRDsarwUxSyXa2mhzxmGsc-V6&index=22", "videoId": "zB7YWM4WDiw", "date_cn": "20/6/26(六)", "description": "主题：从年少到发白\n经文：诗篇七十一篇1~24节\n\n第七十篇和七十一篇，似乎原是同一诗篇；因为「速速帮助」这词两篇都有，而且两篇的内容相似。第七十一篇描述一位饱受风霜的老年人，在人生旅途上面对各样困境，同时遭受恶人与残暴之人的攻击（参4节）；他被人讪笑、批评（参7、10节），甚至有人要夺取他的性命（参10、13节）。老年人感到孤单、无助，甚至有被遗弃的感觉：「我年老的时候，求祢不要丢弃我！我力气衰弱的时候，求祢不要离弃我！」（参9节）老年人经常产生负面情绪，自觉被淘汰，毫无用处。\n\n多大的年纪才算是「老」呢？「看哪，我现今八十五岁了，我还是强壮」（参书十四10~11）。这句话是迦勒说的。此时，他甚至向约书亚请命，要求继续冲锋陷阵。所以，与其说「老」是年纪的问题，还不如说是心态的问题。\n\n另外，从这段经文中看见，神对老年人的爱始终如一！「直到你们年老，我仍这样；直到你们发白，我仍怀搋。我已造作，也必保抱；我必怀抱，也必拯救。」（参赛四十六4）；「我总不撇下你，也不丢弃你」（参来十三5）。老年人总是害怕自己老而无用，圣经却写道：「但义人的路好像黎明的光，越照越明，直到日午。」（参箴四18）老年人难免容易「活在过往」，常说：「想当年……」；然而，诗人却承认：「主耶和华啊，祢是我所盼望的；从我年幼，祢是我所倚靠的。」（参5节）！感谢主！诗人的心活在未来！虽然我们不知道未来将如何，却知道谁掌管明天。年纪渐长的人容易「埋怨」；但是诗人写道：「祢的赞美，祢的荣耀终日必满了我的口」（参8节）。\n\n亲爱的弟兄姊妹，我们若常与主同行，就能拥有属灵的眼光，看见祂怜悯我们的软弱与惧怕，并要帮助我们──让我们以赞美代替埋怨，直到垂暮之年，喜乐归主，与主永远同在！\n\n回应：主啊！从年少到发白，求祢一路扶持我！求祢使我的一生都能坚定事奉祢，直到那日见祢的面。奉主的名求，阿们！\n\n祷读：诗篇七十一篇5节\n主──耶和华啊，祢是我所盼望的；从我年幼，祢是我所倚靠的。\n\nQT: 诗篇七十一篇1~24节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及 x=20", "videoId": "yRzo1HIzRR0", "date_cn": "22/6/26(一)", "description": "主题：清心的人必得见神\n经文：诗篇七十三篇1~28节\n\n略读这诗篇时，或许会认为：「太好了！若有人对社会的不义感到不平，正好能用这诗篇来安慰、劝勉他！」尽管这样的理解并非错误，不过若细读这一篇的内容，就能发现它并非针对恶人尚未遭报的情境，提出「时候未到」的解答，而是深刻地描绘人在信仰的道路上，可能会出现偏离神的思想（参2~14节）。但是，当诗人在神的光照中体悟神的公义和全能（参17节），就从心里发出对神的懊悔（参18~22节），再次选择信靠祂（参23~27节），最后得出生命需要有神的结论（参28节）。\n\n亲爱的弟兄姊妹，诗人所面临的心境，以及他在信仰中的经历，会不会也是我们生命的景况呢？在信仰里面，最重要的就是我们的心！第1节提到的「以色列」，代表神所立约的百姓，也就是我们这些信靠祂的人。诗人在这句经文中，再度强调神是守约信实的主！然而，我们这些信靠神的人，是否向祂存著专一、清洁、无诡诈的心呢？\n\n我们绝对可以对很多事情感到不平、怀疑、愤怒，甚至向神提出质疑！诗篇当中充满了这样的例子，甚至连约伯也是如此！但是，对于难解的生命疑问，神不是每次都会给我们答案。这不是因为祂小气，或是觉得我们太笨、懂不了，所以祂不告诉我们，而是希望我们能够在极度的困惑及信仰危机当中，看见祂不变的爱。\n\n第17节的「等」，代表了诗人信仰的突破和转折！唯独当我们的心完全转向神，才有可能跳脱当下的困境，看见神超越的作为！虽然我们不见得立即就能得著难处的答案，却能因晓得神是在这些难处中，唯一的倚靠和出路，以致能够继续往前走。即使环境可能仍旧相同，但我们确信，神是我们的力量和福分，直到永远。\n    \n\n回应：主啊！求祢以宝贵的话语引导我，以祢的真理成为我的力量，并且求祢保守我，专心跟随祢！奉主的名求，阿们！\n\n祷读：诗篇七十三篇28节  \n但我亲近神是于我有益；我以主耶和华为我的避难所，好叫我述说祢一切的作为。\n\nQT: 诗篇七十三篇1~28节 \n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔亚萨的诗。〕神实在恩待以色列那些清心的人！\n2 至于我，我的脚几乎失闪；我的脚险些滑跌。\n3 我见恶人和狂傲人享平安就心怀不平。\n4 他们死的时候没有疼痛；他们的力气却也壮实。\n5 他们不像别人受苦，也不像别人遭灾。\n6 所以，骄傲如链子戴在他们的项上；强暴像衣裳遮住他们的身体。\n7 他们的眼睛因体胖而凸出；他们所得的，过于心里所想的。\n8 他们讥笑人，凭恶意说欺压人的话；他们说话自高。\n9 他们的口亵渎上天；他们的舌毁谤全地。\n10 所以神的民归到这里，喝尽了满杯的苦水。\n11 他们说：神怎能晓得？至高者岂有知识呢？\n12 看哪，这就是恶人；他们既是常享安逸，财宝便加增。\n13 我实在徒然洁净了我的心，徒然洗手表明无辜。\n14 因为，我终日遭灾难；每早晨受惩治。\n15 我若说，我要这样讲，这就是以奸诈待你的众子。\n16 我思索怎能明白这事，眼看实系为难，\n17 等我进了神的圣所，思想他们的结局。\n18 你实在把他们安在滑地，使他们掉在沉沦之中。\n19 他们转眼之间成了何等的荒凉！他们被惊恐灭尽了。\n20 人睡醒了，怎样看梦；主啊，你醒了也必照样轻看他们的影像。\n21 因而，我心里发酸，肺腑被刺。\n22 我这样愚昧无知，在你面前如畜类一般。\n23 然而，我常与你同在；你搀着我的右手。\n24 你要以你的训言引导我，以后必接我到荣耀里。\n25 除你以外，在天上我有谁呢？除你以外，在地上我也没有所爱慕的。\n26 我的肉体和我的心肠衰残；但神是我心里的力量，又是我的福分，直到永远。\n27 远离你的，必要死亡；凡离弃你行邪淫的，你都灭绝了。\n28 但我亲近神是与我有益；我以主耶和华为我的避难所，好叫我述说你一切的作为。"}, "6-23": {"theme": "虽不见神 仍然倚靠", "scripture": "诗篇七十四篇1~23节", "url": "https://www.youtube.com/watch?v=qk_aUZFZyow&list=PLgFvTLP0QRDsarwUxSyXa2mhzxmGsc-V6&index=19", "videoId": "qk_aUZFZyow", "date_cn": "23/6/26(二)", "description": "主题：虽不见神 仍然倚靠\n经文：诗篇七十四篇1~23节\n\n圣殿是以色列人信仰的中心和根基，更是神与他们同在的象征。如今，他们却面临仇敌大肆破坏圣殿的困境。然而，诗人知道，敌人发动攻击、圣殿被毁、神遭受亵渎，都是神允许才会发生的。这些事情之所以发生，是因为神在惩罚他们（参1节），神甚至容让仇敌在殿中猖狂（参4~8节）。但是，诗人并没有将重心完全放在圣殿上面！因为即使圣殿被毁，属神的儿女仍然要将盼望放在那位眼不能见的神身上！所以，无论面对多么困难的景况，唯一的道路是倚靠神！\n\n我们可以选择不断地埋怨、质疑，甚至不信、放弃神；但是，千万不要忘记神的话语所带来的鼓励和提醒：「我的弟兄们，你们落在百般试炼中，都要以为大喜乐；因为知道你们的信心经过试验，就生忍耐。但忍耐也当成功，使你们成全、完备，毫无缺欠。」（参雅一2~4）而使我们能够持续坚忍信靠神的秘诀，就是回顾祂奇妙的救赎。\n\n在今天所读的诗篇中，诗人就是这么做的：他回顾神从前带领先祖脱离埃及人的奴役，施行大能将红海和约但河分开；他也观看神创造的伟大作为，知道日月运行、季节更迭，都是属乎神的统管！既然如此，我们的生命气息，岂不也是在祂的手中吗？既是这样，神就不轻看祂所创造的每一个受造物！因为每一个受造物，都能显出神的荣耀和奇妙！所以，诗人求神在记念祂荣耀的同时，也记念这群称为祂名下的子民，不让敌人继续放肆！\n\n如今，我们也遭遇许多困境。后现代思想强调多元，所以基督教的绝对真理受到质疑；同性恋主义者高举人权大旗，不断透过法律途径，争取同性婚姻合法；由于人心贪婪，产生许多不法、不义的社会现象，越来越多的人承受不住压力，结束自己的生命……这些都是因为罪进入了世界，而带来的影响！\n\n尽管如此，我们心中最深切和真实的盼望，乃在于那位已经成就救赎工作的耶稣基督！但愿我们更多倚靠神，求祂快快施行拯救！\n\n回应：主啊！环境虽然艰困，祢却是信实的主！求祢怜悯我，打开我信心的眼睛，知道祢仍然掌权，直到永远！奉主的名求，阿们！\n\n祷读：诗篇七十四篇12节 \n神自古以来为我的王，在地上施行拯救。\n\nQT: 诗篇七十四篇1~23节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：http wUxSyXa2mhzxmGsc-V6&index=18", "videoId": "-pTPVNxBJGA", "date_cn": "24/6/26(三)", "description": "主题：审判的主\n经文：诗篇七十五篇1~10节\n\n我们看见别人明明做了坏事，却依然猖狂，心里会作何感想？是无可奈何、嘲讽以对，或是早已麻木，不愿多想？不论我们能否改变社会上的不公义，今天诗篇的信息是──行恶的人将来必要面临神震怒的杯（参8节），而末日将要来临的事实，也提醒我们应当知道如何面对这位审判的主。\n\n第2至5节，好比是神所作的自我宣告──祂立定大地的根基、订下将来的审判，接著警告这些狂傲行恶的人，不要继续在祂的面前猖狂、自负！之后，第6至8节是诗人的劝勉：人应当知道除了神之外，再也没有其他的权柄和能力来源！唯有神可以高举人和降卑人。因此，第1、9、10节，就是诗人在向这一位握有审判权柄的神，发出称颂和赞美。\n\n那么，换作是现在的我们呢？面对这一位永远掌权、满有能力，并且要审判万民的神，我们应该如何回应呢？首先，我们应当赞美、称谢神，因为祂的作为奇妙！祂不仅创造诸天万物，还拥有决定世界未来的权柄。我们甚至能这样说：祂早已订下世人的终局，就是面临祂的审判，没有一人可以逃脱！\n\n其次，我们应当宣扬、记念神的名。经文说祂是「雅各的神」（参9节），这表明了神信实的属性，并且持守祂与百姓所立的约。换句话说，凡因信神而被称义的人，在末日将要被神提升、高举，与神一同作王，并且同享荣耀。因此，我们应当作的回应，就是在神面前谦卑自己。祂是王，祂是审判者，祂有独一的权柄！既然如此，我们应当谦卑地倚靠祂，知道一切的事若没有神的允许，就不会发生！即便是现在看为不好的事，也都在神的掌权之中！虽然我们或许会心怀不平，但是不要忘记，我们所看见的、所了解的都非常有限，而一切事物的背后都有神的掌权！因此，我们「不要为作恶的心怀不平，也不要嫉妒恶人。」（参箴二十四19）只要谦卑信靠主，因为知道「凡自高的，必降为卑；自卑的，必升为高」（参太二十三12）。\n\n回应：主啊！祢是掌权的主，万有都在祢的手中。虽然有些事我不能完全明白，但求祢把更真实的信心赐给我，好让我更能信靠、称颂祢！奉主的名求，阿们！\n\n祷读：以赛亚书四十九章4节 \n然而，我当得的理必在耶和华那里；我的赏赐必在我神那里。   \n\nQT: 诗篇七十五篇1~10节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动 88年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔亚萨的诗歌、交与伶长。用丝弦的乐器。〕在犹大，神为人所认识；在以色列，他的名为大。\n2 在撒冷有他的帐幕；在锡安有他的居所。\n3 他在那里折断弓上的火箭，并盾牌、刀剑，和争战的兵器。（细拉）\n4 你从有野食之山而来，有光华和荣美。\n5 心中勇敢的人都被抢夺；他们睡了长觉，没有一个英雄能措手。\n6 雅各的神啊，你的斥责一发，坐车的、骑马的都沉睡了。\n7 惟独你是可畏的！你怒气一发，谁能在你面前站得住呢？\n8 你从天上使人听判断。神起来施行审判，要救地上一切谦卑的人；那时地就惧怕而静默。（细拉）\n9 并于上节\n10 人的忿怒要成全你的荣美；人的余怒，你要禁止。\n11 你们许愿，当向耶和华──你们的神还愿；在他四面的人都当拿贡物献给那可畏的主。\n12 他要挫折王子的骄气；他向地上的君王显威可畏。"}, "6-26": {"theme": "信心经过试验 更加真实", "scripture": "诗篇七十七篇1~20节", "url": "https://www.youtube.com/watch?v=GKBTut3r-T0&list=PLgFvTLP0QRDsarwUxSyXa2mhzxmGsc-V6&index=16", "videoId": "GKBTut3r-T0", "date_cn": "26/6/26(五)", "description": "主题：信心经过试验 更加真实\n经文：诗篇七十七篇1~20节\n\n有的时候，当我们遇见难处向神呼喊，神却好像躲起来了；有的时候，我们因为犯错而向神认罪，神却好像仍然对我们发怒，没有赐下怜悯。在这样的时刻，我们的心中或许多少会对神产生怀疑。而写下这诗篇的诗人，似乎与我们的遭遇相同。\n\n在诗篇一开始，诗人宣告他对神的信心；他向神呼求，因为神必垂听他的祷告（参1节）。但是，到了第2至9节，却显出他的祷告好像石沉大海！诗人倾诉心中的痛苦，说自己忧伤到一个地步，甚至无法成眠。后来，他对神产生了怀疑──神是否不爱我了？难道神还在生我的气吗？\n\n然而，诗人忽然顿悟了（参10节）！承认这是自己信心软弱的表现，而唯一能让他再度恢复对神信心的方式，就是回想过往神的帮助。往往当我们软弱、无助地呼喊神，神并没有立即回应的时候，这时我们的信心正在经历考验！在第11至20节，诗人不断提醒自己──神是圣洁的神，是行奇事的神，是显能力的神，是救赎祂子民的神，是震撼自然界的神，是无法被人完全识透的神！在神的眼中，我们是祂的百姓、祂的羊群，而祂曾经藉著祂的仆人摩西和亚伦的手，将百姓救拔出来！诗人借由回想神伟大的救赎工作，恢复了对祂的信心。\n\n亲爱的弟兄姊妹，神的确应许垂听祷告，但是也会透过环境和暂时的沉默，来试验我们的信心（参彼前一7）。每当我们无法从神得著回应，可能也会像诗人一样，对神发出不平和怀疑；但是，求神保守、引领我们，时常回想祂的恩典及作为，能看见祂的伟大与慈爱，并且重拾对祂的信心！\n\n回应：主啊！每当我面临试炼，求祢赐给我更真实的信心，好让我在沮丧、忧伤的时刻，可以抬头看见祢引领的手，以及美好的应许与恩典！奉主的名求，阿们！\n \n祷读：诗篇七十七 分强调的课题，尤其是家庭教育，更被他们奉为首要之务（参申六6~9）。透过一代接一代的传讲，父母要后代子孙认识那一位施行奇事的神，而这也是摩西带领百姓四十年之后，即将离世之前的重要训言：务要将神如何拯救我们整个民族的大作为，告诉我们的孩子，好让每一个后代都敬畏神，并且遵行祂的道（参申六20~25）。\n\n诗篇第七十八篇，就是在这世代传承的背景之下所写成的。当时，想必人们已经离开神、不肯亲近祂；他们将这一位施行拯救的耶和华，抛到九霄云外了！于是，诗人再次高声呼吁百姓，聆听并记念这一位带领他们出埃及的拯救者，这一位保守他们在险恶的旷野中四十年的护卫者，以及这一位设立君王治理百姓的大牧者！另一方面，诗人也斥责百姓对神忘恩负义──他们领受恩典，却仍旧悖逆，不顺服神。\n\n在第1至8节，诗人指出这样的教导，是为了达到一个重要的目的，那就是帮助百姓仰望神、记念神的作为，并且遵行神的命令；同样的，对于现今的基督徒，也是很重要的提醒──我们不仅要时常思想神的恩典，也要帮助同工一起信靠神。透过圣经的话语，提升他们的信心，引导他们更深认识神；并且鼓励他们即使在险恶的环境中，也要勇敢持守、遵行神的话！\n\n感谢神，祂的作为永不改变！过去祂如何保守、看顾祂的百姓，如今祂仍然看顾、扶持我们，并且用爱覆庇我们！亲爱的弟兄姊妹，无论我们的生命光景如何，都要不断回到神的面前，思想祂、仰望祂、信靠祂，并且遵行祂的话语！\n\n回应：主啊！祢是昔在、今在、以后永在的主！求祢帮助我时刻认真学习祢的话语，并且用心传承给我肉身和属灵的子孙！奉主的名求，阿们！\n\n祷读：诗篇七十八篇4节\n我们不将这些事向他们的子孙隐瞒，要将耶和华的美德和祂的能力，并祂奇妙的作为，述说给后代听。\n\nQT: 诗篇七十八篇1~8节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔亚萨的训诲诗。〕我的民哪，你们要留心听我的训诲，侧耳听我口中的话。\n2 我要开口说比喻；我要说出古时的谜语，\n3 是我们所听见、所知道的，也是我们的祖宗告诉我们的。\n4 我们不将这些事向他们的子孙隐瞒，要将耶和华的美德和他的能力，并他奇妙的作为，述说给后代听。\n5 因为，他在雅各中立法度，在以色列中设律法；是他吩咐我们祖宗要传给子孙的，\n6 使将要生的后代子孙可以晓得；他们也要起来告诉他们的子孙，\n7 好叫他们仰望神，不忘记神的作为，惟要守他的命令。\n8 不要像他们的祖宗，是顽梗悖逆、居心不正之辈，向着神，心不诚实。"}, "6-28": {"theme": "不背约的神", "scripture": "诗篇七十八篇9~39节", "url": "https://www.youtube.com/watch?v=ugVvKirvVAc&list=PLgFvTLP0QRDsarwUxSyXa2mhzxmGsc-V6&index=14", "videoId": "ugVvKirvVAc", "date_cn": "28/6/26(日)", "description": "主题：不背约的神\n经文：诗篇七十八篇9~39节\n\n如果我们的孩子在接受惩罚的时候，哭著说：「我下次再也不敢了！」大概多数为人父母的人，都会不忍心再责罚吧？可是，偏偏孩子之后又犯了同样，或是类似的错误，惹得我们心里更不高兴，甚至觉得上次应该严厉教训他们。\n\n亲爱的弟兄姊妹，我们面对神的时候，是否也像孩子一样，时常求神原谅我们，却没有真实悔改，好好遵行祂的心意呢？今天的诗篇段落，清楚描写了一群蒙神大恩拯救的人，如何背约、忘恩，一再惹动神的怒气却依然不肯悔悟！然而，我们却也在诗篇中看见，这一位守约施慈爱的神，如何怜悯祂的百姓，持续顾念与他们所立的约。\n\n第9至11节接续第8节的叙述，扼要提出百姓悖逆神的恶行（参12~64节）：例如：临阵脱逃（参9节）、不守盟约（参10节）和忘恩负义（参11节）。接著，诗人在第12至16节，记载神为这些百姓行了四个神迹：领出埃及、立海如垒、日夜引导、旷野供水。而到了第17至20节，百姓却因著私欲、诱惑而出言试探神，说祂岂能在旷野供应食物？接下来，他们忘恩、悖逆的恶行依然故我。在第21至31节，神因著他们的贪婪，赐下了多如尘土、海沙的食物，但同时也降下击杀的刑罚，以示警惕。第32节是一句深深的感慨：「虽是这样，他们仍旧犯罪，不信祂奇妙的作为。」即便人因著恶行而承受刑罚，心里却始终不悔悟，这是多么可悲！难怪神要让死亡和惊恐突然临到他们（参33节）。第34至37节的内容，却更显出人心的险恶与不正！最后，诗人指出──尽管人对神存悖逆、虚假、忘恩的态度，神却依然无比怜悯他们，并且绝不背弃祂的约（参38~39节）。\n\n人在堕落之后，生命里面只有邪恶、自私及虚假。然而，神的慈爱、信实及公义，却也在人心的沉沦和悖逆中，显得更加荣耀与伟大。亲爱的弟兄姊妹，我们如今还能存留气息，实在是因为神仍然宽容、怜悯、等候我们悔改！我们真是需要以今天的经文作为鉴戒，并要颂赞神的大怜悯，宣扬祂的信实及守约，天天心存诚实与祂同行！\n\n回应：主啊！感谢祢总是不放弃祢对我的爱！求祢时刻用宝血覆庇、洁净我的生命，并且让我存著感恩与敬畏的心，一生单单跟随祢！奉主的名求，阿们！\n\n祷读：申命记四章31节\n耶和华──你神原是有怜悯的神；祂总不撇下你，不灭绝你，也不忘记祂起誓与你列祖所立的约。\n\nQT: 诗篇七十八篇9~39节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多 沉痛，甚至到了一个地步，祂连自己的荣耀都不顾了，将自己的产业交在仇敌手中受苦待！\n\n然而，这一位大有怜悯、慈爱的牧人，终究要向祂的百姓施恩！神为他们打退了敌人，又拣选合神心意的大卫，来牧养和管理祂的百姓。神拣选犹大支派及大卫的举动，正说明祂自己才是那位真正的大牧者；而我们的盼望，也再次被引到「弥赛亚要从大卫后裔而出」的预言上。这预言如今已经实现了！耶稣基督牧养我们、引导我们、护卫我们！正如过去神怎样在旷野引领、保护以色列人，今天每一位信靠祂的儿女，也都要在耶稣基督这位大牧者的杖下，得著安慰与保守！\n\n回应：主啊！感谢祢总是不放弃我，在我悖逆的时候等候我悔改！求祢使我不要徒受祢的恩典，而是让我和我的全家一起忠心跟随祢、事奉祢！奉主的名求，阿们！\n\n祷读：诗篇七十八篇72节 \n于是，祂按心中的纯正牧养他们，用手中的巧妙引导他们。\n\nQT: 诗篇七十八篇40~72节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "40 他们在旷野悖逆他，在荒地叫他担忧，何其多呢！\n41 他们再三试探神，惹动以色列的圣者。\n42 他们不追念他的能力〔原文作“手”〕和赎他们脱离敌人的日子；\n43 他怎样在埃及地显神迹，在琐安田显奇事，\n44 把他们的江河并河汊的水都变为血，使他们不能喝。\n45 他叫苍蝇成群落在他们当中，嘬尽他们，又叫青蛙灭了他们，\n46 把他们的土产交给蚂蚱，把他们辛苦得来的交给蝗虫。\n47 他降冰雹打坏他们的葡萄树，下严霜打坏他们的桑树，\n48 又把他们的牲畜交给冰雹，把他们的群畜交给闪电。\n49 他使猛烈的怒气和忿怒、恼恨、苦难成了一群降灾的使者，临到他们。\n50 他为自己的怒气修平了路，将他们交给瘟疫，使他们死亡，\n51 在埃及击杀一切长子，在含的帐棚中击杀他们强壮时头生的。\n52 他却领出自己的民如羊，在旷野引他们如羊群。\n53 他领他们稳稳妥妥地，使他们不致害怕；海却淹没他们的仇敌。\n54 他带他们到自己圣地的边界，到他右手所得的这山地。\n55 他在他们面前赶出外邦人，用绳子将外邦的地量给他们为业，叫以色列支派的人住在他们的帐棚里。\n56 他们仍旧试探、悖逆至高的神，不守他的法度，\n57 反倒退后，行诡诈，像他们的祖宗一样；他们改变，如同翻背的弓。\n58 因他们的邱坛惹了他的怒气；因他们雕刻的偶像触动他的愤恨。\n59 神听见就发怒，极其憎恶以色列人。\n60 甚至他离弃示罗的帐幕，就是他在人间所搭的帐棚；\n61 又将他的约柜〔原文作“能力”〕交与人掳去，将他的荣耀交在敌人手中；\n62 并将他的百姓交与刀剑，向他的产业发怒。\n63 少年人被火烧灭；处女也无喜歌。\n64 祭司倒在刀下，寡妇却不哀哭。\n65 那时，主像世人睡醒，像勇士饮酒呼喊。\n66 他就打退了他的敌人，叫他们永蒙羞辱；\n67 并且他弃掉约瑟的帐棚，不拣选以法莲支派，\n68 却拣选犹大支派──他所喜爱的锡安山；\n69 盖造他的圣所，好像高峰，又像他建立永存之地；\n70 又拣选他的仆人大卫，从羊圈中将他召来，\n71 叫他不再跟从那些带奶的母羊，为要牧养自己的百姓雅各和自己的产业以色列。\n72 于是，他按心中的纯正牧养他们，用手中的巧妙引导他们。"}, "6-30": {"theme": "从悔改到赞美", "scripture": "诗篇七十九篇1~13节", "url": "https://www.youtube.com/watch?v=p4DlU6t7alY&list=PLgFvTLP0QRDsarwUxSyXa2mhzxmGsc-V6&index=12", "videoId": "p4DlU6t7alY", "date_cn": "30/6/26(二)", "description": "主题：从悔改到赞美 \n经文：诗篇七十九篇1~13节\n\n这是一首关于群体的哀歌。诗人看见家园被毁、圣城被污、圣民受辱，心中的难受一定非常强烈！他甚至求神不要再忍受，快快将愤怒倾倒在那些恶劣的外邦人身上，为神的子民报仇！但是，若继续往下读，却发现他写作的心境，转为向神悔改，祈求祂的赦免及怜悯（参8节）；因为诗人领悟到，神容让外邦人在祂的居所撒野，其实是要惩罚祂的百姓！\n\n自从神带领以色列人出埃及以来，不论是在旷野或迦南，以色列人都不专心寻求神，甚至再三抱怨、敬拜假神，惹神忿怒，使他们面临国破家亡的局面！在第9、10节，诗人回转向神，呼求神记念祂向列祖所立的约，不要继续容让外邦人羞辱祂的名。这样的内容有点像摩西在神的面前为百姓的代求：倘若今天神杀了这些抱怨的百姓，一定会让周围的列邦议论，说祂没有能力带领百姓进迦南！\n\n每当我们遭遇恶事，快来到神的面前悔改、认罪。虽然每一次苦难，并非都是因为我们做错事而被神惩罚，但藉著苦难，我们反躬自省：在这件事上，神要我学习什么？若察觉这真是出自神的管教，就快快悔改！即便自省之后认为自己没有不讨神喜悦的地方，也不必急著认定这是属灵争战，而是要更加谦卑信靠神，求神按著祂的慈爱、怜悯、能力，帮助我们走过困境！\n\n诗篇最后的赞美，是信心的表现──从哀叹、祈求、悔改到赞美，是我们在生命中时常经历的过程！如果在这样的过程中，我们愿意耐心等候神的工作，终将经历信心的成长和突破，而向神发出赞美与称谢，将一切荣耀归与神！\n\n回应：主啊！求祢的圣灵时常光照我，在每一天的生活中自省，并且相信祢必不离弃祢草场上的羊！求祢为祢名的缘故，使我在患难中更加倚靠祢，奉主的名求，阿们！\n\n祷读：诗篇七十九篇9节\n拯救我们的神啊，求祢因祢名的荣耀帮助我们！为祢名的缘故搭救我们，赦免我们的罪。\n\nQT: 诗篇七十九篇1~13节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系 见证祢复兴的作为！奉主的名求，阿们！\n\n祷读：诗篇八十篇19节\n耶和华──万军之神啊，求祢使我们回转，使祢的脸发光，我们便要得救！\n\nQT: 诗篇八十篇1~19节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔亚萨的诗，交与伶长。调用为证的百合花。〕领约瑟如领羊群之以色列的牧者啊，求你留心听！坐在二基路伯上的啊，求你发出光来！\n2 在以法莲、便雅悯、玛拿西前面施展你的大能，来救我们。\n3 神啊，求你使我们回转〔“回转”或作“复兴”〕，使你的脸发光，我们便要得救！\n4 耶和华──万军之神啊，你向你百姓的祷告发怒，要到几时呢？\n5 你以眼泪当食物给他们吃，又多量出眼泪给他们喝。\n6 你使邻邦因我们纷争；我们的仇敌彼此戏笑。\n7 万军之神啊，求你使我们回转，使你的脸发光，我们便要得救！\n8 你从埃及挪出一棵葡萄树，赶出外邦人，把这树栽上。\n9 你在这树根前预备了地方，它就深深扎根，爬满了地。\n10 它的影子遮满了山，枝子好像佳美的香柏树。\n11 它发出枝子，长到大海，发出蔓子，延到大河。\n12 你为何拆毁这树的篱笆，任凭一切过路的人摘取？\n13 林中出来的野猪把它糟踏；野地的走兽拿它当食物。\n14 万军之神啊，求你回转！从天上垂看，眷顾这葡萄树，\n15 保护你右手所栽的和你为自己所坚固的枝子。\n16 这树已经被火焚烧，被刀砍伐；他们因你脸上的怒容就灭亡了。\n17 愿你的手扶持你右边的人，就是你为自己所坚固的人子。\n18 这样，我们便不退后离开你；求你救活我们，我们就要求告你的名。\n19 耶和华──万军之神啊，求你使我们回转，使你的脸发光，我们便要得救！"}, "7-2": {"theme": "主羊听主声", "scripture": "诗篇八十一篇1~16节", "url": "https://www.youtube.com/watch?v=SheyFA4k4hE&list=PLgFvTLP0QRDsarwUxSyXa2mhzxmGsc-V6&index=10", "videoId": "SheyFA4k4hE", "date_cn": "2/7/26(四)", "description": "主题：主羊听主声\n经文：诗篇八十一篇1~16节\n\n主耶稣说：「我的羊听我的声音，我也认识他们，他们也跟著我。」（参约十27）亲爱的弟兄姊妹，我们是听谁的声音行事呢？今天所读的这一篇诗篇，多次提及「听」的重要性！在第8节，诗人提到神对祂的儿女最大的期待，就是：「甚愿你肯听从我」。在第13节，诗人又再次提到神的期盼：「甚愿我的民肯听从我」。但是，他却在第11节指出，从古至今，神的儿女是多么让祂失望──「以色列全不理我」。无怪乎在以赛亚书的一开始，神就透过先知的口，呼喊天地齐来作见证，神的儿女比起畜牲更加不如：「天哪，要听！地啊，侧耳而听！因为耶和华说：『我养育儿女，将他们养大，他们竟悖逆我。牛认识主人，驴认识主人的槽，以色列却不认识；我的民却不留意』」（参赛一2~3）。\n\n本诗篇其实是在节期中吟唱的诗歌。一开始，诗人宛如祭司或先知，呼召百姓前来敬拜神，向祂欢欣歌唱（参1~5节），并且领受祂的话语（参5节）。诗人告诉他们过去神怎样施行拯救（参6~7节），并且谆谆劝戒（参8~10节），百姓却迳自不理（参11节），因此受到最严重的惩罚──神就「任凭」，容让百姓各随己意而行（参12节）。\n\n亲爱的弟兄姊妹，这是一个多么可怜、辛酸的景况！倘若我们辛苦喂养、教育长大的孩子，却不认我们为他的父母，我们会多么伤心！既然神救拔了我们，赐给我们新的生命，若我们仍然偏行己意，掩耳不听祂的话，岂不也令祂非常失望和难过呢？\n\n虽然如此，神并不愿意人虚情假意表面顺服，假意顺从神的人将要面临永远的刑罚；而那些真心跟随神的人，神要以丰富的美福待他（参16节）：一方面是物质的赐福和饱足，而另一方面更令人得著丰盛的，就是神的话语。「人活著，不是单靠食物，乃是靠神口里所出的一切话」（参太四4）。\n\n亲爱的弟兄姊妹，但愿我们的生命能够更真实地回应神，天天诚实又顺服地跟随祂，讨祂的喜悦！\n\n回应：主啊！我愿意学习聆听、遵行祢的话语！求祢帮助我时常清除内心吵杂的声音，省察自己的心思意念，并且专心寻求祢的旨意！奉主的名求，阿们！\n\n祷读：诗篇八十一篇8节\n我的民哪，你当听，我要劝戒你；以色列啊，甚愿你肯听从我。\n\n\nQT: 诗篇八十一篇1~16节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文 n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔亚萨的诗。〕神站在有权力者的会中，在诸神中行审判，\n2 说：你们审判不秉公义，徇恶人的情面，要到几时呢？（细拉）\n3 你们当为贫寒的人和孤儿伸冤；当为困苦和穷乏的人施行公义。\n4 当保护贫寒和穷乏的人，救他们脱离恶人的手。\n5 你们仍不知道，也不明白，在黑暗中走来走去；地的根基都摇动了。\n6 我曾说：你们是神，都是至高者的儿子。\n7 然而，你们要死，与世人一样，要仆倒，像王子中的一位。\n8 神啊，求你起来审判世界，因为你要得万邦为业。"}, "7-4": {"theme": "神啊 求祢不要静默", "scripture": "诗篇八十三篇1~18节", "url": "https://www.youtube.com/watch?v=cMsh814QyUs&list=PLgFvTLP0QRDsarwUxSyXa2mhzxmGsc-V6&index=8", "videoId": "cMsh814QyUs", "date_cn": "4/7/26(六)", "description": "主题：神啊 求祢不要静默\n经文：诗篇八十三篇1~18节\n\n这是一首集体请愿的诗歌。第1至8节清楚地描述，这些抵挡神的人如何同谋，而诗人也一一列出仇敌的名字。接著，在第9至15节，诗人提到神的子民向祂呼求。当初他们的列祖遇见外邦人的攻击时，神如何伸手拯救他们，如今，百姓也恳求神快快地向他们施行拯救！在本诗篇中，诗人借由自然界中强大的力量，例如狂风、烈火、暴雨，来比喻仇敌不能抵抗神的作为；当诡诈的人面临神的大能，只得羞羞愧愧地低头，承认神的全能和祂荣耀的名。\n\n今天，属神的百姓，不见得会遭遇立即性的伤害。在宗教自由的国家里，我们不会因为信仰对立而遭受生命威胁；但是，却面临灵性的危机。魔鬼如同吼叫的狮子，四处寻找可吞吃的人。透过传播媒体的渲染，许多抵挡神的价值观，一点一滴地渗入神子民心中。\n\n刷卡文化让人逐渐沉迷于追求物质享受，智者警告我们：「阴间和灭亡永不满足，人的眼目也是如此。」（参箴二十七20）四处可见污秽不堪的画面，以及传播媒体上大言不惭、言语麻辣的谈话性节目，完全扭曲上帝造人的本意，以致道德沦丧，人们追求属世的罪中之乐！人性的败坏，完全背离圣经的教导，例如：「淫妇的家是在阴间之路，下到死亡之宫。」（参箴七27）\n\n亲爱的弟兄姊妹，我们生活在现今的社会中，实在需要时刻心存儆醒！因为属神的儿女若不全心谦卑倚靠祂，也可能会在这些罪恶上有分！魔鬼四处布下罪恶的网罗，要伤害神的儿女，因此，让我们时刻回到属神儿女的身分，相信自己的生命在神的眼里十分宝贵，愿意为主保守自己的身、心、灵，并且祈求祂的手保护我们！求主在祂的教会中施行拯救，切实保守祂的儿女，胜过仇敌的网罗！\n\n回应：主啊！求祢怜悯祢的儿女，在末后的世代中被祢的真理所保守、洁净！求祢伸手拆毁恶者的网罗，好叫祢的儿女不致羞辱祢的名！奉主的名求，阿们！\n\n祷读：箴言四章23节 \n你要保守你心，胜过保守一切，因为一生的果效是由心发出。\n\nQT: 诗篇八十三篇1~18节\n*************\n💌快来留言说「阿们！」or 回应 对神殿宇的渴慕，以及他期望前去敬拜神的心愿；其实，他所提与神同住、亲近神的渴慕，就是表达愿意投靠神的心志；而这样的人就是圣经中所谓「有福」的人。\n\n亲爱的弟兄姊妹，我们需要时常在神面前，为了不以神为满足而悔改。还没有结婚的人，巴不得神快赐下好姻缘；已经结婚的人，却又多么希望重回单身的自由！不满意目前工作薪资的人，四处寻找更好的机会；占住好职位的人，却又经常不认真工作！正在面对升学压力的人，成天忧愁、紧张；在理想的学校中本该好好学习的人，却又四处贪玩、享乐。当人不以神在当下的带领为满足，而将自己的欲望视为优先，就不会在每天的生活中信靠神！\n\n真正渴慕神的生命，绝不只是在教会崇拜时唱诗颂赞，也不是积极参与小组、投入事奉而已！更重要的是必须在每一天的生活中，学习以神为我们的满足！倘若连麻雀、燕子等动物，都可以在神那里得著恩惠（参3节）、筑好巢窝在殿中安居，那么我们这些属神的儿女，岂不比麻雀、燕子更加贵重呢（参路十二6~7）？神岂会不眷顾那些倚靠祂的儿女呢？\n\n「耶和华─神是日头，是盾牌，要赐下恩惠和荣耀。祂未尝留下一样好处不给那些行动正直的人。」（参11节）感谢主！祂要将信靠祂的人，从黑暗及苦难中拯救出来！但愿我们天天投靠神，以神为最大的满足，成为真正有福的人。\n\n回应：主啊，感谢祢乐意把救恩赏赐给我！求祢帮助我更深地倚靠、相信祢，并且愿意享受祢所赐的每一天，以祢为我最大的满足。奉主的名求，阿们！\n\n祷读：诗篇八十四篇11节\n因为耶和华─神是日头，是盾牌，要赐下恩惠和荣耀。祂未尝留下一样好处不给那些行动正直的人。\n\n\nQT: 诗篇八十四篇1~12节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔可拉后裔的诗，交与伶长。用迦特乐器。〕万军之耶和华啊，你的居所何等可爱！\n2 我羡慕渴想耶和华的院宇；我的心肠，我的肉体向永生神呼吁〔或作“欢呼”〕。\n3 万军之耶和华──我的王，我的神啊，在你祭坛那里，麻雀为自己找着房屋，燕子为自己找着菢雏之窝。\n4 如此住在你殿中的便为有福！他们仍要赞美你。（细拉）\n5 靠你有力量、心中想往锡安大道的，这人便为有福！\n6 他们经过“流泪谷”，叫这谷变为泉源之地；并有秋雨之福盖满了全谷。\n7 他们行走，力上加力，各人到锡安朝见神。\n8 耶和华──万军之神啊，求你听我的祷告！雅各的神啊，求你留心听！（细拉）\n9 神啊，你是我们的盾牌；求你垂顾观看你受膏者的面！\n10 在你的院宇住一日，胜似在别处住千日；宁可在我神殿中看门，不愿住在恶人的帐棚里。\n11 因为耶和华──神是日头，是盾牌，要赐下恩惠和荣耀。他未尝留下一样好处不给那些行动正直的人。\n12 万军之耶和华啊，倚靠你的人便为有福！"}, "7-6": {"theme": "我要听神所说的话", "scripture": "诗篇八十五篇1~13节节", "url": "https://www.youtube.com/watch?v=bcj0E39s_hY&list=PLgFvTLP0QRDsarwUxSyXa2mhzxmGsc-V6&index=6", "videoId": "bcj0E39s_hY", "date_cn": "6/7/26(一)", "description": "主题：我要听神所说的话\n经文：诗篇八十五篇1~13节\n\n本诗篇的开头，诗人记念神将属祂的百姓，从被掳之地，带回故土的作为（参1~3节）。神的施恩，表现在消除怒气，并且拯救百姓从外邦回到应许之地。但是，诗人看见了眼前故土的残破，心中不免哀叹，就向神呼求──不要再向我们发怒，求祢使我们得见祢的慈爱（参4~7节）。\n\n诗人在这诗篇中，不断强调神与人密切的关系。诗人承认神在他身上的主权，又说祂是唯一能够施恩的主。诗人除了哀叹、呼求，也向神陈明他的心志（参8节），并且呼吁众人一同来聆听神的话语；而且，他还劝戒众人不仅要听，更要切实去行，不要再转离神，走上虚妄的道路。若遵从神的旨意，百姓必定得著神的平安，并会发现神、人、天、地之间充满和谐，因为神将慈爱、诚实、公义与平安，充满于世界！\n\n此诗篇最重要的关键，就是诗人表明他愿意回转、听从神的心志（参8节）！亲爱的弟兄姊妹，无论是过往的辛苦，或是现今的凄凉，都不能使我们的心颓败、沮丧，因为我们只要愿意专心听从神的话，神就应许将属天的平安，赏赐给祂的百姓、祂的圣民，也就是敬畏神的人！\n\n另外，若我们愿意专心听从神的话，就表示愿意回转向神，离开过去属世的生活。不论过去是辉煌、自豪，或是悔疚、失落，旧事已过，都不再记念，以免混淆我们定睛在神身上的眼光！专心敬畏神、听从神的人，将要经历神所赐的丰盛！这正是神的儿女，对于末世所怀抱的盼望！\n\n但愿每一个属神的儿女，都能够一天比一天更认识神，对神更有信心！亲爱的弟兄姊妹，无论过去的经历是好是坏，我们都要忘记背后、努力面前，向著神所呼召我们去得的奖赏前进（参腓三13~14）！但愿我们一生专一听从神、不偏离祂的话语，以致能够领受属天的祝福。\n\n回应：主啊！感谢祢施恩、救赎了我的生命！求祢帮助我专心听从祢的话语，天天认真跟随祢，好能回应祢的爱和拣选！奉主的名求，阿们！\n\n祷读：诗篇八十五篇8节\n我要听神─耶和华所说的话；因为祂必应许将平安赐给祂的百姓─祂的圣民。\n\n\nQT: 诗篇八十五篇1~13节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各 立的所在。而这首诗更宝贵的另一个部分是：它不仅借由赞美圣城来尊荣耶和华，又带来末世万民都要敬拜神的盼望。\n     \n拉哈伯（参埃及）、巴比伦、非利士、推罗、古实，这些国家都是以色列附近的邦国；而这些原本都不认识神的外邦人，长久以来，带给以色列许多威胁和迫害。然而，在此诗篇中，这些国家被列举出来，却是预言性的象征：到了末日的时候，之前不认识神、不尊敬神的万国、万民、万邦、万族，都要在神的荣耀光中俯伏敬拜祂；而且他们的心要羡慕，并向往来到锡安山，朝拜这一位荣耀的神！由此可见，这是一首带著末日盼望的诗歌，也是诗人至深的心愿──希望万民万邦都能认识，并且敬畏这一位创造他们、爱他们的神。\n    \n如今，我们已经认识神的人，也如同当时以色列人所面对的光景；周遭的信仰环境不容易改变，不信主的人也对我们不甚友善。但是，我们却应当如同诗人，活出属神生命、怀著末日盼望；相信神将来要得著尊荣和万民的敬拜──过去那些不顺服真神的子民，到了神荣耀大光照耀的时候，都要俯伏跪拜祂！如今，我们应当常存这样的盼望，不断地祷告，求神建立祂的工作，让教会成为祂荣耀的居所，成为万民都羡慕来敬拜神的地方！而那些被神所拣选的人，终要回到神的教会中，在属灵上和我们一同成为亚伯拉罕的子孙，如同保罗称呼耶路撒冷（锡安）是我们的母亲一样（参加四26）。\n\n亲爱的弟兄姊妹，让我们时常为身旁未信主的人祷告，要相信──这些被神所爱、预定得救的人，将回到神的家，成为祂的儿女，因信称义，成为属灵的后裔，一起敬拜神。\n\n回应：主啊，但愿更多的人能够认识祢，并且成为祢的儿女！我愿意透过祷告和行动与祢同工，与人同享福音的好处！奉主的名求，阿们！\n\n祷读：诗篇八十六篇9节\n主啊，祢所造的万民都要来敬拜祢；他们也要荣耀祢的名。\n\nQT: 诗篇八十七篇1~7节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 耶和华所立的根基在圣山上。\n2 他爱锡安的门，胜于爱雅各一切的住处。\n3 神的城啊，有荣耀的事乃指着你说的。（细拉）\n4 我要提起拉哈伯和巴比伦人，是在认识我之中的；看哪，非利士和泰尔并古实人，个个生在那里。\n5 论到锡安，必说：这一个、那一个都生在其中，而且至高者必亲自坚立这城。\n6 当耶和华记录万民的时候，他要点出这一个生在那里。（细拉）\n7 歌唱的，跳舞的，都要说：我的泉源都在你里面。"}, "7-9": {"theme": "黑暗中的呼求", "scripture": "诗篇八十八篇1~18节", "url": "https://www.youtube.com/watch?v=TSOV8Ng1vFE&list=PLgFvTLP0QRDsarwUxSyXa2mhzxmGsc-V6&index=3", "videoId": "TSOV8Ng1vFE", "date_cn": "9/7/26(四)", "description": "主题：黑暗中的呼求\n经文：诗篇八十八篇1~18节\n\n在所有的诗篇当中，这一篇大概是最悲哀的。除了一开头，诗人承认、肯定神是拯救的神之外（参1节），接下去的内容更充满了自怨、绝望、质问、哀求，甚至以「黑暗」作为结束（参18节）。在此诗篇中，完全看不见神作出任何回应。无论诗人形容自己是多么地困苦、可怜，又质问神为何一直将他放在幽暗的死地，神却始终没有作出回应。诗人的生命光景，如同他所描述的一样困顿：「我被丢在死人中，好像被杀的人躺在坟墓里。他们是祢不再记念的，与祢隔绝了」（参5节）。\n\n我们无法得知诗人受苦，或是受罚的原因，只知他「心里满了患难」──他遭到隔离、受到惊恐，以致慌张。而且，从其内容中看见：神的愤怒如同千斤石头，压在他的身上！但是，就像约伯不明白为何他会遭遇患难，我们也不能明白神为何如此对待这位诗人。\n\n然而，虽然整篇诗充满孤苦与无望；但诗人在一开头，就向神作出信心宣告，宣告神是拯救他的神，这样的宣告十分重要！因为当环境持续恶劣，诗人不断地等待神，却都无法得著祂的回应；我们是否也曾如此？这是一段灵命成长的过程；「鼎为炼银，炉为炼金；惟有耶和华熬炼人心。」（参箴十七3）基督也是「因所受的苦难学了顺从」（参来五7~8）。所以，当我们处于艰苦的环境，必须求神加添信心，并全然相信祂是真光、祂会覆庇我们！\n\n亲爱的弟兄姊妹，你也正走在一段艰难的路上吗？让我们一同学习宣告──神对我们的爱永不改变！让我们紧紧倚靠祂，直到我们的生命更加成熟、茁壮，并能彰显祂的荣耀！\n\n回应：主啊！当我面对逆境，不总是能完全明白祢的心意。求祢怜悯我、加添我信心，好叫我可以坚定倚靠祢！奉主的名求，阿们！\n\n祷读：诗篇八十八篇1~2节 \n耶和华──拯救我的神啊，我昼夜在祢面前呼吁。愿我的祷告达到祢面前；求祢侧耳听我的呼求！\n\nQT: 诗篇八十八篇1~18节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔可拉后裔的诗歌、就是以斯拉人希幔的训诲诗、交与伶长。调用麻哈拉利暗俄。〕耶和华──拯救我的神啊，我昼夜在你面前呼吁。\n2 愿我的祷告达到你面前；求你侧耳听我的呼求！\n3 因为我心里满了患难；我的性命临近阴间。\n4 我算和下坑的人同列，如同无力的人一样〔“无力”或作“没有帮助”〕。\n5 我被丢在死人中，好像被杀的人躺在坟墓里。他们是你不再记念的，与你隔绝了。\n6 你把我放在极深的坑里，在黑暗地方，在深处。\n7 你的忿怒重压我身；你用一切的波浪困住我。（细拉）\n8 你把我所认识的隔在远处，使我为他们所憎恶；我被拘困，不得出来。\n9 我的眼睛因困苦而干瘪。耶和华啊，我天天求告你，向你举手。\n10 你岂要行奇事给死人看吗？难道阴魂还能起来称赞你吗？（细拉）\n11 岂能在坟墓里述说你的慈爱吗？岂能在灭亡中述说你的信实吗？\n12 你的奇事岂能在幽暗里被知道吗？你的公义岂能在忘记之地被知道吗？\n13 耶和华啊，我呼求你；我早晨的祷告要达到你面前。\n14 耶和华啊，你为何丢弃我？为何掩面不顾我？\n15 我自幼受苦，几乎死亡；我受你的惊恐，甚至慌张。\n16 你的烈怒漫过我身；你的惊吓把我剪除。\n17 这些终日如水环绕我，一齐都来围困我。\n18 你把我的良朋密友隔在远处，使我所认识的人进入黑暗里。"}, "7-10": {"theme": "哪一个大能者像祢", "scripture": "诗篇八十九篇1~18节", "url": "https://www.youtube.com/watch?v=Jh0aza4pkW8&list=PLgFvTLP0QRDsarwUxSyXa2mhzxmGsc-V6&index=2", "videoId": "Jh0aza4pkW8", "date_cn": "10/7/26", "description": "主题：哪一个大能者像祢\n经文：诗篇八十九篇1~18节\n\n一口气读完第八十九篇，会发现在第37节之前，诗人强调神的信实、慈爱，以及祂拣选大卫的约。但是，从第38节开始，却出现一连串的哀叹；诗人急切地呼求神再度显明祂的慈爱！这呈现极大对比的两段内容，可让我们思想神的「超越」。\n\n第1至4节是本诗篇的基础──神的慈爱和信实，坚立在天，存到永远；因此，祂拣选大卫，并且主动和他立约。接著，诗人再从三方面来称颂神的「超越」：\n\n首先，从第5至8节，看见神超越一切属灵的受造物，以及所有的天使、圣者；有何者可以像神一样，大有威严、尊荣呢？神「说有，就有，命立，就立」（参诗三十三9）；启示录五章13节也告诉我们，天上地下所有的被造之物，都要颂赞神的荣耀！这样的光荣、威严，是没有任何人、事、物能够相比的！感谢赞美主！祂是何等威严，配得荣耀！\n\n其次，诗人提到──神超越了大自然一切的受造物（参9~13节）。天地洋海、山林川池；天上飞的、水中游的、地上走的；能动的、不能动的、能思考的、不能思考的、有权的、低微的、富有的、贫穷的……有哪一个不是借由神而造的呢？\n\n最后，诗人提到──我们可以因著神伟大、超越的属性而蒙福（参14~18节）。感谢神，祂是公义、公平、慈爱、诚实、荣耀、信实的！这是祂的属性，也是我们作为祂的儿女不能忘记的！倘若我们真实承认神是我们的神，并且愿意跟随祂，就能够行在祂的光中，得见祂的荣面，享受祂的喜乐，并且经历祂的保守！\n\n亲爱的弟兄姊妹，但愿我们打从心里承认神的「超越」，相信祂是那一位独一、伟大的神，并且真心跟随祂，好叫我们因著祂的名，一生得享丰盛的喜乐与福分！\n\n回应：主啊！我要赞美、敬拜祢，因为祢是何等伟大！求祢时刻光照我的生命，好叫我一生紧密与祢同行，更深认识和信靠祢。奉主的名求，阿们！\n\n祷读：诗篇八十九篇15节\n知道向祢欢呼的，那民是有福的！耶和华啊，他们在祢脸上的光里行走。\n\nQT: 诗篇八十九篇1~18节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」 卫，仇敌不能伤害他，而且神也要给他争战的能力，战胜邻国，得著从大河到大海之间的所有地土。另外，神甚至高举他，成为世上地位最高的君王！而这样的描述，正是象征弥赛亚的王权超越万有之上。最后，我们不禁赞叹，神是何等信实！即使大卫的后裔不专心寻求神，也不遵行祂的话，神在加给他们刑罚与苦难的同时，却不曾将祂的慈爱全然收回，这是因为神不背弃祂所立的约！\n\n亲爱的弟兄姊妹，我们成为神的儿女，必须承认──神有绝对的主权！唯独祂是我们的主、我们的王，是赏赐我们生命气息的神！因此，相信生命道路在祂的手中，就不会时常心怀不满、自怨自艾。另外，我们也要向神献上感恩！因为祂向祂儿女所应许的福是多么丰盛，而且祂看顾我们如同眼中的瞳仁！就如同保罗提醒我们的：「神若帮助我们，谁能敌挡我们呢？」（参罗八31）最后，我们要对神更有信心，因为祂的圣洁、公义是最有力的担保──祂永不毁约，也向祂的儿女常存慈爱！即使我们因犯罪而受罚，但是时候到了，就必再次得享祂的慈爱！既是如此，神儿女还有什么挂虑呢？\n\n回应：主啊，感谢祢拣选了我！祢不仅赐下丰富的恩典，也用恩手保护我！求祢帮助我对祢更有信心，无论何时都相信祢是守约、施慈爱的神。奉主的名求，阿们！\n\n祷读：诗篇八十九篇33节\n只是我必不将我的慈爱全然收回，也必不叫我的信实废弃。\n\nQT: 诗篇八十九篇19~37节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "19 当时，你在异象中晓谕你的圣民，说：我已把救助之力加在那有能者的身上；我高举那从民中所拣选的。\n20 我寻得我的仆人大卫，用我的圣膏膏他。\n21 我的手必使他坚立；我的膀臂也必坚固他。\n22 仇敌必不勒索他；凶恶之子也不苦害他。\n23 我要在他面前打碎他的敌人，击杀那恨他的人。\n24 只是我的信实和我的慈爱要与他同在；因我的名，他的角必被高举。\n25 我要使他的左手伸到海上，右手伸到河上。\n26 他要称呼我说：你是我的父，是我的神，是拯救我的磐石。\n27 我也要立他为长子，为世上最高的君王。\n28 我要为他存留我的慈爱，直到永远；我与他立的约必要坚定。\n29 我也要使他的后裔存到永远，使他的宝座如天之久。\n30 倘若他的子孙离弃我的律法，不照我的典章行，\n31 背弃我的律例，不遵守我的诫命，\n32 我就要用杖责罚他们的过犯，用鞭责罚他们的罪孽。\n33 只是我必不将我的慈爱全然收回，也必不叫我的信实废弃。\n34 我必不背弃我的约，也不改变我口中所出的。\n35 我一次指着自己的圣洁起誓：我决不向大卫说谎！\n36 他的后裔要存到永远；他的宝座在我面前如日之恒一般，\n37 又如月亮永远坚立，如天上确实的见证。（细拉）"}, "7-12": {"theme": "神啊 这要到几时呢", "scripture": "诗篇八十九篇38~52节", "url": "https://www.youtube.com/watch?v=6hQojjvGwJQ&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=31", "videoId": "6hQojjvGwJQ", "date_cn": "12/7/26(日)", "description": "主题：神啊 这要到几时呢 \n经文：诗篇八十九篇38~52节\n\n前两天的经文，不断地向我们强调神的守约及施慈爱──神不仅要坚立大卫的王位，神也要坚定他的后裔。但是，我们今天读到的经文，却好像完全不是这么一回事！为何会如此呢？\n    \n根据历史书的记载，所罗门之后，大卫的后裔不专心跟随神，也不遵行神的典章。因此，如同昨天的经文提到的──神要用杖管教、责罚祂悖逆的百姓（参32节）！从第38至45节可以看见，国家当时的光景是何等悲哀：除了遭受敌人的侵略，大卫荣耀的王权和广大的疆域尽失！而百姓软弱到一个地步，连争战的力气都没有了！此时的羞辱和之前的强盛，真是天壤之别。\n\n可是，神不是应许：「我必不将我的慈爱全然收回」吗（参33节）？所以，在第46至51节，诗人就紧紧抓住神之前的应许来求告祂：「这要到几时呢？」（参46节）、「祢从前凭祢的信实向大卫立誓要施行的慈爱在哪里呢？」（参49节）\n\n虽然我们无法知道要等候多久，神才会回应这样的祷告，就像我们也不能理解，为何别人向神求，神就回应了他，而我们向神求，却没有得到同样的回应。这种情形我们唯一可以做的，就是相信神自己所作的宣告：「我一次指著自己的圣洁起誓：我决不向大卫说谎！」（参35节）感谢主！在我们感到痛苦、孤独的时刻，虽然神看似隐藏，却永不背弃祂的约！\n\n「耶和华啊，这要到几时呢？」（参46节）如同诗人在困苦中向神提出质问，神也允许我们在面临无助和低潮时，向祂发出最真实的呼喊！亲爱的弟兄姊妹，让我们学习在不容易的过程中，坚心忍耐、等候神的工作！如同「农夫忍耐等候地里宝贵的出产，直到得了秋雨春雨。」（参雅五7）愿神亲自帮助我们，使我们的生命借由这些时刻，更加成熟、坚韧，以致从祂得著称赞！\n\n回应：主啊！我时常信心软弱，以致于无法好好等候。求祢怜悯我，好叫我能靠著祢的恩典，坚持仰望祢，直到看见祢荣耀的心意！奉主的名求，阿们！\n\n祷读：雅各书五章7节\n弟兄们哪，你们要忍耐，直到主来。看哪，农夫忍耐等候地里宝贵的出产，直到得了秋雨春雨。\n\nQT: 诗篇八十九篇38~52节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光， 慧和蒙眷爱的恩典！奉主的名求，阿们！\n\n祷读：诗篇九十篇17节\n愿主我们神的荣美归于我们身上。愿祢坚立我们手所做的工；我们手所做的工，愿祢坚立。\n\nQT: 诗篇九十篇1~17节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 〔神人摩西的祈祷。〕主啊，你世世代代作我们的居所。\n2 诸山未曾生出，地与世界你未曾造成，从亘古到永远，你是神。\n3 你使人归于尘土，说：你们世人要归回。\n4 在你看来，千年如已过的昨日，又如夜间的一更。\n5 你叫他们如水冲去；他们如睡一觉。早晨，他们如生长的草，\n6 早晨发芽生长，晚上割下枯干。\n7 我们因你的怒气而消灭，因你的忿怒而惊惶。\n8 你将我们的罪孽摆在你面前，将我们的隐恶摆在你面光之中。\n9 我们经过的日子都在你震怒之下；我们度尽的年岁好像一声叹息。\n10 我们一生的年日是七十岁，若是强壮可到八十岁；但其中所矜夸的不过是劳苦愁烦，转眼成空，我们便如飞而去。\n11 谁晓得你怒气的权势？谁按着你该受的敬畏晓得你的忿怒呢？\n12 求你指教我们怎样数算自己的日子，好叫我们得着智慧的心。\n13 耶和华啊，我们要等到几时呢？求你转回，为你的仆人后悔。\n14 求你使我们早早饱得你的慈爱，好叫我们一生一世欢呼喜乐。\n15 求你照着你使我们受苦的日子，和我们遭难的年岁，叫我们喜乐。\n16 愿你的作为向你仆人显现；愿你的荣耀向他们子孙显明。\n17 愿主──我们神的荣美归于我们身上。愿你坚立我们手所做的工；我们手所做的工，愿你坚立。"}, "7-14": {"theme": "阴影中的安全", "scripture": "诗篇九十一篇1~16节", "url": "https://www.youtube.com/watch?v=t7V_k7NKq4s&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=29", "videoId": "t7V_k7NKq4s", "date_cn": "14/7/26(二)", "description": "主题：阴影中的安全\n经文：诗篇九十一篇1~16节\n\n世界上最安全的地方在哪里？银行的金库？军队驻守的营区？诗人认为，这世界上最安全的地方，是一个被遮蔽之处──「住在至高者隐密处的，必住在全能者的荫下……祂必用自己的翎毛遮蔽你，你要投靠在他的翅膀底下……」（参1、4节）。这段经文的意思为何？诗人所提到的意象，是以至圣所内的施恩座作为背景，也就是两个基路伯的翅膀彼此相接之所在；「在他的翅膀底下」的意思，就是指神充满荣耀、降临的施恩座，是祂与人相会之处（参出三十6）。由此可见，世界上最安全的地方，就是与神交通的地方！因此，诗人勉励我们，我们与神建立关系，不单是要如同大祭司一年一度拜访至圣所，而是要「住在全能者的荫下」（参1节）。\n\n根据希伯来书第四章、十章的内容，我们都接到了一个公开的邀请，可以坦然无惧地来到神的面前，住在祂的隐密处，也就是祂的施恩座前。施恩座是神彰显荣耀的地方，也是神与我们相会的地方，神要在此向我们显明祂的旨意，引导我们前面的道路。\n\n「因祂要为你吩咐祂的使者，在你行的一切道路上保护你。」（参11节）诗人在此告诉我们一份神的应许，那就是我们若行在神的旨意中，神就要差派祂的军队来保护我们。而这也表明我们有一个责任，那就是要行在祂的道路上、行在祂的旨意中，并且「将至高者当你的居所」（参9节）！\n\n「灾害也不挨近你的帐棚」（参10节），这句经文并非表示，我们不会遭遇困难和灾害，而是强调一份应许──尽管我们行过死荫的幽谷，祸患却不会临到我们，反而会经历「万事互相效力，使爱神的人能得著益处」的恩典与祝福（参罗八28）！\n\n　 \n\n回应：主啊！谢谢祢透过耶稣的宝血，使我能进到祢的施恩座前，得蒙祢的怜悯与恩典。求祢的杖、祢的竿，引导我一生一世住在祢的殿中！奉主的名求，阿们！\n\n祷读：诗篇九十一篇2节\n我要论到耶和华说：「祂是我的避难所，是我的山寨，是我的神，是我所倚靠的。」\n\nQT : 诗篇九十一篇1~16节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 住在至高者隐密处的，必住在全能者的荫下。\n2 我要论到耶和华说：他是我的避难所，是我的山寨，是我的神，是我所倚靠的。\n3 他必救你脱离捕鸟人的网罗和毒害的瘟疫。\n4 他必用自己的翎毛遮蔽你；你要投靠在他的翅膀底下；他的诚实是大小的盾牌。\n5 你必不怕黑夜的惊骇，或是白日飞的箭，\n6 也不怕黑夜行的瘟疫，或是午间灭人的毒病。\n7 虽有千人仆倒在你旁边，万人仆倒在你右边，这灾却不得临近你。\n8 你惟亲眼观看，见恶人遭报。\n9 耶和华是我的避难所；你已将至高者当你的居所，\n10 祸患必不临到你，灾害也不挨近你的帐棚。\n11 因他要为你吩咐他的使者，在你行的一切道路上保护你。\n12 他们要用手托着你，免得你的脚碰在石头上。\n13 你要踹在狮子和虺蛇的身上，践踏少壮狮子和大蛇。\n14 神说：因为他专心爱我，我就要搭救他；因为他知道我的名，我要把他安置在高处。\n15 他若求告我，我就应允他；他在急难中，我要与他同在；我要搭救他，使他尊贵。\n16 我要使他足享长寿，将我的救恩显明给他。"}, "7-15": {"theme": "理想的一天", "scripture": "诗篇九十二篇1~15节", "url": "https://www.youtube.com/watch?v=hUOC-JZN6lE&list=PLgFvTLP0QRDtm5z0NbQB78C2E7s0Sd7_g&index=28", "videoId": "hUOC-JZN6lE", "date_cn": "15/7/26(三)", "description": "主题：理想的一天\n经文：诗篇九十二篇1~15节\n\n我们每一天的早晨如何开始，以及夜晚如何结束，决定了这两者之间所发生的事。在这一篇诗篇的第1至2节，诗人描述了理想的一天：「称谢耶和华！歌颂祢至高者的名！用十弦的乐器和瑟，用琴弹幽雅的声音，早晨传扬祢的慈爱，每夜传扬祢的信实。这本为美事」。\n\n这就是我们每一天该过的生活。亲爱的弟兄姊妹，我们早晨醒来，就要记得祂的慈爱，千万别嘟著嘴，说：「惨了！又是无趣的一天！」我们醒过来的时候，要说：「今天，主要爱我！我的生命在祂慈爱的手中，没有什么好害怕的」。\n\n每一天，我们都要向神献上赞美与感恩──「称谢耶和华！歌颂祢至高者的名……这本为美事。」不论是大事或小事，我们都要找出赞美神的理由，诸如找到停车位、平安出门返家、看见美丽的花草、可以工作及服事……；而当这一天快要结束的时候，要记得感谢神。早晨仰望神的荣面，又经历神的慈爱，那么晚上回顾这一天，可以告诉自己：「神是信实的！」无论这一天经历了多少困难，或拾起多少欢笑，我们都可以像先知耶利米一样说：「祢的信实极其广大」（参哀三23）！\n\n当我们拥有这样的生活态度，就能在每一天的劳苦、愁烦中，看见神的工作与祂大能的作为（参4节）！若我们的生命能够这样被「栽于耶和华的殿中」（参13节），就能如同棕树与香柏树（参12节）──即使经历暴风雨的摧残，仍然能够向下扎根，在旷野汲取水分；向上结果，能够「满了汁浆而常发青」（参14节），甚至到了晚年的时候，仍然多结果子。\n\n亲爱的弟兄姊妹，但愿我们所活出的每一天，都能彰显神的荣耀与恩典！\n\n回应：主啊！祢的信实极其广大！求祢擦亮我的眼睛，使我天天看见祢的作为，并能经历祢所赐的怜悯与平安。奉主的名求，阿们！\n\n祷读：诗篇九十二篇4节\n因祢──耶和华藉著祢的作为叫我高兴，我要因祢手的工作欢呼。\n\nQT: 诗篇九十二篇1~15节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声
