hoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 我儿，你要遵守我的言语，将我的命令存记在心。\n2 遵守我的命令就得存活；保守我的法则〔或作“指教”〕，好像保守眼中的瞳人，\n3 系在你指头上，刻在你心版上。\n4 对智慧说：你是我的姐妹，称呼聪明为你的亲人，\n5 她就保你远离淫妇，远离说谄媚话的外女。\n6 我曾在我房屋的窗户内，从我窗棂之间往外观看：\n7 见愚蒙人内，少年人中，分明有一个无知的少年人，\n8 从街上经过，走近淫妇的巷口，直往通她家的路去，\n9 在黄昏，或晚上，或半夜，或黑暗之中。\n10 看哪，有一个妇人来迎接他，是妓女的打扮，有诡诈的心思。\n11 这妇人喧嚷，不守约束，在家里停不住脚，\n12 有时在街市上，有时在宽阔处，或在各巷口蹲伏，\n13 拉住那少年人，与他亲嘴，脸无羞耻对他说：\n14 平安祭在我这里，今日才还了我所许的愿。\n15 因此，我出来迎接你，恳切求见你的面，恰巧遇见了你。\n16 我已经用绣花毯子和埃及线织的花纹布铺了我的床。\n17 我又用没药、沉香、桂皮薰了我的榻。\n18 你来，我们可以饱享爱情，直到早晨；我们可以彼此亲爱欢乐。\n19 因为我丈夫不在家，出门行远路；\n20 他手拿银囊，必到月望才回家。\n21 淫妇用许多巧言诱他随从，用谄媚的嘴逼他同行。\n22 少年人立刻跟随她，好像牛往宰杀之地；又像愚昧人带锁炼去受刑罚，\n23 直等箭穿他的肝；如同雀鸟急入网罗，却不知是自丧己命。\n24 众子啊，现在要听从我，留心听我口中的话。\n25 你的心不可偏向淫妇的道，不要入她的迷途。\n26 因为，被她伤害仆倒的不少；被她杀戮的而且甚多。\n27 她的家是在阴间之路，下到死亡之宫。"}, "10-22": {"theme": "无与伦比的智慧", "scripture": "箴言八章1~36节", "url": "https://www.youtube.com/watch?v=_EEPCMPR1_0&list=PLgFvTLP0QRDv7loBanDX5oRTdniG9ik27&index=21", "videoId": "_EEPCMPR1_0", "date_cn": "22/10/26(四)", "description": "主题：无与伦比的智慧 \n经文：箴言八章1~36节\n\n从箴言看到，智慧的人回应情欲诱惑的态度，与那些无知、愚蒙的人十分不同！感谢主！藉著祂所赏赐的智慧，我们就有力量对抗邪恶！然而，神所赐的智慧不仅会帮助我们抵挡邪恶，智慧本身的美好、无与伦比的价值、所带来生命的祝福，以及神创造宇宙万物的大工等，皆显明神的心意，呼召我们全心、全力、全意渴慕追求智慧。\n\n智慧发出爱的呼召（参17节）：智慧的价值远超过黄金、白银和珍珠，世上一切都由祂掌权；所有的财富和权力，都比不上智慧的丰富及尊荣！然而，世人汲汲营营寻求珍宝与权柄，却忽视了智慧的价值；为此，智慧大声呼喊，盼望愚蒙的人能够体会祂的宝贵。况且，智慧不是难以寻求的，祂向世人发出爱的呼召：「爱我的，我也爱他；恳切寻求我的，必寻得见」（参17节）。\n\n亲爱的弟兄姐妹，只要我们爱智慧，智慧必定爱我们、亲近我们，而且祂要将荣耀的丰富赏赐给我们！因此，在智慧的面前，我们要思想：我们所爱的，到底是什么呢？\n\n智慧的永恒（参22~31节）：全备的智慧，是神的属性。我们能够透过神的奇妙创造，明白体会祂美好的智慧。神的智慧配得一切的敬拜与赞美，祂的智慧超越一切！各种思维与理性，都无法取代祂的永恒与独特！此外，祂的智慧超越时间、空间，和一切的限制！然而，这样的智慧却喜悦住在世人之间；作为神的儿女，怎能不为此感到欢喜踊跃呢？\n\n智慧的祝福（参32、34节）：亲爱的弟兄姐妹，我们不仅要爱智慧、寻求智慧，也要明白─智慧也喜悦住在我们当中，祂将为我们的生命带来极大的祝福！但愿我们「会悟灵明」、「心里明白」（参5节），亲身经历智慧的价值与美好，享受蒙神祝福的恩惠。\n\n回应：主啊，我要敬畏祢！感谢祢将美好的智慧赏赐给我！我要专心寻求祢，以致更深经历祢！奉主的名求，阿们！\n\n祷读：箴言八章17节\n爱我的，我也爱他；恳切寻求我的，必寻得见。\n\nQT: 箴言八章1~36节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 智慧岂不呼叫？聪明岂不发声？\n2 她在道旁高处的顶上，在十字路口站立，\n3 在城门旁，在城门口，在城门洞，大声说：\n4 众人哪，我呼叫你们，我向世人发声。\n5 说：愚蒙人哪，你们要会悟灵明；愚昧人哪，你们当心里明白。\n6 你们当听，因我要说极美的话；我张嘴要论正直的事。\n7 我的口要发出真理；我的嘴憎恶邪恶。\n8 我口中的言语都是公义，并无弯曲乖僻。\n9 有聪明的，以为明显，得知识的，以为正直。\n10 你们当受我的教训，不受白银；宁得知识，胜过黄金。\n11 因为智慧比珍珠〔或作“红宝石”〕更美；一切可喜爱的都不足与比较。\n12 我──智慧以灵明为居所，又寻得知识和谋略。\n13 敬畏耶和华在乎恨恶邪恶；那骄傲、狂妄，并恶道，以及乖谬的口，都为我所恨恶。\n14 我有谋略和真知识；我乃聪明，我有能力。\n15 帝王借我坐国位；君王借我定公平。\n16 王子和首领，世上一切的审判官，都是借我掌权。\n17 爱我的，我也爱他；恳切寻求我的，必寻得见。\n18 丰富尊荣在我；恒久的财并公义也在我。\n19 我的果实胜过黄金，强如精金；我的出产超乎高银。\n20 我在公义的道上走，在公平的路中行，\n21 使爱我的，承受货财，并充满他们的府库。\n22 在耶和华造化的起头，在太初创造万物之先，就有了我。\n23 从亘古，从太初，未有世界以前，我已被立。\n24 没有深渊，没有大水的泉源，我已生出。\n25 大山未曾奠定，小山未有之先，我已生出。\n26 耶和华还没有创造大地和田野，并世上的土质，我已生出。\n27 他立高天，我在那里；他在渊面的周围，划出圆圈。\n28 上使穹苍坚硬，下使渊源稳固，\n29 为沧海定出界限，使水不越过他的命令，立定大地的根基。\n30 那时，我在他那里为工师，日日为他所喜爱，常常在他面前踊跃，\n31 踊跃在他为人预备可住之地，也喜悦住在世人之间。\n32 众子啊，现在要听从我，因为谨守我道的，便为有福。\n33 要听教训就得智慧，不可弃绝。\n34 听从我、日日在我门口仰望、在我门框旁边等候的，那人便为有福。\n35 因为寻得我的，就寻得生命，也必蒙耶和华的恩惠。\n36 得罪我的，却害了自己的性命；恨恶我的，都喜爱死亡。"}, "10-23": {"theme": "舍弃自我 领受智慧", "scripture": "箴言九章1~18节", "url": "https://www.youtube.com/watch?v=sB4_igHpJK0&list=PLgFvTLP0QRDv7loBanDX5oRTdniG9ik27&index=20", "videoId": "sB4_igHpJK0", "date_cn": "23/10/26(五)", "description": "主题：舍弃自我 领受智慧\n经文：箴言九章1~18节\n\n神的智慧蕴含一切供应，智慧如同一场丰盛的筵席，邀请一切空虚匮乏的人来享用美好的生命灵粮。亲爱的弟兄姐妹，盼望我们都能寻求神智慧的真理，并得著在耶稣基督里的一切丰盛！\n\n在箴言里时常提到一种人，那就是「愚蒙的人」。这样的人心里没有属神的智慧，内心充满昏暗，很容易受到各种声音的引诱；好比愚昧的妇人喧嚷，呼叫过路的人转向她，以「虚假」（参意指『偷来的水』、『暗吃的饼』）来引诱人走向死地（参13~18节）。\n\n这个世界充满许多试探的声音，以及各式各样虚假的满足。这样的满足往往会带来短暂的快乐，最终却使人的内心更加饥渴，生命更加贫乏！像是赌博、情欲、贪恋、名利等等，往往都能带来感官或自我的满足，但是，这一切所伴随而来的，时常是我们所不能承担的代价！\n\n相较于世界所提供的满足和试探，真正的智慧可以为我们带来身、心、灵的完全以及美好的满足，这真实的满足要滋润我们的生命！如同今天阅读的箴言所写，智慧已经为我们预备了一切！祂建造美好的房屋、供应丰盛的筵席，甚至自己呼喊、邀请客人；而我们所需要做的，就是舍弃自我的愚蒙，转向智慧，就能得著一切的好处！愚蒙人舍弃智慧，就是舍弃自我；而舍弃自我，就是得著智慧的第一步！当人愿意领受智慧的教导，就越发有智慧（参9节）；人若只愿意停留在自我的亵慢及骄傲中，必定独自担当偏行己路的结果（参12节）。\n\n「敬畏耶和华是智慧的开端；认识至圣者便是聪明。」（参10节），这是智慧书卷不断重复的钥节。箴言第一至九章的内容，都在颂扬真智慧！真智慧从敬畏神而来，因为认识神就有聪明。感谢主！祂乐意赐给我们属天的智慧！但愿我们都能舍弃自己的愚蒙，真心敬畏祂，渴慕认识祂，得著智慧与聪明！\n\n回应：主啊！求祢使我看清楚自己的愚蒙，以致晓得如何舍弃自我，并且从祢得著真正的智慧。奉主的名求，阿们！\n\n祷读：箴言九章6节　\n你们愚蒙人，要舍弃愚蒙，就得存活，并要走光明的道。\n\nQT: 箴言九章1~18节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩 喜悦，与祂一同享受属天的喜乐！当我们活出智慧的教导，就能对神、对人活出真实的爱。\n\n箴言教导我们，义人（神所喜悦的人）要认真勤奋（参4、5、15、16、26节），而懒惰的人则会招致贫穷。尽管贫穷的原因不一定是懒惰，但是懒惰必定带来生命的贫乏！懒惰和消极是一体两面，不仅影响物质的财富，也会影响我们回应神的意愿！\n\n另外，箴言教导我们，义人也要注意口舌；因为义人的话语是生命的泉源，能滋生智慧，令人喜悦（参11、31、32节）。我们作为神的儿女，口里所说的话应是以造就、安慰、劝勉为目的（参林前十四3）。当我们说出智慧的话语，就能使人的生命得著喂养和滋润！而愚妄的人所说出的话，会带来败坏、怨恨与谗谤！义人的口舌带来祝福，恶人的口舌则是带来苦毒！两种不同的生命，会对身旁的人带来截然不同的影响！\n\n但愿箴言的教导，活在我们的心中，使我们成为讨神喜悦的儿女，成为祂心目中的义人，并且活出智慧的生命。\n\n回应：主啊！我愿意讨祢的喜悦、活出智慧的生命，并且为这个世代带下属祢的祝福！奉主的名求，阿们！\n\n祷读：箴言十章11节\n义人的口是生命的泉源。\n\nQT: 箴言十章1~32节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 所罗门的箴言：智慧之子使父亲欢乐；愚昧之子叫母亲担忧。\n2 不义之财毫无益处；惟有公义能救人脱离死亡。\n3 耶和华不使义人受饥饿；恶人所欲的，他必推开。\n4 手懒的，要受贫穷；手勤的，却要富足。\n5 夏天聚敛的，是智慧之子；收割时沉睡的，是贻羞之子。\n6 福祉临到义人的头；强暴蒙蔽恶人的口。\n7 义人的纪念被称赞；恶人的名字必朽烂。\n8 心中智慧的，必受命令；口里愚妄的，必致倾倒。\n9 行正直路的，步步安稳；走弯曲道的，必致败露。\n10 以眼传神的，使人忧患；口里愚妄的，必致倾倒。\n11 义人的口是生命的泉源；强暴蒙蔽恶人的口。\n12 恨能挑启争端；爱能遮掩一切过错。\n13 明哲人嘴里有智慧；无知人背上受刑杖。\n14 智慧人积存知识；愚妄人的口速致败坏。\n15 富户的财物是他的坚城；穷人的贫乏是他的败坏。\n16 义人的勤劳致生；恶人的进项致死〔“死”原文作“罪”〕。\n17 谨守训诲的，乃在生命的道上；违弃责备的，便失迷了路。\n18 隐藏怨恨的，有说谎的嘴；口出谗谤的，是愚妄的人。\n19 多言多语难免有过；禁止嘴唇是有智慧。\n20 义人的舌乃似高银；恶人的心所值无几。\n21 义人的口教养多人；愚昧人因无知而死亡。\n22 耶和华所赐的福使人富足，并不加上忧虑。\n23 愚妄人以行恶为戏耍；明哲人却以智慧为乐。\n24 恶人所怕的，必临到他；义人所愿的，必蒙应允。\n25 暴风一过，恶人归于无有；义人的根基却是永久。\n26 懒惰人叫差他的人如醋倒牙，如烟熏目。\n27 敬畏耶和华使人日子加多；但恶人的年岁必被减少。\n28 义人的盼望必得喜乐；恶人的指望必致灭没。\n29 耶和华的道是正直人的保障，却成了作孽人的败坏。\n30 义人永不挪移；恶人不得住在地上。\n31 义人的口滋生智慧；乖谬的舌必被割断。\n32 义人的嘴能令人喜悦；恶人的口说乖谬的话。"}, "10-25": {"theme": "公平与正直", "scripture": "箴言十一章1~31节", "url": "https://www.youtube.com/watch?v=NLCchJymQA8&list=PLgFvTLP0QRDv7loBanDX5oRTdniG9ik27&index=18", "videoId": "NLCchJymQA8", "date_cn": "25/10/26(日)", "description": "主题：公平与正直\n经文：箴言十一章1~31节\n\n神是信实公义的，祂喜悦我们按著祂的形像，活出美好的见证。正直与公平是神对我们的期待，祂不喜悦诡诈与欺压。愿我们都可以按著神的形像，活出正直公平的生活，手与口都蒙祂悦纳。\n\n在第1节，作者就说明了人心的诡诈：神喜悦公平，人心却充满诡诈。在生活中，很难避免以自己的标准和利益作为出发点来衡量别人。我们往往在别人和自己之间比较、衡量，而产生不公平的争竞，为自己带来苦毒与怨恨。人的自我中心，带来了许多不公、不义的结果；似是而非的言论，以及不公、不义的做法，都会对社会带来损害。如同耶利米书十七章9节写道：「人心比万物都诡诈，坏到极处，谁能识透呢？」愿神帮助我们，让我们的心时常在祂面前获得校正，从诡诈变为公平，活出祂的正直！\n\n倘若人的心是天平，人的口就是心的表达；因为心若不正，说出来的话就会带来败坏和倾覆；而心若正直，说出来的话就能带来「得救」与「祝福」（参9、11节）。亲爱的弟兄姐妹，我们口中的言语有极大的力量！好比国家社会的风气、前途、凝聚力，都与在上位者的言语息息相关；媒体的传播角度，也会影响社会大众对于相关事件的看法。因此，我们要来思想：日常的言语与评论，会带给别人祝福，还是会带下更多的纷争与困扰呢？\n\n亲爱的弟兄姐妹，我们的心若正直，各种经营都会带来生命的果效（参18、19、30节）！即使是在世上进行商业买卖，也会领受关乎物质的祝福（参24、26节）。人的本性喜欢将所拥有的紧紧抓在手中，尽管看似能拥有安全感，但所倚靠的却是自己！如果我们在神的恩典中，愿意学习放手、操练施舍，将我们的手交给神来使用，就是做讨祂喜悦的事。供应别人的需要，超越自我的需求，神必要加倍报答我们！但愿我们都能在神的恩典中发旺如青叶，而非跌倒于自我的财物中。\n\n回应：主啊！谢谢祢为我预备的一切！我愿意靠祢行出正直、说出公平，在别人的生命中带来滋润与祝福！奉主的名求，阿们！\n\n祷读：箴言十一章30节\n义人所结的果子就是生命树；有智慧的，必能得人。\n\nQT: 箴言十一章1~31节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 往会让人丧失自信、否定自我，而导致活在消极、阴沉和恐惧中。因此，耶稣在登山宝训中，禁止我们骂弟兄是拉加、魔利（参意指没有脑袋、愚笨，参太五22）。另外，第18节提到：「说话浮躁的，如刀刺人」。锐利的言语，有时比真正的刀枪还更伤人！亲爱的弟兄姐妹，我们必须谨慎留心自己的言语，好能为别人、为自己带来生命的祝福！\n\n第14节告诉我们，我们的口若说出祝福，就会如同一棵树结出美好的果子，生命也必饱得美福。希伯来书十三章15节也进一步提醒我们，「应当靠著耶稣，常常以颂赞为祭献给神，这就是那承认主名之人嘴唇的果子」。但愿我们都能赞美真神、肯定别人，使得自己的生命因而充满美福！\n\n最后，我们也必须谨慎分辨真实与谎言。撒但是谎言之父！在我们还不认识主的时候，或多或少都经历过谎言带来的「好处」，像是逃避责任、躲避刑罚、避免尴尬……我们喜欢以谎言遮盖所不喜欢的真实，但神是信实的，祂憎恶谎言！但愿我们能够谨记：「说谎言的嘴为耶和华所憎恶；行事诚实的，为祂所喜悦。」（参22节）求主保守我们持守内心的真实，口里所说的话都讨祂喜悦！\n\n回应：主啊！愿我口里所说的话，都能讨祢喜悦！求祢亲自帮助我，勒住我的舌头，将一切的荣耀归给祢！奉主的名求，阿们！\n \n祷读：箴言十二章14节\n人因口所结的果子，必饱得美福；人手所做的，必为自己的报应。\n\nQT: 箴言十二章1~28节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 喜爱管教的，就是喜爱知识；恨恶责备的，却是畜类。\n2 善人必蒙耶和华的恩惠；设诡计的人，耶和华必定他的罪。\n3 人靠恶行不能坚立；义人的根必不动摇。\n4 才德的妇人是丈夫的冠冕；贻羞的妇人如同朽烂在她丈夫的骨中。\n5 义人的思念是公平；恶人的计谋是诡诈。\n6 恶人的言论是埋伏流人的血；正直人的口必拯救人。\n7 恶人倾覆，归于无有；义人的家必站得住。\n8 人必按自己的智慧被称赞；心中乖谬的，必被藐视。\n9 被人轻贱，却有仆人，强如自尊，缺少食物。\n10 义人顾惜他牲畜的命；恶人的怜悯也是残忍。\n11 耕种自己田地的，必得饱食；追随虚浮的，却是无知。\n12 恶人想得坏人的网罗；义人的根得以结实。\n13 恶人嘴中的过错是自己的网罗；但义人必脱离患难。\n14 人因口所结的果子，必饱得美福；人手所做的，必为自己的报应。\n15 愚妄人所行的，在自己眼中看为正直；惟智慧人肯听人的劝教。\n16 愚妄人的恼怒立时显露；通达人能忍辱藏羞。\n17 说出真话的，显明公义；作假见证的，显出诡诈。\n18 说话浮躁的，如刀刺人；智慧人的舌头却为医人的良药。\n19 口吐真言，永远坚立；舌说谎话，只存片时。\n20 图谋恶事的，心存诡诈；劝人和睦的，便得喜乐。\n21 义人不遭灾害；恶人满受祸患。\n22 说谎言的嘴为耶和华所憎恶；行事诚实的，为他所喜悦。\n23 通达人隐藏知识；愚昧人的心彰显愚昧。\n24 殷勤人的手必掌权；懒惰的人必服苦。\n25 人心忧虑，屈而不伸；一句良言，使心欢乐。\n26 义人引导他的邻舍；恶人的道叫人失迷。\n27 懒惰的人不烤打猎所得的；殷勤的人却得宝贵的财物。\n28 在公义的道上有生命；其路之中并无死亡。"}, "10-27": {"theme": "领受责备 必得尊荣", "scripture": "箴言十三章1~25节", "url": "https://www.youtube.com/watch?v=yU_WxIoczA0&list=PLgFvTLP0QRDv7loBanDX5oRTdniG9ik27&index=16", "videoId": "yU_WxIoczA0", "date_cn": "27/10/26(二)", "description": "主题：领受责备 必得尊荣\n经文：箴言十三章1~25节\n\n就人的本性而言，我们都喜欢听好听的话语，对于诚实有益处的建言反而不易接受。因此，我们不仅要了解如何说话，更要学习如何聆听；听见别人对我们的指教，并且领受圣灵的引导，才能使我们的生命活得健全、丰富，因为「智慧人的法则（或译：指教）是生命的泉源」（参14节）。\n\n我们都喜欢得到别人的赞美与肯定，圣经也鼓励我们多说造就人的好话，而造就人的话语也包含智慧的引导、责备与劝戒。愿神保守我们存著温柔、顺服的心，可以接受管教，好能领受生命的泉源与祝福。\n\n第1节提到，智慧的孩子听从父母的教训，亵慢人（参指心高气傲、侮慢神的人）就不愿意听从。当我们检视自己与神的关系，发现也如同孩子与父母的关系，我们若顺服听从神的教导，就能得著丰盛的祝福；若不，则要学习承担后果！愿神时常拆毁我们心中的骄傲，好能怀抱一颗受教的心，时刻聆听祂的真理和劝戒。\n\n人的耳朵难以听进建言，往往是因为内心的骄傲。第10节指出，人的骄傲不能带给彼此祝福，只会带来争竞与比较。而第13节也同样提醒我们，「藐视训言」是「自取灭亡」！如果我们只活在自己的满足里，不能从训言中扩张生命的境界，那么生命只会越来越狭窄、贫乏、软弱（参18节）！亲爱的弟兄姐妹，我们若愿意虚心领受神借由人与环境所赏赐的引导、责备和教训，就能领受许多丰富的恩典！\n\n另外，我们除了自己要愿意学习谦卑领受管教，也要学习在爱中管教别人（参24节）。我们的管教难免出于血气，所以要学习「在爱中」说诚实话；如同耶稣，以柔和谦卑的态度管教别人，达到管教的效益。但愿我们在天父的爱与恩典中谦卑受教，也能有从神而来的智慧管教所爱的人。\n\n回应：主啊！即使我心存悖逆、不肯受教，祢却仍然挽回我！我感谢祢！我要除去心中的骄傲，领受智慧的教导，好能荣耀祢的名！奉主的名求，阿们！\n\n祷读：箴言十三章14节\n智慧人的法则是生命的泉源，可以使人离开死亡的网罗。\n\nQT: 箴言十三章1~25节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 们：「轻易发怒的，行事愚妄」。人很容易在怒气中做出愚蠢的事，甚至说出刺伤人的话！愿神保守我们不轻易发怒，能够掌控情绪。\n\n再来，第30节提醒我们：保持心中的安静，是肉体的生命。「安静」不仅是心灵的状态，也对身体有益处；但是，「嫉妒」就会带来各种负面情绪，像是怨恨、不平、比较等等，使我们的心思意念烦乱不堪、搅动不停，甚至影响身体的健康，成为骨中的朽烂。\n\n亲爱的弟兄姐妹，但愿情绪成为我们的好朋友，为我们的生命带来更多的丰富！盼望我们在属神的智慧中，结出「节制」的果子，各样情绪都受到圣灵的管束，保持在主里面的喜乐与平安。\n\n回应：主啊！愿祢掌管我一切的情绪，都能作出适切的表达，并能领受从祢而来的管束！求祢看顾我的内心，使我的属灵生命健康、强壮！奉主的名求，阿们！\n  \n祷读：箴言十四章29~30节\n不轻易发怒的，大有聪明；性情暴躁的，大显愚妄。心中安静是肉体的生命；嫉妒是骨中的朽烂。\n\nQT: 箴言十四章1~35节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 智慧妇人建立家室；愚妄妇人亲手拆毁。\n2 行动正直的，敬畏耶和华；行事乖僻的，却藐视他。\n3 愚妄人口中骄傲，如杖责打己身；智慧人的嘴必保守自己。\n4 家里无牛，槽头干净；土产加多乃凭牛力。\n5 诚实见证人不说谎话；假见证人吐出谎言。\n6 亵慢人寻智慧，却寻不着；聪明人易得知识。\n7 到愚昧人面前，不见他嘴中有知识。\n8 通达人的智慧在乎明白己道；愚昧人的愚妄乃是诡诈〔或作“自欺”〕。\n9 愚妄人犯罪，以为戏耍〔或作“赎愆祭愚弄愚妄人”〕；正直人互相喜悦。\n10 心中的苦楚，自己知道；心里的喜乐，外人无干。\n11 奸恶人的房屋必倾倒；正直人的帐棚必兴盛。\n12 有一条路，人以为正，至终成为死亡之路。\n13 人在喜笑中，心也忧愁；快乐至极就生愁苦。\n14 心中背道的，必满得自己的结果；善人必从自己的行为得以知足。\n15 愚蒙人是话都信；通达人步步谨慎。\n16 智慧人惧怕，就远离恶事；愚妄人却狂傲自恃。\n17 轻易发怒的，行事愚妄；设立诡计的，被人恨恶。\n18 愚蒙人得愚昧为产业；通达人得知识为冠冕。\n19 坏人俯伏在善人面前；恶人俯伏在义人门口。\n20 贫穷人连邻舍也恨他；富足人朋友最多。\n21 藐视邻舍的，这人有罪；怜悯贫穷的，这人有福。\n22 谋恶的，岂非走入迷途吗？谋善的，必得慈爱和诚实。\n23 诸般勤劳都有益处；嘴上多言乃致穷乏。\n24 智慧人的财为自己的冠冕；愚妄人的愚昧终是愚昧。\n25 作真见证的，救人性命；吐出谎言的，施行诡诈。\n26 敬畏耶和华的，大有倚靠；他的儿女也有避难所。\n27 敬畏耶和华就是生命的泉源，可以使人离开死亡的网罗。\n28 帝王荣耀在乎民多；君王衰败在乎民少。\n29 不轻易发怒的，大有聪明；性情暴躁的，大显愚妄。\n30 心中安静是肉体的生命；嫉妒是骨中的朽烂。\n31 欺压贫寒的，是辱没造他的主；怜悯穷乏的，乃是尊敬主。\n32 恶人在所行的恶上必被推倒；义人临死，有所投靠。\n33 智慧存在聪明人心中；愚昧人心里所存的，显而易见。\n34 公义使邦国高举；罪恶是人民的羞辱。\n35 智慧的臣子蒙王恩惠；贻羞的仆人遭其震怒。"}, "10-29": {"theme": "口与心", "scripture": "箴言十五章1~33节", "url": "https://www.youtube.com/watch?v=dWZOXqVL3pU&list=PLgFvTLP0QRDv7loBanDX5oRTdniG9ik27&index=14", "videoId": "dWZOXqVL3pU", "date_cn": "29/10/26(四)", "description": "主题：口与心\n经文：箴言十五章1~33节\n\n从一个人口里所说的话，就能够看出他的心思意念。如果我们说出温良及智慧的话语，就能带出生命的成长；相反地，如果我们说出乖谬、负面的话语，就会使人心碎！说话与心思对于我们生命的影响何其大！\n\n话语会牵动我们的情绪。柔和、美好的话语能使我们心情舒畅、生命得到滋润；暴戾的言语却会触动怒气，导致失控，并带来更大的纷争（参1、18节）。鼓励与肯定能帮助人的生命向正面发展，负面和否定的言语，则往往会带人走向消极与放弃。另外，话语不仅影响别人，也会影响自己。如果我们常常说出没有信心的话，就限制了成长的机会；相反地，若我们说出积极的话，就能经历在基督耶稣里的盼望与力量。\n\n「智慧人的嘴播扬知识；愚昧人的心并不如此。」（参7节）。在箴言中，智慧人是指敬畏神的人；这样的人总是透过话语传扬知识，也就是以属灵的眼光来解释、说明各样的事。然而，愚昧人所说出来的话语却没有意义，只有愚昧（参2节）。愿神帮助我们时常心存儆醒，不说出无意义、无价值，甚至带来负面影响的话语，而是能够说出「使骨滋润」的「好信息」（参30节）。\n\n话语和我们的心思息息相关，当我们与神说话，更是如此！神鉴察我们的心思意念，如同作者写道：「阴间和灭亡尚在耶和华眼前，何况世人的心呢？」（参11节），「耶和华远离恶人，却听义人的祷告。」（参29节）。说话与心思如此紧密连结，祷告更是由心灵深处向神发出的求问！\n\n亲爱的弟兄姐妹，神不仅聆听我们向祂祷告的言语，更要鉴察我们内心真实的善恶！华美的言词不能打动神，唯独真心的祈求，才能带出属天的能力！但愿我们与人说话、向神祷告，都能存著敬畏的心，以致能在人际关系中享受真实的恩典，并且活出神所喜悦的生命！\n\n回应：主啊！求祢帮助我，使我说出的每一句话，都能带来正面的建造和祝福！奉主的名求，阿们！\n\n祷读：箴言十五章30节\n眼有光，使心喜乐；好信息，使骨滋润。\n\nQT: 箴言十五章1~33节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年， 我们的内心，洞察极其细微的思绪，而且唯独祂才能作出最标准、最公平的判断。\n\n感谢主！祂是我们的公义，是我们的判断！这一点让我们极为安心。每个人对于每件事都有自己的立场和想法，如果没有神公义的判断在其中，就会陷入无止尽的纷争与辩论，而在自我中心里打转。但是，感谢神！祂衡量人心，又鉴察全地！只要我们的心都归向祂，都以祂的标准作为标准，彼此尊重、顺服，就能成就祂的美意。\n\n感谢主！神在我们当中造作一切，成就万事，并且全然掌权。当我们全然顺服神的权柄，并且全心信靠，祂就必为我们成就心中所想的事。如同经文告诉我们：「你所做的，要交托耶和华」（参3节）！亲爱的弟兄姐妹，交托是信靠神的表现。虽然我们可以筹划、计算、设立目标；但是，我们所踏出的每一步，都需要神的引导（参3、9节）。求神帮助我们，能够将内心的渴望，放心交托在祂的手中，并且顺服祂的引导！\n\n「签放在怀里，定事由耶和华。」（参33节），但愿我们都能交出生命的主权，顺服神的旨意；不是倚靠自己的势力和才能，而是仰望神的智慧，在每一次的行动中，经历神的智慧与引导，并且结出生命美好的果子！\n\n回应：主啊！祢是我生命的主！我愿意交出主权，不以自己作为标准，而是学习全心交托、顺服祢的引导。奉主的名求，阿们！\n\n祷读：箴言十六章9节\n人心筹算自己的道路；惟耶和华指引他的脚步。\n\n\nQT: 箴言十六章1~33节\n\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 心中的谋算在乎人；舌头的应对由于耶和华。\n2 人一切所行的，在自己眼中看为清洁；惟有耶和华衡量人心。\n3 你所做的，要交托耶和华，你所谋的，就必成立。\n4 耶和华所造的，各适其用；就是恶人也为祸患的日子所造。\n5 凡心里骄傲的，为耶和华所憎恶；虽然连手，他必不免受罚。\n6 因怜悯诚实，罪孽得赎；敬畏耶和华的，远离恶事。\n7 人所行的，若蒙耶和华喜悦，耶和华也使他的仇敌与他和好。\n8 多有财利，行事不义，不如少有财利，行事公义。\n9 人心筹算自己的道路；惟耶和华指引他的脚步。\n10 王的嘴中有神语，审判之时，他的口必不差错。\n11 公道的天平和秤都属耶和华；囊中一切法码都为他所定。\n12 作恶，为王所憎恶，因国位是靠公义坚立。\n13 公义的嘴为王所喜悦；说正直话的，为王所喜爱。\n14 王的震怒如杀人的使者；但智慧人能止息王怒。\n15 王的脸光使人有生命；王的恩典好像春云时雨。\n16 得智慧胜似得金子；选聪明强如选银子。\n17 正直人的道是远离恶事；谨守己路的，是保全性命。\n18 骄傲在败坏以先；狂心在跌倒之前。\n19 心里谦卑与穷乏人来往，强如将掳物与骄傲人同分。\n20 谨守训言的，必得好处；倚靠耶和华的，便为有福。\n21 心中有智慧，必称为通达人；嘴中的甜言，加增人的学问。\n22 人有智慧就有生命的泉源；愚昧人必被愚昧惩治。\n23 智慧人的心教训他的口，又使他的嘴增长学问。\n24 良言如同蜂房，使心觉甘甜，使骨得医治。\n25 有一条路，人以为正，至终成为死亡之路。\n26 劳力人的胃口使他劳力，因为他的口腹催逼他。\n27 匪徒图谋奸恶，嘴上仿佛有烧焦的火。\n28 乖僻人播散纷争；传舌的，离间密友。\n29 强暴人诱惑邻舍，领他走不善之道。\n30 眼目紧合的，图谋乖僻；嘴唇紧闭的，成就邪恶。\n31 白发是荣耀的冠冕，在公义的道上必能得着。\n32 不轻易发怒的，胜过勇士；治服己心的，强如取城。\n33 签放在怀里，定事由耶和华。"}, "10-31": {"theme": "美好的家庭", "scripture": "箴言十七章1~28节", "url": "https://www.youtube.com/watch?v=x3xihpLpsl8&list=PLgFvTLP0QRDv7loBanDX5oRTdniG9ik27&index=12", "videoId": "x3xihpLpsl8", "date_cn": "31/10/26(五)", "description": "主题：美好的家庭\n经文：箴言十七章1~28节\n\n「设筵满屋，大家相争，不如有块干饼，大家相安。」（参1节）；物质的丰富，可以让我们喜乐、感恩，却也可能造成争竞。在社会上，许多富有人家兄弟相安，常被视为美事，因为有更多的家庭，是兄弟阋墙、子孙分家，甚至彼此对簿公堂。我们希望能提供家人富足的物质生活，却忽略了经营彼此的情感，建立正确的价值观；于是，大家看重外在利益，过于宝贵的情感，以致失去了生命和关系中真正的富足！\n\n因此，我们大多都能认同，对于一个家庭或团体来说，最重要的并非丰富的物质生活，而是彼此能够享受平安的关系。真正的平安，并不是建立在物质上，而是在人与人美好的关系中。在一个家庭里，如果家人之间的关系只有撕裂与对立，物质和资源的丰富，反而因人心的贪婪与争竞，加深恶者的试探，而造成家人之间更多的破口。\n\n如同耶稣告诉我们，「人的生命不在乎家道丰富」（参路十二15）。家道丰富并不能带来真正的平安，唯有建立美好的关系，才能使我们得享祝福。美好的关系不是建立在物质上，而是在人与人之间彼此的喜爱与尊重。「子孙为老人的冠冕；父亲是儿女的荣耀。」（参6节），家庭成员互相尊重、肯定，必定能带给彼此极大的福分！\n\n可是，如今许多父母，没有活出生命的见证、不能成为榜样，怎能成为儿女的荣耀呢？孩子骄纵、任性、不知感恩，又怎能成为长辈的冠冕与安慰呢？愿神帮助我们，在家人之间建立真实的爱与信任，彼此尊重、扶持，好让整个家庭能够走在神美好的旨意中。\n\n「喜乐的心乃是良药；忧伤的灵使骨枯干。」（参22节），在这个充满物质试探的世界上，求神熬炼我们的心，在属祂的价值观中，建立真实蒙福的家庭与人生！\n\n回应：主啊！求祢帮助我，在祢的里面寻得生命真实的平安，并能在家中建立互信、互荣的美好关系。奉主的名求，阿们！\n\n祷读：箴言十五章17节 \n吃素菜，彼此相爱，强如吃肥牛，彼此相恨。\n\nQT: 箴言十七章1~28节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https: 代的金融风暴中，有多少人的财产一夕归零，甚至债台高筑！金钱不再是美好的城墙，能够保护身家安全，反而成为生命的牢笼、限制与捆绑。\n\n世事变化万千，昔日高官，今日可以成为阶下囚；万贯家财，也有散尽的一天。金钱、名望和地位，也许可以一时满足我们内心错误的渴望，但若怀抱这不正确的期盼，就无法长久得享福乐。好比富足人「心想」财物犹如高墙（参11节），这错误的价值观、错误的倚靠、错误的思想，最终会带来空虚与失望。而唯独永不改变的真神，才是我们真正的坚固台。\n\n感谢主！「耶和华的名是坚固台」（参10节），是永恒不变的真理。神的名大而可畏！祂是创造主，是医治者，是得胜的元帅，是一切的供应，在祂的里面充满一切的荣耀、尊贵、智慧与圣洁！祂是我们的能力，是我们的平安；祂是一切，而且永不改变！\n\n在这弯曲悖谬的世代，任何人、事、物都可能改变，原先以为可靠的，最后却往往带给我们极大的失望。但是，感谢神！「在祂并没有改变，也没有转动的影儿」（参雅一17）我们的神是磐石、是山寨、是避难所、是坚固台！\n\n回应：主啊！在这变化多端的世代中，谢谢祢成为我的坚固台！求祢用祢的真理指引我的脚步，我要跟随祢到底，直到看见祢的荣耀彰显！奉主的名求，阿们！\n\n祷读：箴言十八章10节\n耶和华的名是坚固台；义人奔入便得安稳。\n\nQT: 箴言十八章1~24节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 与众寡合的，独自寻求心愿，并恼恨一切真智慧。\n2 愚昧人不喜爱明哲，只喜爱显露心意。\n3 恶人来，藐视随来；羞耻到，辱骂同到。\n4 人口中的言语如同深水；智慧的泉源好像涌流的河水。\n5 瞻徇恶人的情面，偏断义人的案件，都为不善。\n6 愚昧人张嘴启争端，开口招鞭打。\n7 愚昧人的口自取败坏；他的嘴是他生命的网罗。\n8 传舌人的言语如同美食，深入人的心腹。\n9 做工懈怠的，与浪费人为弟兄。\n10 耶和华的名是坚固台；义人奔入便得安稳。\n11 富足人的财物是他的坚城，在他心想，犹如高墙。\n12 败坏之先，人心骄傲；尊荣以前，必有谦卑。\n13 未曾听完先回答的，便是他的愚昧和羞辱。\n14 人有疾病，心能忍耐；心灵忧伤，谁能承当呢？\n15 聪明人的心得知识；智慧人的耳求知识。\n16 人的礼物为他开路，引他到高位的人面前。\n17 先诉情由的，似乎有理；但邻舍来到，就察出实情。\n18 掣签能止息争竞，也能解散强胜的人。\n19 弟兄结怨，劝他和好，比取坚固城还难；这样的争竞如同坚寨的门闩。\n20 人口中所结的果子，必充满肚腹；他嘴所出的，必使他饱足。\n21 生死在舌头的权下，喜爱它的，必吃它所结的果子。\n22 得着贤妻的，是得着好处，也是蒙了耶和华的恩惠。\n23 贫穷人说哀求的话；富足人用威吓的话回答。\n24 滥交朋友的，自取败坏；但有一朋友比弟兄更亲密。"}, "11-2": {"theme": "贫穷与富足", "scripture": "箴言十九章1~29节", "url": "https://www.youtube.com/watch?v=EMYhcbgrChs&list=PLgFvTLP0QRDv7loBanDX5oRTdniG9ik27&index=10", "videoId": "EMYhcbgrChs", "date_cn": "2/11/26(一)", "description": "主题：贫穷与富足\n经文：箴言十九章1~29节\n\n在资本主义挂帅的世代，贫穷与富足似乎是评量个人价值的标准。名牌、名车、豪宅等物质，成为标示个人成就的记号；但个人内在的品格与生命本身的尊严，却被视为无足轻重，甚至遭到刻意贬低。即便如此，创造万物的神，乐意施恩给寻求祂的人！祂所赐生命的富足，超过物质的满足。\n\n如同诗篇四章7节写道：「祢使我心里快乐，胜过那丰收五谷新酒的人。」今天阅读的箴言也告诉我们：「行为纯正的贫穷人胜过乖谬愚妄的富足人。」（参1节），换句话说，一个人即使生活过得富裕，倘若不能明白真道、自高自大，结局还不如蒙神喜悦的贫穷人呢！我们从大卫和拿八的故事中，就能看到这样的例子。拿八有钱有势，但是他生命最后的结局，却是被神击打致死！而大卫却在神的保守之下，完成神对他生命的旨意（参撒上二十五）。\n \n当然，人处在贫穷中，必面临许多错误价值观的挑战；好比用钱财来衡量人与人的关系，似乎唯有钱财能够发挥一定程度的影响力！而另一个错误的价值观，就是懒散的生活态度。如果贫穷人终日懒散、不上进、不努力，不愿意建立认真、正确的生活态度，这样不仅无法得著别人的赏识，也不能讨神喜悦！而神要这样的人承担自己所引发的结果：「懒惰使人沉睡；懈怠的人必受饥饿」（参15节）。\n\n感谢主！祂是施恩、怜悯的神，祂怜悯贫穷、软弱、缺乏的人，而祂也喜悦我们活出属祂的怜悯之心。「怜悯贫穷的，就是借给耶和华；他的善行，耶和华必偿还」（参17节）。亲爱的弟兄姐妹，但愿我们除了学习活出神的怜悯，也能牢记保罗的提醒：「若有人不肯做工，就不可吃饭」（参帖后三10）。愿神加添智慧，在教会中知道如何处缺乏或富足（参腓四11~13），并靠著神的恩典和真理，在肢体当中学习彼此相爱。\n\n回应：主啊！感谢祢赐给我生命真实的富足！求祢持续帮助我，不论外在环境如何，都靠祢得著更丰盛的生命。奉主的名求，阿们！\n\n祷读：箴言十九章23节\n敬畏耶和华的，得著生命；他必恒久知足，不遭祸患。\n\nQT: 箴言十九章1~29节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 行为纯正的贫穷人胜过乖谬愚妄的富足人。\n2 心无知识的，乃为不善；脚步急快的，难免犯罪。\n3 人的愚昧倾败他的道；他的心也抱怨耶和华。\n4 财物使朋友增多；但穷人朋友远离。\n5 作假见证的，必不免受罚；吐出谎言的，终不能逃脱。\n6 好施散的，有多人求他的恩情；爱送礼的，人都为他的朋友。\n7 贫穷人，弟兄都恨他；何况他的朋友，更远离他！他用言语追随，他们却走了。\n8 得着智慧的，爱惜生命；保守聪明的，必得好处。\n9 作假见证的，不免受罚；吐出谎言的，也必灭亡。\n10 愚昧人宴乐度日是不合宜的；何况仆人管辖王子呢？\n11 人有见识就不轻易发怒；宽恕人的过失便是自己的荣耀。\n12 王的忿怒好像狮子吼叫；他的恩典却如草上的甘露。\n13 愚昧的儿子是父亲的祸患；妻子的争吵如雨连连滴漏。\n14 房屋钱财是祖宗所遗留的；惟有贤慧的妻是耶和华所赐的。\n15 懒惰使人沉睡；懈怠的人必受饥饿。\n16 谨守诫命的，保全生命；轻忽己路的，必致死亡。\n17 怜悯贫穷的，就是借给耶和华；他的善行，耶和华必偿还。\n18 趁有指望，管教你的儿子；你的心不可任他死亡。\n19 暴怒的人必受刑罚；你若救他，必须再救。\n20 你要听劝教，受训诲，使你终久有智慧。\n21 人心多有计谋；惟有耶和华的筹算才能立定。\n22 施行仁慈的，令人爱慕；穷人强如说谎言的。\n23 敬畏耶和华的，得着生命；他必恒久知足，不遭祸患。\n24 懒惰人放手在盘子里，就是向口撤回，他也不肯。\n25 鞭打亵慢人，愚蒙人必长见识；责备明哲人，他就明白知识。\n26 虐待父亲、撵出母亲的，是贻羞致辱之子。\n27 我儿，不可听了教训而又偏离知识的言语。\n28 匪徒作见证戏笑公平；恶人的口吞下罪孽。\n29 刑罚是为亵慢人预备的；鞭打是为愚昧人的背预备的。"}, "11-3": {"theme": "神所喜悦的公平", "scripture": "箴言二十章1~30节", "url": "https://www.youtube.com/watch?v=WCuLALapeDs&list=PLgFvTLP0QRDv7loBanDX5oRTdniG9ik27&index=9", "videoId": "WCuLALapeDs", "date_cn": "3/11/26(二)", "description": "主题：神所喜悦的公平\n经文：箴言二十章1~30节\n\n我们都喜欢被公平对待，甚至特别的偏袒。论到公平，我们很容易从自己的角度来评估、衡量身旁所发生的事情；但是，这个世界上到底有没有真正的公平呢？每个人都有自己的角度、想法和需要，如同第9节所写道：「谁能说，我洁净了我的心」？如果我们的心不洁净，又如何能得著真正的公平呢？\n\n坦白说，这个世界上很难拥有真正的公平。每个人从出生就拥有不同的条件，不论是外在或是内心的标准，都很难在其中发现公平。那么，真正的公平在哪里？在神的爱里。\n\n今天所阅读的箴言中，作者提到神不喜悦我们有两样的法码（参10节）。法码是量器，可以衡量物品的重量与价值。亲爱的弟兄姐妹，神喜悦我们诚实如一，没有两套标准！在待人处事上，我们都只有一个标准，那就是神的标准。\n\n如同雅各书的教导，我们不可以按外貌待人（参雅二1~4），而是要清楚人内在的价值，明白每一个人都是神所爱的！在神的爱中，可以消除一切的成见；我们只要有从神而来的眼光，就可以除掉自己眼中的梁木（参太七3），不再以个人的偏见作为标准。\n\n然而，若要以统一的标准来行事为人，实在不是一件容易的事！就像是在商业行为中，所谓的「两本帐」；外帐给别人看，内帐给自己看，这就是两样的法码。可是，我们必须清楚—神不喜悦这样的行为！\n\n我们的内心都有一个量器，用来衡量自己和别人，但这量器却是偏差的！求神亲自校正我们的心思意念，回到祂的标准里！愿神洁净我们的心，放下自我的法码，完全以神的标准行事为人，活出美好的诚实与公平！\n\n回应：主啊！我的心中时常有两样的法码，而没有真正的公平。求祢成为我行事为人唯一的标准，帮助我活出属祢的公义与信实。奉主的名求，阿们！\n\n祷读：诗篇八十九篇14节\n公义和公平是祢宝座的根基；慈爱和诚实行在祢前面。\n\nQT: 箴言二十章1~30节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 酒能使人亵慢，浓酒使人喧嚷；凡因酒错误的，就无智慧。\n2 王的威吓如同狮子吼叫；惹动他怒的，是自害己命。\n3 远离纷争是人的尊荣；愚妄人都爱争闹。\n4 懒惰人因冬寒不肯耕种，到收割的时候，他必讨饭而无所得。\n5 人心怀藏谋略，好像深水，惟明哲人才能汲引出来。\n6 人多述说自己的仁慈，但忠信人谁能遇着呢？\n7 行为纯正的义人，他的子孙是有福的！\n8 王坐在审判的位上，以眼目驱散诸恶。\n9 谁能说，我洁净了我的心，我脱净了我的罪？\n10 两样的法码，两样的升斗，都为耶和华所憎恶。\n11 孩童的动作是清洁，是正直，都显明他的本性。\n12 能听的耳，能看的眼，都是耶和华所造的。\n13 不要贪睡，免致贫穷；眼要睁开，你就吃饱。\n14 买物的说：不好，不好；及至买去，他便自夸。\n15 有金子和许多珍珠〔或作“红宝石”〕，惟有知识的嘴乃为贵重的珍宝。\n16 谁为生人作保，就拿谁的衣服；谁为外人作保，谁就要承当。\n17 以虚谎而得的食物，人觉甘甜；但后来，他的口必充满尘沙。\n18 计谋都凭筹算立定；打仗要凭智谋。\n19 往来传舌的，泄漏密事；大张嘴的，不可与他结交。\n20 咒骂父母的，他的灯必灭，变为漆黑的黑暗。\n21 起初速得的产业，终久却不为福。\n22 你不要说 要向神支取属灵的权柄！\n\n摩西手里平凡无奇的杖，经过神大能的工作，变成了权柄的象征（参出四1~5）。希伯来书也告诉我们：神所爱的，祂必管教（参来十二4~11）。感谢主！为人父母有一个最大的帮助，就是从神而来的权柄！但愿每一位信靠神的父母，都能在家中妥善运用属神的权柄，与下一代一同领受从神而来的祝福！\n\n回应：主啊！祢是最完全的父亲与母亲！愿祢帮助我，学习成为敬虔的父母，教养下一代走在当行的路上！奉主的名求，阿们！\n\n祷读：箴言二十二章6节\n教养孩童，使他走当行的道，就是到老他也不偏离。\n\nQT: 箴言二十二章1~29节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 美名胜过大财；恩宠强如金银。\n2 富户穷人在世相遇，都为耶和华所造。\n3 通达人见祸藏躲；愚蒙人前往受害。\n4 敬畏耶和华心存谦卑，就得富有、尊荣、生命为赏赐。\n5 乖僻人的路上有荆棘和网罗；保守自己生命的，必要远离。\n6 教养孩童，使他走当行的道，就是到老他也不偏离。\n7 富户管辖穷人；欠债的是债主的仆人。\n8 撒罪孽的，必收灾祸；他逞怒的杖也必废掉。\n9 眼目慈善的，就必蒙福，因他将食物分给穷人。\n10 赶出亵慢人，争端就消除；纷争和羞辱也必止息。\n11 喜爱清心的人因他嘴上的恩言，王必与他为友。\n12 耶和华的眼目眷顾聪明人，却倾败奸诈人的言语。\n13 懒惰人说：外头有狮子；我在街上就必被杀。\n14 淫妇的口为深坑；耶和华所憎恶的，必陷在其中。\n15 愚蒙迷住孩童的心，用管教的杖可以远远赶除。\n16 欺压贫穷为要利己的，并送礼与富户的，都必缺乏。\n17 你须侧耳听受智慧人的言语，留心领会我的知识。\n18 你若心中存记，嘴上咬定，这便为美。\n19 我今日以此特特指教你，为要使你倚靠耶和华。\n20 谋略和知识的美事，我岂没有写给你吗？\n21 要使你知道真言的实理，你好将真言回覆那打发你来的人。\n22 贫穷人，你不可因他贫穷就抢夺他的物，也不可在城门口欺压困苦人；\n23 因耶和华必为他辨屈；抢夺他的，耶和华必夺取那人的命。\n24 好生气的人，不可与他结交；暴怒的人，不可与他来往；\n25 恐怕你效法他的行为，自己就陷在网罗里。\n26 不要与人击掌，不要为欠债的作保。\n27 你若没有什么偿还，何必使人夺去你睡卧的床呢？\n28 你先祖所立的地界，你不可挪移。\n29 你看见办事殷勤的人吗？他必站在君王面前，必不站在下贱人面前。"}, "11-6": {"theme": "酒肉人生", "scripture": "箴言二十三章1~35节", "url": "https://www.youtube.com/watch?v=4C0gzxtWUYk&list=PLgFvTLP0QRDv7loBanDX5oRTdniG9ik27&index=6", "videoId": "4C0gzxtWUYk", "date_cn": "6/11/26(五)", "description": "主题：酒肉人生 \n经文：箴言二十三章1~35节\n\n箴言虽然是神所赐予犹太人的智慧语录，但是其中所描写的社会关系景况，实在是超越时空，也是现今社会的真实写照。\n\n许多人白天在企业工作，晚上却又在餐厅和酒店，「上」另一种形式的班。而在正常管道下不能解决的问题，往往在饮食酒肉之间却能达成协议，许多的弊端也就此产生。箴言严厉警告我们：不可贪恋别人的美食，因为是哄人的食物（参3节）；「不要吃恶眼人的饭，也不要贪他的美味；因为他心怎样思量，他为人就是怎样。他虽对你说，请吃，请喝，他的心却与你相背」（参6~7节）。\n\n即使大家同桌吃饭，当中却有人胸怀诡诈，彼此分享美食，只是为了得到更大的利益。在各种应酬的场合中，愿神赐给我们分辨的智慧，保守我们不遇见试探，并能避免作出错误的决定。\n\n另外，箴言也提到：生活习惯会影响一个人的境遇：「好酒贪食的，必致贫穷；好睡觉的，必穿破烂衣服」（参21节）。犹太人看不起贪食好酒之人，耶稣基督甚至也因为和税吏吃饭，以致被污蔑为贪食好酒的人。由此可见，严谨的饮食起居，是犹太人基本的生活态度。亲爱的弟兄姐妹，我们千万不要以为饮食只是一件小事！当一个人顺从自己的口腹之欲，就代表他无法节制，生活过得松散、随便，最终必然要承受负面的结果。\n\n最后，箴言提醒我们：饮酒会严重影响身体与情绪。「谁有祸患？谁有忧愁？谁有争斗？谁有哀叹？谁无故受伤？谁眼目红赤？就是那流连饮酒、常去寻找调和酒的人。」（参29~30节）饮酒之所以让人沉迷，是因为它可以带领人脱离真实、进入幻境、逃避痛苦……愿神帮助我们，能够坚定倚靠祂面对生命中所有的困难，并为沉迷于酒精中的人祷告！\n\n回应：主啊！求祢帮助我因著信靠祢的权柄，而愿意拥抱真实，不躲藏在各样的虚幻中！求祢赐给我力量认真生活，好回应祢的爱！奉主的名求，阿们！\n\n祷读：罗马书十三章13~14节\n行事为人要端正，好像行在白昼。不可荒宴醉酒，不可好色邪荡，不可争竞嫉妒；总要披戴主耶稣基督，不要为肉体安排，去放纵私欲。\n\nQT: 箴言二十三章1~35节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年， 人心的岂不明白吗」（参12节）？\n\n因此，神警戒我们：不要以自己为公义，而要为仇敌祷告，好让自己得著祝福！正如耶稣在登山宝训所教导的─我们要心怀饶恕，而不是紧紧抓住别人的过犯（参太六14~15）。如果我们抱持幸灾乐祸的心态，神必不喜悦，甚至要将怒气转眼向我们发作。这样的怒气，谁能承受得住呢？\n\n感谢主！在祂有完全的公义！因此，我们「不要为作恶的心怀不平，也不要嫉妒恶人；因为，恶人终不得善报；恶人的灯也必熄灭。」（参19~20节）亲爱的弟兄姐妹，在神完全的公义中，我们可以放心！可以不再以自我为出发点，以为神必站在我们这一边；我们也不用担心神偏待人，以为恶人反倒享福！\n\n今天，让我们将自己更安心地交托在神的手中！相信神的公义，必然要向爱祂的人显明！\n\n回应：主啊！祢是完全的公义！求祢使我放下内心的评断，单单仰望祢，直到看见祢的公义显明！奉主的名求，阿们！\n\n祷读：箴言二十四章19~20节\n不要为作恶的心怀不平，也不要嫉妒恶人；因为，恶人终不得善报；恶人的灯也必熄灭。\n\nQT: 箴言二十四章1~22节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 你不要嫉妒恶人，也不要起意与他们相处；\n2 因为，他们的心图谋强暴，他们的口谈论奸恶。\n3 房屋因智慧建造，又因聪明立稳；\n4 其中因知识充满各样美好宝贵的财物。\n5 智慧人大有能力；有知识的人力上加力。\n6 你去打仗，要凭智谋；谋士众多，人便得胜。\n7 智慧极高，非愚昧人所能及，所以在城门内不敢开口。\n8 设计作恶的，必称为奸人。\n9 愚妄人的思念乃是罪恶；亵慢者为人所憎恶。\n10 你在患难之日若胆怯，你的力量就微小。\n11 人被拉到死地，你要解救；人将被杀，你须拦阻。\n12 你若说：这事我未曾知道，那衡量人心的岂不明白吗？保守你命的岂不知道吗？他岂不按各人所行的报应各人吗？\n13 我儿，你要吃蜜，因为是好的；吃蜂房下滴的蜜便觉甘甜。\n14 你心得了智慧，也必觉得如此。你若找着，至终必有善报；你的指望也不致断绝。\n15 你这恶人，不要埋伏攻击义人的家；不要毁坏他安居之所。\n16 因为，义人虽七次跌倒，仍必兴起；恶人却被祸患倾倒。\n17 你仇敌跌倒，你不要欢喜；他倾倒，你心不要快乐；\n18 恐怕耶和华看见就不喜悦，将怒气从仇敌身上转过来。\n19 不要为作恶的心怀不平，也不要嫉妒恶人；\n20 因为，恶人终不得善报；恶人的灯也必熄灭。\n21 我儿，你要敬畏耶和华与君王，不要与反覆无常的人结交，\n22 因为他们的灾难必忽然而起。耶和华与君王所施行的毁灭，谁能知道呢？"}, "11-8": {"theme": "心田的建造", "scripture": "箴言二十四章23~34节", "url": "https://www.youtube.com/watch?v=a86wWh_HleU&list=PLgFvTLP0QRDv7loBanDX5oRTdniG9ik27&index=4", "videoId": "a86wWh_HleU", "date_cn": "8/11/26(日)", "description": "主题：心田的建造 \n经文：箴言二十四章23~34节\n\n圣经强调，神是我们的牧者，我们必不致缺乏。但是，圣经也同时强调，我们要以积极、渴慕，而非懒散、消极的态度来回应神的恩典。因为如果我们对神拥有真实的信心，内心的动机和外在的行为都会有所转变。\n\n田地想要有好收成，除了神所赏赐合宜的天气与雨水，农夫也要辛勤垦地、撒种、浇灌。一旦田地荒芜、长满「荆棘」和「刺草」（参30~31节），就表示农夫没有尽上栽种、浇灌的责任。田地荒废，自然不能结出果子，也无法获得丰厚的收成。另外，田地也需要认真看管，否则会被飞鸟和害虫吃尽果实，先前栽种、浇灌的功夫也就白白耗费。\n\n懒惰会带来贫乏，这是必然的结果，而属灵的道理也是如此！我们的心就好像田地，如果疏于照顾、看管，以致任凭杂草丛生，自然就会产生败坏，以致空虚、穷乏！可惜的是，我们时常体贴肉体，不愿意花时间亲近神、领受祂的话语，以致神的道无法浇灌在我们心里！于是，世上的价值与资讯如同荆棘、刺草一般，在我们的心田中迅速生长，挤住神的道，导致土里的种子不能发芽、生长，结出美好的果实，反而带来荒凉和败坏！到了这个时候，我们怎能怪神不供应我们的需要呢？\n\n箴言勉励我们：「你要在外头预备工料，在田间办理整齐，然后建造房屋」（参27节）。圣经常以「房屋」来比喻人的生命，保罗也提醒我们—我们建造工程，是以耶稣基督为根基，以金银宝石或草木禾稭为材料，各人的工程如何，必然显露（参林前三11~13节）。\n\n亲爱的弟兄姐妹，我们如何建造自己的生命呢？要用积极、渴慕的态度，预备坚实的材料，建立良好的生活规范，并且以神的话、神的灵，来建造美好的生命内涵！如此一来，我们的生命必然坚固、牢靠，并且能在神丰富的供应中，向祂献上欢喜与感恩！\n\n回应：主啊！我时常体贴肉体，没有好好建造自己的属灵生命！求祢赦免我，并且帮助我操练以积极的态度，结出生命美好的果实！奉主的名求，阿们！\n\n祷读：哥林多前书三章10~11节\n我照神所给我的恩，好像一个聪明的工头，立好了根基，有别人在上面建造；只是各人要谨慎怎样在上面建造。因为那已经立好的根基就是耶稣基督，此外没有人能立别的根基。\n\nQT: 箴言二十四章23~34节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "23 以下也是智慧人的箴言：审判时看人情面是不好的。\n24 对恶人说“你是义人”的，这人万民必咒诅，列邦必憎恶。\n25 责备恶人的，必得喜悦；美好的福也必临到他。\n26 应对正直的，犹如与人亲嘴。\n27 你要在外头预备工料，在田间办理整齐，然后建造房屋。\n28 不可无故作见证陷害邻舍，也不可用嘴欺骗人。\n29 不可说：人怎样待我，我也怎样待他；我必照他所行的报复他。\n30 我经过懒惰人的田地、无知人的葡萄园，\n31 荆棘长满了地皮，刺草遮盖了田面，石墙也坍塌了。\n32 我看见就留心思想；我看着就领了训诲。\n33 再睡片时，打盹片时，抱着手躺卧片时，\n34 你的贫穷就必如强盗速来，你的缺乏仿佛拿兵器的人来到。"}, "11-9": {"theme": "美好的金苹果", "scripture": "箴言二十五章1~28节", "url": "https://www.youtube.com/watch?v=nsStPhfKNXg&list=PLgFvTLP0QRDv7loBanDX5oRTdniG9ik27&index=3", "videoId": "nsStPhfKNXg", "date_cn": "9/11/26(一)", "description": "主题：美好的金苹果\n经文：箴言二十五章1~28节\n\n说话是艺术，是智慧，更是力量。话语能够创造，也能破坏。话说得好，可以滋润人的生命、带来医治与生长；话说得不好，就会带来破坏与拆毁，使人失去生命的信心与价值！\n\n亲爱的弟兄姐妹，盼望我们所说的话，都能为别人带来安慰、医治与造就，好能彰显从神而来的力量。\n\n我们今天所读的箴言，以不同的方式，来描述话语的重要：\n\n美好的话语：「一句话说得合宜，就如金苹果在银网子里。智慧人的劝戒，在顺从的人耳中，好像金耳环和精金的妆饰。忠信的使者叫差他的人心里舒畅，就如在收割时有冰雪的凉气」（参11~13节）。这段经文告诉我们，说话的人和听话的人都很重要─说话的人要传达美好的心意，听话的人也要怀抱温柔，才能领受话语的意思。另外，受人之托传达话语的人也很重要，可以舒缓情势，带来转变。\n\n破坏的话语：「作假见证陷害邻舍的，就是大槌，是利刀，是快箭。患难时倚靠不忠诚的人，好像破坏的牙，错骨缝的脚。对伤心的人唱歌，就如冷天脱衣服，又如碱上倒醋」（参18~20节）。「北风生雨，谗谤人的舌头也生怒容」（参23节）。亲爱的弟兄姐妹，上述的这段经文是否也是我们的生活体验？每当我们听见不合宜的话，就会心里发凉，且情绪会产生剧烈的反应，如同碱上加醋一般，甚至挑起怒气，带来难以收拾的后果。\n\n话语是有力量的─「柔和的舌头能折断骨头」（参15节），而爱的行动也能带来转变！我们若以实际的行动爱仇敌，「就是把炭火堆在他的头上」（参22节），也就是以爱来挽回仇敌！爱的言语和行动都可以带来更新与转变，然而，即使我们都知道，要做到这一件事，却是相当困难！求主将祂的爱与智慧，更深地浇灌在我们心里，好叫我们说出合宜的话，作出合宜的举动。\n\n回应：主啊！愿祢将祢的话语充满在我的心中，好让我的口可以说出建造生命的话语！奉主的名求，阿们！\n\n祷读：箴言二十五章11节\n一句话说得合宜，就如金苹果在银网子里。\n\nQT: 箴言二十五章1~28节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」 on": "主题：百般软弱\n经文：箴言二十六章1~28节\n\n第二十六章提到了各种人：愚昧人、懒惰人、情绪激动的人，还有传舌的人。整章信息都是严肃的警告，读来令人心存战兢！亲爱的弟兄姐妹，但愿我们都能从中领受主的教导！\n\n在箴言中，「愚昧人」特别是指不认识神、不敬畏神的人。第3至12节描述的，是愚昧人的生命光景。愚昧人不敬畏神，即使美好的真理存在他的口中，也必浪费、无用；他们如果享有尊荣，甚至会像机弦包裹石子一样，带来极大的杀伤力。此外，和愚昧人对话，也有很大的学问：有时我们需要远离他们，以免被愚妄的话语缠扰；有时我们却要温柔而坚定地指出他们的错谬。然而，箴言也提醒我们─不要只看别人是愚妄的，而自以为有智慧；因为这样的人，「愚昧人比他更有指望」（参12节）！\n\n第13至16节描述的是「懒惰人」的生命光景。懒惰人自认为有智慧，对于任何事都有借口，以致看不见自己的问题。他们躺在床上，就像开门、关门一般，总是在相同的位置上，不会移动；即使他们的盘子里有食物，对他们来说，要将食物放进嘴里吃，也觉得困乏！亲爱的弟兄姐妹，我们是否有时也非常懒惰、不愿出门、凡事都嫌麻烦……求神帮助我们，能够怀抱勤奋、不懒散的态度！\n\n第17至19节描述的是「情绪激动的人」。这样的人很容易涉入与自己不相干的事，就像是人和狗相争，为自己带来不必要的麻烦。而这样的人也会恶待身边的人，并且不承认自己的过错；他们会以「好玩、戏耍」作为借口，在人与人之间带来纷争。\n\n从第20节开始，作者提到「传舌」的可怕。人与人之间的口舌往来，往往带出极大的伤害！如果我们的内心充满争竞、奸恶、怨恨、诡诈、虚谎、谄媚……口中的言语就会如同余火加炭、火上加油一般！但愿我们都能谨慎内心，小心口舌！\n\n回应：主啊！求祢帮助我看见自己的不足，并且能靠祢胜过一切，活出讨祢喜悦的样式！奉主的名求，阿们！\n\n祷读：以弗所书五章15~17节\n你们要谨慎行事，不要像愚昧人，当像智慧人。要爱惜光阴，因为现今的世代邪恶。不要作糊涂人，要明白主的旨意如何。\n\nQT: 箴言二十六章1~28节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 夏天落雪，收割时下雨，都不相宜；愚昧人得尊荣也是如此。\n2 麻雀往来，燕子翻飞；这样，无故的咒诅也必不临到。\n3 鞭子是为打马，辔头是为勒驴；刑杖是为打愚昧人的背。\n4 不要照愚昧人的愚妄话回答他，恐怕你与他一样。\n5 要照愚昧人的愚妄话回答他，免得他自以为有智慧。\n6 借愚昧人手寄信的，是砍断自己的脚，自受损害〔“自受”原文作“喝”〕。\n7 瘸子的脚空存无用；箴言在愚昧人的口中也是如此。\n8 将尊荣给愚昧人的，好像人把石子包在机弦里。\n9 箴言在愚昧人的口中，好像荆棘刺入醉汉的手。\n10 雇愚昧人的，与雇过路人的，就像射伤众人的弓箭手。\n11 愚昧人行愚妄事，行了又行，就如狗转过来吃牠所吐的。\n12 你见自以为有智慧的人吗？愚昧人比他更有指望。\n13 懒惰人说：道上有猛狮，街上有壮狮。\n14 门在枢纽转动，懒惰人在床上也是如此。\n15 懒惰人放手在盘子里，就是向口撤回也以为劳乏。\n16 懒惰人看自己比七个善于应对的人更有智慧。\n17 过路被事激动，管理不干己的争竞，好像人揪住狗耳。\n18 人欺凌邻舍，却说：我岂不是戏耍吗？他就像疯狂的人抛掷火把、利箭，与杀人的兵器。〔“杀人的兵器”原文作“死亡”〕\n19 并于上节\n20 火缺了柴就必熄灭；无人传舌，争竞便止息。\n21 好争竞的人煽惑争端，就如余火加炭，火上加柴一样。\n22 传舌人的言语，如同美食，深入人的心腹。\n23 火热的嘴，奸恶的心，好像银渣包的瓦器。\n24 怨恨人的，用嘴粉饰，心里却藏着诡诈；\n25 他用甜言蜜语，你不可信他，因为他心中有七样可憎恶的。\n26 他虽用诡诈遮掩自己的怨恨，他的邪恶必在会中显露。\n27 挖陷坑的，自己必掉在其中；滚石头的，石头必反滚在他身上。\n28 虚谎的舌恨他所压伤的人；谄媚的口败坏人的事。"}, "11-11": {"theme": "称赞的艺术", "scripture": "箴言二十七章1~27节", "url": "https://www.youtube.com/watch?v=HNeca2qvW0k&list=PLgFvTLP0QRDv7loBanDX5oRTdniG9ik27&index=1", "videoId": "HNeca2qvW0k", "date_cn": "11/11/26(三)", "description": "主题：称赞的艺术\n经文：箴言二十七章1~27节\n\n人与人彼此称赞、肯定，能为关系带来滋润和满足。但是，称赞是一门艺术；如果不懂得其中的分寸，很可能适得其反。\n\n今天所读的箴言，在一开头就提醒我们：「不要为明日自夸」（参1节）。不为明日自夸，代表我们在神面前的谦卑，因为知道自己不是时间的主宰，也不能掌握下一刻。面对未来，雅各书教导我们，要抱持以下的态度：「主若愿意，我们就可以活著，也可以做这事，或做那事」（参雅四15）。因此，对于未来，我们要怀抱积极的盼望，以及足够的谦卑！愿神在我们的生命中全然掌权，因为我们是为祂而活！\n\n接下来，第二十七章也告诉我们：对自己要有合乎中道的认识，千万不要看自己过于所当看的，更不要自己夸赞自己（参2节）。亲爱的弟兄姐妹，真正有价值的赞美，是从神而来的！别人的赞美即便是对我们的肯定，也能带来正面的鼓励效果，但却也可能成为试炼（参21节）。\n\n如果我们接收了别人的赞美，却不够儆醒，甚至为了追求赞美，而改变某些行为或价值观，那赞美很可能会成为我们的网罗！诚如保罗在加拉太书所写道：「我现在是要得人的心呢？还是要得神的心呢？我岂是讨人的喜欢吗？若仍旧讨人的喜欢，我就不是基督的仆人了。」（参加一10）但愿我们都能心存谨慎，不落入赞美的试探中。\n\n相对于称赞，箴言很看重朋友之间「诚实的劝教」（参9节）。我们比较喜欢赞美的言语，不喜欢劝勉的话，但是朋友之间必须以爱心说诚实话！「膏油与香料使人心喜悦；朋友诚实的劝教也是如此甘美。」（参9节）亲爱的弟兄姐妹，我们与其他的弟兄姐妹之间，是表面的赞美多，还是彼此的劝戒多呢？愿神帮助我们，能和身边的人建立真实、互信的关系，彼此劝勉，使得生命更加成熟、茁壮！因为「铁磨铁，磨出刃来；朋友相感也是如此」（参17节）。\n\n回应：主啊！我要在祢的里面，得著最真实的爱！求祢帮助我与弟兄姐妹建立真实、互信的关系，一同在祢的真理和恩典中成长！奉主的名求，阿们！\n\n祷读：罗马书十二章3节\n我凭著所赐我的恩对你们各人说：「不要看自己过于所当看的，要照著神所分给各人信心的大小，看得合乎中道。」\n\nQT: 箴言二十七章1~27节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持 Mc9E", "date_cn": "12/11/26(四)", "description": "主题：罪的代价\n经文：箴言二十八章1~28节\n\n没有人可以逃脱罪的代价！箴言如此强调，是在说明如果我们不遵行神的话（参律法），不但会落入祸坑之中，甚至嘴里所发出的祈祷，也是可憎的。（参9节）一旦落在罪中，我们与神或与人的关系，不但都将遭到隔绝，而且因罪必须承担不好的后果。\n\n在以色列历史中，许多君王不听从神的话，崇拜偶像、倚靠外邦势力，因此不但无法得著神的祝福，甚至造成政局不稳、动乱频繁。在上位者如果犯罪，国家也会同时承受罪的恶果。反之，如果在上位者向神寻求聪明与智慧来治理国家，国家就能长治久安。国家领袖如此，每一个位居领袖地位的人，也要心存儆醒，不容让自己活在罪中。特别是在教会，我们不能容许罪恶发酵！\n\n另外，箴言提到，罪蒙蔽我们的心思─「坏人不明白公义；惟有寻求耶和华的，无不明白。」（参5节）人世间难寻真正的公义，唯有神是完全公义，并鉴察人心！在祂里面，才有真正的公义可被寻见！但愿我们都渴慕寻求神，在各样的事上明白祂的心意。\n\n要常常提醒自己：倘若我们不愿意听从神的话，神也不会听我们的话！诗篇的作者提到，当罪人受审判的时候，「愿他的祈祷反成为罪」（参诗一〇九7）！如果我们一直停留在罪中，不肯聆听神的训诲、不遵行神的道，就是以自我为王；而我们所发出的祈祷，同样也落在以自我为王的罪中，就必不讨神喜悦。亲爱的弟兄姐妹，但愿神的话成为我们生命的提醒！ \n\n最后，箴言告诉我们─不知罪、不认罪，会使我们罪加一等！「偷窃父母的，说：『这不是罪。』此人就是与强盗同类。」（参24节）亲爱的弟兄姐妹，我们可能认为，父母的钱财理当属于自己，因而轻慢、占据，不以为是罪，甚至对于所发生的罪轻忽、散漫！然而，若对罪不够敏锐，也不肯对付自己的软弱，终必付出罪的代价！愿神怜悯、拯救我们，脱离罪的捆绑！\n\n回应：主啊！愿祢帮助我成为敬畏祢、顺服祢的人！我渴望脱离罪的辖制，求祢亲自保守我时常活在祢的话语之中！奉主的名求，阿们！\n\n祷读：箴言八章13节\n敬畏耶和华在乎恨恶邪恶；那骄傲、狂妄，并恶道，以及乖谬的口，都为我所恨恶。\nQT: 箴言二十八章1~28节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 恶人虽无人追赶也逃跑；义人却胆壮像狮子。\n2 邦国因有罪过，君王就多更换；因有聪明知识的人，国必长存。\n3 穷人欺压贫民，好像暴雨冲没粮食。\n4 违弃律法的，夸奖恶人；遵守律法的，却与恶人相争。\n5 坏人不明白公义；惟有寻求耶和华的，无不明白。\n6 行为纯正的穷乏人胜过行事乖僻的富足人。\n7 谨守律法的，是智慧之子；与贪食人作伴的，却羞辱其父。\n8 人以厚利加增财物，是给那怜悯穷人者积蓄的。\n9 转耳不听律法的，他的祈祷也为可憎。\n10 诱惑正直人行恶道的，必掉在自己的坑里；惟有完全人必承受福分。\n11 富足人自以为有智慧，但聪明的贫穷人能将他查透。\n12 义人得志，有大荣耀；恶人兴起，人就躲藏。\n13 遮掩自己罪过的，必不亨通；承认离弃罪过的，必蒙怜恤。\n14 常存敬畏的，便为有福；心存刚硬的，必陷在祸患里。\n15 暴虐的君王辖制贫民，好像吼叫的狮子、觅食的熊。\n16 无知的君多行暴虐；以贪财为可恨的，必年长日久。\n17 背负流人血之罪的，必往坑里奔跑，谁也不可拦阻他。\n18 行动正直的，必蒙拯救；行事弯曲的，立时跌倒。\n19 耕种自己田地的，必得饱食；追随虚浮的，足受穷乏。\n20 诚实人必多得福；想要急速发财的，不免受罚。\n21 看人的情面乃为不好；人因一块饼枉法也为不好。\n22 人有恶眼想要急速发财，却不知穷乏必临到他身。\n23 责备人的，后来蒙人喜悦，多于那用舌头谄媚人的。\n24 偷窃父母的，说：这不是罪，此人就是与强盗同类。\n25 心中贪婪的，挑起争端；倚靠耶和华的，必得丰裕。\n26 心中自是的，便是愚昧人；凭智慧行事的，必蒙拯救。\n27 赒济贫穷的，不致缺乏；佯为不见的，必多受咒诅。\n28 恶人兴起，人就躲藏；恶人败亡，义人增多。"}, "11-13": {"theme": "治理的智慧", "scripture": "箴言二十九章1~27节", "url": "https://www.youtube.com/watch?v=P-4z1xcFmJY&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=29", "videoId": "P-4z1xcFmJY", "date_cn": "13/11/26", "description": "主题：治理的智慧\n经文：箴言二十九章1~27节\n\n凡治理、管理之事，都需要智慧。大自邦国、小至家庭，处处都需要属神的智慧，并以从祂而来的异象治理及带领群体，以享有和平、安息与喜乐。\n\n国家的领导与治理，如果没有属神的智慧，就不容易面对政治的纷争与分化。「亵慢人煽惑通城；智慧人止息众怒。」（参8节）民众容易被情绪性的言词挑动，而遭有心者操弄群众力量。群众力量不容小觑，而这样的力量所带来的，是和平或是暴动，就在乎领导者的智慧。\n\n箴言告诉我们，当政者也必须公平清廉（参4节）。倘若当政者行事不公不义、收受贿赂，必使国家败亡！再来，当政者也要不听谎言（参12节）如果他们只听自己想听的话，不能察纳雅言，最后只有奸佞小人围绕在旁，任由他们蒙蔽眼界，将国家带入衰败之地！\n\n不过，尽管治理者拥有世上权柄，至高权柄却是在神的手中（参25~26节）。当我们晓得这一点，并且信靠神，知道祂全然掌权，即使治理的权柄败坏，也能活出安稳！因为知道神能够调动万有，祂的旨意纯全美好！只要活在神的启示与异象之中（参18节），不放纵自己，单单遵行神的话，就能经历祂的权能和祝福！\n\n家庭治理也是同样道理，以智慧管教孩子，是家庭治理的重要环节。孩子敬虔爱主、不放纵私欲，是父母最大的安慰。（参15、17节）另外，家中的仆人也需要接受管教（参19、21节）。亲疏远近总有次序，仆人再好，终究有属于他的位分（参创十五1~4）；如果次序不清楚，容易造成家庭破口，并让关系产生混乱。\n\n亲爱的弟兄姐妹，今天所读的箴言告诉我们，无论是个人的情绪（参11、20节），或是各样的环境、角色及关系，都十分需要治理的智慧！但愿我们能够全心倚靠神，从祂得著治理的智慧，好能领受祂真实的祝福与恩典！\n\n回应：主啊！祢是奇妙的策士，和平的君王！求祢将治理的智慧赐给我，使我生命中的每一个层面，都能领受和成全祢的心意！奉主的名求，阿们！\n\n祷读：雅各书一章5节\n你们中间若有缺少智慧的，应当求那厚赐与众人、也不斥责人的神，主就必赐给他。\n\nQT: 箴言二十九章1~27节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 ption": "主题：在神面前谦卑\n经文：箴言三十章1~33节\n\n我们常常在神面前祷告，求祂赐下恩赐、能力，并透过我们彰显祂大能的作为。但是，出色的恩赐，往往容易使我们陷入骄傲的网罗。真正的智者，所求的乃是谦卑自己，俯伏在神的面前，与祂建立美好、深刻的关系。\n\n这一章箴言所提到的智者非常有智慧。在他和以铁与乌甲对谈时，他将自己放在很低的位置，说：「我比众人更蠢笨」（参2节）。但是，接著他提出了关于创造的问题，而这些问题所导入的唯一答案，就是那一位创造的神。智者除了提到神满有权能、创造宇宙万物，也提到祂是我们的盾牌；只要我们愿意投靠祂，祂必要成为我们的力量与帮助（参4~5节）。\n\n另外，智者的祈祷非常有智慧！在世上，他祈求两件事（参7~9节）：不要富足，以致于高抬自己，骄傲自满，以为一切都是自己所成就的；不要贫穷，以致于为了获得金钱而偷窃、犯罪、亵渎神的名！这一位智者不在乎世上的成就、价值，而是在乎自己与神的关系。亲爱的弟兄姐妹，这是多么美好的生命！\n\n环境的改变，会显明我们与神真实的关系。在顺境中，我们容易忘记神，忘记倚靠祂的能力与恩典；在逆境中，我们又容易心生怨言，以口犯罪，甚至产生罪行。我们真是需要谨记智者在神面前的谦卑─他认识自己的软弱，晓得自己容易受环境影响，就求神不要让他落入试探！求神帮助我们，在祂的面前常存谦卑、儆醒的心，远离各样的试探！\n\n另外，智者也借由四样小物，向我们阐明─强与弱，事实上不过是一体的两面，乃是神在创造上的奇妙之处。蚂蚁虽然渺小无力，却懂得收聚粮食，预备过冬；小动物沙番（穴熊）看似软弱，却在岩石中居住；蝗虫不需要领导，自然能够形成组织；守宫（壁虎）很容易被抓住，却能爬进王宫。亲爱的弟兄姐妹，如果我们在小事上，都能看见主奇妙的安排，又怎能不谦卑自己，在神的面前俯伏敬拜祂呢？\n\n回应：主啊，求祢赦免我的软弱！求祢开我的眼睛，让我看见祢大能的手，并能谦卑寻求祢的面！奉主的名求，阿们！\n\n祷读：诗篇一四九篇4节 \n因为耶和华喜爱祂的百姓；祂要用救恩当作谦卑人的妆饰。\n\nQT: 箴言三十章1~33节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 雅基的儿子亚古珥的言语就是真言。这人对以铁和乌甲说：\n2 我比众人更蠢笨，也没有人的聪明。\n3 我没有学好智慧，也不认识至圣者。\n4 谁升天又降下来？谁聚风在掌握中？谁包水在衣服里？谁立定地的四极？他名叫什么？他儿子名叫什么？你知道吗？\n5 神的言语句句都是炼净的；投靠他的，他便作他们的盾牌。\n6 他的言语，你不可加添，恐怕他责备你，你就显为说谎言的。\n7 我求你两件事，在我未死之先，不要不赐给我：\n8 求你使虚假和谎言远离我；使我也不贫穷也不富足；赐给我需用的饮食，\n9 恐怕我饱足不认你，说：耶和华是谁呢？又恐怕我贫穷就偷窃，以致亵渎我神的名。\n10 你不要向主人谗谤仆人，恐怕他咒诅你，你便算为有罪。\n11 有一宗人〔“宗”原文作“代”。下同。〕，咒诅父亲，不给母亲祝福。\n12 有一宗人，自以为清洁，却没有洗去自己的污秽。\n13 有一宗人，眼目何其高傲，眼皮也是高举。\n14 有一宗人，牙如剑，齿如刀，要吞灭地上的困苦人和世间的穷乏人。\n15 蚂蟥有两个女儿，常说：给呀，给呀！有三样不知足的，连不说“够的”共有四样：\n16 就是阴间和石胎，浸水不足的地，并火。\n17 戏笑父亲、藐视而不听从母亲的，他的眼睛必为谷中的乌鸦啄出来，为鹰雏所吃。\n18 我所测不透的奇妙有三样，连我所不知道的共有四样：\n19 就是鹰在空中飞的道；蛇在磐石上爬的道；船在海中行的道；男与女交合的道。\n20 淫妇的道也是这样：她吃了，把嘴一擦就说：我没有行恶。\n21 使地震动的有三样，连地担不起的共有四样：\n22 就是仆人作王；愚顽人吃饱；\n23 丑恶的女子出嫁；婢女接续主母。\n24 地上有四样小物，却甚聪明：\n25 蚂蚁是无力之类，却在夏天预备粮食。\n26 沙番是软弱之类，却在磐石中造房。\n27 蝗虫没有君王，却分队而出。\n28 守宫用爪抓墙，却住在王宫。\n29 步行威武的有三样，连行走威武的共有四样：\n30 就是狮子──乃百兽中最为猛烈、无所躲避的，\n31 猎狗，公山羊，和无人能敌的君王。\n32 你若行事愚顽，自高自傲，或是怀了恶念，就当用手捂口。\n33 摇牛奶必成奶油；扭鼻子必出血。照样，激动怒气必起争端。"}, "11-15": {"theme": "智慧的实践", "scripture": "箴言三十一章1~31节", "url": "https://www.youtube.com/watch?v=Lew894SibEw&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=27", "videoId": "Lew894SibEw", "date_cn": "15/11/26(日)", "description": "主题：智慧的实践\n经文：箴言三十一章1~31节\n\n箴言的最后一章有两个主题：对君王的训诲，以及对才德妇人的称赞。不论是一国之君，或是家庭主妇，都需要智慧与能力。由此再度溯及箴言的核心真理─属神的能力与智慧。\n\n君王治理国家，必然承担很大压力。当我们承接重任，也会面对极大挑战。箴言提醒我们，不可借由酒精的麻醉作用，来忘记眼前的重担或压力，因为这样并不能解决问题，只是让我们逃避现实。\n\n亲爱的弟兄姐妹，让我们自我省察，是不是试图逃避压力呢？经文提到君王不能躲在自己的象牙塔里，而要为不能申冤的人开口，必须看见别人的需要（参8~9节），并且积极的回应！君王需要将来自于神的智慧与公义，明确地实践出来。 \n\n本章的另一个主题：「才德的妇人」，这妇人是家庭的支柱与祝福。她是敬畏耶和华的妇女（参30节），她有从神来的智慧及能力，使丈夫得著尊荣和利益，并且丰富供应家中的需要。她勤奋工作、赒济贫穷，对未来怀抱美好的盼望！才德妇人所说的话有智慧与仁慈，又将夫妻关系、亲子关系经营得十分美好，因此她的丈夫看她是独一无二的珍宝，这一位才德的妇人，活出了以神为中心的生命！\n\n箴言第一章是父亲的训诲，最后一章是对母亲的教导，同时又论及妇女在家庭中的地位与责任，使我们从中看见家庭教育的重要。在神的真理影响下，犹太民族非常看重家庭教育，通常信仰与文化的传承都在家庭中进行。\n\n感谢主！箴言不仅是真理的教导，更是生活的实践。愿神帮助我们，在箴言充满智慧的教导中，同时赐下实践的力量，使我们除了得著属天的智慧，也存著敬畏神的心，活出属天的生命！\n\n回应：主啊！谢谢祢成为我们的智慧、能力、圣洁、公义！愿祢的话语充满我，使我活出讨祢喜悦的生命，并归荣耀于祢！奉主的名求，阿们！\n\n祷读：诗篇一一一篇10节\n敬畏耶和华是智慧的开端；凡遵行祂命令的是聪明人。耶和华是永远当赞美的！\n\nQT: 箴言三十一 youtube.com/watch?v=gvDwsXkiI8Q&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=26", "videoId": "gvDwsXkiI8Q", "date_cn": "16/11/26(一)", "description": "主题：离了神 人生必然虚空\n经文：传道书一章1~11节\n\n传统的看法认为，传道书的作者是所罗门。所罗门拥有许多财富、尊荣、聪明及智慧，可说是前无古人，后无来者（参代下一12）。然而，这位享有一切丰富的君王，却写下了对于人生极为悲观、真实的描述─生命是虚空的，人在虚空的生命中，所做的任何努力都是无益，而且各个世代都在重复这样的虚空，没有例外。（参1~4节）\n\n如同大自然的现象，整个世界似乎都在一个循环里面，没有新的变化（参5~7节）。日升、日落；风随著季节改变风向、所有的河流最终流向海洋，海洋却永远填不满。这些周而复始的现象令人厌烦，人心也不得饱足（参8~11节）。\n\n这个世界如果离弃了神，真的是很无聊、虚空！不过，「日光之下并无新事」（参9节），并不表示没有新的事件，而是在强调各个世代的人，都跳脱不了生、老、病、死的循环。但是，我们必须留意：传道书作者的言论，跟佛教的虚无主义不同。传道书论及负面的情形，是为了指向一个正面的回应与结果，那就是「敬畏神」（参传十二13~14）。\n\n基督徒与非基督徒一样，都需要吃、喝、工作，也会经历生、老、病、死。然而，由于基督徒怀抱敬畏神的心，就能在日常生活中不断领受丰富的恩典，而且每一件事都是为主而做，并且被主记念，直到永远！感谢神！这真是我们最大的价值！\n\n亲爱的弟兄姐妹，在这个万事虚无的世界上，我们何等有福，能够成为属神的儿女。因此，让我们无论是工作、玩乐，或是日常生活的经营，都存著敬畏、感谢神的心！愿神喜悦、记念我们所做的一切！\n\n回应：主啊！谢谢祢让我成为祢的儿女，享受今世与永恒的恩典！求祢帮助我天天敬畏祢，活出全新的生命，并能将真实的盼望与人分享。奉主的名求，阿们！\n\n祷读：诗篇一〇六篇4节\n耶和华啊，祢用恩惠待祢的百姓；求祢也用这恩惠记念我，开祢的救恩眷顾我。\n\nQT: 传道书一章1~11节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 在耶路撒冷作王、大卫的儿子、传道者的言语。\n2 传道者说：虚空的虚空，虚空的虚空，凡事都是虚空。\n3 人一切的劳碌，就是他在日光之下的劳碌，有什么益处呢？\n4 一代过去，一代又来，地却永远长存。\n5 日头出来，日头落下，急归所出之地。\n6 风往南刮，又向北转，不住地旋转，而且返回转行原道。\n7 江河都往海里流，海却不满；江河从何处流，仍归还何处。\n8 万事令人厌烦〔或作“万物满有困乏”〕，人不能说尽。眼看，看不饱；耳听，听不足。\n9 已有的事后必再有；已行的事后必再行。日光之下并无新事。\n10 岂有一件事人能指着说这是新的？哪知，在我们以前的世代早已有了。\n11 已过的世代，无人记念；将来的世代，后来的人也不记念。"}, "11-17": {"theme": "离了神 智慧便是虚空", "scripture": "传道书一章12~18节", "url": "https://www.youtube.com/watch?v=n0mSOPfYMwo&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=25", "videoId": "n0mSOPfYMwo", "date_cn": "17/11/26(二)", "description": "主题：离了神 智慧便是虚空\n经文：传道书一章12~18节\n\n所罗门极有智慧，他的声名远播，甚至当时别国的女王，不远千里亲自到耶路撒冷，听他讲智慧的话（参王上十1~12；代下九1~11）。然而，所罗门却发现─智慧并不能使他的生命得著满足，最后竟然离开了神。「因为多有智慧，就多有愁烦；加增知识的，就加增忧伤。」（参18节）亲爱的弟兄姐妹，所罗门的经历，真是我们的鉴戒！但愿我们都能因认识神，而拥有真正的智慧。\n\n追求智慧和知识并非坏事，可是真正的智慧，会叫人敬畏神。换句话说，只有敬畏神，才能拥有真正的智慧。箴言一章7节写道，「敬畏耶和华是知识的开端」；这并不是说圣经完全提供世上所有的知识，也不是说我们不需要阅读其他书籍，只要读圣经就够了。举例来说：某人想当医生，如果他只读圣经，就不能成为医生。然而，如果某人想当医生，他不仅阅读了所有相关的医学书籍，也有相当好的实习经验，却不敬畏神、不认识神的话语，这样的人其实并没有真正的智慧。\n\n神和祂的话语，是一切智慧与知识的基础！一旦人离了神，就失去了智慧的根基。许多人可能透过哲学、数学来建构真理，但是「弯曲的，不能变直；缺少的，不能足数」（参15节）──人无法在脱离神的光景下，得到真正的智慧！\n\n然而，主耶稣说祂就是真理（参约十四6）。感谢主！神透过耶稣，使人可以得著绝对的真理。我们不需要是数学家、科学家、哲学家，或者是天才；我们只要因著认识神、敬畏神，就能拥有最有价值的智慧！亲爱的弟兄姐妹，让我们再度向神献上真诚的感恩与赞美，因为祂是智慧唯一的源头！\n\n回应：主啊！感谢祢乐意将自己启示给我，使我能够得著真正的智慧。求主保守我常在祢的里面，更加认识祢、经历祢，并能清楚祢的心意！奉主的名求，阿们！\n\n祷读：约翰福音十四章6节\n耶稣说：「我就是道路、真理、生命；若不藉著我，没有人能到父那里去。」\n\nQT: 传道书一章12~18节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "12 我传道者在耶路撒冷作过以色列的王。\n13 我专心用智慧寻求、查究天下所做的一切事，乃知神叫世人所经练的是极重的劳苦。\n14 我见日光之下所做的一切事，都是虚空，都是捕风。\n15 弯曲的，不能变直；缺少的，不能足数。\n16 我心里议论说：我得了大智慧，胜过我以前在耶路撒冷的众人，而且我心中多经历智慧和知识的事。\n17 我又专心察明智慧、狂妄，和愚昧，乃知这也是捕风。\n18 因为多有智慧，就多有愁烦；加增知识的，就加增忧伤。"}, "11-18": {"theme": "离了神 快乐是虚空", "scripture": "传道书二章1~11节", "url": "https://www.youtube.com/watch?v=m7_DyVWX6Zo&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=24", "videoId": "m7_DyVWX6Zo", "date_cn": "18/11/26(三)", "description": "主题：离了神 快乐是虚空\n经文：传道书二章1~11节\n\n当所罗门发现「智慧」无法真正满足人，他就从别的地方寻求满足。从这一段经文可以看到，所罗门渴望从快乐中得到满足。\n\n首先，他喝酒，这使他的肉体感到舒畅。不过，他并没有酗酒，因为他晓得这样做是不对的。然而，他却没有让敬畏神的智慧，来引导他生活的每一个层面。他继续学习各样追寻快乐的方式，即使他知道这样做似乎显得愚昧，却仍然期望尝试，看看到底哪一件事最能令人快乐（参1~3节）。\n\n于是，所罗门开始尝试一切肉体的享受，好比建造豪宅、增加财富，又在宫中纳入许多妃嫔，放纵情欲。他所享受的，当时无人能够相比！而他也为此筹划、劳碌。可是，当他最后回过头来看自己所经营的这一切，他的结论却是─「虚空」、「捕风」、「毫无益处」（参11节）。\n\n亲爱的弟兄姐妹，我们在生活中，是不是也时常寻求各样的刺激，以致渴望获得满足？许多年轻人从吸毒、嗑药、混夜店和逛街中寻找；中、老年人也借由不同方式，来寻求属于他们的快乐。但是，所有的快乐，不论是高尚的或是低俗的，都不能满足「日光之下」的人（参11节）。所罗门得到了一切，甚至是神所赏赐的丰盛，然而他却因没有持续敬畏、顺服神，而觉得生命更加虚空！\n\n事实上，让生活有所享受并非坏事。但是，如果我们在这些行为中，存著不敬畏神、只想满足私欲的态度，那就是一件错事！亲爱的弟兄姐妹，我们所拥有的都是神赏赐的，祂愿意让我们享受祂所赐的，为的是要我们用敬畏的态度来服事祂。我们当以神为最大的满足，知道万有都是本于祂，而我们拥有祂，就拥有了一切。\n\n当我们存著如此敬畏的心，来享受神所赏赐的一切，就不仅能够喜乐，还能得著极深的满足！\n\n回应：主啊！求祢加添我信心，使我更深渴慕祢、经历祢！愿祢天天将永恒的满足和喜乐，浇灌在我的心中！奉主的名求，阿们！\n\n祷读：诗篇十六篇11节\n祢必将生命的道路指示我。在祢面前有满足的喜乐；在祢右手中有永远的福乐。\n\nQT: 传道书二章1~11节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  http 离，落在痛苦、没有盼望的地狱中。因此，即使是死亡，这一件每个人都将经历的事，都会因人是否认识神、信靠神，而大有差别！\n\n另外，作者也提到「劳碌」这件事。当「劳碌」遇到「死亡」，仍旧是虚空的（参18~23节）！即便我们努力了半天，一旦死去，依然要把劳碌得来的成果留给后人。而接管的人到底是智慧还是愚昧，我们根本无法知道！\n\n好比我们喜欢将钱财留给儿女，但是儿女将来会不会善用这一笔钱，我们除了无法知道，甚至会为此感到担心！这不是说我们不能为自己或儿女存钱，而是我们必须求神指教我们，怀抱「积财在天」（参太十九19~21）的态度，存著敬畏神的心行事。\n\n因著耶稣基督从死里复活、得胜，如今我们得以拥有永恒的盼望！于是，我们在主里的劳苦，都不会是徒然、虚空的（参林前十五57~58）。感谢主！这是何等大的恩典！但愿我们行事为人都能靠主得胜，并能领受最深的盼望！\n\n回应：主啊！谢谢祢藉著耶稣基督，使我的生命重新得著盼望！我渴望为祢而活，并且凡事倚靠祢而行！奉主的名求，阿们！\n\n祷读：罗马书十五章13节 \n但愿使人有盼望的神，因信将诸般的喜乐、平安充满你们的心，使你们藉著圣灵的能力大有盼望。\n\nQT: 传道书二章12~23节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "12 我转念观看智慧、狂妄，和愚昧。在王以后而来的人还能做什么呢？也不过行早先所行的就是了。\n13 我便看出智慧胜过愚昧，如同光明胜过黑暗。\n14 智慧人的眼目光明〔“光明”原文作“在他头上”〕，愚昧人在黑暗里行。我却看明有一件事，这两等人都必遇见。\n15 我就心里说：“愚昧人所遇见的，我也必遇见，我为何更有智慧呢？”我心里说，这也是虚空。\n16 智慧人和愚昧人一样，永远无人记念，因为日后都被忘记；可叹智慧人死亡，与愚昧人无异。\n17 我所以恨恶生命；因为在日光之下所行的事我都以为烦恼，都是虚空，都是捕风。\n18 我恨恶一切的劳碌，就是我在日光之下的劳碌，因为我得来的必留给我以后的人。\n19 那人是智慧是愚昧，谁能知道？他竟要管理我劳碌所得的，就是我在日光之下用智慧所得的。这也是虚空。\n20 故此，我转想我在日光之下所劳碌的一切工作，心便绝望。\n21 因为有人用智慧、知识、灵巧所劳碌得来的，却要留给未曾劳碌的人为分。这也是虚空，也是大患。\n22 人在日光之下劳碌累心，在他一切的劳碌上得着什么呢？\n23 因为他日日忧虑，他的劳苦成为愁烦，连夜间心也不安。这也是虚空。"}, "11-20": {"theme": "一切出于神的手", "scripture": "传道书二章24~26节", "url": "https://www.youtube.com/watch?v=kbMslbbTV_s&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=22", "videoId": "kbMslbbTV_s", "date_cn": "20/11/26(五)", "description": "主题：一切出于神的手　\n经文：传道书二章24~26节\n\n作者认为，人在敬畏神的前提下吃喝、劳碌、享福，是很好的事情（参24节）。试想一个人如果都不用做事，只是养尊处优、吃喝玩乐，大概也不会自认在享福，恐怕反而会感到痛苦。就像是所罗门，他虽然体会过敬畏神的踏实，后来却在肉体的软弱中，经验虚空与悲哀。\n\n第26节所提到的「罪人」，可以有两个意思。一个是犯罪的人，另一个是上半节「神喜悦谁」这一句经文中的那个「谁」。然而，不论作者所指的是哪一个意思，他所强调的是：「万事都是出于神」。神随著自己的意思，将智慧、知识和喜乐，赏赐给祂想赏赐的人。同样地，神也随著自己的意思，把人所聚敛的罪过归给人。\n\n亲爱的弟兄姐妹，我们得著的智慧、知识和喜乐，都是神白白的恩典。如果我们敬畏神、顺服神，并能妥善使用这些赏赐，就必不虚空！然而，有时神也会挪去这些恩赐，使我们顿感劳苦愁烦与虚空！祂这样做，是要提醒我们─祂才是我们所信靠的对象！\n\n神拥有绝对主权，但是祂的预定与掌权，并不消减人回应祂的责任。神使我们所做的尽都顺利时，当存感谢的心，继续谦卑事奉祂。然而，有时神给我们的环境并不好受！此时就要在祂的面前，谦卑省察自己是否得罪祂，并且悔改。若在神的光照下，知道没有得罪神，就更要向祂献上感谢─求祂加添我们更坚定的信心，并更深体会祂的爱！\n\n「不但如此，就是在患难中也是欢欢喜喜的；因为知道患难生忍耐，忍耐生老练，老练生盼望；盼望不至于羞耻，因为所赐给我们的圣灵将神的爱浇灌在我们心里。」（参罗五3~5）亲爱的弟兄姊妹，我们作为神的儿女，是如此有福！不论面对顺境或逆境，只要单单信靠神，生命就必不虚空！\n\n回应：主啊！求祢加添信心，让我时刻经历祢的爱与信实，妥善使用祢所赏赐给我的一切，并归荣耀于祢！奉主的名求，阿们！\n\n祷读：雅各书一章17节 \n各样美善的恩赐和各样全备的赏赐都是从上头来的，从众光之父那里降下来的；在祂并没有改变，也没有转动的影儿。\n\nQT: 传道书二章24~26节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录 的人将永远沉沦，好像没有永生的野兽一样。\n\n亲爱的弟兄姐妹，但愿我们都能透过思想永恒的生命，更加明白天父满有宽容、怜悯的爱，而更加敬畏祂、爱慕祂、赞美祂！祂的公义将完全彰显，使我们因相信祂的权能与时间安排，天天怀抱喜乐与盼望，并且凭著信心知道─无论是过去的事，还是将来的事，都有神最美好的安排！\n\n回应：主啊！求祢让我在经历不公义的时候，仍然对祢怀抱信心和盼望！因为唯独祢是公义的神，祢的公义将要完全彰显！求祢的手牵引我，走在祢所预备的道路上！奉主的名求，阿们！\n\n祷读：诗篇七篇17节 \n我要照著耶和华的公义称谢祂，歌颂耶和华至高者的名。\n\nQT: 传道书三章16~22节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "16 我又见日光之下，在审判之处有奸恶，在公义之处也有奸恶。\n17 我心里说，神必审判义人和恶人；因为在那里，各样事务，一切工作，都有定时。\n18 我心里说，这乃为世人的缘故，是神要试验他们，使他们觉得自己不过像兽一样。\n19 因为世人遭遇的，兽也遭遇，所遭遇的都是一样：这个怎样死，那个也怎样死，气息都是一样。人不能强于兽，都是虚空。\n20 都归一处，都是出于尘土，也都归于尘土。\n21 谁知道人的灵是往上升，兽的魂是下入地呢？\n22 故此，我见人莫强如在他经营的事上喜乐，因为这是他的分。他身后的事谁能使他回来得见呢？"}, "11-23": {"theme": "欺压与嫉妒", "scripture": "传道书四章1~6节", "url": "https://www.youtube.com/watch?v=TIUxKOaer0U&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=19", "videoId": "TIUxKOaer0U", "date_cn": "23/11/26(一)", "description": "主题：欺压与嫉妒\n经文：传道书四章1~6节\n\n在传道书中，作者谈论了许多十分真实、却令人感到无奈的现象。今天所读的经文提到了两个现象，那就是「欺压」（参1~3节）和「嫉妒」（参4~6节）。\n\n首先，作者提到了「欺压」的现象。很多人滥用手中的权柄和势力，直接或间接欺负他人。而那些遭到欺压的人，不仅要面对这个艰难的事实，更可怜的是，没有人在乎他们的遭遇！\n\n再来，作者提到了「嫉妒」的现象。殷勤工作本是好事，但是倘若工作做得越好，却越惹人嫉妒，人与人之间就会产生恶性竞争。这样的结果不仅令人感叹──勤劳工作也是虚空，比那些愚昧、懒惰、笨到在吃自己的手的人还不如！\n\n亲爱的弟兄姐妹，我们从小到大或多或少都经验过欺压与嫉妒。有时我们是加害者，有时则是受害者。而在一些特别复杂的情况下，我们先是被害者，受伤之后却转为加害者。种种不公不义的现象，使得生活变得无奈与可悲。\n\n然而，日光之下令人绝望的实况，反而使人仰望日光之上的神！感谢主！我们所信的神是公义、良善的神，祂不喜悦欺压、嫉妒与争竞。如果我们是被害者，求神加添信心，知道祂掌管一切，而祂将按照祂的时间进行审判！相反地，如果我们是欺压与嫉妒他人的人，求神赦免，并且赐下信心─清楚自己生命的价值，不再和别人比较！\n\n感谢主！因耶稣基督的拯救，我们已经拥有「神的儿女」的身分了（参罗八16）！由于我们的生命是如此珍贵，就不再因骄傲而欺压他人，也不再因自卑而嫉妒他人！但愿我们每一天都能更加仰望神，来回应世上的不公与不义，并能认真对付自己生命的问题，彰显属神的美善！\n\n回应：主啊，我需要祢的怜悯！求祢提升我的眼光，让我更加渴慕祢的公义，并且期盼祢更新的大能，深刻地临到我的生命！奉主的名求，阿们！\n\n祷读：诗篇三十四篇5节 \n凡仰望祂的，便有光荣；他们的脸必不蒙羞。\n\nQT: 传道书四章1~6节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "1 我又转念，见日光之下所行的一切欺压。看哪，受欺压的流泪，且无人安慰；欺压他们的有势力，也无人安慰他们。\n2 因此，我赞叹那早已死的死人，胜过那还活着的活人。\n3 并且我以为那未曾生的，就是未见过日光之下恶事的，比这两等人更强。\n4 我又见人为一切的劳碌和各样灵巧的工作就被邻舍嫉妒。这也是虚空，也是捕风。\n5 愚昧人抱着手，吃自己的肉。\n6 满了一把，得享安静，强如满了两把，劳碌捕风。"}, "11-24": {"theme": "团契的美好", "scripture": "传道书四章7~12节", "url": "https://www.youtube.com/watch?v=A1U-Py7hdxY&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=18", "videoId": "A1U-Py7hdxY", "date_cn": "24/11/26(二)", "description": "主题：团契的美好\n经文：传道书四章7~12节\n\n在这一段经文中，作者先提到孤独的人生问题（参7~8节），接著再谈论团契生活的好处。\n\n前几章的经文，谈到了「劳碌」的虚空。我们经常辛苦了半天，成果却得留给后人，且无法得知他们会善用或是浪费！第7、8节提到的情况，是人在经过劳碌之后，心里感到空虚。不过，这里所提到的空虚，比较著重孤单的感受。\n\n当一个人很努力工作，不论他有没有成家，是否有手足或子孙，如果他无法与别人分享所拥有的一切，就算赚再多的钱，也是虚空！因此，在生活中有人陪伴，是一件好事。可是，所谓「陪伴」必须是在主里面，否则自私、虚假，甚至是互相包庇做坏事的友伴关系，并不会带来任何的益处！\n\n神创造人的时候，就希望人能够拥有同伴，以发展团契生活。所以，神为独居的亚当造了夏娃，可以扶持、帮助他（参创二18）。今天的经文也告诉我们，「两个人总比一个人好」（参9节）；这话不是指人一定要结婚，而是在说我们要找到合适的同伴，彼此扶持、互相分享，并能一同享受劳碌之后的成果。\n\n另外，作者告诉我们─在主里的团契生活，可以一起抵抗恶事（参10节）。举例来说，在群体之中，我们能够互相提醒、督促，避免让人陷入罪中；大家也能帮助某人胜过坏习惯，或是陪伴、安慰心灵忧伤的人、支持经济时有困难的人。而除了彼此帮补、解决问题之外，团契生活也能使我们得到很好的帮助，好比多人一起做工，就能更有果效。然而，不论是夫妻、家庭或是教会的肢体关系，最重要的是，透过人与人之间彼此相爱，可以分享更多神对我们的爱，进而彼此激励，更加爱神！\n\n回应：主啊！求祢让我敞开自己的心，与弟兄姐妹一起同奔天路、经历祢和服事祢！愿祢亲自带领我，在团契生活中更多看见祢的心意！奉主的名求，阿们！\n\n祷读：传道书四章12节\n有人攻胜孤身一人，若有二人便能敌挡他；三股合成的绳子不容易折断。\n\n\nQT: 传道书四章7~12节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "7 我又转念，见日光之下有一件虚空的事：\n8 有人孤单无二，无子无兄，竟劳碌不息，眼目也不以钱财为足。他说：“我劳劳碌碌，刻苦自己，不享福乐，到底是为谁呢？”这也是虚空，是极重的劳苦。\n9 两个人总比一个人好，因为二人劳碌同得美好的果效。\n10 若是跌倒，这人可以扶起他的同伴；若是孤身跌倒，没有别人扶起他来，这人就有祸了。\n11 再者，二人同睡就都暖和，一人独睡怎能暖和呢？\n12 有人攻胜孤身一人，若有二人便能敌挡他；三股合成的绳子不容易折断。"}, "11-25": {"theme": "莫忘拯救你的主", "scripture": "传道书四章13~16节", "url": "https://www.youtube.com/watch?v=Yb43YRXpFds&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=17", "videoId": "Yb43YRXpFds", "date_cn": "25/11/26(三)", "description": "主题：莫忘拯救你的主\n经文：传道书四章13~16节\n\n我们读这段经文的时候，可能会好奇─经文中的「少年人」和「老年人」，到底是谁？作者也许并没有特指某人，但是我们的确能从历史中，看到许多相似的情况。旧约圣经中的约瑟、撒母耳和大卫，都是在年轻的时候敬畏神，而得著神所赐的智慧。内地会的创办人戴德生（参Hudson Taylor），曾经是一位体弱多病的贫穷青年，神却重用他，带领他在中国传福音，并且借由他呼召许多宣教士，投入中国内地的福音工作。\n\n然而，圣经也让我们看见，有一些人虽然起初敬畏神而得著智慧，后来却一步、一步离开神！当大卫统一以色列与犹大各支派之后，胜利与成功却使他忘记了神，屈服于试探，以致犯罪（参撒下十一）！耶罗波安原本也是有智慧的人（参王上十一28），后来却因渴望保住王位而离弃神（参王上十二25~33）。\n\n当人年轻、贫穷、遭遇艰难和困苦，就会谦卑寻求神，被神使用。但是，当人一得志，就容易因骄傲、自满而堕落！传道书的作者对于人的这种虚空十分惋惜！因为似乎无人能避免这样的情况（参15节）。\n\n尽管我们不是国王，也不见得会经历从穷途潦倒到飞黄腾达的过程；但是，我们的生命，却经常不断的在平顺与挫败之间起伏。在低谷的时候，我们比较容易谦卑倚靠神，因为知道自己很软弱、很需要主！然而，困难过去之后，似乎很容易忘记神！不像之前那样谦卑，知道自己时时刻刻都需要神，甚至也不想听神的话！\n\n亲爱的弟兄姐妹，求主帮助我们，无论身处顺境或逆境，都能专心信靠祂、听从祂的话！但愿我们都能成为「有智慧的少年人」，而不是「年老不肯纳谏的愚昧王」（参13节）。\n\n回应：主啊！求祢保守我的心怀意念，使我无论遭遇何事，都能谦卑地来到祢的面前。求祢使我全心倚靠祢，并能在各样环境中归荣耀给祢！奉主的名求，阿们！\n\n祷读：申命记八章18节 \n你要记念耶和华─你的神，因为得货财的力量是他给你的，为要坚定他向你列祖起誓所立的约。\n\nQT: 传道书四章13~16节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "13 贫穷而有智慧的少年人胜过年老不肯纳谏的愚昧王。\n14 这人是从监牢中出来作王，在他国中，生来原是贫穷的。\n15 我见日光之下一切行动的活人都随从那第二位，就是起来代替老王的少年人。\n16 他所治理的众人就是他的百姓，多得无数；在他后来的人尚且不喜悦他。这真是虚空，也是捕风。"}, "11-26": {"theme": "谨慎主前", "scripture": "传道书五章1~7节", "url": "https://www.youtube.com/watch?v=ia5LRAeEhLw&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=16", "videoId": "ia5LRAeEhLw", "date_cn": "26/11/26(四)", "description": "主题：谨慎主前\n经文：传道书五章1~7节\n\n作者在这一段经文中，谈到了人与神之间互动的三种行为：献祭（参1节）、祷告（参2~3节）、许愿（参4~6节）。虽然因著耶稣基督的到来，现今的献祭与许愿，已经与旧约时代有了不同的表现（参来九11~14），这些表现的属灵意义，依然能够被含括在祷告的操练中。\n\n第1节告诉我们，人到神面前的时候，首先要听神的话，因为愿意听从神，比任何一件事情都重要。「听命胜于献祭；顺从胜于公羊的脂油」（参撒上十五22）。亲爱的弟兄姐妹，虽然献祭是很重要的事情，神却更喜悦我们愿意听祂的话！\n\n我们祷告的时候，也要听神对我们说话，不是只顾自己讲。即使我们不断地向神表达内心的颂赞、感谢或祈求，也都要怀抱一颗愿意听主说话的心─在祷告中，我们在说，也在听。\n\n第2、3节告诉我们，另一个重要的祷告态度。这一段经文向我们强调─「神在天上，你在地下」（参2节）。亲爱的弟兄姐妹，神掌管万事！因此，我们不要在祂的面前喋喋不休，好像以为祂不明白。求主加添我们信心，尤其是当我们为著某件事迫切祷告的时候，更是不要忘记─神以全然的智慧与慈爱，掌管万事！\n\n第4至6节则告诉我们，我们到主的面前，要怀抱敬畏的态度。这里提到的许愿，重点不在于一定要偿还，而是不可以轻慢。我们可能在一些情况下许愿，后来却发现许愿的内容或心态有误，而对所许的愿感到反悔。神一定明白我们想法和能力上的限制，而能怜悯、接纳不成熟的许愿；因此，重点并不在于所许的非偿还不可，而是在于─不要像「愚昧人」一样不敬畏神，在神的面前随便说说、不谨慎！\n\n亲爱的弟兄姐妹，神是如此伟大！让我们带著敬畏的心，来到祂的面前！　\n\n回应：主啊！求祢将敬畏祢的心赏赐给我！我要天天尊崇祢的名，并将一切的荣耀归给祢！愿祢喜悦我的一切所言、所行与所求！奉主的名求，阿们！\n\n祷读：申命记十章12节\n以色列啊，现在耶和华─你神向你所要的是什么呢？只要你敬畏耶和华─你的神，遵行祂的道，爱祂，尽心尽性事奉祂。\n\nQT: 传道书五章1~7节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  h 上，那么迟早就要面临极大的祸患！因为这一切的财富，根本不能救他脱离死亡，也不能让他在死后的世界中享用（参传五13~17）!\n\n亲爱的弟兄姐妹，何等感恩，因为我们拥有一份超越死亡的恩典！作为神的儿女，我们都明白─最大的盼望是在将来！当我们的生命结束之后，我们将在永恒中享受神的恩典！因此，财富不会成为我们生命的目标，即便贫穷，也不会绊倒我们！因为这一位慈爱的主，要天天带领我们的生命，走向永恒的丰盛！但愿神天天赐下管理财富的智慧，好让我们能成为祂忠心的好管家，并将一切的荣耀归给祂！\n\n回应：主啊！我是如此软弱、渺小，以致可能落入钱财的试探！求祢格外加添我信心与智慧，好让我在各样的景况中，都能尊祢为大！奉主的名求，阿们！\n\n祷读：传道书五章18节\n我所见为善为美的，就是人在神赐他一生的日子吃喝，享受日光之下劳碌得来的好处，因为这是他的分。\n\nQT: 传道书五章8节~六章2节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "8 你若在一省之中见穷人受欺压，并夺去公义公平的事，不要因此诧异；因有一位高过居高位的鉴察，在他们以上还有更高的。\n9 况且地的益处归众人，就是君王也受田地的供应。\n10 贪爱银子的，不因得银子知足；贪爱丰富的，也不因得利益知足。这也是虚空。\n11 货物增添，吃的人也增添，物主得什么益处呢？不过眼看而已！\n12 劳碌的人不拘吃多吃少，睡得香甜；富足人的丰满却不容他睡觉。\n13 我见日光之下有一宗大祸患，就是财主积存资财，反害自己。\n14 因遭遇祸患，这些资财就消灭；那人若生了儿子，手里也一无所有。\n15 他怎样从母胎赤身而来，也必照样赤身而去；他所劳碌得来的，手中分毫不能带去。\n16 他来的情形怎样，他去的情形也怎样。这也是一宗大祸患。他为风劳碌有什么益处呢？\n17 并且他终身在黑暗中吃喝，多有烦恼，又有病患呕气。\n18 我所见为善为美的，就是人在神赐他一生的日子吃喝，享受日光之下劳碌得来的好处，因为这是他的分。\n19 神赐人资财丰富，使他能以吃用，能取自己的分，在他劳碌中喜乐，这乃是神的恩赐。\n20 他不多思念自己一生的年日，因为神应他的心使他喜乐。"}, "11-28": {"theme": "生命美好的影儿", "scripture": "传道书六章3~12节", "url": "https://www.youtube.com/watch?v=PeNeIPpYKcg&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=14", "videoId": "PeNeIPpYKcg", "date_cn": "28/11/26(六)", "description": "主题：生命美好的影儿\n经文：传道书六章3~12节\n\n传道书的作者不断探讨「虚空」。作者认为人活在这个世界上，似乎做什么都没有意义。因为人若拥有了一切的福分，却不得善终，不如当个「不到期而落的胎」（参3节）。\n\n作者的言论，乍听之下令人觉得不可思议！人活在世上至少还能享有一些荣华富贵，怎么会比不上流产的胎儿呢？原来，作者认为人最大的福气，并非那些看得到的荣华富贵、子孙满堂，而是「安息」（参5节）。\n\n人只要活著，就会时常焦虑。无论是工作、健康、家庭、孩子，或是其他与我们息息相关的人、事、物。只要是我们所在乎的，就很可能让我们即便活著，却无法得著安息！\n\n亲爱的弟兄姐妹，我们若要得享安息，就必须怀抱一颗敬畏神的心。因为人活在世上，如果只是为了填饱肚子、满足各样欲望，也不会觉得满足（参7节）。即使我们认真过每一天，内心却不敬畏上帝，那么，任何事都会是虚空。有智慧跟没智慧的人，没有什么差别（参8节）；看见好东西和在心里幻想，好像也没有差别（参9节）；而我们也不需要努力，因为反正我们胜不过命运（参10节）！这样的人生，真的是在虚度光阴，如同无意义的影子一样！\n\n传道书的作者认为，人的一生像是不真实的影子，毫无意义！然而，在历代志上第二十九章，大卫却从正面的角度来谈论我们的一生──他认为我们的一生好像影儿（参代上二十九15），是我们将来永远与主一同生活的轮廓！基督徒跟不信主的人一样，都在世上吃喝嫁娶。但是，不信主的人生活虚空，是无意义的影儿，基督徒的生活，却预表未来将有更好的影儿！\n\n感谢主！唯有圣经能够告诉我们，「身后在日光之下有什么事」（参12节），而且生命的起初及末后，都在神的手里！但愿我们都能更加信靠神的话，向往活出生命美好的影儿，并且更深经历神荣耀的心意！\n\n回应：主啊！求祢开启我的心眼，让我一生以祢为至宝，并能经历将来在天上，全然美好的影儿！奉主的名求，阿们！\n\n祷读：传道书八章12节 \n罪人虽然作恶百次，倒享长久的年日; 然而我准知道，敬畏神的，就是在祂面前敬畏的人，终久必得福乐。\nQT: 传道书六章3~12节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n🏠台北基督之家 https://www.tpehoc.org.tw/\n⛪寻找合适教会：https://153in.net/join \n\n😀 天声奔跑在媒体宣教这条又大又远的道路上，我们很需要各位的支持与守望代祷。欢迎广传天声海内外各平台，使人同得这福音的好处！\n\n✝ 1988年，#基督之家​ 创办人寇世远监督已经察觉到大众传播工具的影响力，因此成立了「天声传播协会」，制作一系列的「天人之间」电视节目和广播节目，专注于华人世界的媒体福音事工。\n\n🙏 2013年，天声制播由 #寇绍恩牧师​ 主讲的 #恩典365​ 节目。播出后，收到来自世界各地华人听众给我们的感动回应，他们说，虽然每天只有几分钟的时间，却能带给他们许多的提醒与亮光，得以面对生活中各式各样的挑战。\n\n🙏2015年，天声推出由基督之家牧者团队编撰的 #每日亲近神​ 灵修QT手册，帮助弟兄姊妹们每天精读圣经、思想上帝话语、培养固定灵修习惯，更深的与上帝亲近。\n\n🙏2021年，天声在热心的弟兄姐妹录制支持下推出*寇世远【 口唱心和 心被恩感 *纯诗歌集】    • 寇世远 - 诗歌集【口唱心和 心被恩感】  \n\n🙏2023年起，陆续发布【 口唱心和 心被恩感 *诗歌集-灵修版】 (有声书)    • 寇世远 **研经选读** 【口唱心和❤心被恩感】** 诗歌集灵修版  \n本诗歌集收录1969至1977年间，由 #基督之家 创办人 #寇世远 监督主日讲道的部分信息，以及依照信息创作填词的200多首 #诗歌 ，愿感动寇监督的圣灵，也加倍感动每一位收听的您！\n\n🙏2024年起，天声推出以【每日亲近神​】祷读经文延伸制作的每天1分钟祷告短影片     / @hvfhoc123     欢迎弟兄姊妹多多分享神的话语祝福更多的人！\n\n☀️影像及音乐版权均属天声传播协会所有***", "bible_text": "3 人若生一百个儿子，活许多岁数，以致他的年日甚多，心里却不得满享福乐，又不得埋葬；据我说，那不到期而落的胎比他倒好。\n4 因为虚虚而来，暗暗而去，名字被黑暗遮蔽，\n5 并且没有见过天日，也毫无知觉；这胎，比那人倒享安息。\n6 那人虽然活千年，再活千年，却不享福，众人岂不都归一个地方去吗？\n7 人的劳碌都为口腹，心里却不知足。\n8 这样看来，智慧人比愚昧人有什么长处呢？穷人在众人面前知道如何行，有什么长处呢？\n9 眼睛所看的比心里妄想的倒好。这也是虚空，也是捕风。\n10 先前所有的，早已起了名，并知道何为人，他也不能与那比自己力大的相争。\n11 加增虚浮的事既多，这与人有什么益处呢？\n12 人一生虚度的日子，就如影儿经过，谁知道什么与他有益呢？谁能告诉他身后在日光之下有什么事呢？"}, "11-29": {"theme": "掌管万事的神", "scripture": "传道书七章1~14节", "url": "https://www.youtube.com/watch?v=d2WnsjlVwt8&list=PLgFvTLP0QRDtImOpCwCxMUY_ByWws5PWB&index=13", "videoId": "d2WnsjlVwt8", "date_cn": "29/11/26(日)", "description": "主题：掌管万事的神\n经文：传道书七章1~14节\n\n这一段经文第1至4节提到，死是众人的结局。虽然人人都有一死，很多人却没有真正体认到这个事实。或许参加追思礼拜会比参加婚礼更能提醒我们─人必有死的事实（参2节）。当人体会到无法逃脱死亡，以致内心忧愁，未尝不是好事，因为这样更有可能使人愿意归向真神。\n\n圣经提及「智慧」和「知识」，往往是引领人进入认识、敬畏神的真理，而传道书的内容，正切合这样的主题！作者提醒我们「人必有死」的事实，是在帮助我们看见将生命归向神的重要！第4节提到的「愚昧人」，就是那些不认识神的人。虽然他们所做的事情看似正面，作者却告诉我们─倘若人不认识神，就算拥有了一切，也都是虚空的！\n\n感谢主！当我们认识神，日子就不虚空！可是，在认识神之后，仍然会发生一些事情，让我们感觉很不好，甚至痛苦！在这样的时刻，我们非常需要神来帮助我们！面对不好的事情时，先不要心存恼怒，认为神做错了！求主亲自帮助我们，在一切的艰难中忍耐、等候祂，并坚定持守对祂的信心，而不是时常「想当年」，认为神过去比现在更恩待我们（参8~10节）。\n\n亲爱的弟兄姐妹，神所做的事情，我们未必都能明白。但是，无论祂使我们经历亨通，或是面对患难，都是要我们思想祂在我们生命中的旨意！尽管我们不能明白，为何这时亨通、那时遭难，却愿意更加谦卑地来到祂的面前，知道唯独祂是明白万事的主（参13~14节）！\n\n感谢主！认识神并且对祂怀抱信心，是能够保护人，并且使人得益处的真智慧（参12节）！但愿我们每一天都能经历神的信实与慈爱，并能持守对祂的信心，更亲密地与祂同行！\n\n回应：主啊！求祢使我看见，祢是掌管万事的主！不论我经历亨通或患难，求祢帮助我能更多认识、经历祢的美善！奉主的名求，阿们！\n\n祷读：传道书七章14节\n遇亨通的日子你当喜乐；遭患难的日子你当思想；因为神使这两样并列，为的是叫人查不出身后有什么事。\n\nQT: 传道书七章1~14节\n*************\n💌快来留言说「阿们！」or 回应领受或见证，愿圣灵开启我们的心窍能明白真理！\n🐂🐏🐦 奉献支持天声事工：https://hvfhoc.eoffering.org.tw/ \n🔔 订阅「天声」按下铃铛 👉*全部*  https://bit.ly/sub365yt  🌹\n📖寇绍恩牧师丛书：https://153in.net/pcbuy\n🔥 天声官网 https://www.hvfhoc.com/ \n📡 天声Podcast   https://bit.ly/Grace365Podcast \n📣 恩典365 - 天声粉专  https://bit.ly/G365FB\n🙂欢迎就近加入教会： \n
